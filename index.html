<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA ULTIMATE</title>
    <style>
        :root {
            --purp: #a855f7;
            --blue: #00d2ff;
            --bg: #030306;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; position: fixed;
        }

        /* АТМОСФЕРНЫЙ ФОН */
        .bg {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 50% 0%, rgba(168, 85, 247, 0.25) 0%, transparent 70%),
                radial-gradient(circle at 0% 100%, rgba(0, 210, 255, 0.15) 0%, transparent 50%);
        }

        .container {
            display: flex; flex-direction: column; height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        /* СВЕТЯЩАЯСЯ НАДПИСЬ */
        .header { padding: 25px; text-align: center; }
        .header h1 {
            font-size: 3.2rem; letter-spacing: 15px; margin: 0;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--purp), var(--blue), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: auraFlow 5s linear infinite;
            filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.6));
        }

        @keyframes auraFlow { to { background-position: 200% center; } }

        #chat {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 160px;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            padding: 16px 20px; border-radius: 24px; max-width: 80%;
            font-size: 16px; line-height: 1.4; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } }

        .a-msg { 
            background: rgba(168, 85, 247, 0.12); align-self: flex-start; 
            border-bottom-left-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .u-msg { 
            background: rgba(255, 255, 255, 0.06); align-self: flex-end; 
            border-bottom-right-radius: 4px; border-color: rgba(0, 210, 255, 0.3);
        }

        /* ВВОД БЕЗ БЛОКИРОВОК */
        .input-area {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
            padding: 15px 20px calc(35px + env(safe-area-inset-bottom));
        }

        .row { display: flex; gap: 12px; max-width: 550px; margin: 0 auto; }

        input {
            flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 16px 22px; color: #fff; font-size: 17px;
            outline: none; -webkit-appearance: none;
        }

        button {
            width: 56px; height: 56px; border-radius: 28px;
            background: linear-gradient(135deg, var(--purp), var(--blue));
            border: none; color: white; font-size: 24px;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            display: flex; align-items: center; justify-content: center;
        }

        .loader { display: none; text-align: center; color: var(--blue); font-size: 11px; margin-bottom: 8px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="header"><h1>AURA</h1></div>
        <div id="chat">
            <div class="msg a-msg">Бро, я собрала всё в один файл. Никаких настроек — просто пиши. Синий и фиолетовый неон в здании! 💜✨</div>
        </div>
        <div class="input-area">
            <div id="ldr" class="loader">ПОТОК МЫСЛЕЙ...</div>
            <div class="row">
                <input type="text" id="in" placeholder="Спроси AURA..." autocomplete="off">
                <button id="go">➜</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat'), input = document.getElementById('in'), btn = document.getElementById('go'), ldr = document.getElementById('ldr');

        async function ask() {
            const val = input.value.trim();
            if(!val) return;

            const u = document.createElement('div');
            u.className = 'msg u-msg'; u.textContent = val;
            chat.appendChild(u); input.value = '';
            chat.scrollTop = chat.scrollHeight;
            ldr.style.display = 'block';

            try {
                // Используем легальный метод получения данных, который не блокирует Safari
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.simsimi.vn/v2/?text=' + val + '&lc=ru'));
                const data = await response.json();
                const result = JSON.parse(data.contents);

                const a = document.createElement('div');
                a.className = 'msg a-msg';
                a.textContent = result.result || "Бро, я здесь. Что на уме?";
                chat.appendChild(a);
            } catch (e) {
                const a = document.createElement('div');
                a.className = 'msg a-msg';
                a.textContent = "Сигнал прошел, но Safari капризничает. Нажми еще раз!";
                chat.appendChild(a);
            } finally {
                ldr.style.display = 'none';
                chat.scrollTop = chat.scrollHeight;
            }
        }

        btn.onclick = ask;
        input.onkeypress = (e) => { if(e.key === 'Enter') { ask(); input.blur(); } };
    </script>
</body>
</html>
