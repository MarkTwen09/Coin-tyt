<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dota 2 HTML Lite</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0c0f12;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: radial-gradient(circle, #1a2229 0%, #0b0e11 100%);
            position: relative;
        }
        /* Экран выбора героя */
        #hero-selection {
            position: absolute;
            inset: 0;
            background: rgba(12, 15, 18, 0.95);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .hero-title {
            font-size: 24px;
            color: #e54e4e;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(229, 78, 78, 0.5);
        }
        .hero-list {
            display: flex;
            gap: 20px;
        }
        .hero-card {
            width: 140px;
            height: 200px;
            background: #1c242d;
            border: 2px solid #3c4856;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .hero-card:active {
            transform: scale(0.95);
            border-color: #e54e4e;
        }
        .hero-avatar {
            font-size: 50px;
            margin-bottom: 20px;
        }
        .hero-name {
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }

        /* Верхний бар (Счёт, Золото) */
        .top-bar {
            height: 60px;
            background: linear-gradient(to bottom, #1c242d, #12171d);
            border-bottom: 2px solid #2e3743;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .score-board {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: #000;
            padding: 5px 15px;
            border-radius: 4px;
            border: 1px solid #e54e4e;
        }
        .gold-display {
            color: #ffd700;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Игровое поле (Псевдо-3D Мид) */
        .battlefield {
            flex-grow: 1;
            position: relative;
            background: linear-gradient(135deg, #1b2819 0%, #111a10 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Сетка для эффекта глубины */
        .battlefield::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
        }

        /* Персонажи */
        .entity {
            position: absolute;
            bottom: 30%;
            transition: all 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #player-hero {
            left: 20%;
        }
        #enemy-creep {
            right: 20%;
        }
        .model-3d {
            font-size: 60px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            animation: idle 1.5s infinite ease-in-out;
        }
        #enemy-creep .model-3d {
            transform: scaleX(-1);
        }
        @keyframes idle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ХП Бары */
        .hp-bar-container {
            width: 80px;
            height: 8px;
            background: #333;
            border: 1px solid #000;
            border-radius: 2px;
            margin-bottom: 5px;
            overflow: hidden;
        }
        .hp-bar {
            height: 100%;
            width: 100%;
            transition: width 0.1s;
        }
        .player-hp { background: #2ecc71; }
        .enemy-hp { background: #e74c3c; }

        /* Нижняя панель (Скиллы и Закуп) */
        .hud-panel {
            background: #0e1217;
            border-top: 3px solid #232d38;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .skills-row, .shop-row {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-action {
            width: 65px;
            height: 65px;
            background: #1c242d;
            border: 2px solid #3c4856;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            position: relative;
            cursor: pointer;
        }
        .btn-action:active {
            transform: scale(0.95);
            background: #25313d;
        }
        .btn-action .icon {
            font-size: 24px;
            margin-bottom: 2px;
        }
        .btn-action .cost {
            position: absolute;
            bottom: 2px;
            font-size: 10px;
            color: #ffd700;
        }

        /* Эффекты урона */
        .damage-popup {
            position: absolute;
            color: #ff4d4d;
            font-weight: bold;
            font-size: 24px;
            animation: floatUp 0.6s ease-out forwards;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(0.8); opacity: 0; }
        }

        /* Всплывающее золото */
        .gold-popup {
            position: absolute;
            color: #ffd700;
            font-weight: bold;
            font-size: 20px;
            animation: floatUp 0.6s ease-out forwards;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hero-selection">
        <div class="hero-title">Выберите Героя</div>
        <div class="hero-list">
            <div class="hero-card" onclick="selectHero('Shadow Fiend', '😈', 15)">
                <div class="hero-avatar">😈</div>
                <div class="hero-name">Shadow Fiend</div>
            </div>
            <div class="hero-card" onclick="selectHero('Juggernaut', '🥷', 12)">
                <div class="hero-avatar">🥷</div>
                <div class="hero-name">Juggernaut</div>
            </div>
        </div>
    </div>

    <div class="top-bar">
        <div class="gold-display">🪙 <span id="gold-count">0</span></div>
        <div class="score-board">KILLS: <span id="kill-count">0</span></div>
    </div>

    <div class="battlefield" id="battlefield" onclick="dealDamage(false)">
        <div class="entity" id="player-hero">
            <div class="hp-bar-container"><div class="hp-bar player-hp" id="player-hp-bar"></div></div>
            <div class="model-3d" id="player-model">😈</div>
        </div>

        <div class="entity" id="enemy-creep">
            <div class="hp-bar-container"><div class="hp-bar enemy-hp" id="enemy-hp-bar"></div></div>
            <div class="model-3d">👹</div>
        </div>
    </div>

    <div class="hud-panel">
        <div class="skills-row">
            <div class="btn-action" onclick="useSkill('cooldown1', 2, 50)" id="skill1">
                <span class="icon">💥</span>
                <span>Скилл 1</span>
            </div>
            <div class="btn-action" onclick="useSkill('cooldown2', 4, 120)" id="skill2">
                <span class="icon">🔥</span>
                <span>Ульта</span>
            </div>
        </div>

        <div class="shop-row">
            <div class="btn-action" onclick="buyItem('Daedalus', 150, 10, this)">
                <span class="icon">⚔️</span>
                <span>Daedalus</span>
                <span class="cost">150</span>
            </div>
            <div class="btn-action" onclick="buyItem('Rapier', 400, 35, this)">
                <span class="icon">🔱</span>
                <span>Rapier</span>
                <span class="cost">400</span>
            </div>
        </div>
    </div>
</div>

<script>
    // Игровое состояние
    let gameState = {
        gold: 0,
        kills: 0,
        heroName: '',
        playerDmg: 10,
        enemyMaxHp: 50,
        enemyHp: 50,
        cooldown1: false,
        cooldown2: false
    };

    // Выбор героя
    function selectHero(name, avatar, baseDmg) {
        gameState.heroName = name;
        gameState.playerDmg = baseDmg;
        document.getElementById('player-model').innerText = avatar;
        document.getElementById('hero-selection').style.display = 'none';
        spawnCreep();
    }

    // Респавн крипа
    function spawnCreep() {
        gameState.enemyMaxHp = 50 + (gameState.kills * 15); // Сложность растет
        gameState.enemyHp = gameState.enemyMaxHp;
        updateHpBars();
    }

    // Обновление интерфейса ХП
    function updateHpBars() {
        const enemyPct = (gameState.enemyHp / gameState.enemyMaxHp) * 100;
        document.getElementById('enemy-hp-bar').style.width = Math.max(0, enemyPct) + '%';
    }

    // Клик по экрану — атака
    function dealDamage(isSkill, skillDmg = 0) {
        let damage = isSkill ? skillDmg : gameState.playerDmg;
        
        // Рандомный крит (20% шанс)
        let isCrit = !isSkill && Math.random() < 0.2;
        if (isCrit) {
            damage *= 2;
        }

        gameState.enemyHp -= damage;
        
        // Анимация атаки героя
        const pModel = document.getElementById('player-model');
        pModel.style.transform = 'translateX(30px) scale(1.1)';
        setTimeout(() => pModel.style.transform = 'none', 50);

        // Появление цифр урона
        createPopup(damage, isCrit ? 'orange' : '#ff4d4d', 'damage-popup');

        if (gameState.enemyHp <= 0) {
            handleKill();
        } else {
            updateHpBars();
        }
    }

    // Обработка убийства крипа
    function handleKill() {
        gameState.kills++;
        let goldEarned = 30 + Math.floor(Math.random() * 20);
        gameState.gold += goldEarned;

        document.getElementById('kill-count').innerText = gameState.kills;
        document.getElementById('gold-count').innerText = gameState.gold;

        createPopup(`+${goldEarned} 🪙`, '#ffd700', 'gold-popup');
        
        // Смерть врага и спавн нового
        const eModel = document.getElementById('enemy-creep');
        eModel.style.opacity = '0';
        setTimeout(() => {
            eModel.style.opacity = '1';
            spawnCreep();
        }, 300);
    }

    // Юз скиллов
    function useSkill(cooldownProp, multiplier, cdTime) {
        if (gameState[cooldownProp]) return;

        gameState[cooldownProp] = true;
        let sDmg = gameState.playerDmg * multiplier;
        dealDamage(true, sDmg);

        // Визуальное КД на кнопке
        const btn = cooldownProp === 'cooldown1' ? document.getElementById('skill1') : document.getElementById('skill2');
        btn.style.opacity = '0.4';

        setTimeout(() => {
            gameState[cooldownProp] = false;
            btn.style.opacity = '1';
        }, cdTime * 10); // Внутреннее КД
    }

    // Покупка шмоток
    function buyItem(itemName, cost, extraDmg, buttonElement) {
        if (gameState.gold >= cost) {
            gameState.gold -= cost;
            gameState.playerDmg += extraDmg;
            document.getElementById('gold-count').innerText = gameState.gold;
            
            // Стилизация купленного предмета
            buttonElement.style.borderColor = '#2ecc71';
            buttonElement.style.boxShadow = '0 0 10px rgba(46, 204, 113, 0.5)';
            buttonElement.onclick = null; // Покупка в один раз для простоты
            
            createPopup('Куплено!', '#2ecc71', 'gold-popup');
        } else {
            createPopup('Не хватает золота!', '#e74c3c', 'gold-popup');
        }
    }

    // Создание всплывающего текста
    function createPopup(text, color, className) {
        const bf = document.getElementById('battlefield');
        const popup = document.createElement('div');
        popup.className = className;
        popup.innerText = text;
        popup.style.color = color;
        
        // Позиция у крипа
        popup.style.left = '65%';
        popup.style.top = '40%';

        bf.appendChild(popup);
        setTimeout(() => popup.remove(), 600);
    }
</script>
</body>
</html>
