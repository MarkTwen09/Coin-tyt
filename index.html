<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA | Neural System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #c084fc; --base: #000000; }
        body { background: var(--base); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Анимированный глубокий фон */
        .bg-canvas { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 100%, #1a0b2e 0%, #000 70%); }
        .bg-canvas::after { content: ''; position: absolute; inset: 0; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.15; pointer-events: none; }
        .glow { position: absolute; top: -10%; left: 50%; width: 60%; height: 40%; background: var(--accent); filter: blur(120px); opacity: 0.1; transform: translateX(-50%); animation: drift 10s infinite alternate; }

        @keyframes drift { from { transform: translateX(-60%) scale(1); } to { transform: translateX(-40%) scale(1.1); } }

        /* Сообщения */
        .msg-ai { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(25px); border-radius: 24px; box-shadow: inset 0 0 20px rgba(192, 132, 252, 0.05); }
        .msg-user { background: linear-gradient(135deg, #a855f7, #6366f1); box-shadow: 0 10px 30px -10px rgba(168, 85, 247, 0.5); border-radius: 24px; }

        /* Поле ввода как в iOS 18 / Grok */
        .glass-input { background: rgba(15,15,15,0.6); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .glass-input:focus-within { border-color: var(--accent); box-shadow: 0 0 25px rgba(192, 132, 252, 0.2); }

        #chat-flow { height: calc(100vh - 170px); mask-image: linear-gradient(to bottom, transparent, black 12%, black 88%, transparent); }
        #chat-flow::-webkit-scrollbar { display: none; }

        .btn-glow { background: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.3); transition: 0.3s; }
        .btn-glow:active { transform: scale(0.85); }
        
        .aura-text { font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; background: linear-gradient(to bottom, #fff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="flex flex-col">
    <div class="bg-canvas"></div>
    <div class="glow"></div>

    <header class="pt-14 pb-4 px-8 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <span class="aura-text text-xl">Aura</span>
        </div>
        <div class="px-3 py-1 rounded-full border border-white/10 text-[9px] tracking-[0.2em] opacity-50 bg-white/5 uppercase">Neural Link Established</div>
    </header>

    <main id="chat-flow" class="overflow-y-auto p-6 space-y-8 flex flex-col pt-12"></main>

    <div id="loader" class="hidden px-10 py-2 text-[10px] text-purple-300 tracking-[0.3em] uppercase opacity-60 animate-pulse">Aura is dreaming...</div>

    <footer class="p-6 pb-12 z-20">
        <div class="max-w-3xl mx-auto glass-input flex items-center p-2">
            <input type="text" id="userInput" class="w-full bg-transparent px-5 py-4 text-sm outline-none text-white placeholder-white/20" placeholder="Sync with Aura..." autocomplete="off">
            <button onclick="handle()" class="btn-glow text-black h-12 w-12 flex items-center justify-center rounded-full">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
        </div>
    </footer>

    <script>
        const KEY = 'AIzaSyDOqqL5RGsnseRbEnfn64YZdpZ7-2YIzOY';

        async function handle() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat-flow');
            const loader = document.getElementById('loader');
            const val = input.value.trim();
            if (!val) return;

            input.value = '';
            chat.innerHTML += `<div class="msg-user p-5 self-end max-w-[85%] text-sm leading-relaxed">${val}</div>`;
            chat.scrollTo(0, chat.scrollHeight);
            
            loader.classList.remove('hidden');

            try {
                // ПЕРЕКЛЮЧИЛ НА СТАБИЛЬНУЮ ВЕРСИЮ v1
                const r = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await r.json();
                loader.classList.add('hidden');

                if (data.error) {
                    chat.innerHTML += `<div class="p-4 bg-white/5 border border-red-500/30 rounded-2xl text-[10px] text-red-400 text-center uppercase tracking-widest">Protocol Failure: ${data.error.message}</div>`;
                } else {
                    const aiText = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="msg-ai p-6 self-start max-w-[90%] text-sm leading-relaxed border-l-2 border-purple-500/50">${aiText}</div>`;
                }
            } catch (err) {
                loader.classList.add('hidden');
                chat.innerHTML += `<div class="text-red-500 text-center text-[10px] uppercase tracking-widest">Link Offline: Check VPN Access</div>`;
            }
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
        }

        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') handle(); };
    </script>
</body>
</html>
