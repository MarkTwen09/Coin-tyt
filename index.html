<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLIXY PREMIUM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #ffcc00;
            --bg: #000000;
            --surface: #121212;
            --text: #ffffff;
            --text-dim: #999999;
            --safe-top: env(safe-area-inset-top);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Основной экран --- */
        .app-shell {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: var(--safe-top);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 180px;
            scrollbar-width: none;
        }
        .content::-webkit-scrollbar { display: none; }

        .logo { font-size: 28px; font-weight: 900; color: var(--accent); margin-bottom: 30px; }

        /* --- Карточка загрузки --- */
        .upload-section {
            background: var(--surface);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .upload-section input {
            width: 100%; background: #1a1a1a; border: none; padding: 14px;
            border-radius: 12px; color: #fff; margin-bottom: 12px; font-size: 16px;
        }
        .file-label {
            display: block; background: #252525; padding: 12px; text-align: center;
            border-radius: 12px; margin-bottom: 12px; color: var(--text-dim); cursor: pointer;
        }
        .btn-pub {
            width: 100%; background: var(--accent); color: #000; border: none;
            padding: 16px; border-radius: 14px; font-weight: 800; font-size: 16px;
        }

        /* --- Список треков --- */
        .track-card {
            display: flex; align-items: center; padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .track-card img { width: 56px; height: 56px; border-radius: 10px; margin-right: 16px; object-fit: cover; }
        .track-info { flex: 1; }
        .track-info h4 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .track-info p { font-size: 14px; color: var(--text-dim); }

        /* --- МИНИ-ПЛЕЕР --- */
        .mini-player {
            position: fixed; bottom: 90px; left: 8px; right: 8px;
            background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(25px);
            height: 64px; border-radius: 16px; display: flex; align-items: center;
            padding: 0 12px; z-index: 1000; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .mini-player img { width: 44px; height: 44px; border-radius: 8px; margin-right: 12px; }

        /* --- ПОЛНЫЙ ПЛЕЕР (Swipe up) --- */
        .player-view {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
            transition: transform 0.4s cubic-bezier(0.32, 1, 0.23, 1);
            display: flex; flex-direction: column; padding: 40px 24px;
        }
        .player-view.active { transform: translateY(-100%); }

        .player-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #333 0%, #000 100%);
            opacity: 0.6; z-index: -1;
        }

        .drag-handle { width: 40px; height: 5px; background: #333; border-radius: 3px; align-self: center; margin-bottom: 40px; }

        .full-cover { width: 100%; aspect-ratio: 1; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-bottom: 40px; }

        /* --- Слайдер времени --- */
        .progress-container { width: 100%; margin: 30px 0; }
        .slider { width: 100%; height: 4px; background: #333; border-radius: 2px; position: relative; cursor: pointer; }
        .slider-fill { width: 0%; height: 100%; background: var(--accent); border-radius: 2px; }

        .controls { display: flex; justify-content: space-around; align-items: center; width: 100%; margin-top: 20px; }
        .play-main { width: 80px; height: 80px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; }

        /* --- Навигация --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(0,0,0,0.9); display: flex; justify-content: space-around;
            padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .nav-item { color: var(--text-dim); text-align: center; font-size: 11px; }
        .nav-item.active { color: #fff; }
        .nav-item i { display: block; font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="content">
        <div class="logo">FLIXY</div>
        
        <div class="upload-section">
            <h3 style="margin-bottom: 15px;">Загрузить трек</h3>
            <input type="text" id="in-name" placeholder="Название трека">
            <input type="text" id="in-artist" placeholder="Исполнитель">
            <label class="file-label">Обложка (Квадратная) <input type="file" id="in-img" accept="image/*" hidden></label>
            <label class="file-label">Аудио (MP3) <input type="file" id="in-snd" accept="audio/*" hidden></label>
            <button class="btn-pub" onclick="saveToDB()">Опубликовать на FLIXY</button>
        </div>

        <h2>Твоя музыка</h2>
        <div id="track-list" style="margin-top: 15px;"></div>
    </div>
</div>

<div class="mini-player" id="mini" onclick="openPlayer()">
    <img id="m-img" src="">
    <div class="track-info">
        <h4 id="m-title">Название</h4>
        <p id="m-artist">Исполнитель</p>
    </div>
    <i class="fas fa-play" id="m-play" onclick="event.stopPropagation(); toggle();" style="font-size: 24px; margin: 0 10px;"></i>
</div>

<div class="player-view" id="full">
    <div class="player-bg" id="p-bg"></div>
    <div class="drag-handle" onclick="closePlayer()"></div>
    
    <img id="f-img" class="full-cover" src="">
    
    <div style="width: 100%;">
        <h1 id="f-title" style="font-size: 28px; margin-bottom: 8px;">Title</h1>
        <p id="f-artist" style="font-size: 18px; color: var(--text-dim);">Artist</p>
    </div>

    <div class="progress-container" id="prog-wrap">
        <div class="slider">
            <div class="slider-fill" id="f-fill"></div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; color: var(--text-dim);">
            <span id="cur-time">0:00</span>
            <span id="dur-time">0:00</span>
        </div>
    </div>

    <div class="controls">
        <i class="fas fa-step-backward" style="font-size: 28px;"></i>
        <div class="play-main" onclick="toggle()">
            <i class="fas fa-play" id="f-play"></i>
        </div>
        <i class="fas fa-step-forward" style="font-size: 28px;"></i>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active"><i class="fas fa-home"></i>Главная</div>
    <div class="nav-item"><i class="fas fa-compass"></i>Обзор</div>
    <div class="nav-item"><i class="fas fa-heart"></i>Коллекция</div>
</div>

<script>
    const audio = new Audio();
    let db;

    // Инициализация базы данных
    const request = indexedDB.open("FlixyDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => { db = e.target.result; render(); };

    async function saveToDB() {
        const name = document.getElementById('in-name').value;
        const artist = document.getElementById('in-artist').value;
        const img = document.getElementById('in-img').files[0];
        const snd = document.getElementById('in-snd').files[0];

        if(!name || !artist || !img || !snd) return alert("Заполни всё!");

        const song = {
            name, artist,
            img: await toBase64(img),
            snd: await toBase64(snd)
        };

        const tx = db.transaction("songs", "readwrite");
        tx.objectStore("songs").add(song);
        tx.oncomplete = () => { render(); alert("Опубликовано!"); };
    }

    const toBase64 = file => new Promise((res) => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.readAsDataURL(file);
    });

    function render() {
        const list = document.getElementById('track-list');
        list.innerHTML = '';
        const tx = db.transaction("songs", "readonly");
        tx.objectStore("songs").openCursor().onsuccess = e => {
            const c = e.target.result;
            if(c) {
                const s = c.value;
                const d = document.createElement('div');
                d.className = 'track-card';
                d.onclick = () => play(s);
                d.innerHTML = `<img src="${s.img}"><div class="track-info"><h4>${s.name}</h4><p>${s.artist}</p></div>`;
                list.prepend(d);
                c.continue();
            }
        };
    }

    function play(s) {
        audio.src = s.snd;
        audio.play();
        document.getElementById('mini').style.display = 'flex';
        document.getElementById('m-title').innerText = s.name;
        document.getElementById('m-artist').innerText = s.artist;
        document.getElementById('m-img').src = s.img;
        document.getElementById('f-title').innerText = s.name;
        document.getElementById('f-artist').innerText = s.artist;
        document.getElementById('f-img').src = s.img;
        updateIcons(true);
    }

    function toggle() {
        if(audio.paused) { audio.play(); updateIcons(true); }
        else { audio.pause(); updateIcons(false); }
    }

    function updateIcons(state) {
        const i = state ? 'fa-pause' : 'fa-play';
        document.getElementById('m-play').className = 'fas ' + i;
        document.getElementById('f-play').className = 'fas ' + i;
    }

    function openPlayer() { document.getElementById('full').classList.add('active'); }
    function closePlayer() { document.getElementById('full').classList.remove('active'); }

    audio.ontimeupdate = () => {
        const p = (audio.currentTime / audio.duration) * 100;
        document.getElementById('f-fill').style.width = p + '%';
        document.getElementById('cur-time').innerText = format(audio.currentTime);
        document.getElementById('dur-time').innerText = format(audio.duration);
    };

    function format(t) {
        if(!t) return "0:00";
        let m = Math.floor(t / 60), s = Math.floor(t % 60);
        return m + ":" + (s < 10 ? '0' : '') + s;
    }

    // Перемотка кликом по прогресс-бару
    document.getElementById('prog-wrap').onclick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const p = (e.clientX - rect.left) / rect.width;
        audio.currentTime = p * audio.duration;
    };
</script>

</body>
</html>
