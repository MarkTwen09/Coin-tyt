<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Rustok</title>
<meta name="theme-color" content="#08090f" />
<style>
:root{
  --bg:#07080d;
  --panel:rgba(18,20,31,.72);
  --panel2:rgba(255,255,255,.06);
  --text:#f4f7fb;
  --muted:#a3adbb;
  --accent:#ff2d55;
  --accent2:#7c5cff;
  --line:rgba(255,255,255,.08);
  --shadow:0 20px 60px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{
  height:100%;
  margin:0;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:
    radial-gradient(circle at 20% 10%,rgba(124,92,255,.18),transparent 30%),
    radial-gradient(circle at 80% 0%,rgba(255,45,85,.18),transparent 26%),
    linear-gradient(180deg,#05060a 0%,#090b12 100%);
  color:var(--text);
  overflow:hidden;
}
button{font:inherit;border:0;background:none;color:inherit}
#app{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:stretch;
}
.phone{
  position:relative;
  width:min(100vw,460px);
  height:100vh;
  max-height:100vh;
  background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));
  backdrop-filter:blur(12px);
  box-shadow:var(--shadow);
  overflow:hidden;
  border-left:1px solid rgba(255,255,255,.04);
  border-right:1px solid rgba(255,255,255,.04);
}
.topbar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  z-index:20;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 18px 12px;
  background:linear-gradient(180deg,rgba(0,0,0,.52),transparent);
}
.brand{display:flex;flex-direction:column;gap:2px}
.brand b{font-size:22px;letter-spacing:.4px}
.brand span{font-size:12px;color:var(--muted)}
.chip{
  padding:10px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.08);
}
.feed{
  position:absolute;
  inset:0;
  overflow:auto;
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
  -ms-overflow-style:none;
  scrollbar-width:none;
}
.feed::-webkit-scrollbar{display:none}
.post{
  position:relative;
  height:100vh;
  width:100%;
  scroll-snap-align:start;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  padding:88px 14px 88px;
  background:linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.56)),var(--bgimg) center/cover no-repeat;
}
.post::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.15) 40%,rgba(0,0,0,.7) 100%);
  pointer-events:none;
}
.content,.actions,.footer,.topbar{
  position:relative;
  z-index:2;
}
.content{
  max-width:72%;
  align-self:flex-end;
  padding:0 6px 0 2px;
}
.creator{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(135deg,#ff2d55,#7c5cff);
  display:grid;
  place-items:center;
  font-weight:800;
  box-shadow:0 10px 30px rgba(255,45,85,.25);
}
.meta b{display:block;font-size:15px}
.meta span{display:block;font-size:12px;color:rgba(255,255,255,.75)}
.caption{
  font-size:15px;
  line-height:1.45;
  margin:10px 0 12px;
  text-shadow:0 2px 16px rgba(0,0,0,.45);
}
.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.tag{
  font-size:12px;
  padding:7px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(10px);
}
.actions{
  display:flex;
  flex-direction:column;
  gap:14px;
  align-self:flex-end;
  padding-bottom:72px;
}
.action{
  width:54px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}
.iconbtn{
  width:54px;
  height:54px;
  border-radius:18px;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.08);
  display:grid;
  place-items:center;
  font-size:22px;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
  cursor:pointer;
  transition:.2s transform,.2s background;
}
.iconbtn:active{transform:scale(.95)}
.count{
  font-size:12px;
  color:#fff;
  text-shadow:0 1px 8px rgba(0,0,0,.5);
}
.footer{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  padding:18px 16px 14px;
  background:linear-gradient(180deg,transparent,rgba(6,7,11,.8) 35%,rgba(6,7,11,.96));
  border-top:1px solid rgba(255,255,255,.06);
}
.nav{
  display:flex;
  justify-content:space-between;
  gap:8px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  padding:10px;
  border-radius:22px;
  backdrop-filter:blur(14px);
}
.navbtn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:10px 4px;
  border-radius:16px;
  color:var(--muted);
  cursor:pointer;
}
.navbtn.active{
  color:#fff;
  background:linear-gradient(135deg,rgba(255,45,85,.22),rgba(124,92,255,.22));
  border:1px solid rgba(255,255,255,.06);
}
.navbtn small{font-size:11px}
.progress{
  position:absolute;
  top:0;
  left:0;
  height:3px;
  width:100%;
  background:rgba(255,255,255,.08);
  z-index:30;
}
.progress i{
  display:block;
  height:100%;
  width:38%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 18px rgba(255,45,85,.45);
}
.toast{
  position:absolute;
  left:50%;
  top:76px;
  transform:translateX(-50%);
  z-index:40;
  background:rgba(0,0,0,.68);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.08);
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  opacity:0;
  transition:.25s;
}
.toast.show{opacity:1}
.videoBadge{
  position:absolute;
  left:16px;
  top:68px;
  z-index:3;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(0,0,0,.28);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  font-size:12px;
  color:#fff;
}
.glow{
  position:absolute;
  inset:auto 10% 18% 10%;
  height:120px;
  filter:blur(46px);
  background:radial-gradient(circle,rgba(255,45,85,.28),transparent 60%);
  opacity:.9;
  pointer-events:none;
}
.modal{
  position:absolute;
  inset:auto 12px 100px 12px;
  z-index:50;
  background:rgba(10,12,18,.92);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:14px;
  display:none;
}
.modal.show{display:block}
.modal h3{margin:0 0 8px}
.modal p{
  margin:0 0 12px;
  color:var(--muted);
  font-size:13px;
  line-height:1.45;
}
.modal input{
  width:100%;
  background:rgba(255,255,255,.06);
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px 14px;
  outline:none;
  margin-bottom:10px;
}
.modal .row{
  display:flex;
  gap:10px;
}
.modal .row button{
  flex:1;
  padding:12px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:700;
  cursor:pointer;
}
.modal .row button.secondary{
  background:rgba(255,255,255,.08);
}
.uploadPanel{
  position:absolute;
  left:12px;
  right:12px;
  bottom:100px;
  z-index:45;
  background:rgba(10,12,18,.92);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:14px;
  display:none;
}
.uploadPanel.show{display:block}
.uploadPanel h3{margin:0 0 8px}
.uploadPanel p{margin:0 0 10px;color:var(--muted);font-size:13px;line-height:1.45}
.uploadPanel input, .uploadPanel textarea{
  width:100%;
  background:rgba(255,255,255,.06);
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px 14px;
  outline:none;
  margin-bottom:10px;
}
.uploadPanel textarea{min-height:84px;resize:none}
.uploadPanel .row{
  display:flex;
  gap:10px;
}
.uploadPanel .row button{
  flex:1;
  padding:12px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:700;
  cursor:pointer;
}
.uploadPanel .row button.secondary{background:rgba(255,255,255,.08)}
.previewBox{
  display:none;
  margin-bottom:10px;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  background:#000;
}
.previewBox video{
  width:100%;
  display:block;
  max-height:180px;
  object-fit:cover;
}
@media (max-width:520px){
  .phone{width:100vw;border:0}
  .content{max-width:74%}
  .brand b{font-size:20px}
}
</style>
</head>
<body>
<div id="app">
  <div class="phone">
    <div class="progress"><i id="prog"></i></div>
    <div class="topbar">
      <div class="brand"><b>Rustok</b><span>short videos • for you</span></div>
      <div class="chip" id="openUpload">+ Upload</div>
    </div>

    <div class="toast" id="toast">Liked</div>
    <div class="feed" id="feed"></div>

    <div class="footer">
      <div class="nav">
        <button class="navbtn active"><div>🏠</div><small>Home</small></button>
        <button class="navbtn"><div>🔎</div><small>Search</small></button>
        <button class="navbtn" id="navUpload"><div>➕</div><small>Post</small></button>
        <button class="navbtn"><div>💬</div><small>Inbox</small></button>
        <button class="navbtn"><div>👤</div><small>Profile</small></button>
      </div>
    </div>

    <div class="modal" id="modal">
      <h3>Rustok</h3>
      <p>Это демо-приложение для GitHub Pages: лента, лайки, комментарии и свайпы. Можно загрузить своё видео и показать его в ленте.</p>
      <input id="nameInput" placeholder="Твоё имя или ник" value="Rustok user" />
      <div class="row">
        <button id="saveBtn">Сохранить</button>
        <button class="secondary" id="closeBtn">Закрыть</button>
      </div>
    </div>

    <div class="uploadPanel" id="uploadPanel">
      <h3>Загрузить видео</h3>
      <p>Выбери видео с устройства. Оно покажется в верхнем посте ленты как локальный предпросмотр.</p>
      <input id="videoInput" type="file" accept="video/*" />
      <div class="previewBox" id="previewBox">
        <video id="previewVideo" controls playsinline></video>
      </div>
      <textarea id="captionInput" placeholder="Подпись к видео"></textarea>
      <div class="row">
        <button id="addVideoBtn">Добавить в ленту</button>
        <button class="secondary" id="closeUploadBtn">Закрыть</button>
      </div>
    </div>

    <div class="glow"></div>
  </div>
</div>

<script>
const feed = document.getElementById('feed');
const toast = document.getElementById('toast');
const modal = document.getElementById('modal');
const uploadPanel = document.getElementById('uploadPanel');
const nameInput = document.getElementById('nameInput');
const saveBtn = document.getElementById('saveBtn');
const closeBtn = document.getElementById('closeBtn');
const openUpload = document.getElementById('openUpload');
const navUpload = document.getElementById('navUpload');
const closeUploadBtn = document.getElementById('closeUploadBtn');
const addVideoBtn = document.getElementById('addVideoBtn');
const videoInput = document.getElementById('videoInput');
const previewBox = document.getElementById('previewBox');
const previewVideo = document.getElementById('previewVideo');
const captionInput = document.getElementById('captionInput');
const prog = document.getElementById('prog');

let userVideo = null;
let userVideoUrl = '';
let liked = new Set();

const demoBg = 'radial-gradient(circle at 30% 20%, rgba(255,45,85,.32), transparent 30%), radial-gradient(circle at 70% 30%, rgba(124,92,255,.28), transparent 30%), linear-gradient(180deg,#111,#05060a)';
const demoPosts = [
  {u:'@neonwave', t:'Ночной вайб, быстрый монтаж и чистый интерфейс.', tags:['#ai','#edit','#vibes']},
  {u:'@pixelrush', t:'Вертикальная лента, жесты и плавные анимации для мобильного UX.', tags:['#ui','#mobile','#design']},
  {u:'@midnightloop', t:'Красивый one-page прототип, который можно сразу залить на Pages.', tags:['#githubpages','#html','#js']}
];

function showToast(t){
  toast.textContent = t;
  toast.classList.add('show');
  clearTimeout(showToast.t);
  showToast.t = setTimeout(()=>toast.classList.remove('show'),900);
}

function renderPosts(){
  feed.innerHTML = '';
  const all = [];
  if(userVideo){
    all.push({
      u:'@you',
      t:userVideo.caption,
      tags:['#yourvideo','#rustok','#upload'],
      bg:userVideoUrl,
      uploaded:true
    });
  }
  demoPosts.forEach(p=>all.push({...p,bg:demoBg,uploaded:false}));

  all.forEach((p,i)=>{
    const el = document.createElement('section');
    el.className = 'post';
    el.style.setProperty('--bgimg', `linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.56)), ${p.bg}`);
    el.innerHTML = `
      <div class="videoBadge">🎬 Rustok • Clip ${i+1}</div>
      <div class="content">
        <div class="creator">
          <div class="avatar">${(p.u || 'R').replace('@','').slice(0,1).toUpperCase()}</div>
          <div class="meta">
            <b>${p.u}</b>
            <span>${p.uploaded ? 'your upload • just now' : 'original feed • ' + (12+i) + 'm ago'}</span>
          </div>
        </div>
        <div class="caption">${p.t}</div>
        <div class="tags">${p.tags.map(x=>`<span class="tag">${x}</span>`).join('')}</div>
      </div>
      <div class="actions">
        <div class="action">
          <button class="iconbtn like">❤</button>
          <div class="count">${1200+i*223}</div>
        </div>
        <div class="action">
          <button class="iconbtn comment">💬</button>
          <div class="count">${80+i*18}</div>
        </div>
        <div class="action">
          <button class="iconbtn share">↗</button>
          <div class="count">Share</div>
        </div>
      </div>`;
    feed.appendChild(el);

    const like = el.querySelector('.like');
    like.onclick = () => {
      const on = liked.has(el);
      if(on) liked.delete(el); else liked.add(el);
      like.style.background = on ? 'rgba(255,255,255,.09)' : 'linear-gradient(135deg,var(--accent),var(--accent2))';
      showToast(on ? 'Unliked' : 'Liked');
    };

    el.querySelector('.comment').onclick = () => {
      modal.classList.add('show');
      uploadPanel.classList.remove('show');
      showToast('Comments opened');
    };

    el.querySelector('.share').onclick = async () => {
      try{
        await navigator.clipboard.writeText(location.href);
        showToast('Link copied');
      }catch(e){
        showToast('Copy failed');
      }
    };
  });

  prog.style.width = all.length ? `${Math.max(35, 100/all.length)}%` : '100%';
}

openUpload.onclick = () => {
  uploadPanel.classList.add('show');
  modal.classList.remove('show');
};

navUpload.onclick = () => {
  uploadPanel.classList.add('show');
  modal.classList.remove('show');
};

closeUploadBtn.onclick = () => uploadPanel.classList.remove('show');

closeBtn.onclick = () => modal.classList.remove('show');

saveBtn.onclick = () => {
  localStorage.setItem('rustok_name', nameInput.value.trim() || 'Rustok user');
  modal.classList.remove('show');
  showToast('Saved');
};

nameInput.value = localStorage.getItem('rustok_name') || 'Rustok user';

videoInput.addEventListener('change', () => {
  const file = videoInput.files && videoInput.files[0];
  if(!file) return;
  if(userVideoUrl) URL.revokeObjectURL(userVideoUrl);
  userVideoUrl = URL.createObjectURL(file);
  previewVideo.src = userVideoUrl;
  previewBox.style.display = 'block';
  userVideo = {
    file,
    caption: captionInput.value.trim() || ('Uploaded video: ' + file.name)
  };
  showToast('Video selected');
});

addVideoBtn.onclick = () => {
  const file = videoInput.files && videoInput.files[0];
  if(!file){
    showToast('Choose a video first');
    return;
  }
  userVideo.caption = captionInput.value.trim() || ('Uploaded video: ' + file.name);
  renderPosts();
  uploadPanel.classList.remove('show');
  showToast('Added to feed');
};

document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape'){
    modal.classList.remove('show');
    uploadPanel.classList.remove('show');
  }
});

renderPosts();
</script>
</body>
</html>
