<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA ZENITH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --a: #bc61f5; --b: #6164f5; }
        body { background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Элитный живой фон */
        .zenith-bg { position: fixed; inset: 0; z-index: -1; background: #000; overflow: hidden; }
        .blob { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(188,97,245,0.15) 0%, transparent 70%); filter: blur(60px); animation: move 20s infinite alternate; }
        .blob-2 { top: -200px; right: -100px; background: radial-gradient(circle, rgba(97,100,245,0.1) 0%, transparent 70%); animation-delay: -5s; }
        @keyframes move { from { transform: translate(-10%, -10%) scale(1); } to { transform: translate(20%, 20%) scale(1.2); } }

        /* Сообщения */
        .msg-ai { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); backdrop-filter: blur(40px); border-radius: 28px; box-shadow: 0 0 20px rgba(188,97,245,0.05); border-left: 2px solid var(--a); }
        .msg-user { background: linear-gradient(135deg, var(--a), var(--b)); border-radius: 28px 28px 4px 28px; box-shadow: 0 15px 35px -10px rgba(188,97,245,0.4); }

        /* Ввод как в будущем */
        .zenith-input { background: rgba(15,15,15,0.7); backdrop-filter: blur(50px); border: 1px solid rgba(255,255,255,0.08); border-radius: 40px; }
        .zenith-input:focus-within { border-color: var(--a); box-shadow: 0 0 30px rgba(188,97,245,0.15); }

        #flow { height: calc(100vh - 180px); mask-image: linear-gradient(to bottom, transparent 2%, black 15%, black 85%, transparent 98%); }
        #flow::-webkit-scrollbar { display: none; }

        .aura-shimmer { background: linear-gradient(90deg, #fff, var(--a), #fff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 4s linear infinite; }
        @keyframes shimmer { to { background-position: 200% center; } }
        
        .send-aura { background: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.4); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .send-aura:active { transform: scale(0.8); }
    </style>
</head>
<body class="flex flex-col">
    <div class="zenith-bg">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="pt-14 pb-5 px-10 flex justify-between items-center">
        <h1 class="text-2xl font-black aura-shimmer italic tracking-tighter uppercase">Aura</h1>
        <div class="px-4 py-1.5 rounded-full border border-white/5 bg-white/5 text-[8px] tracking-[0.4em] opacity-40 uppercase">Zenith Interface</div>
    </header>

    <main id="flow" class="overflow-y-auto p-6 space-y-8 flex flex-col pt-10"></main>

    <div id="loading" class="hidden px-10 py-2 text-[9px] text-purple-400 tracking-[0.5em] uppercase opacity-50 animate-pulse">Syncing...</div>

    <footer class="p-8 pb-14">
        <div class="max-w-4xl mx-auto zenith-input flex items-center p-2.5">
            <input type="text" id="entry" class="w-full bg-transparent px-6 py-4 text-sm outline-none text-white placeholder-white/20" placeholder="Ask Zenith Aura..." autocomplete="off">
            <button onclick="sync()" class="send-aura text-black h-14 w-14 flex items-center justify-center rounded-full">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
        </div>
    </footer>

    <script>
        const KEY = 'AIzaSyDOqqL5RGsnseRbEnfn64YZdpZ7-2YIzOY';

        async function sync() {
            const input = document.getElementById('entry');
            const flow = document.getElementById('flow');
            const loader = document.getElementById('loading');
            const val = input.value.trim();
            if (!val) return;

            input.value = '';
            flow.innerHTML += `<div class="msg-user p-6 self-end max-w-[80%] text-sm leading-relaxed">${val}</div>`;
            flow.scrollTo(0, flow.scrollHeight);
            
            loader.classList.remove('hidden');

            try {
                // Попытка через v1beta - она часто стабильнее на старте ключа
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await r.json();
                loader.classList.add('hidden');

                if (data.error) {
                    flow.innerHTML += `<div class="p-5 bg-red-500/10 border border-red-500/20 rounded-3xl text-[10px] text-red-300 text-center uppercase tracking-widest leading-relaxed">Protocol Alert: ${data.error.message}</div>`;
                } else {
                    const txt = data.candidates[0].content.parts[0].text;
                    flow.innerHTML += `<div class="msg-ai p-7 self-start max-w-[90%] text-sm leading-relaxed">${txt}</div>`;
                }
            } catch (err) {
                loader.classList.add('hidden');
                flow.innerHTML += `<div class="text-red-500 text-center text-[10px] uppercase tracking-[0.3em]">Fatal Link Error: Check VPN</div>`;
            }
            flow.scrollTo({ top: flow.scrollHeight, behavior: 'smooth' });
        }

        document.getElementById('entry').onkeypress = (e) => { if(e.key === 'Enter') sync(); };
    </script>
</body>
</html>
