<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHETTO BANK | FINAL BLACK</title>
    <style>
        :root { --bg: #000; --card: #111; --accent: #2ecc71; --gold: #ffdd2d; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; justify-content: center; }
        
        #app { width: 100%; max-width: 430px; min-height: 100vh; padding: 20px; display: none; }
        #auth { width: 100%; max-width: 430px; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px; text-align: center; }

        /* PREMIUM UI */
        .card { 
            background: linear-gradient(135deg, #1c1c1e 0%, #000 100%); 
            border: 1px solid #222; border-radius: 30px; padding: 30px; margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .bal-val { font-size: 42px; font-weight: 800; letter-spacing: -1.5px; margin: 10px 0; }
        
        .box { background: var(--card); border: 1px solid #222; border-radius: 24px; padding: 20px; margin-bottom: 15px; }
        input { background: #000; border: 1px solid #333; border-radius: 12px; padding: 15px; color: #fff; width: 100%; font-size: 16px; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 20px; border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.97); opacity: 0.9; }

        .h-item { display: flex; justify-content: space-between; padding: 15px 5px; border-bottom: 1px solid #111; font-size: 14px; }
    </style>
</head>
<body>

    <div id="auth">
        <h1 style="font-size: 32px; letter-spacing: -1px;">GHETTO <span style="color:var(--gold)">PRIVATE</span></h1>
        <input type="text" id="reg-name" placeholder="Ваше имя">
        <button class="btn" onclick="register()">Открыть счет</button>
    </div>

    <div id="app">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
            <div id="u-name" style="font-weight:900; font-size: 20px;">USER</div>
            <div style="background:var(--card); padding:5px 12px; border-radius:20px; font-size:12px; border:1px solid #222" id="u-id">ID: 0000</div>
        </div>

        <div class="card">
            <div style="font-size:12px; color:#555; font-weight:700; text-transform:uppercase">Доступный лимит</div>
            <div class="bal-val" id="balance">0 ₽</div>
            <div style="display:flex; justify-content:space-between; margin-top:30px; font-family:monospace; color:#333">
                <span>•••• 4456</span>
                <span style="color:var(--gold); font-weight:900">PREMIUM</span>
            </div>
        </div>

        <div class="box">
            <div style="font-weight:800; margin-bottom:15px; font-size:18px">Мгновенный перевод</div>
            <input type="number" id="send-amt" placeholder="Сумма ₽">
            <button class="btn" style="background:#fff" onclick="makeTransfer()">Создать Смарт-Ссылку</button>
        </div>

        <div style="margin-top:30px">
            <div style="font-weight:800; margin-bottom:15px">История операций</div>
            <div id="history"></div>
        </div>
    </div>

<script>
    let user = JSON.parse(localStorage.getItem('gh_final_v1')) || null;

    // ПРОВЕРКА ВХОДЯЩЕГО ПЕРЕВОДА ИЗ URL
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const transfer = params.get('pay');
        if (transfer && user) {
            try {
                const data = JSON.parse(atob(transfer));
                // Защита от повторного использования ссылки
                let used = JSON.parse(localStorage.getItem('gh_used_tx')) || [];
                if (!used.includes(data.key)) {
                    user.balance += parseFloat(data.amt);
                    used.push(data.key);
                    localStorage.setItem('gh_used_tx', JSON.stringify(used));
                    addHistory(`Входящий от ID:${data.from}`, data.amt, true);
                    save();
                    alert(`✅ ПРИНЯТО: +${data.amt} ₽`);
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            } catch(e) { console.log("Ошибка чека"); }
        }
        if (user) showApp();
    };

    function register() {
        const name = document.getElementById('reg-name').value;
        if(!name) return;
        user = { name: name, id: Math.floor(1000 + Math.random()*9000), balance: 150000, history: [] };
        save();
        showApp();
    }

    function showApp() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('u-name').innerText = user.name.toUpperCase();
        document.getElementById('u-id').innerText = 'ID: ' + user.id;
        updateUI();
    }

    function updateUI() {
        document.getElementById('balance').innerText = user.balance.toLocaleString() + ' ₽';
    }

    function makeTransfer() {
        const amt = parseFloat(document.getElementById('send-amt').value);
        if (amt > 0 && amt <= user.balance) {
            user.balance -= amt;
            
            // Создаем уникальный шифр перевода
            const txData = btoa(JSON.stringify({
                amt: amt,
                from: user.id,
                key: Math.random().toString(36).substring(7)
            }));
            
            const link = window.location.href.split('?')[0] + '?pay=' + txData;
            
            // Копируем ссылку другу
            navigator.clipboard.writeText(link);
            addHistory(`Перевод по ссылке`, amt, false);
            save();
            updateUI();
            
            alert(`🔥 ССЫЛКА СКОПИРОВАНА!\nОтправь её другу. Как только он перейдет по ней, деньги зачислятся ему на счет.`);
        } else {
            alert("Ошибка: проверьте сумму и баланс");
        }
    }

    function addHistory(msg, amt, plus) {
        const h = document.getElementById('history');
        const d = document.createElement('div');
        d.className = 'h-item';
        d.innerHTML = `<div>${msg}</div><div style="font-weight:800; color:${plus?'var(--accent)':'#fff'}">${plus?'+':'-'} ${amt} ₽</div>`;
        h.prepend(d);
    }

    function save() { localStorage.setItem('gh_final_v1', JSON.stringify(user)); }
</script>
</body>
</html>
