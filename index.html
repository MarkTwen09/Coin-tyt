<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA AI</title>

<style>
:root{
--bg:#0b0b12;
--glass:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.15);
--accent1:#8a5cff;
--accent2:#00ffd0;
--text:#ffffff;
}

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:var(--bg);
color:var(--text);
overflow:hidden;
cursor:none;
}

/* Canvas background */
canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* Glow Cursor */
.cursor{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
background:radial-gradient(circle,var(--accent1),transparent);
pointer-events:none;
mix-blend-mode:screen;
z-index:999;
}

/* Center Energy */
.energy{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:300px;
height:300px;
border-radius:50%;
background:radial-gradient(circle,var(--accent1),transparent 70%);
filter:blur(80px);
opacity:0.4;
z-index:-1;
transition:0.2s;
}

/* Layout */
.container{
display:flex;
height:100vh;
}

/* Sidebar */
.sidebar{
width:250px;
background:var(--glass);
backdrop-filter:blur(30px);
border-right:1px solid var(--border);
padding:20px;
display:flex;
flex-direction:column;
}

.history{
flex:1;
overflow-y:auto;
font-size:14px;
}

.history div{
margin-bottom:10px;
opacity:0.7;
cursor:pointer;
}

.theme-switch{
margin-top:10px;
}

.theme-switch button{
margin:3px;
padding:6px 10px;
border:none;
border-radius:12px;
cursor:pointer;
background:var(--glass);
color:white;
}

/* Chat */
.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:15px;
text-align:center;
letter-spacing:4px;
background:var(--glass);
border-bottom:1px solid var(--border);
}

.chat{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
padding:15px;
border-radius:18px;
max-width:80%;
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(25px);
}

.user{
align-self:flex-end;
background:linear-gradient(135deg,var(--accent1),var(--accent2));
}

.ai{align-self:flex-start;}

.input-area{
display:flex;
padding:10px;
gap:10px;
background:var(--glass);
}

input{
flex:1;
padding:12px;
border:none;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
}

button.send{
padding:12px 18px;
border:none;
border-radius:15px;
cursor:pointer;
background:linear-gradient(135deg,var(--accent1),var(--accent2));
color:white;
}

/* Themes */
.dark{
--bg:#0b0b12;
--accent1:#8a5cff;
--accent2:#00ffd0;
}

.ultra{
--bg:#050507;
--accent1:#ff00cc;
--accent2:#3333ff;
}

.neon{
--bg:#000000;
--accent1:#00ffcc;
--accent2:#ff00ff;
}

@media(max-width:900px){
.sidebar{display:none;}
}
</style>
</head>

<body class="dark">

<canvas id="grid"></canvas>
<div class="cursor" id="cursor"></div>
<div class="energy" id="energy"></div>

<div class="container">

<div class="sidebar">
<h3>AURA</h3>
<div class="history" id="history"></div>

<div class="theme-switch">
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('ultra')">Ultra</button>
<button onclick="setTheme('neon')">Neon</button>
</div>
</div>

<div class="main">
<div class="header">AURA</div>
<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Введите сообщение...">
<button class="send" onclick="send()">→</button>
</div>
</div>

</div>

<script>
/* Cursor */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* Energy Parallax */
const energy=document.getElementById("energy");
document.addEventListener("mousemove",e=>{
let x=(e.clientX/window.innerWidth-0.5)*50;
let y=(e.clientY/window.innerHeight-0.5)*50;
energy.style.transform=`translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
});

/* Canvas Grid */
const canvas=document.getElementById("grid");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let mouse={x:0,y:0};
document.addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY;});

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let x=0;x<canvas.width;x+=40){
for(let y=0;y<canvas.height;y+=40){
let dx=x-mouse.x;
let dy=y-mouse.y;
let dist=Math.sqrt(dx*dx+dy*dy);
let alpha=Math.max(0,1-dist/300);
ctx.fillStyle="rgba(138,92,255,"+alpha*0.3+")";
ctx.fillRect(x,y,2,2);
}}
requestAnimationFrame(draw);
}
draw();

/* Chat */
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const history=document.getElementById("history");

function typeText(element,text,i=0){
if(i<text.length){
element.innerHTML+=text.charAt(i);
setTimeout(()=>typeText(element,text,i+1),20);
}
}

function addMessage(text,type){
const msg=document.createElement("div");
msg.className="message "+type;
chat.appendChild(msg);

if(type==="ai") typeText(msg,text);
else msg.innerText=text;

chat.scrollTop=chat.scrollHeight;

if(type==="user"){
let h=document.createElement("div");
h.innerText=text;
history.prepend(h);
}
}

/* Simple brain */
function respond(text){
text=text.toLowerCase();
if(text.includes("привет")) return "Привет 👋 Я AURA.";
if(text.includes("как дела")) return "Отлично. Я чувствую цифровую энергию.";
try{
let result=Function('"use strict";return ('+text.replace("^","**")+')')();
if(!isNaN(result)) return "Ответ: "+result;
}catch{}
return "Я могу общаться и считать примеры.";
}

function send(){
let text=input.value.trim();
if(!text) return;
addMessage(text,"user");
input.value="";
setTimeout(()=>addMessage(respond(text),"ai"),400);
}

input.addEventListener("keypress",e=>{if(e.key==="Enter")send();});

/* Theme switch */
function setTheme(theme){
document.body.className=theme;
}
</script>

</body>
</html>
