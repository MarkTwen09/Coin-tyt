<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Т-ГЕТТО БАНК</title>
    <style>
        :root {
            --bg: #000000;
            --card-gray: #1c1c1e;
            --tinkoff-yellow: #ffdd2d;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --green: #30d158;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text-main); font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; justify-content: center; }

        .container { width: 100%; max-width: 430px; min-height: 100vh; padding-bottom: 90px; }

        /* HEADER */
        .header { padding: 20px 16px; display: flex; justify-content: space-between; align-items: center; }
        .profile-btn { width: 40px; height: 40px; background: #2c2c2e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; border: 1px solid #3a3a3c; }

        /* STORIES */
        .stories { display: flex; gap: 12px; overflow-x: auto; padding: 0 16px 20px; scrollbar-width: none; }
        .stories::-webkit-scrollbar { display: none; }
        .story { min-width: 68px; height: 68px; border-radius: 50%; border: 2px solid var(--tinkoff-yellow); padding: 2px; }
        .story-img { width: 100%; height: 100%; border-radius: 50%; background: #2c2c2e; display: flex; align-items: center; justify-content: center; font-size: 26px; }

        /* MAIN CARD */
        .main-card { background: linear-gradient(135deg, #2c2c2e 0%, #111 100%); margin: 0 16px 24px; padding: 24px; border-radius: 24px; border: 1px solid #3a3a3c; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .card-label { color: var(--text-muted); font-size: 14px; margin-bottom: 8px; }
        .balance { font-size: 34px; font-weight: 800; letter-spacing: -1px; }

        /* QUICK ACTIONS */
        .actions-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 16px; margin-bottom: 30px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .action-icon { width: 56px; height: 56px; background: var(--card-gray); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: 0.2s; }
        .action-item:active .action-icon { transform: scale(0.92); background: #2c2c2e; }
        .action-text { font-size: 11px; color: var(--text-main); }

        /* CONTACTS LIST (НОВОЕ) */
        .section-title { padding: 0 16px; margin-bottom: 12px; font-size: 20px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .contacts-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 0 16px 25px; scrollbar-width: none; }
        .contacts-scroll::-webkit-scrollbar { display: none; }
        .contact-card { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; min-width: 70px; }
        .contact-avatar { width: 54px; height: 54px; background: #2c2c2e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #333; }
        .contact-name { font-size: 12px; text-align: center; color: var(--text-main); }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; z-index: 1000; }
        .modal-content { background: var(--card-gray); width: 100%; padding: 30px 20px; border-radius: 24px 24px 0 0; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-input { width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; padding: 18px; border-radius: 14px; color: #fff; font-size: 20px; margin: 20px 0; text-align: center; }
        .btn-send { width: 100%; background: var(--tinkoff-yellow); color: #000; padding: 18px; border-radius: 14px; border: none; font-weight: 700; font-size: 16px; cursor: pointer; }

        /* TAB BAR */
        .tab-bar { position: fixed; bottom: 0; width: 100%; max-width: 430px; background: rgba(20,20,20,0.95); backdrop-filter: blur(15px); border-top: 1px solid #2c2c2e; display: flex; justify-content: space-around; padding: 10px 0 30px; }
        .tab { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 10px; gap: 4px; }
        .tab.active { color: var(--tinkoff-yellow); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="profile-btn" id="user-initial">A</div>
        <div style="font-weight: 700; font-size: 17px;">ГЕТТО БАНК</div>
        <div style="font-size: 22px;">⚙️</div>
    </div>

    <div class="stories">
        <div class="story"><div class="story-img">🍟</div></div>
        <div class="story"><div class="story-img">💎</div></div>
        <div class="story"><div class="story-img">🎮</div></div>
        <div class="story"><div class="story-img">🕶️</div></div>
        <div class="story"><div class="story-img">🔋</div></div>
    </div>

    <div class="main-card">
        <div class="card-label">Гетто Black • MasterCard</div>
        <div class="balance" id="balance-display">150 000,00 ₽</div>
        <div style="margin-top: 15px; font-family: monospace; color: var(--text-muted); letter-spacing: 2px;">•••• 4432</div>
    </div>

    <div class="actions-row">
        <div class="action-item" onclick="openTopUp()">
            <div class="action-icon" style="background: var(--tinkoff-yellow); color: black;">+</div>
            <span class="action-text">Пополнить</span>
        </div>
        <div class="action-item">
            <div class="action-icon">⇄</div>
            <span class="action-text">Перевод</span>
        </div>
        <div class="action-item">
            <div class="action-icon">🧾</div>
            <span class="action-text">Счета</span>
        </div>
        <div class="action-item">
            <div class="action-icon">🛠️</div>
            <span class="action-text">Сервис</span>
        </div>
    </div>

    <div class="section-title">Переводы людям</div>
    <div class="contacts-scroll" id="contacts-list">
        </div>

    <div class="section-title">История</div>
    <div id="history-container" style="padding: 0 16px;"></div>
</div>

<div class="modal" id="transfer-modal">
    <div class="modal-content">
        <div style="text-align: center; font-size: 18px; font-weight: 600;" id="target-name">Перевод Коле</div>
        <input type="number" class="modal-input" id="amount-input" placeholder="0 ₽" autofocus>
        <button class="btn-send" onclick="confirmTransfer()">Перевести</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:var(--text-muted); margin-top:15px;">Отмена</button>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active"><span>🏠</span><span>Главная</span></div>
    <div class="tab"><span>📊</span><span>Платежи</span></div>
    <div class="tab"><span>💬</span><span>Чат</span></div>
    <div class="tab"><span>📁</span><span>Еще</span></div>
</div>

<script>
    // База данных пользователей (те, кто "зарегистрирован")
    const users = [
        { id: 1, name: "Коля", avatar: "👦", color: "#ff453a" },
        { id: 2, name: "Мама", avatar: "👩", color: "#30d158" },
        { id: 3, name: "Бабуля", avatar: "👵", color: "#5856d6" },
        { id: 4, name: "Брат", avatar: "👺", color: "#ff9f0a" },
        { id: 5, name: "Aura AI", avatar: "🤖", color: "#007aff" }
    ];

    let balance = parseFloat(localStorage.getItem('g_balance')) || 250000;
    let selectedUser = null;

    // Инициализация
    function init() {
        renderContacts();
        updateUI();
    }

    function updateUI() {
        document.getElementById('balance-display').innerText = balance.toLocaleString('ru-RU') + ',00 ₽';
        localStorage.setItem('g_balance', balance);
    }

    function renderContacts() {
        const list = document.getElementById('contacts-list');
        users.forEach(u => {
            const div = document.createElement('div');
            div.className = 'contact-card';
            div.onclick = () => openTransfer(u);
            div.innerHTML = `
                <div class="contact-avatar" style="background: ${u.color}33; color: ${u.color}">${u.avatar}</div>
                <div class="contact-name">${u.name}</div>
            `;
            list.appendChild(div);
        });
    }

    function openTransfer(user) {
        selectedUser = user;
        document.getElementById('target-name').innerText = `Перевод: ${user.name}`;
        document.getElementById('transfer-modal').style.display = 'flex';
        document.getElementById('amount-input').focus();
    }

    function openTopUp() {
        let amt = prompt("Сумма пополнения:");
        if (amt && !isNaN(amt)) {
            balance += parseFloat(amt);
            addHistory("Пополнение", amt, true);
            updateUI();
        }
    }

    function confirmTransfer() {
        const input = document.getElementById('amount-input');
        const amt = parseFloat(input.value);

        if (amt > 0 && amt <= balance) {
            balance -= amt;
            addHistory(selectedUser.name, amt, false);
            updateUI();
            closeModal();
            alert(`Успешно! Переведено ${amt} ₽ пользователю ${selectedUser.name}`);
        } else {
            alert("Недостаточно средств или неверная сумма!");
        }
    }

    function closeModal() {
        document.getElementById('transfer-modal').style.display = 'none';
        document.getElementById('amount-input').value = '';
    }

    function addHistory(name, amt, isPlus) {
        const container = document.getElementById('history-container');
        const item = document.createElement('div');
        item.style = "display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #1c1c1e;";
        item.innerHTML = `
            <div style="display: flex; gap: 15px; align-items: center;">
                <div style="width: 40px; height: 40px; background: #1c1c1e; border-radius: 10px; display: flex; align-items: center; justify-content: center;">${isPlus ? '💰' : '👤'}</div>
                <div>
                    <div style="font-weight: 500;">${name}</div>
                    <div style="color: var(--text-muted); font-size: 12px;">Сегодня</div>
                </div>
            </div>
            <div style="font-weight: 700; color: ${isPlus ? 'var(--green)' : 'white'}">${isPlus ? '+' : '-'} ${parseFloat(amt).toLocaleString()} ₽</div>
        `;
        container.prepend(item);
    }

    init();
</script>

</body>
</html>
