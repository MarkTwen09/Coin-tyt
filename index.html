<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA X-RAY MOBILE</title>
    <style>
        :root {
            --bg: #030303;
            --aura: #bc61ff;
            --blue: #00f2ff;
            --glass: rgba(255, 255, 255, 0.04);
            --neon: rgba(188, 97, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; position: fixed;
        }

        /* СОЧНЫЙ X-RAY ФОН */
        .visuals {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 50% 10%, #1e1b4b 0%, transparent 60%),
                radial-gradient(circle at 0% 100%, #312e81 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #ec48991a 0%, transparent 40%);
        }

        .container {
            display: flex; flex-direction: column; height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        .header { padding: 10px; text-align: center; position: relative; }
        .header h1 {
            font-size: 2.2rem; letter-spacing: 12px; margin: 0;
            background: linear-gradient(90deg, #fff, var(--aura), var(--blue), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* ЧАТ НА АЙФОНЕ */
        #chat {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 160px; /* Запас под мобильную клавиатуру */
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            padding: 14px 18px; border-radius: 20px; max-width: 80%;
            font-size: 16px; line-height: 1.4; border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            animation: pop 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        @keyframes pop { from { opacity: 0; transform: translateY(15px); } }

        .aura-msg { 
            background: rgba(188, 97, 255, 0.08); 
            align-self: flex-start; border-bottom-left-radius: 4px;
            color: #eee;
        }
        .user-msg { 
            background: var(--glass); align-self: flex-end; 
            border-bottom-right-radius: 4px; border-color: rgba(0, 242, 255, 0.2); 
            color: #fff;
        }

        /* X-RAY ИНПУТ (СОЧНЕЙШИЙ ДИЗАЙН) */
        .controls-wrapper {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 80%, transparent);
            padding: 10px 15px calc(25px + env(safe-area-inset-bottom)); /* Фикс под нижнюю полосу */
            z-index: 1000;
        }

        .input-box {
            display: flex; gap: 10px; align-items: center; 
            max-width: 500px; margin: 0 auto;
            background: rgba(10,10,10,0.6);
            border-radius: 30px; border: 1px solid var(--border);
            padding: 5px;
            box-shadow: 0 0 20px var(--neon), inset 0 0 5px rgba(255,255,255,0.03);
            transition: all 0.3s ease;
        }

        .input-box:focus-within {
            box-shadow: 0 0 30px rgba(188, 97, 255, 0.6), inset 0 0 10px var(--neon);
            border-color: rgba(188, 97, 255, 0.5);
        }

        input {
            flex: 1; background: transparent; border: none;
            padding: 12px 18px; color: #fff; font-size: 16px; /* Чтобы Safari не зумил */
            outline: none; -webkit-appearance: none;
        }

        input::placeholder { color: rgba(255,255,255,0.3); }

        button {
            width: 48px; height: 48px; border-radius: 24px;
            background: linear-gradient(135deg, var(--aura), var(--blue));
            border: none; color: white; font-size: 20px;
            box-shadow: 0 0 10px rgba(188, 97, 255, 0.6);
            cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        button:active { transform: scale(0.9); box-shadow: 0 0 20px rgba(188, 97, 255, 0.8); }

        .loader { font-size: 11px; color: var(--blue); text-align: center; visibility: hidden; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="visuals"></div>
    <div class="container">
        <div class="header"><h1>AURA</h1></div>
        
        <div id="chat">
            <div class="msg aura-msg">Привет! Я <b>AURA X-Ray</b>. У меня новый стабильный канал и сочнейший дизайн. Регистрация? Ключи? Пфф, забудь. Просто пиши!</div>
        </div>

        <div class="controls-wrapper">
            <div id="status" class="loader">СИНХРОНИЗАЦИЯ НЕЙРОНОВ...</div>
            <div class="input-box">
                <input type="text" id="input" placeholder="Напиши AURA..." autocomplete="off">
                <button id="btn">➜</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        async function talk() {
            const val = input.value.trim();
            if(!val) return;

            // Добавляем сообщение юзера
            const uM = document.createElement('div');
            uM.className = 'msg user-msg';
            uM.textContent = val;
            chat.appendChild(uM);
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            status.style.visibility = 'visible';

            try {
                // ИСПОЛЬЗУЕМ АНОНИМНЫЙ РЕЗЕРВНЫЙ КАНАЛ (Mistral-7B)
                // Этот API шлюз работает без ключей.
                const response = await fetch('https://api-inference.huggingface.co/models/Mistralai/Mistral-7B-Instruct-v0.2', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        inputs: `[INST] Ты AURA. Отвечай кратко, стильно и дерзко на русском языке. Вопрос: ${val} [/INST]`,
                        parameters: { max_new_tokens: 250, temperature: 0.7 }
                    })
                });

                const data = await response.json();
                let reply = data[0].generated_text.split('[/INST]')[1] || "Я задумалась. Давай еще раз?";

                const aM = document.createElement('div');
                aM.className = 'msg aura-msg';
                aM.innerHTML = reply.trim();
                chat.appendChild(aM);

            } catch (e) {
                const eM = document.createElement('div');
                eM.className = 'msg aura-msg';
                eM.textContent = "Сигнал прервался. Бро, просто нажми '➜' еще разок через 3 секунды!";
                chat.appendChild(eM);
            } finally {
                status.style.visibility = 'hidden';
                chat.scrollTop = chat.scrollHeight;
            }
        }

        btn.onclick = talk;
        input.onkeypress = (e) => { if(e.key === 'Enter') { talk(); input.blur(); } };
    </script>
</body>
</html>
