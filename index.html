<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHETTO OS | PRIVATE BANKING</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #ffffff;
            --accent-dim: #333333;
            --danger: #ff3b30;
            --success: #34c759;
            --font-main: 'Inter', -apple-system, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--accent); font-family: var(--font-main); margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 430px; min-height: 100vh; padding: 20px; display: none; }
        
        /* РЕГИСТРАЦИЯ */
        #auth-screen { width: 100%; max-width: 430px; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px; text-align: center; }
        .auth-title { font-size: 24px; font-weight: 200; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 50px; }
        .auth-input { background: transparent; border: none; border-bottom: 1px solid var(--accent-dim); color: #fff; font-size: 18px; padding: 15px; text-align: center; margin-bottom: 30px; transition: 0.3s; }
        .auth-input:focus { border-bottom-color: #fff; }
        .btn { background: #fff; color: #000; border: none; padding: 20px; border-radius: 2px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; margin-top: 10px; }
        .brand { font-size: 14px; font-weight: 800; letter-spacing: 3px; }
        .id-badge { font-size: 10px; color: var(--accent-dim); }

        /* CARD */
        .premium-card { background: #050505; border: 1px solid var(--accent-dim); border-radius: 4px; padding: 30px; margin-bottom: 40px; position: relative; overflow: hidden; }
        .card-label { font-size: 10px; text-transform: uppercase; color: var(--accent-dim); letter-spacing: 2px; margin-bottom: 10px; }
        .balance { font-size: 38px; font-weight: 300; letter-spacing: -1px; }

        /* CONTACTS */
        .section-header { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-dim); margin-bottom: 20px; display: flex; justify-content: space-between; }
        .contacts-grid { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .contacts-grid::-webkit-scrollbar { display: none; }
        .contact-item { min-width: 70px; text-align: center; }
        .contact-avatar { width: 60px; height: 60px; border: 1px solid var(--accent-dim); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 18px; transition: 0.3s; cursor: pointer; }
        .contact-avatar:hover { border-color: #fff; background: #fff; color: #000; }
        .contact-name { font-size: 11px; font-weight: 500; }

        /* ACTIONS */
        .quick-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 40px; }
        .nav-btn { background: var(--surface); border: 1px solid var(--accent-dim); color: #fff; padding: 20px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }
        .nav-btn:hover { background: #fff; color: #000; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 100; padding: 30px; }
        .modal-inner { width: 100%; max-width: 350px; text-align: center; }
        .modal-title { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; color: var(--accent-dim); }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; font-size: 32px; text-align: center; margin: 40px 0; font-weight: 200; }

        /* HISTORY */
        .history-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #111; font-size: 12px; }
        .h-dim { color: var(--accent-dim); font-size: 10px; margin-top: 4px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-title">GHETTO PRIVATE</div>
        <input type="text" id="reg-name" class="auth-input" placeholder="Введите имя">
        <button class="btn" onclick="register()">Создать аккаунт</button>
    </div>

    <div class="app-container" id="app">
        <div class="header">
            <div class="brand">GHETTO OS</div>
            <div class="id-badge" id="my-id">ID: ----</div>
        </div>

        <div class="premium-card">
            <div class="card-label">Total Assets</div>
            <div class="balance" id="main-balance">0,00 ₽</div>
            <div style="margin-top: 30px; display: flex; justify-content: space-between; align-items: center;">
                <div style="font-size: 12px; color: #333; letter-spacing: 2px;">• • • • 7789</div>
                <div style="font-weight: 900; font-style: italic;">BLACK</div>
            </div>
        </div>

        <div class="quick-nav">
            <button class="nav-btn" onclick="receiveMoney()">Принять код</button>
            <button class="nav-btn" onclick="topUp()">Депозит</button>
        </div>

        <div class="section-header">
            <span>Зарегистрированные люди</span>
            <span style="color: #fff; cursor: pointer;" onclick="addFriend()">+ Добавить ID</span>
        </div>
        <div class="contacts-grid" id="contacts">
            </div>

        <div class="section-header">Транзакции</div>
        <div id="history"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-inner">
            <div id="modal-title" class="modal-title">AMOUNT</div>
            <input type="number" id="amount-input" class="modal-input" placeholder="0">
            <button class="btn" style="width: 100%;" onclick="executeTransfer()">Подтвердить</button>
            <div onclick="closeModal()" style="margin-top: 30px; font-size: 10px; color: #333; cursor: pointer; letter-spacing: 2px;">ОТМЕНА</div>
        </div>
    </div>

<script>
    let user = JSON.parse(localStorage.getItem('gh_user')) || null;
    let balance = parseFloat(localStorage.getItem('gh_bal')) || 100000;
    let friends = JSON.parse(localStorage.getItem('gh_friends')) || [];
    let currentTarget = null;

    function register() {
        const name = document.getElementById('reg-name').value;
        if (name.length < 2) return alert("Имя слишком короткое");
        const id = "GH-" + Math.floor(1000 + Math.random() * 9000);
        user = { name, id };
        localStorage.setItem('gh_user', JSON.stringify(user));
        location.reload();
    }

    if (user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('my-id').innerText = `ID: ${user.id}`;
        init();
    }

    function init() {
        updateUI();
        renderFriends();
    }

    function updateUI() {
        document.getElementById('main-balance').innerText = balance.toLocaleString('ru-RU') + ' ₽';
        localStorage.setItem('gh_bal', balance);
    }

    function addFriend() {
        const friendId = prompt("Введите ID зарегистрированного пользователя (например, GH-1234):");
        if (friendId && friendId.startsWith("GH-")) {
            const name = prompt("Как назвать этого человека в списке?");
            if (name) {
                friends.push({ id: friendId, name: name });
                localStorage.setItem('gh_friends', JSON.stringify(friends));
                renderFriends();
            }
        } else { alert("Неверный формат ID!"); }
    }

    function renderFriends() {
        const list = document.getElementById('contacts');
        list.innerHTML = '';
        friends.forEach(f => {
            const div = document.createElement('div');
            div.className = 'contact-item';
            div.onclick = () => openTransfer(f);
            div.innerHTML = `<div class="contact-avatar">${f.name[0]}</div><div class="contact-name">${f.name}</div>`;
            list.appendChild(div);
        });
    }

    function openTransfer(friend) {
        currentTarget = friend;
        document.getElementById('modal-title').innerText = `Перевод для ${friend.name}`;
        document.getElementById('modal').style.display = 'flex';
    }

    function executeTransfer() {
        const amt = parseFloat(document.getElementById('amount-input').value);
        if (amt > 0 && amt <= balance) {
            balance -= amt;
            const code = `TX-${user.id}-${btoa(amt)}`;
            alert(`Успешно! Отправь этот код ${currentTarget.name}:\n\n${code}`);
            addHistory(`Перевод: ${currentTarget.name}`, amt, false);
            updateUI();
            closeModal();
        } else { alert("Ошибка баланса"); }
    }

    function receiveMoney() {
        const code = prompt("Вставь код перевода:");
        if (code && code.startsWith("TX-")) {
            const amt = parseFloat(atob(code.split('-')[2]));
            let used = JSON.parse(localStorage.getItem('used_tx') || '[]');
            if (used.includes(code)) return alert("Код уже использован");
            
            balance += amt;
            used.push(code);
            localStorage.setItem('used_tx', JSON.stringify(used));
            addHistory("Принятие кода", amt, true);
            updateUI();
            alert("Деньги зачислены!");
        }
    }

    function topUp() {
        const amt = prompt("Сумма пополнения:");
        if (amt) { balance += parseFloat(amt); updateUI(); addHistory("Депозит", amt, true); }
    }

    function addHistory(title, amt, plus) {
        const h = document.getElementById('history');
        const row = document.createElement('div');
        row.className = 'history-row';
        row.innerHTML = `<div><div>${title}</div><div class="h-dim">${new Date().toLocaleTimeString()}</div></div>
                         <div style="font-weight:700; color:${plus ? 'var(--success)' : '#fff'}">${plus ? '+' : '-'} ${parseFloat(amt).toLocaleString()}</div>`;
        h.prepend(row);
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
