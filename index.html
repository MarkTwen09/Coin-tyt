<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .aura-gradient { background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .chat-area { height: calc(100vh - 140px); }
        input:focus { font-size: 16px !important; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="p-5 flex justify-between items-center glass z-10">
        <span class="text-xl font-black tracking-widest aura-gradient">AURA</span>
        <div class="h-2 w-2 rounded-full bg-purple-500 shadow-[0_0_10px_#a855f7]"></div>
    </header>

    <main id="chat" class="chat-area overflow-y-auto p-5 space-y-6 flex flex-col"></main>

    <footer class="p-4 pb-8 glass">
        <div class="max-w-3xl mx-auto flex gap-3">
            <input type="text" id="input" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500 transition-all" placeholder="Message Aura...">
            <button onclick="ask()" class="bg-white text-black px-6 py-4 rounded-2xl font-bold active:scale-90 transition-all">Send</button>
        </div>
    </footer>

    <script>
        const KEY = 'INSERT_KEY_HERE AIzaSyDOqqL5RGsnseRbEnfn64YZdpZ7-2YIzOY'; 

        async function ask() {
            const i = document.getElementById('input');
            const box = document.getElementById('chat');
            if (!i.value.trim()) return;

            const uMsg = i.value;
            i.value = '';
            box.innerHTML += `<div class="self-end bg-white/10 p-4 rounded-2xl max-w-[80%] text-sm">${uMsg}</div>`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: uMsg }] }] })
                });
                const d = await res.json();
                const txt = d.candidates[0].content.parts[0].text;
                box.innerHTML += `<div class="self-start glass p-4 rounded-2xl max-w-[85%] text-sm border-l-2 border-purple-500">${txt}</div>`;
                box.scrollTo(0, box.scrollHeight);
            } catch (e) {
                box.innerHTML += `<div class="text-red-400 text-xs text-center">Error: Check Key</div>`;
            }
        }
        document.getElementById('input').onkeypress = (e) => { if(e.key === 'Enter') ask() };
    </script>
</body>
</html>
