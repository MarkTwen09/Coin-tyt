<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA INFINITY</title>
    <style>
        :root {
            --bg: #000;
            --sidebar: #0a0a0b;
            --accent: #4e8cff;
            --border: rgba(255, 255, 255, 0.07);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
            overflow: hidden;
        }

        /* SIDEBAR & OVERLAY */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--sidebar); border-right: 1px solid var(--border);
            z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 999; display: none; backdrop-filter: blur(4px);
        }
        .overlay.active { display: block; }

        /* ИНТЕРФЕЙС */
        .main { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }
        
        .nav {
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
        }
        .menu-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .logo { font-weight: 600; letter-spacing: 1px; background: linear-gradient(90deg, #4e8cff, #b573f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #chat-flow {
            flex: 1; overflow-y: auto; padding: 25px;
            display: flex; flex-direction: column; gap: 35px;
            padding-bottom: 180px; -webkit-overflow-scrolling: touch;
        }

        /* СООБЩЕНИЯ */
        .msg { max-width: 90%; line-height: 1.6; font-size: 16px; animation: msgIn 0.3s ease; position: relative; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } }

        .ai-msg { align-self: flex-start; color: #f0f0f0; }
        .ai-msg::before { content: '✦'; color: var(--accent); font-size: 22px; display: block; margin-bottom: 8px; }

        .user-msg { 
            align-self: flex-end; background: var(--glass); 
            padding: 14px 20px; border-radius: 20px; border: 1px solid var(--border);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
        }

        /* ВВОД */
        .input-zone {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px 20px calc(40px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }
        .input-pill {
            max-width: 800px; margin: 0 auto; background: #111113;
            border: 1px solid var(--border); border-radius: 32px;
            padding: 8px 8px 8px 22px; display: flex; align-items: center;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 17px; outline: none; padding: 10px 0; }
        .send-btn { width: 44px; height: 44px; border-radius: 22px; background: #fff; border: none; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); background: var(--accent); color: #fff; }

        /* ИСТОРИЯ ЧАТОВ */
        .chat-history-item {
            padding: 12px; margin-bottom: 8px; border-radius: 10px;
            font-size: 14px; color: #888; cursor: pointer; border: 1px solid transparent;
        }
        .chat-history-item:hover { background: var(--glass); border-color: var(--border); color: #fff; }
        .new-btn { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 12px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <button class="new-btn" onclick="startNewChat()">+ Новый чат</button>
        <div id="history-list" style="flex: 1; overflow-y: auto;"></div>
        <button class="new-btn" onclick="fullReset()" style="border-color: #ff4b4b; color: #ff4b4b; margin-top: 20px;">Очистить всё</button>
    </div>

    <div class="main">
        <div class="nav">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div class="logo">AURA INFINITY</div>
            <div style="width: 24px;"></div>
        </div>
        <div id="chat-flow"></div>
        <div class="input-zone">
            <div class="input-pill">
                <input type="text" id="user-input" placeholder="Спроси о чем угодно..." autocomplete="off">
                <button id="send-trigger" class="send-btn">↑</button>
            </div>
        </div>
    </div>

    <script>
        const chatFlow = document.getElementById('chat-flow'), userInput = document.getElementById('user-input'), 
              sendBtn = document.getElementById('send-trigger'), sidebar = document.getElementById('sidebar'), 
              overlay = document.getElementById('overlay'), historyList = document.getElementById('history-list');

        let allChats = JSON.parse(localStorage.getItem('aura_v3_data')) || [];
        let activeIdx = allChats.length > 0 ? 0 : -1;

        // БАЗА ЗНАНИЙ (Умная логика 2026)
        const neuralLogic = {
            "задач": "Я готова решить любую задачу. Математика, физика или программирование — просто напиши условие!",
            "кто так": "Я знаю мировых знаменитостей, от звезд Тиктока до Илона Маска и исторических личностей. О ком именно рассказать?",
            "бравл": "В Бравле сейчас важна тактика. Твой BAZA SHOP — отличная тема, давай обсудим контент для него?",
            "невинк": "В Невинномысске всегда кипит жизнь. Как продвигается твой новостной проект?",
            "учеб": "8-й класс — важный этап. Помогу с биологией Пасечника или любым другим предметом за минуту.",
            "помоги": "Я здесь, чтобы помочь. Расскажи подробнее, какая ситуация, и мы найдем решение вместе.",
            "айфон": "iPhone 17 Pro — это мощь. Мой интерфейс оптимизирован специально под твой экран.",
            "дела": "Мои системы работают идеально. Готова разносить любые вопросы! Как твои дела?",
            "привет": "Салют! Рада тебя видеть. О чем сегодня пообщаемся?",
            "default": [
                "Это глубокий вопрос. Давай разберем его по фактам и логике.",
                "Я поняла запрос. Мой анализ говорит, что это отличная идея!",
                "Интересно! Расскажи больше, чтобы я выдала максимально точный совет.",
                "С точки зрения продвинутого ИИ, это решение приведет к успеху.",
                "Полностью согласна. Давай двигаться в этом направлении!"
            ]
        };

        function init() {
            renderHistory();
            if (activeIdx === -1) startNewChat();
            else openChat(activeIdx);
        }

        function toggleSidebar() { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); }
        overlay.onclick = toggleSidebar;

        function startNewChat() {
            const nc = { title: "Новый диалог " + (allChats.length + 1), msgs: [] };
            allChats.unshift(nc);
            activeIdx = 0;
            save();
            openChat(0);
            if (sidebar.classList.contains('active')) toggleSidebar();
        }

        function openChat(i) {
            activeIdx = i;
            chatFlow.innerHTML = '';
            if (allChats[i].msgs.length === 0) {
                showMsg("Привет! Я — AURA. Мой интеллект теперь полностью автономен. Спрашивай о чем угодно — от задач до советов по жизни.", 'ai-msg');
            } else {
                allChats[i].msgs.forEach(m => showMsg(m.t, m.type));
            }
            renderHistory();
            if (sidebar.classList.contains('active')) toggleSidebar();
        }

        async function handleAction() {
            const val = userInput.value.trim(); if(!val) return;
            showMsg(val, 'user-msg');
            allChats[activeIdx].msgs.push({t: val, type: 'user-msg'});
            if (allChats[activeIdx].msgs.length === 1) allChats[activeIdx].title = val;
            userInput.value = '';

            setTimeout(() => {
                let reply = neuralLogic["default"][Math.floor(Math.random() * neuralLogic["default"].length)];
                const low = val.toLowerCase();
                for (let k in neuralLogic) { if (low.includes(k) && k !== "default") { reply = neuralLogic[k]; break; } }
                
                showMsg(reply, 'ai-msg');
                allChats[activeIdx].msgs.push({t: reply, type: 'ai-msg'});
                save();
            }, 600);
        }

        function showMsg(t, type) {
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.textContent = t;
            chatFlow.appendChild(d);
            chatFlow.scrollTop = chatFlow.scrollHeight;
        }

        function renderHistory() {
            historyList.innerHTML = allChats.map((c, i) => `
                <div class="chat-history-item" onclick="openChat(${i})">
                    ${c.title.substring(0, 20)}${c.title.length > 20 ? '...' : ''}
                </div>
            `).join('');
        }

        function save() { localStorage.setItem('aura_v3_data', JSON.stringify(allChats)); }
        function fullReset() { if(confirm("Удалить всю историю навсегда?")) { localStorage.clear(); location.reload(); } }

        sendBtn.onclick = handleAction;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleAction(); };
        init();
    </script>
</body>
</html>
