<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Grok Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* Эффект стекла Grok */
        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            border-color: rgba(167, 139, 250, 0.5);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.1);
        }

        /* Анимация Aura */
        .aura-glow {
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.2);
            animation: pulse-glow 4s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .message-anim {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex">

    <aside id="sidebar" class="w-72 glass-panel border-r hidden md:flex flex-col z-50">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-black font-bold aura-glow">/</div>
                <span class="text-xl font-semibold tracking-tight">Aura <span class="text-violet-400 text-xs">v2.0</span></span>
            </div>
            <button onclick="createNewChat()" class="w-full py-3 px-4 glass-input rounded-xl text-sm font-medium hover:bg-white/10 transition flex items-center justify-center gap-2">
                <span>+</span> Новый чат
            </button>
        </div>
        <div id="chat-list" class="flex-1 overflow-y-auto px-4 space-y-2">
            </div>
        <div class="p-4 border-t border-white/5 text-[10px] text-white/30 text-center uppercase tracking-widest">
            Powered by Grok Engine & Math Core
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="h-16 border-b border-white/5 flex items-center justify-between px-6 glass-panel">
            <button class="md:hidden text-2xl" onclick="toggleSidebar()">☰</button>
            <div class="text-sm font-medium text-white/60">Модель: <span class="text-white">Aura Math-X</span></div>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-xs text-white/40 font-mono">Status: Ready</span>
            </div>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-8">
            <div class="max-w-3xl mx-auto text-center py-20">
                <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tighter">Что решим сегодня?</h1>
                <p class="text-white/40 text-lg">Я обучена сложной математике, коду и глубоким рассуждениям.</p>
            </div>
        </div>

        <div class="p-4 md:p-8">
            <div class="max-w-3xl mx-auto relative">
                <textarea id="user-input" rows="1" 
                    onkeydown="if(event.key === 'Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"
                    placeholder="Спроси что угодно или введи уравнение..."
                    class="w-full glass-input rounded-2xl py-4 px-6 pr-16 outline-none resize-none text-[16px] leading-relaxed"></textarea>
                
                <button onclick="sendMessage()" class="absolute right-3 bottom-3 w-10 h-10 bg-white text-black rounded-xl flex items-center justify-center hover:scale-105 active:scale-95 transition">
                    <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </div>
            <p class="text-center text-[10px] text-white/20 mt-4">Aura может ошибаться, но в математике она — зверь.</p>
        </div>
    </main>

    <script>
        let chats = JSON.parse(localStorage.getItem('aura_v2_chats')) || [];
        let currentChatId = null;

        // Математическое ядро
        const MathCore = {
            solve(input) {
                try {
                    // Удаляем лишние слова, оставляем выражение
                    let expr = input.replace(/[а-яА-ЯёЁ?]/g, '').trim();
                    if(!expr || expr.length < 3) return null;
                    
                    // Безопасное вычисление (Math.js был бы лучше, но делаем нативно)
                    const result = eval(expr.replace(/x/g, '*').replace(/\^/g, '**'));
                    return `**Результат вычисления:** \n\n $$ ${expr} = ${result} $$ \n\nНужна помощь с разбором формулы?`;
                } catch (e) {
                    return null;
                }
            }
        };

        function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            if (!currentChatId) createNewChat(text.substring(0, 20));
            
            appendMessage('user', text);
            input.value = '';
            
            // Имитация "умного" ответа
            setTimeout(() => {
                let response;
                const mathResult = MathCore.solve(text);
                
                if (mathResult) {
                    response = mathResult;
                } else if (text.toLowerCase().includes('привет')) {
                    response = "Привет, Марк! Я обновила интерфейс под стиль Grok. Теперь всё летает. Какие задачи на сегодня? Могу помочь с кодом, уроками или разобрать твой новый проект.";
                } else {
                    response = "Я проанализировала твой запрос. С точки зрения логики и данных, это интересная тема. Давай углубимся в детали?";
                }
                
                appendMessage('aura', response);
                saveChats();
            }, 600);
        }

        function appendMessage(role, content) {
            const container = document.getElementById('messages');
            if(container.querySelector('h1')) container.innerHTML = ''; // Убираем приветствие

            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-anim`;
            
            const inner = role === 'user' 
                ? `<div class="bg-white/10 px-5 py-3 rounded-2xl max-w-[80%] border border-white/5">${content}</div>`
                : `<div class="flex gap-4 max-w-[85%]">
                    <div class="w-8 h-8 rounded-full bg-white flex-shrink-0 flex items-center justify-center text-black text-xs font-bold">/</div>
                    <div class="space-y-2">
                        <div class="text-xs text-white/40 font-mono uppercase tracking-widest">Aura Intelligence</div>
                        <div class="text-white/90 leading-relaxed">${content.replace(/\n/g, '<br>')}</div>
                    </div>
                   </div>`;
            
            div.innerHTML = inner;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function createNewChat(name = "Новый диалог") {
            const id = Date.now();
            chats.unshift({ id, name, messages: [] });
            currentChatId = id;
            renderChatList();
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = chats.map(c => `
                <div onclick="selectChat(${c.id})" class="p-3 rounded-xl cursor-pointer transition ${c.id === currentChatId ? 'bg-white/10 border border-white/10' : 'hover:bg-white/5 text-white/50'} text-sm truncate">
                    ${c.name}
                </div>
            `).join('');
        }

        function saveChats() {
            localStorage.setItem('aura_v2_chats', JSON.stringify(chats));
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('hidden');
            sb.classList.toggle('flex');
            sb.classList.toggle('absolute');
            sb.classList.toggle('h-full');
        }

        // Авто-инициализация
        if(chats.length > 0) {
            currentChatId = chats[0].id;
            renderChatList();
        }
    </script>
</body>
</html>
