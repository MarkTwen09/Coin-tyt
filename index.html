<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAO ELITE | EMPIRE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --accent: #acff01; --purp: #8a2be2; --bg: #050505;
            --card: rgba(255, 255, 255, 0.03);
        }

        body {
            background: var(--bg); color: white; font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a2210 0%, transparent 70%);
        }

        .header {
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px);
        }

        .screen {
            flex: 1; display: none; flex-direction: column; align-items: center;
            padding: 20px; animation: fadeIn 0.4s ease; overflow-y: auto; padding-bottom: 100px;
        }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        .bal-val { font-size: 48px; font-weight: 900; color: white; text-shadow: 0 0 20px rgba(172,255,1,0.2); }

        /* COIN & SKINS */
        .coin-box {
            width: 170px; height: 170px; border-radius: 50%; border: 4px solid var(--accent);
            margin: 25px 0; display: flex; align-items: center; justify-content: center;
            font-size: 70px; box-shadow: 0 0 40px rgba(172, 255, 1, 0.1); transition: 0.3s;
        }
        .rolling { animation: flipAnim 1.5s cubic-bezier(0.2, 0, 0.1, 1); }
        @keyframes flipAnim { 0% { transform: rotateY(0); } 100% { transform: rotateY(1440deg); } }

        /* BUTTONS */
        .btn {
            background: var(--accent); color: black; border: none; padding: 18px 60px;
            border-radius: 18px; font-weight: 900; cursor: pointer; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-s { background: var(--card); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 10px; font-size: 12px; }

        /* SHOP & TASKS */
        .item-card {
            width: 90%; background: var(--card); border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
        }
        .skin-preview { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 15px; }

        /* NAV */
        .nav {
            position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(5,5,5,0.95);
            border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center;
        }
        .n-item { color: #444; text-align: center; font-size: 9px; font-weight: 700; cursor: pointer; }
        .n-item.active { color: var(--accent); }
        .n-item i { display: block; font-size: 22px; margin-bottom: 3px; font-style: normal; }

        #msg { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 12px 30px; border-radius: 12px; z-index: 2000; display: none; font-weight: 900; }
    </style>
</head>
<body>

    <div id="msg"></div>

    <div class="header">
        <div style="color: var(--accent); font-weight: 900;">KAO EMPIRE</div>
        <div id="top_bal" style="font-weight: 700;">500 🪙</div>

        <div class="bal-val" id="b_home">500</div>
        <div id="main_coin" class="coin-box">🎭</div>
        <div style="display: flex; gap: 8px; margin-bottom: 20px;">
            <button class="btn-s" onclick="setB(10)">10</button>
            <button class="btn-s" style="border-color: var(--accent)" onclick="setB(50)">50</button>
            <button class="btn-s" onclick="setB(100)">100</button>
        </div>
        <button class="btn" onclick="play()">БРОСИТЬ</button>
    </div>

    <div id="scr_shop" class="screen">
        <h2 style="color: var(--accent)">МАГАЗИН СКИНОВ</h2>
        <div class="item-card">
            <div style="display:flex; align-items:center;">
                <div class="skin-preview">🪙</div>
                <div><b>Classic Gold</b><br><small>Стандарт</small></div>

            <button class="btn-s" onclick="buySkin('classic', 0, '🪙')">ВЫБРАТЬ</button>
        </div>
        <div class="item-card">

                <div><b>Crypto King</b><br><small>5,000 монет</small></div>
            </div>
            <button id="btn_crypto" class="btn-s" onclick="buySkin('crypto', 5000, '₿')">КУПИТЬ</button>
        </div>
        <div class="item-card">
            <div style="display:flex; align-items:center;">
                <div class="skin-preview" style="border-color:#00ffff">💎</div>
                <div><b>Diamond</b><br><small>15,000 монет</small></div>
            </div>
            <button id="btn_diamond" class="btn-s" onclick="buySkin('diamond', 15000, '💎')">КУПИТЬ</button>
        </div>
    </div>

    <div id="scr_earn" class="screen">
        <h2 style="color: var(--accent)">БОНУСЫ</h2>
        <div class="item-card" style="border: 2px solid var(--accent)">
            <div><b>Ежедневный подарок</b><br><small id="bonus_timer">Доступно сейчас!</small></div>
            <button id="btn_daily" class="btn-s" style="background:var(--accent); color:black;" onclick="claimDaily()">ЗАБРАТЬ</button>
        </div>
        <div class="item-card">
            <div><b>Подписка на ТГ</b><br><small>+2,000 монет</small></div>
            <button class="btn-s" onclick="doTask('t1', 2000)">ПРОВЕРИТЬ</button>
        </div>
    </div>

    <div id="scr_wall" class="screen">
