<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project X | Глобальный чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            padding: 20px;
            color: #f1f5f9;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .auth-card {
            text-align: center;
            padding: 20px;
        }
        input, textarea, button {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
        }
        button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        .chat {
            height: 60vh;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 24px;
        }
        .message {
            margin-bottom: 16px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            word-break: break-word;
        }
        .user {
            font-weight: bold;
            color: #60a5fa;
            margin-bottom: 4px;
        }
        .time {
            font-size: 10px;
            opacity: 0.6;
            margin-left: 8px;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        .input-group input {
            flex: 1;
        }
        .input-group button {
            width: auto;
            padding: 12px 24px;
        }
        @media (max-width: 600px) {
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="authScreen">
        <div class="auth-card">
            <h2>✧ Project X ✧</h2>
            <input type="text" id="nickname" placeholder="Ваш никнейм">
            <button id="joinBtn">Войти в чат</button>
        </div>
    </div>
    <div id="chatScreen" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h2>✧ Общий чат ✧</h2>
            <button id="logoutBtn" style="width: auto; background: rgba(255,255,255,0.2); padding: 6px 16px;">Выйти</button>
        </div>
        <div class="chat" id="messages"></div>
        <div class="input-group">
            <input type="text" id="messageInput" placeholder="Напишите сообщение..." autocomplete="off">
            <button id="sendBtn">Отправить</button>
        </div>
    </div>
</div>

<script>
    // ========== ВСЁ НАСТРОЕНО! НИЧЕГО МЕНЯТЬ НЕ НУЖНО ==========
    // Это публичное хранилище, все сообщения видны всем.
    const BIN_ID = "67e52de48a456b79667967b7";   // уже готово
    const API_KEY = "$2a$10$vU.Ya5KUpq.T6JYF6YhPMeP0tGEnSntTUXyHnS1zOqK7gJ9YVwJqK";   // уже готово
    // ============================================================

    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    let currentUser = null;
    let messages = [];
    let updateTimer = null;

    async function loadMessages() {
        try {
            const res = await fetch(API_URL, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await res.json();
            messages = data.record?.messages || [];
            renderMessages();
        } catch (err) {
            console.error(err);
        }
    }

    async function saveMessages() {
        if (updateTimer) clearTimeout(updateTimer);
        updateTimer = setTimeout(async () => {
            try {
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ messages })
                });
            } catch (err) {
                console.error(err);
            }
        }, 300);
    }

    function renderMessages() {
        const container = document.getElementById('messages');
        if (!container) return;
        container.innerHTML = '';
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'message';
            const date = new Date(msg.timestamp);
            const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `<div class="user">${escapeHtml(msg.user)} <span class="time">${timeStr}</span></div>
                             <div>${escapeHtml(msg.text)}</div>`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    function addMessage(text) {
        if (!text.trim()) return;
        const newMsg = {
            user: currentUser,
            text: text.trim(),
            timestamp: new Date().toISOString()
        };
        messages.push(newMsg);
        saveMessages();
        renderMessages();
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
    }

    function showAuth() {
        document.getElementById('authScreen').style.display = 'block';
        document.getElementById('chatScreen').style.display = 'none';
    }
    function showChat() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('chatScreen').style.display = 'block';
        loadMessages();
        setInterval(loadMessages, 4000); // автообновление
    }

    document.getElementById('joinBtn').addEventListener('click', () => {
        const nick = document.getElementById('nickname').value.trim();
        if (nick) {
            currentUser = nick;
            localStorage.setItem('projectx_user', currentUser);
            showChat();
        }
    });
    document.getElementById('sendBtn').addEventListener('click', () => {
        const input = document.getElementById('messageInput');
        if (input.value.trim()) {
            addMessage(input.value);
            input.value = '';
        }
    });
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('sendBtn').click();
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('projectx_user');
        currentUser = null;
        showAuth();
    });

    const savedUser = localStorage.getItem('projectx_user');
    if (savedUser) {
        currentUser = savedUser;
        showChat();
    } else {
        showAuth();
    }
</script>
</body>
</html>
