<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .aura-border { border: 1px solid rgba(168, 85, 247, 0.2); }
        .aura-gradient-bg { background: linear-gradient(180deg, rgba(0,0,0,1) 0%, rgba(10,10,10,1) 100%); }
        .user-bubble { background: #111; border: 1px solid #222; border-radius: 18px 18px 2px 18px; }
        .ai-bubble { background: rgba(168, 85, 247, 0.03); border: 1px solid rgba(168, 85, 247, 0.3); border-radius: 18px 18px 18px 2px; }
        #chat-window { scroll-behavior: smooth; flex-grow: 1; overflow-y: auto; padding-bottom: 120px; }
        #chat-window::-webkit-scrollbar { width: 0; }
        input:focus { font-size: 16px !important; }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: #a855f7; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 #a855f7, 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 #a855f7, 1em 0 0 #a855f7; } }
    </style>
</head>
<body class="aura-gradient-bg">

    <header class="p-6 text-center border-b border-white/5 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-xl font-black tracking-[0.3em] uppercase italic text-purple-500">Aura</h1>
    </header>

    <main id="chat-window" class="p-4 space-y-6 flex flex-col pt-8"></main>

    <div id="loader" class="hidden px-8 py-2 text-purple-400 text-xs font-mono uppercase tracking-widest leading-none">
        Aura processing<span class="loading-dots"></span>
    </div>

    <footer class="fixed bottom-0 left-0 w-full p-4 bg-black/80 backdrop-blur-xl border-t border-white/5 pb-8">
        <div class="max-w-3xl mx-auto flex items-center gap-3 aura-border bg-white/5 p-1 rounded-[24px]">
            <input type="text" id="userInput" class="w-full bg-transparent px-5 py-4 text-sm focus:outline-none" placeholder="Type your message..." autocomplete="off">
            <button onclick="handleSend()" class="bg-white text-black h-12 w-12 flex items-center justify-center rounded-full active:scale-90 transition-transform">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
        </div>
    </footer>

    <script>
        const KEY = 'AIzaSyDOqqL5RGsnseRbEnfn64YZdpZ7-2YIzOY';

        const chat = document.getElementById('chat-window');
        const input = document.getElementById('userInput');
        const loader = document.getElementById('loader');

        async function handleSend() {
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            addMessage(text, 'user');
            
            loader.classList.remove('hidden');
            chat.scrollTo(0, chat.scrollHeight);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiResponse = data.candidates[0].content.parts[0].text;
                loader.classList.add('hidden');
                addMessage(aiResponse, 'ai');

            } catch (err) {
                console.error("FULL ERROR:", err);
                loader.classList.add('hidden');
                addMessage(`SYSTEM ERROR: ${err.message}. Check console or API key status.`, 'ai');
            }
        }

        function addMessage(msg, role) {
            const div = document.createElement('div');
            div.className = role === 'user' 
                ? 'user-bubble p-4 self-end max-w-[85%] text-sm leading-relaxed shadow-2xl' 
                : 'ai-bubble p-4 self-start max-w-[90%] text-sm leading-relaxed text-purple-50';
            
            div.innerText = msg;
            chat.appendChild(div);
            chat.scrollTo(0, chat.scrollHeight);
        }

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
