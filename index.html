<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil investor: Russia Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --accent-neon: #00ffcc;
            --text-main: #c9d1d9;
            --btn-green: #238636;
            --btn-red: #da3633;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-neon);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
            margin-bottom: 5px;
        }

        .subtitle {
            color: #8b949e;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .news-ticker {
            grid-column: 1 / -1;
            background: #21262d;
            border-left: 4px solid var(--accent-neon);
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            min-height: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #21262d;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #30363d;
        }

        .stat-card span {
            display: block;
            font-size: 0.85rem;
            color: #8b949e;
            text-transform: uppercase;
        }

        .stat-card strong {
            display: block;
            font-size: 1.4rem;
            color: #fff;
            margin-top: 5px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            color: #fff;
        }

        button:active { transform: scale(0.98); }

        .btn-buy { background-color: var(--btn-green); }
        .btn-buy:hover { opacity: 0.9; }

        .btn-sell { background-color: var(--btn-red); }
        .btn-sell:hover { opacity: 0.9; }

        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }
    </style>
</head>
<body>

    <h1>NEFT RUSSIA INVESTOR</h1>
    <div class="subtitle">Симулятор торговли нефтью в эпоху санкций и ограничений</div>

    <div class="container">
        <div class="panel news-ticker" id="news-box">
            Загрузка геополитической обстановки...
        </div>

        <div class="panel">
            <h3 style="margin-top:0; color: #fff;">График стоимости Urals (за баррель)</h3>
            <div class="chart-container">
                <canvas id="oilChart"></canvas>
            </div>
        </div>

        <div class="panel" style="display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <h3 style="margin-top:0; color: #fff;">Портфель инвестора</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span>Баланс</span>
                        <strong id="balance-val">10 000 $</strong>
                    </div>
                    <div class="stat-card">
                        <span>Текущий курс</span>
                        <strong id="price-val" style="color: var(--accent-neon);">60.00 $</strong>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card" style="grid-column: 1 / -1;">
                        <span>Куплено нефти</span>
                        <strong id="oil-val">0 bbl</strong>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn-buy" onclick="buyOil()">КУПИТЬ</button>
                <button class="btn-sell" onclick="sellOil()">ПРОДАТЬ</button>
            </div>
        </div>
    </div>

    <script>
        // Игровые переменные
        let balance = 10000;
        let oilOwned = 0;
        let currentPrice = 60.0;
        
        // Данные для графика
        const priceHistory = [62, 61, 59, 60, 58, 60];
        const timeLabels = ['10:00', '11:00', '12:00', '13:00', '14:00', '15:00'];

        // Пул новостей, влияющих на рынок
        const newsEvents = [
            { text: "⚡ ЕС вводит новый пакет санкций против российского экспорта нефти!", impact: -5 },
            { text: "🔥 Крупный азиатский хаб заключил долгосрочный контракт на закупку Urals!", impact: 6 },
            { text: "📊 ОПЕК+ договорились о дополнительном сокращении добычи.", impact: 4 },
            { text: "⚓ Шторм в Новороссийске временно заблокировал отгрузку танкеров.", impact: -2 },
            { text: "🛡️ Индия увеличила закупки российской нефти со скидкой, обходя потолок цен.", impact: 3 },
            { text: "📉 Мировая экономика замедляется, спрос на энергоресурсы падает.", impact: -4 }
        ];

        // Инициализация графика Chart.js
        const ctx = document.getElementById('oilChart').getContext('2d');
        const oilChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: timeLabels,
                datasets: [{
                    label: 'Цена Urals ($)',
                    data: priceHistory,
                    borderColor: '#00ffcc',
                    borderWidth: 3,
                    backgroundColor: 'rgba(0, 255, 204, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#00ffcc'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                    y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });

        // Обновление интерфейса текста
        function updateUI() {
            document.getElementById('balance-val').innerText = balance.toFixed(2) + ' $';
            document.getElementById('price-val').innerText = currentPrice.toFixed(2) + ' $';
            document.getElementById('oil-val').innerText = oilOwned + ' bbl';
        }

        // Логика покупки
        function buyOil() {
            if (balance >= currentPrice) {
                balance -= currentPrice;
                oilOwned += 1;
                updateUI();
            } else {
                alert("Не хватает бабок на баррель!");
            }
        }

        // Логика продажи
        function sellOil() {
            if (oilOwned > 0) {
                balance += currentPrice;
                oilOwned -= 1;
                updateUI();
            } else {
                alert("У тебя нет нефти на продажу!");
            }
        }

        // Игровой цикл: изменение цены каждые 3 секунды
        setInterval(() => {
            // Базовое случайное колебание цены (-2 до +2 долларов)
            let change = (Math.random() * 4) - 2;
            
            // Шанс 20% на генерацию крупного инфоповода
            if (Math.random() < 0.2) {
                const randomNews = newsEvents[Math.floor(Math.random() * newsEvents.length)];
                document.getElementById('news-box').innerText = randomNews.text;
                change += randomNews.impact; // Добавляем влияние санкции/события
            }

            currentPrice += change;
            if (currentPrice < 10) currentPrice = 10; // Чтобы цена в ноль не ушла

            // Обновляем данные графика
            const now = new Date();
            const timeStr = now.getHours() + ':' + (now.getMinutes()<10?'0':'') + now.getMinutes() + ':' + (now.getSeconds()<10?'0':'') + now.getSeconds();
            
            oilChart.data.labels.push(timeStr);
            oilChart.data.datasets[0].data.push(currentPrice);

            // Ограничиваем график 15-ю точками, чтобы он не сжимался бесконечно
            if (oilChart.data.labels.length > 15) {
                oilChart.data.labels.shift();
                oilChart.data.datasets[0].data.shift();
            }

            oilChart.update();
            updateUI();
        }, 3000);

        // Первый запуск UI
        updateUI();
    </script>
</body>
</html>
