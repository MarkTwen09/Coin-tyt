<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHETTO BANK | LUXURY</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --accent: #ffffff;
            --card: #111111;
            --border: #222222;
            --gold: #FFD700;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 390px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .brand {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1.5px;
            text-transform: uppercase;
        }

        .brand span { color: var(--gold); }

        .id-badge {
            font-size: 11px;
            background: var(--card);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid var(--border);
            letter-spacing: 1px;
        }

        .card {
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 25px;
        }

        .label { color: #555; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .balance { font-size: 48px; font-weight: 800; margin: 10px 0; }

        .input-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin-bottom: 15px;
            padding: 5px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 15px;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: white;
            color: black;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active { transform: scale(0.96); opacity: 0.8; }

        .status {
            text-align: center;
            font-size: 12px;
            color: #444;
            margin-top: 15px;
        }

        .history-title { font-size: 14px; color: #333; margin: 30px 0 15px 5px; text-transform: uppercase; }
        .transaction {
            background: var(--card);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #151515;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="brand">GHETTO<span>BANK</span></div>
        <div class="id-badge" id="displayId">OFFLINE</div>
    </div>

    <div class="card">
        <div class="label">Balance Total</div>
        <div class="balance" id="displayBalance">0.00 ₽</div>
        <div style="font-size: 12px; color: #333;">Mastercard Private • 8821</div>
    </div>

    <div class="input-box">
        <input type="text" id="targetId" placeholder="ID Получателя">
    </div>
    <div class="input-box">
        <input type="number" id="amount" placeholder="Сумма перевода">
    </div>

    <button onclick="sendMoney()">ПОДТВЕРДИТЬ ПЕРЕВОД</button>
    <div class="status" id="status">Подключение к сети...</div>

    <div class="history-title">История операций</div>
    <div id="history"></div>
</div>

<script>
    // Используем бесплатный сервер для обмена данными
    const socket = io("https://p2p-bridge.glitch.me"); 

    let myId = localStorage.getItem('gb_id') || Math.floor(1000 + Math.random() * 9000).toString();
    localStorage.setItem('gb_id', myId);
    document.getElementById('displayId').innerText = "ID: " + myId;

    let balance = parseFloat(localStorage.getItem('gb_bal')) || 100000;

    function updateUI() {
        document.getElementById('displayBalance').innerText = balance.toLocaleString() + " ₽";
        localStorage.setItem('gb_bal', balance);
    }

    // Регистрация в сети
    socket.on('connect', () => {
        document.getElementById('status').innerText = "• Online •";
        socket.emit('register', myId);
    });

    // Логика получения денег
    socket.on('receive_money', (data) => {
        if (data.to === myId) {
            balance += parseFloat(data.amount);
            updateUI();
            addHistory(`Входящий от ${data.from}`, data.amount, "plus");
            alert(`Вам пришло ${data.amount} ₽ от ID:${data.from}`);
        }
    });

    function sendMoney() {
        const to = document.getElementById('targetId').value;
        const sum = parseFloat(document.getElementById('amount').value);

        if (!to || !sum || sum <= 0 || sum > balance) {
            alert("Ошибка: проверьте ID и сумму");
            return;
        }

        // Уменьшаем свой баланс
        balance -= sum;
        updateUI();

        // Отправляем сигнал другому человеку
        socket.emit('send_money', {
            from: myId,
            to: to,
            amount: sum
        });

        addHistory(`Перевод для ${to}`, sum, "minus");
        document.getElementById('amount').value = '';
        alert("Перевод успешно отправлен!");
    }

    function addHistory(text, sum, type) {
        const h = document.getElementById('history');
        const div = document.createElement('div');
        div.className = 'transaction';
        div.innerHTML = `
            <div>
                <div style="font-size: 14px;">${text}</div>
                <div style="font-size: 10px; color: #444;">${new Date().toLocaleTimeString()}</div>
            </div>
            <div style="font-weight: 800; color: ${type === 'plus' ? '#32d74b' : '#ff453a'}">
                ${type === 'plus' ? '+' : '-'}${sum} ₽
            </div>
        `;
        h.prepend(div);
    }

    updateUI();
</script>

</body>
</html>
