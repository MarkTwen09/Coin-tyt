<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Интерактивная карта Datamaps</title>

  <!-- 1. Подключаем необходимые зависимости через CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.3/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/1.6.9/topojson.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datamaps@0.5.9/dist/datamaps.all.min.js"></script>

  <style>
    /* 2. Контейнер карты обязательно должен иметь размеры и position: relative */
    #datamap-container {
      width: 900px;
      height: 500px;
      position: relative;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <!-- 3. Контейнер для карты -->
  <div id="datamap-container"></div>

  <script>
    // 4. Инициализация Datamap
    var map = new Datamap({
      element: document.getElementById('datamap-container'),
      scope: 'world', // Отображаем карту мира
      responsive: true, // Адаптивность
      fills: {
        defaultFill: '#f5f5f5', // Цвет по умолчанию
        'high': '#FF0000',  // Красный для "высокого" уровня
        'medium': '#FFFF00', // Жёлтый для "среднего"
        'low': '#00FF00'     // Зелёный для "низкого"
      },
      data: {
        'RUS': { fillKey: 'high' },   // Россия — высокий уровень
        'USA': { fillKey: 'medium' }, // США — средний уровень
        'CAN': { fillKey: 'low' }    // Канада — низкий уровень
      }
    });

    // 5. Обработчик изменения размера окна для адаптивности
    window.addEventListener('resize', function() {
      map.resize();
    });
  </script>
</body>
</html>
