<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA PRO MAX</title>
    <style>
        :root {
            --bg: #050508;
            --aura: #a855f7;
            --blue: #22d3ee;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; position: fixed; width: 100%;
        }

        .visuals {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 60%);
        }

        .app {
            display: flex; flex-direction: column; height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        .header { padding: 10px; text-align: center; }
        .header h1 {
            font-size: 2.2rem; letter-spacing: 12px; margin: 0;
            background: linear-gradient(90deg, #fff, var(--aura), var(--blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #chat {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 150px; /* Запас под клавиатуру */
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            padding: 14px 18px; border-radius: 22px; max-width: 80%;
            font-size: 16px; line-height: 1.4; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }

        .aura { background: rgba(168, 85, 247, 0.15); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: var(--glass); align-self: flex-end; border-color: var(--blue); border-bottom-right-radius: 4px; }

        .controls-wrapper {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 80%, transparent);
            padding: 10px 20px calc(30px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .input-row { display: flex; gap: 10px; align-items: center; max-width: 600px; margin: 0 auto; }

        input {
            flex: 1; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px; padding: 14px 20px; color: #fff; font-size: 17px;
            outline: none; -webkit-appearance: none;
        }

        button {
            width: 50px; height: 50px; border-radius: 25px;
            background: var(--aura); border: none; color: white;
            font-size: 22px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px var(--aura);
        }

        .status { font-size: 12px; color: var(--blue); text-align: center; margin-bottom: 8px; visibility: hidden; }
    </style>
</head>
<body>
    <div class="visuals"></div>
    <div class="app">
        <div class="header"><h1>AURA</h1></div>
        <div id="chat">
            <div class="msg aura">Так, попытка номер 5! Я обновила свои нейронные связи. Если сейчас не отвечу — значит, пора звать экзорциста. Проверяй!</div>
        </div>
        
        <div class="controls-wrapper">
            <div id="status" class="status">AURA генерирует ответ...</div>
            <div class="input-row">
                <input type="text" id="input" placeholder="Напиши мне..." autocomplete="off">
                <button id="btn">➜</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        async function talk() {
            const val = input.value.trim();
            if(!val) return;

            const uDiv = document.createElement('div');
            uDiv.className = 'msg user';
            uDiv.textContent = val;
            chat.appendChild(uDiv);
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
            status.style.visibility = 'visible';

            try {
                // Используем более стабильный и быстрый шлюз
                const response = await fetch('https://api.pawan.krd/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer pk-null' },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'system', content: 'Ты AURA, дерзкая нейросеть.' }, { role: 'user', content: val }]
                    })
                });

                if (!response.ok) throw new Error();

                const data = await response.json();
                const reply = data.choices[0].message.content;

                const aDiv = document.createElement('div');
                aDiv.className = 'msg aura';
                aDiv.textContent = reply;
                chat.appendChild(aDiv);

            } catch (e) {
                const eDiv = document.createElement('div');
                eDiv.className = 'msg aura';
                eDiv.textContent = "Бро, сервера реально перегружены. Давай я буду твоим красивым тамагочи, пока API не оживет?";
                chat.appendChild(eDiv);
            } finally {
                status.style.visibility = 'hidden';
                chat.scrollTop = chat.scrollHeight;
            }
        }

        btn.onclick = talk;
        input.onkeypress = (e) => { if(e.key === 'Enter') { talk(); input.blur(); } };
    </script>
</body>
</html>
