<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Stars — Premium</title>
    <style>
        :root {
            --bg-dark: #0a0c10;
            --card-bg: rgba(20, 24, 33, 0.9);
            --accent-gold: #c5a059;
            --accent-sber: #21a038;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-main); padding: 20px 0; overflow-x: hidden;
        }

        .logo { font-size: 20px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 25px; }
        .logo span { color: var(--accent-gold); }

        /* ПЛАВНАЯ БЕСКОНЕЧНАЯ РУЛЕТКА */
        .slider-container {
            width: 100%;
            overflow: hidden;
            margin-bottom: 30px;
            white-space: nowrap;
            position: relative;
        }

        .slider-track {
            display: inline-flex;
            gap: 15px;
            animation: scroll 20s linear infinite;
            padding-left: 15px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-50% - 7.5px)); }
        }

        .service-card {
            min-width: 260px;
            height: 130px;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-decoration: none;
            color: white;
            position: relative;
        }

        .vpn-card { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .shop-card { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        
        .card-tag { position: absolute; top: 15px; left: 15px; font-size: 9px; font-weight: 800; background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 8px; }
        .card-title { font-size: 18px; font-weight: 800; }

        /* ОСНОВНОЙ БЛОК */
        .main-container {
            width: 90%; max-width: 380px; background: var(--card-bg);
            backdrop-filter: blur(20px); border-radius: 30px; padding: 25px;
            border: 1px solid var(--border); margin-bottom: 20px;
        }

        .price-box { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; margin: 20px 0; text-align: center; border: 1px solid var(--border); }
        .val-main { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .val-sub { color: var(--accent-gold); font-weight: 600; font-size: 14px; }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 20px 0 30px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #fff; border-radius: 50%; border: 4px solid var(--bg-dark); }

        .buy-btn { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 16px; font-size: 13px; font-weight: 800; cursor: pointer; }

        /* МОДАЛКА ОПЛАТЫ */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .payment-card { width: 100%; max-width: 340px; background: #12141a; border-radius: 28px; padding: 30px; text-align: center; border: 1px solid var(--border); }
        
        .sber-icon { width: 50px; height: 50px; margin-bottom: 15px; }
        
        .copy-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(33,160,56,0.3); border-radius: 18px; padding: 20px; margin: 20px 0; cursor: pointer; }
        .card-num { font-size: 18px; font-weight: 700; letter-spacing: 1px; color: #fff; }
        .copy-text { font-size: 10px; color: var(--accent-sber); font-weight: 800; text-transform: uppercase; margin-top: 8px; }

        .ref-link { color: var(--text-dim); font-size: 12px; margin-top: 20px; text-decoration: none; display: block; }
    </style>
</head>
<body>

<div class="logo">MOON<span>STARS</span></div>

<div class="slider-container">
    <div class="slider-track">
        <!-- Карточки дублируются для бесконечного эффекта -->
        <div class="service-card vpn-card"><span class="card-tag">VPN</span><div class="card-title">Tgeshka VPN</div></div>
        <div class="service-card shop-card"><span class="card-tag">SHOP</span><div class="card-title">Moon Shop</div></div>
        <div class="service-card vpn-card"><span class="card-tag">VPN</span><div class="card-title">Tgeshka VPN</div></div>
        <div class="service-card shop-card"><span class="card-tag">SHOP</span><div class="card-title">Moon Shop</div></div>
    </div>
</div>

<div class="main-container">
    <input type="text" id="username" placeholder="@username" style="width:100%; padding:14px; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:14px; color:#fff; outline:none; margin-bottom:15px;">
    
    <div class="price-box">
        <div class="val-main" id="stars-val">100 STARS</div>
        <div class="val-sub" id="price-val">170 ₽</div>
    </div>

    <input type="range" id="slider" min="0" max="5" value="0" oninput="update()">
    <button class="buy-btn" onclick="showPay()">Оформить заказ</button>
</div>

<a href="#" class="ref-link" onclick="alert('Ссылка скопирована!')">Реферальная программа</a>

<div class="modal" id="payModal">
    <div class="payment-card">
        <!-- СБЕР ЛОГО КОДОМ (SVG) - ТЕПЕРЬ ТОЧНО НЕ ПРОПАДЕТ -->
        <svg class="sber-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="20" fill="#21A038"/>
            <path d="M10 20C10 14.4772 14.4772 10 20 10V14C16.6863 14 14 16.6863 14 20C14 23.3137 16.6863 26 20 26V30C14.4772 30 10 25.5228 10 20Z" fill="white"/>
            <path d="M20 12V8C26.6274 8 32 13.3726 32 20C32 26.6274 26.6274 32 20 32V28C24.4183 28 28 24.4183 28 20C28 15.5817 24.4183 12 20 12Z" fill="white" fill-opacity="0.6"/>
        </svg>

        <div style="font-size:18px; font-weight:800; color:#fff;">Оплата на Сбербанк</div>
        
        <div class="copy-box" onclick="copyCard()">
            <div class="card-num">2202 2088 9003 9648</div>
            <div class="copy-text" id="btn-text">Нажмите, чтобы скопировать</div>
        </div>

        <button class="buy-btn" style="background:#21a038; color:#fff;" onclick="send()">Я оплатил</button>
        <button onclick="document.getElementById('payModal').style.display='none'" style="background:none; border:none; color:var(--text-dim); margin-top:20px; cursor:pointer;">Отмена</button>
    </div>
</div>

<script>
    const prices = [
        {s: "100 STARS", p: 170}, {s: "250 STARS", p: 445}, {s: "500 STARS", p: 830},
        {s: "1000 STARS", p: 1540}, {s: "2500 STARS", p: 3700}, {s: "5000 STARS", p: 7200}
    ];

    function update() {
        const val = document.getElementById('slider').value;
        document.getElementById('stars-val').innerText = prices[val].s;
        document.getElementById('price-val').innerText = prices[val].p + " ₽";
    }

    function showPay() {
        if(!document.getElementById('username').value) return alert("Введите ник!");
        document.getElementById('payModal').style.display = 'flex';
    }

    function copyCard() {
        navigator.clipboard.writeText("2202208890039648");
        document.getElementById('btn-text').innerText = "СКОПИРОВАНО!";
        setTimeout(() => { document.getElementById('btn-text').innerText = "Нажмите, чтобы скопировать"; }, 2000);
    }

    function send() {
        const user = document.getElementById('username').value;
        const star = prices[document.getElementById('slider').value].s;
        window.location.href = `https://t.me/kaoface?text=Оплатил ${star} для ${user}`;
    }
</script>

</body>
</html>
