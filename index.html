<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GHETTO BANK BLACK</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --accent-yellow: #ffde00;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --danger: #ff3b30;
            --success: #34c759;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }
        .header h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .status-online {
            color: var(--success);
            font-size: 12px;
            background: rgba(52, 199, 89, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Main Card */
        .balance-card {
            background: linear-gradient(135deg, #2c2c2e 0%, #1c1c1e 100%);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            border: 1px solid #3a3a3c;
        }
        .balance-label { color: var(--text-secondary); font-size: 14px; margin-bottom: 8px; }
        .balance-amount { font-size: 38px; font-weight: 700; margin-bottom: 20px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .card-id { color: var(--text-secondary); font-family: monospace; font-size: 14px; }
        .card-type { color: var(--accent-yellow); font-weight: 900; font-size: 12px; letter-spacing: 1px; }

        /* Action Block */
        .action-container {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .action-title { font-weight: 700; margin-bottom: 16px; font-size: 18px; }
        .input-group {
            background: #2c2c2e;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #3a3a3c;
        }
        .input-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px; }
        .input-val { font-size: 18px; font-weight: 600; color: var(--text-main); }
        
        .main-btn {
            background: var(--accent-yellow);
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 10px;
            transition: transform 0.1s;
        }
        .main-btn:active { transform: scale(0.97); }

        /* History */
        .history-section { flex-grow: 1; overflow-y: auto; }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #1c1c1e;
        }
        .hist-info div { font-weight: 600; font-size: 15px; }
        .hist-info span { color: var(--text-secondary); font-size: 12px; }
        .hist-amount { font-weight: 700; }
        .plus { color: var(--success); }
        .minus { color: var(--danger); }

        /* Notifications */
        #notify {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="notify">КРЫША ЗАБРАЛА ДОЛЮ -15%</div>

    <div class="header">
        <h1>ЗАД</h1>
        <div class="status-online">В СЕТИ</div>
    </div>

    <div class="balance-card">
        <div class="balance-label">Баланс счета</div>
        <div class="balance-amount" id="balance">100 ₽</div>
        <div class="card-footer">
            <div class="card-id">ID: GH-3448</div>
            <div class="card-type">BLACK</div>
        </div>
    </div>

    <div class="action-container">
        <div class="action-title">Мгновенный перевод</div>
        <div class="input-group">
            <div class="input-label">ID Получателя</div>
            <div class="input-val">ГЕТТО-ДИЛЕР (ПРОВЕРЕН)</div>
        </div>
        <div class="input-group">
            <div class="input-label">Сумма инвестиции</div>
            <div class="input-val" id="invest-amount">50 ₽</div>
        </div>
        <button class="main-btn" onclick="gamble()">Внести в капитал (Крыша)</button>
    </div>

    <div class="history-section">
        <div class="action-title">История</div>
        <div id="history-list">
            </div>
    </div>

    <script>
        let balance = 100;
        let investAmount = 50;

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString() + " ₽";
            document.getElementById('invest-amount').innerText = Math.floor(investAmount).toLocaleString() + " ₽";
        }

        function addHistory(title, amount, isPlus) {
            const list = document.getElementById('history-list');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <div class="hist-info">
                    <div>${title}</div>
                    <span>${time}</span>
                </div>
                <div class="hist-amount ${isPlus ? 'plus' : 'minus'}">
                    ${isPlus ? '+' : '-'} ${Math.abs(Math.floor(amount)).toLocaleString()} ₽
                </div>
            `;
            list.prepend(item);
            if(list.children.length > 5) list.removeChild(list.lastChild);
        }

        function gamble() {
            if (balance < investAmount) {
                showNotify("НЕДОСТАТОЧНО СРЕДСТВ", true);
                return;
            }

            balance -= investAmount;
            let chance = Math.random();

            if (chance > 0.6) { // Выигрыш
                let win = investAmount * 2.5;
                balance += win;
                addHistory("Доход с оборота", win, true);
                investAmount *= 1.2; // Растет сложность (цена входа)
            } else { // Проигрыш
                addHistory("Конфискация товара", investAmount, false);
                investAmount = Math.max(50, investAmount * 0.8);
            }
            updateUI();
        }

        function showNotify(text, isRed) {
            const n = document.getElementById('notify');
            n.innerText = text;
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 2000);
        }

        // Случайные события гетто (Сложность)
        setInterval(() => {
            let event = Math.random();
            if (event < 0.15 && balance > 200) { // Налог крыши
                let tax = balance * 0.2;
                balance -= tax;
                addHistory("Потеря от КРЫШИ (Полиция)", tax, false);
                showNotify("ОБЛАВА! -20%", true);
                updateUI();
            } else if (event > 0.95) { // Мелкая прибыль
                let gift = 50;
                balance += gift;
                addHistory("Перевод от Лала", gift, true);
                updateUI();
            }
            
            // Инфляция (постоянное давление)
            if (balance > 100) {
                balance -= 1; 
                updateUI();
            }
        }, 5000);

        updateUI();
    </script>
</body>
</html>
