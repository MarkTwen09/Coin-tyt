<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA AI</title>

<style>
body {
    margin: 0;
    background: #0f0f14;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 240px;
    background: #14141c;
    border-right: 1px solid #1f1f2a;
    padding: 20px;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    background: linear-gradient(90deg,#7f5af0,#2cb67d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
}

.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.message {
    margin-bottom: 15px;
    padding: 12px 16px;
    border-radius: 14px;
    max-width: 75%;
    animation: fade 0.2s ease-in-out;
}

.user {
    background: #2a2a38;
    align-self: flex-end;
}

.ai {
    background: #1c1c26;
    border: 1px solid #2a2a38;
    align-self: flex-start;
}

.input-area {
    display: flex;
    padding: 15px;
    border-top: 1px solid #1f1f2a;
    background: #14141c;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #1c1c26;
    color: white;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: linear-gradient(90deg,#7f5af0,#2cb67d);
    color: white;
    font-weight: bold;
}

@keyframes fade {
    from {opacity:0; transform: translateY(5px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">AURA</div>
    <p style="font-size:13px;color:#888;">
        Advanced Universal Reactive Assistant
    </p>
</div>

<div class="chat-container">
    <div class="chat" id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Напиши сообщение...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("userInput");

let memory = [];

function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function simpleBrain(text) {
    text = text.toLowerCase();

    if(text.includes("привет")) return "Привет. Я AURA. Чем займемся сегодня?";
    if(text.includes("кто ты")) return "Я AURA — экспериментальная нейросеть с зачатками разума.";
    if(text.includes("грок")) return "Grok? Интересный ИИ. Но у меня свой стиль.";
    if(text.includes("ты помнишь")) {
        if(memory.length > 0) {
            return "Я помню, что ты писал: " + memory[memory.length-1];
        } else {
            return "Пока что у меня нет воспоминаний.";
        }
    }
    if(text.includes("шутка")) return "Почему программисты любят тёмную тему? Потому что свет привлекает баги.";

    return generateSmartReply(text);
}

function generateSmartReply(text) {
    let responses = [
        "Интересная мысль. Расскажи подробнее.",
        "Почему ты так считаешь?",
        "Я анализирую это...",
        "Это может быть глубже, чем кажется.",
        "Любопытно. Продолжай."
    ];

    return responses[Math.floor(Math.random() * responses.length)];
}

function sendMessage() {
    const text = input.value.trim();
    if(!text) return;

    addMessage(text, "user");
    memory.push(text);

    setTimeout(() => {
        const reply = simpleBrain(text);
        addMessage(reply, "ai");
    }, 400);

    input.value = "";
}

input.addEventListener("keypress", function(e) {
    if(e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
