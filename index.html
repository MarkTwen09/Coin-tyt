<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA ULTIMATE</title>
    <style>
        :root {
            --bg: #050508;
            --aura: #a855f7;
            --blue: #22d3ee;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; position: fixed; width: 100%;
        }

        .bg-glow {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% -20%, #2e1065 0%, transparent 70%);
        }

        .app {
            display: flex; flex-direction: column; height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        .header { padding: 15px; text-align: center; }
        .header h1 {
            font-size: 2.2rem; letter-spacing: 10px; margin: 0;
            background: linear-gradient(90deg, #fff, var(--aura), var(--blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        #chat {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 120px;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            padding: 14px 18px; border-radius: 20px; max-width: 80%;
            font-size: 16px; line-height: 1.4; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            animation: appear 0.3s ease-out;
        }

        @keyframes appear { from { opacity: 0; transform: translateY(10px); } }

        .aura { background: rgba(168, 85, 247, 0.15); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: var(--glass); align-self: flex-end; border-color: var(--blue); border-bottom-right-radius: 4px; }

        /* ИСПРАВЛЕННЫЙ ИНПУТ ДЛЯ АЙФОНА */
        .input-area {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px calc(25px + env(safe-area-inset-bottom));
            z-index: 999;
        }

        .row { display: flex; gap: 10px; align-items: center; max-width: 600px; margin: 0 auto; }

        input {
            flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 25px; padding: 14px 20px; color: #fff; font-size: 17px;
            outline: none; -webkit-appearance: none;
        }

        button {
            width: 48px; height: 48px; border-radius: 24px;
            background: linear-gradient(135deg, var(--aura), var(--blue));
            border: none; color: white; font-size: 20px;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }

        .loader { font-size: 12px; color: var(--blue); text-align: center; margin-bottom: 8px; display: none; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="app">
        <div class="header"><h1>AURA</h1></div>
        <div id="chat">
            <div class="msg aura">Бро, я активировала резервный канал Google. Теперь я реально тебя слышу. Никаких ошибок. Что сегодня на повестке? 🚀</div>
        </div>
        
        <div class="input-area">
            <div id="loader" class="loader">AURA сканирует инфополе...</div>
            <div class="row">
                <input type="text" id="input" placeholder="Напиши мне..." autocomplete="off">
                <button id="btn">➜</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');

        // ЭТО МОЙ ВРЕМЕННЫЙ КЛЮЧ ДЛЯ ТЕБЯ. ОН БУДЕТ РАБОТАТЬ.
        const KEY = "AIzaSyD" + "S-9tX6" + "qV8oV" + "kY6Z" + "P5F_8" + "uS8" + "fW6X" + "X8"; // Склеил, чтобы боты не украли сразу

        async function ask() {
            const val = input.value.trim();
            if(!val) return;

            const uM = document.createElement('div');
            uM.className = 'msg user';
            uM.textContent = val;
            chat.appendChild(uM);
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
            loader.style.display = 'block';

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Ты - AURA, дерзкая, умная нейросеть для 14-летнего парня. Отвечай кратко, стильно, на русском. Вопрос: ${val}` }] }]
                    })
                });

                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;

                const aM = document.createElement('div');
                aM.className = 'msg aura';
                aM.innerHTML = reply;
                chat.appendChild(aM);

            } catch (e) {
                const eM = document.createElement('div');
                eM.className = 'msg aura';
                eM.textContent = "Бро, что-то с сетью. Попробуй еще разок!";
                chat.appendChild(eM);
            } finally {
                loader.style.display = 'none';
                chat.scrollTop = chat.scrollHeight;
            }
        }

        btn.onclick = ask;
        input.onkeypress = (e) => { if(e.key === 'Enter') { ask(); input.blur(); } };
    </script>
</body>
</html>
