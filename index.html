<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гетто Банк — Главная</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --accent-yellow: #ffdd2d; /* Тот самый желтый */
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            background-color: var(--bg-color);
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .profile-icon {
            width: 40px;
            height: 40px;
            background-color: #2c2c2e;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: var(--accent-yellow);
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }

        /* Карта */
        .card-section {
            background: linear-gradient(135deg, #2c2c2e 0%, #1c1c1e 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            border: 1px solid #3a3a3c;
        }

        .card-type {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .balance {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .card-number {
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
            color: var(--text-secondary);
        }

        /* Кнопки действий */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .action-icon {
            width: 50px;
            height: 50px;
            background-color: #1c1c1e;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .action-icon:active {
            background-color: #2c2c2e;
            transform: scale(0.95);
        }

        .action-label {
            font-size: 0.7rem;
            color: var(--text-main);
        }

        /* Список операций */
        .history-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .transaction {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #1c1c1e;
        }

        .trans-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .trans-logo {
            width: 40px;
            height: 40px;
            background-color: #2c2c2e;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .trans-name {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .trans-category {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .trans-amount {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .plus { color: #30d158; }

        /* Нижнее меню */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 400px;
            background-color: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px 0;
            border-top: 1px solid #3a3a3c;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 0.65rem;
        }

        .tab-item.active {
            color: var(--accent-yellow);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="profile-icon">A</div>
        <div class="logo-text">ГЕТТО БАНК</div>
        <div style="font-size: 1.2rem;">🔍</div>
    </div>

    <div class="card-section">
        <div class="card-type">Гетто Black • MasterCard</div>
        <div class="balance" id="main-balance">540 230,50 ₽</div>
        <div class="card-number">•••• 4432</div>
    </div>

    <div class="quick-actions">
        <div class="action-item" onclick="addMoney()">
            <div class="action-icon" style="background-color: var(--accent-yellow); color: black;">+</div>
            <div class="action-label">Пополнить</div>
        </div>
        <div class="action-item">
            <div class="action-icon">⇄</div>
            <div class="action-label">Перевести</div>
        </div>
        <div class="action-item">
            <div class="action-icon">🧾</div>
            <div class="action-label">Платежи</div>
        </div>
        <div class="action-item">
            <div class="action-icon">•••</div>
            <div class="action-label">Еще</div>
        </div>
    </div>

    <div class="history-title">История операций</div>

    <div id="transactions-list">
        <div class="transaction">
            <div class="trans-info">
                <div class="trans-logo">🎮</div>
                <div>
                    <div class="trans-name">Brawl Stars: Gems</div>
                    <div class="trans-category">Развлечения</div>
                </div>
            </div>
            <div class="trans-amount">- 1 490 ₽</div>
        </div>

        <div class="transaction">
            <div class="trans-info">
                <div class="trans-logo">🍔</div>
                <div>
                    <div class="trans-name">Вкусно — и точка</div>
                    <div class="trans-category">Рестораны</div>
                </div>
            </div>
            <div class="trans-amount">- 840 ₽</div>
        </div>

        <div class="transaction">
            <div class="trans-info">
                <div class="trans-logo">💰</div>
                <div>
                    <div class="trans-name">Перевод от BAZA SHOP</div>
                    <div class="trans-category">Переводы</div>
                </div>
            </div>
            <div class="trans-amount plus">+ 15 000 ₽</div>
        </div>
    </div>

    <div style="height: 100px;"></div> <div class="tab-bar">
        <div class="tab-item active">
            <span style="font-size: 1.2rem;">🏠</span>
            <span>Главная</span>
        </div>
        <div class="tab-item">
            <span style="font-size: 1.2rem;">📊</span>
            <span>Платежи</span>
        </div>
        <div class="tab-item">
            <span style="font-size: 1.2rem;">💬</span>
            <span>Чат</span>
        </div>
        <div class="tab-item">
            <span style="font-size: 1.2rem;">⚙️</span>
            <span>Еще</span>
        </div>
    </div>
</div>

<script>
    let balance = 540230.50;

    function addMoney() {
        const amount = 5000;
        balance += amount;
        document.getElementById('main-balance').innerText = balance.toLocaleString('ru-RU') + ',50 ₽';
        
        // Маленькая анимация
        const el = document.getElementById('main-balance');
        el.style.color = '#ffdd2d';
        setTimeout(() => { el.style.color = '#ffffff'; }, 300);
    }
</script>

</body>
</html>
