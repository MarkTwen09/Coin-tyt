<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Stars — Купить Telegram Stars</title>
    <style>
        :root {
            --main-bg: #f5f7fa;
            --card-bg: #ffffff;
            --accent-blue: #0088cc;
            --text-dark: #333;
            --input-bg: #f9f9f9;
            --gold: #ffd700;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--main-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .header { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent-blue); }

        h1 { font-size: 20px; margin: 10px 0; text-align: center; }
        .description { color: #666; font-size: 13px; text-align: center; margin-bottom: 25px; line-height: 1.4; }

        .label { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: block; color: #555; }

        .input-group { margin-bottom: 20px; position: relative; }
        
        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border-radius: 15px;
            border: 1px solid #eee;
            background: var(--input-bg);
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        .icon { position: absolute; left: 15px; top: 38px; color: #aaa; }

        /* Стилизация прайса */
        .price-box {
            background: #f0f9ff;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px dashed var(--accent-blue);
        }

        .price-value { font-size: 24px; font-weight: bold; color: var(--accent-blue); }

        .slider-container { margin: 20px 0; text-align: center; }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--gold);
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .buy-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .buy-btn:hover { filter: brightness(1.1); }
        .buy-btn:active { transform: scale(0.98); }

        .features {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">🌙 MOON STARS</div>
    </div>

    <h1>Купить Telegram Stars</h1>
    <p class="description">Мгновенное пополнение после оплаты.<br>Безопасно и с гарантией.</p>

    <label class="label">Ваш аккаунт</label>
    <div class="input-group">
        <span class="icon">@</span>
        <input type="text" id="username" placeholder="username">
    </div>

    <label class="label">Выберите количество звёзд</label>
    <div class="price-box">
        <span id="starsDisplay">⭐ 100</span> — <span class="price-value" id="priceDisplay">170 ₽</span>
    </div>

    <div class="slider-container">
        <input type="range" id="priceSlider" min="0" max="5" step="1" value="0">
    </div>

    <button class="buy-btn" onclick="orderStars()">Купить и оплатить</button>

    <div class="features">
        ✅ Мгновенно • 💎 1000+ отправлено • 👤 @kaoface
    </div>
</div>

<script>
    // Массив данных из твоего прайса
    const pricelist = [
        { stars: 100, price: 170 },
        { stars: 150, price: 240 },
        { stars: 250, price: 445 },
        { stars: 500, price: 830 },
        { stars: 1000, price: 1540 },
        { stars: 2500, price: 3700 }
    ];

    const slider = document.getElementById('priceSlider');
    const starsDisplay = document.getElementById('starsDisplay');
    const priceDisplay = document.getElementById('priceDisplay');

    slider.oninput = function() {
        const data = pricelist[this.value];
        starsDisplay.innerText = `⭐ ${data.stars}`;
        priceDisplay.innerText = `${data.price} ₽`;
    };

    function orderStars() {
        const user = document.getElementById('username').value;
        const currentData = pricelist[slider.value];
        
        if(!user) {
            alert("Пожалуйста, введите ваш Telegram username");
            return;
        }

        const cleanUser = user.replace('@', '');
        const message = `Привет! Заказываю звёзды в Moon Stars.\n\n⭐ Количество: ${currentData.stars}\n💰 Цена: ${currentData.price} ₽\n👤 Для аккаунта: @${cleanUser}`;
        
        const telegramUrl = `https://t.me/kaoface?text=${encodeURIComponent(message)}`;
        window.location.href = telegramUrl;
    }
</script>

</body>
</html>
