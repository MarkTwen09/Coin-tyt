<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA ULTIMATE</title>
    <style>
        :root { --p: #a855f7; --b: #00d2ff; --bg: #020205; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; position: fixed; }
        .bg-glow { position: absolute; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 0%, rgba(168,85,247,0.2) 0%, transparent 70%), radial-gradient(circle at 100% 100%, rgba(0,210,255,0.1) 0%, transparent 50%); }
        .container { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }
        .header { padding: 30px 10px; text-align: center; }
        .header h1 { 
            font-size: 3.2rem; letter-spacing: 15px; margin: 0; font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--p), var(--b), #fff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: flow 5s linear infinite;
            filter: drop-shadow(0 0 15px rgba(168,85,247,0.5));
        }
        @keyframes flow { to { background-position: 200% center; } }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 160px; -webkit-overflow-scrolling: touch; }
        .msg { padding: 16px 20px; border-radius: 24px; max-width: 82%; font-size: 16px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); animation: up 0.4s ease; }
        @keyframes up { from { transform: translateY(15px); opacity: 0; } }
        .a { background: rgba(168,85,247,0.12); align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .u { background: rgba(255,255,255,0.06); align-self: flex-end; border-bottom-right-radius: 4px; border-color: rgba(0,210,255,0.3); }
        .input-wrap { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, var(--bg) 85%, transparent); padding: 15px 20px calc(35px + env(safe-area-inset-bottom)); }
        .row { display: flex; gap: 12px; max-width: 550px; margin: 0 auto; }
        input { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 16px 22px; color: #fff; font-size: 17px; outline: none; -webkit-appearance: none; }
        button { width: 56px; height: 56px; border-radius: 28px; background: linear-gradient(135deg, var(--p), var(--b)); border: none; color: #fff; font-size: 24px; box-shadow: 0 0 20px rgba(168,85,247,0.4); }
        .ldr { display: none; text-align: center; color: var(--b); font-size: 11px; margin-bottom: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="header"><h1>AURA</h1></div>
        <div id="chat"><div class="msg a">Бро, я обновила ядро. Теперь без посредников. Если VPN выключен, мы на связи. Погнали? 💜✨</div></div>
        <div class="input-wrap">
            <div id="ldr" class="ldr">ИМПУЛЬС...</div>
            <div class="row">
                <input type="text" id="in" placeholder="Напиши AURA..." autocomplete="off">
                <button id="go">➜</button>
            </div>
        </div>
    </div>
    <script>
        const chat = document.getElementById('chat'), input = document.getElementById('in'), btn = document.getElementById('go'), ldr = document.getElementById('ldr');
        async function ask() {
            const val = input.value.trim(); if(!val) return;
            const u = document.createElement('div'); u.className = 'msg u'; u.textContent = val;
            chat.appendChild(u); input.value = ''; chat.scrollTop = chat.scrollHeight;
            ldr.style.display = 'block';
            try {
                // Прямой запрос к самому простому API, который обычно не блокируется
                const r = await fetch('https://api.pawan.krd/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer pk-null' },
                    body: JSON.stringify({ model: 'gpt-3.5-turbo', messages: [{role: 'user', content: val}] })
                });
                const d = await r.json();
                const a = document.createElement('div'); a.className = 'msg a';
                a.textContent = d.choices[0].message.content || "Я задумалась. Повтори?";
                chat.appendChild(a);
            } catch (e) {
                const a = document.createElement('div'); a.className = 'msg a';
                a.textContent = "Бро, Сафари всё еще блокирует. Попробуй зайти через Chrome или выключи VPN/блокировщик рекламы!";
                chat.appendChild(a);
            } finally { ldr.style.display = 'none'; chat.scrollTop = chat.scrollHeight; }
        }
        btn.onclick = ask;
        input.onkeypress = (e) => { if(e.key === 'Enter') { ask(); input.blur(); } };
    </script>
</body>
</html>
