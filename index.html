<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tapok Messenger</title>
    <style>
        :root {
            --bg: #0e1621; --side: #17212b; --active: #2b5278;
            --msg-in: #182533; --msg-out: #2b5278; --text: #fff;
        }
        body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Список чатов */
        .sidebar { width: 30%; min-width: 320px; background: var(--side); border-right: 1px solid #080e15; display: flex; flex-direction: column; }
        .search { padding: 15px; background: var(--side); }
        .search input { width: 100%; background: #242f3d; border: none; padding: 10px; border-radius: 10px; color: #fff; outline: none; }
        
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .chat-item.active { background: var(--active); }
        .avatar { width: 54px; height: 54px; border-radius: 50%; background: #2b5278; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .avatar img { width: 65%; filter: invert(1); }
        
        .chat-info h4 { margin: 0; font-size: 16px; }
        .chat-info p { margin: 5px 0 0; font-size: 14px; color: #7f91a4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Окно чата */
        .main { flex: 1; display: flex; flex-direction: column; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: color-burn; background-color: #0e1621; }
        .header { background: var(--side); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #080e15; }
        
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 450px; padding: 10px 14px; border-radius: 15px; font-size: 15px; position: relative; }
        .in { background: var(--msg-in); align-self: flex-start; border-bottom-left-radius: 4px; }
        .out { background: var(--msg-out); align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .input-bar { background: var(--side); padding: 15px 20px; display: flex; align-items: center; gap: 15px; }
        .input-bar input { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; }

        .tapok-logo { width: 40px; filter: invert(1); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="search"><input type="text" placeholder="Поиск в Tapok"></div>
    <div class="chat-list">
        <div class="chat-item active">
            <div class="avatar"><img src="https://i.ibb.co/Xxd9Y3q/image.png"></div>
            <div class="chat-info"><h4>Tapok Mod (Beta)</h4><p>Бро, это твой мессенджер!</p></div>
        </div>
        <div class="chat-item">
            <div class="avatar" style="background: #e17076">B</div>
            <div class="chat-info"><h4>BAZA SHOP</h4><p>Гемы в наличии ✅</p></div>
        </div>
    </div>
</div>

<div class="main">
    <div class="header">
        <div><b>Tapok Support</b><br><small style="color: #7f91a4">в сети</small></div>
        <img src="https://i.ibb.co/Xxd9Y3q/image.png" class="tapok-logo">
    </div>
    <div class="messages" id="box">
        <div class="bubble in">Добро пожаловать в <b>Tapok</b> — твой собственный мод.</div>
        <div class="bubble in">Я вшил сюда оригинальные стили Telegram Web K.</div>
        <div class="bubble out">Вот теперь это реально похоже на Телегу! ✅✅</div>
    </div>
    <div class="input-bar">
        <span>📎</span>
        <input type="text" id="msg" placeholder="Написать сообщение...">
        <span>🎤</span>
    </div>
</div>

<script>
    const msg = document.getElementById('msg');
    const box = document.getElementById('box');
    msg.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && msg.value !== '') {
            const d = document.createElement('div');
            d.className = 'bubble out';
            d.innerHTML = msg.value;
            box.appendChild(d);
            msg.value = '';
            box.scrollTop = box.scrollHeight;
        }
    });
</script>

</body>
</html>
