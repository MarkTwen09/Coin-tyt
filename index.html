<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines Luxury Premium</title>
    <style>
        :root {
            --bg-main: #060709;
            --panel-bg: rgba(13, 17, 24, 0.85);
            --panel-border: rgba(255, 183, 3, 0.25);
            --gold-primary: #ffb703;
            --gold-glow: #ffea00;
            --cyan-glow: #00f0ff;
            --gem-color: #00ffaa;
            --mine-color: #ff3344;
            --text-white: #f1f5f9;
            --text-muted: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 30%, #111622 0%, var(--bg-main) 80%);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            perspective: 1000px;
            overflow: hidden;
        }

        /* Эффект тряски экрана при взрыве */
        .shake-anim {
            animation: screenShake 0.4s ease-in-out;
        }

        .game-wrapper {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            transform-style: preserve-3d;
        }

        /* Премиальный Верхний Бар */
        .header-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffffff 30%, var(--gold-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,183,3,0.3));
        }

        .balance-container {
            text-align: right;
        }

        .balance-title {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .balance-value {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .balance-value span {
            color: var(--gold-primary);
            text-shadow: 0 0 15px rgba(255,183,3,0.5);
        }

        /* Главный интерфейс */
        .main-layout {
            display: flex;
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 35px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.05);
            gap: 35px;
        }

        /* Панель управления */
        .control-sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 300px;
        }

        .inputs-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field-box label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
        }

        .input-premium-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-premium {
            width: 100%;
            background: #090d14;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 16px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .input-premium:focus {
            border-color: var(--gold-primary);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 15px rgba(255,183,3,0.2);
        }

        .input-badge {
            position: absolute;
            right: 20px;
            font-weight: 700;
            color: #475569;
        }

        /* Сетка быстрых ставок */
        .bet-presets {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .preset-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.05);
            color: #cbd5e1;
            border-radius: 8px;
            padding: 8px 0;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
            color: #fff;
        }

        /* Информационный Экран статистики */
        .score-board {
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 100%);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-lbl { color: #64748b; font-size: 14px; font-weight: 500;}
        .score-val { font-weight: 700; color: #fff; font-size: 15px;}
        .score-val.gold-glow {
            color: var(--gold-primary);
            font-size: 22px;
            text-shadow: 0 0 15px rgba(255,183,3,0.4);
        }

        /* Кнопки Действий */
        .trigger-btn {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 25px;
        }

        .btn-start-round {
            background: linear-gradient(135deg, #ffc300 0%, #ff9100 100%);
            color: #000;
            box-shadow: 0 8px 25px rgba(255,145,0,0.3);
        }

        .btn-start-round:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255,145,0,0.5);
        }

        .btn-cashout-round {
            background: linear-gradient(135deg, #00ff87 0%, #60efff 100%);
            color: #090d14;
            box-shadow: 0 8px 25px rgba(0,255,135,0.3);
            display: none;
        }

        .btn-cashout-round:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,255,135,0.5);
        }

        .trigger-btn:disabled {
            opacity: 0.15;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* СУПЕР 3D ПОЛЕ И ЯЧЕЙКИ */
        .board-wrapper {
            flex: 1.3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1/1;
        }

        .cell-3d {
            background: radial-gradient(135deg, #1b2332 0%, #0f141d 100%);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Блик на ячейке */
        .cell-3d::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.08) 50%, transparent 55%);
            transform: rotate(45deg);
            transition: transform 0.6s ease;
        }

        .cell-3d:hover:not(.revealed):not(.disabled) {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(255,183,3,0.4);
            box-shadow: 0 12px 20px rgba(0,0,0,0.6), 0 0 15px rgba(255,183,3,0.1);
        }

        .cell-3d:hover:not(.revealed):not(.disabled)::after {
            transform: translate(25%, 25%) rotate(45deg);
        }

        .cell-3d:active:not(.revealed):not(.disabled) {
            transform: translateY(1px) scale(0.98);
        }

        /* Состояния раскрытия */
        .cell-3d.revealed {
            cursor: default;
            background: #090b10;
            border-color: rgba(255,255,255,0.02);
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
            transform: none !important;
        }

        /* Стилизация Алмазов */
        .cell-3d.has-gem {
            border-color: var(--gem-color);
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 170, 0.15) 0%, #070a0f 100%);
            animation: crystalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        /* Стилизация Взрывных Мин */
        .cell-3d.has-mine {
            border-color: var(--mine-color);
            background: radial-gradient(circle at 50% 50%, rgba(255, 51, 68, 0.25) 0%, #070a0f 100%);
            animation: minePop 0.3s ease-out forwards;
        }

        .cell-3d svg {
            width: 50%;
            height: 50%;
            transition: all 0.3s;
            z-index: 2;
        }

        .cell-3d.has-gem svg {
            filter: drop-shadow(0 0 15px rgba(0, 255, 170, 0.8)) drop-shadow(0 0 5px #fff);
        }

        .cell-3d.has-mine svg {
            filter: drop-shadow(0 0 20px rgba(255, 51, 68, 0.9));
        }

        .cell-3d.lost-reveal {
            opacity: 0.35;
        }

        /* ЭФФЕКТ ЧАСТИЦ КРИСТАЛЛА (Sparkle) */
        .sparkle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--gem-color);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: sparkOut 0.5s ease-out forwards;
        }

        /* Высококачественные Анимации */
        @keyframes crystalPop {
            0% { transform: scale(0.6) rotate(-15deg); filter: brightness(3); }
            80% { transform: scale(1.05) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
        }

        @keyframes minePop {
            0% { transform: scale(0.8); filter: brightness(5); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        @keyframes sparkOut {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(0.2); }
        }

        @keyframes screenShake {
            0%, 100% { transform: translateX(0) translateY(0); }
            20% { transform: translateX(-8px) translateY(4px); }
            40% { transform: translateX(8px) translateY(-4px); }
            60% { transform: translateX(-6px) translateY(-2px); }
            80% { transform: translateX(6px) translateY(2px); }
        }

        @media (max-width: 820px) {
            .main-layout { flex-direction: column; padding: 20px; }
            .control-sidebar { width: 100%; }
            .mines-grid { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="game-wrapper" id="stage-wrapper">
        <!-- Верхняя Панель -->
        <div class="header-panel">
            <div class="brand-logo">MINES PREMIER</div>
            <div class="balance-container">
                <div class="balance-title">Капитал Личного Счета</div>
                <div class="balance-value" id="balance-view">1 000 <span>₽</span></div>
            </div>
        </div>

        <!-- Основной Контент -->
        <div class="main-layout">
            <div class="control-sidebar">
                <div class="inputs-stack">
                    
                    <div class="field-box">
                        <label>Размер Инвестиции</label>
                        <div class="input-premium-wrapper">
                            <input type="number" id="bet-field" class="input-premium" value="100" min="10">
                            <span class="input-badge">₽</span>
                        </div>
                        <div class="bet-presets">
                            <button class="preset-btn" onclick="changeBet('min')">MIN</button>
                            <button class="preset-btn" onclick="changeBet('x2')">X2</button>
                            <button class="preset-btn" onclick="changeBet('1/2')">1/2</button>
                            <button class="preset-btn" onclick="changeBet('max')">MAX</button>
                        </div>
                    </div>

                    <div class="field-box">
                        <label>Количество Угроз (Мин)</label>
                        <div class="input-premium-wrapper">
                            <input type="number" id="mines-field" class="input-premium" value="3" min="1" max="24">
                        </div>
                    </div>

                    <div class="score-board">
                        <div class="score-row">
                            <span class="score-lbl">Множитель сделки</span>
                            <span id="mult-view" class="score-val gold-glow">x0.00</span>
                        </div>
                        <div class="score-row">
                            <span class="score-lbl">Чистая прибыль</span>
                            <span id="profit-view" class="score-val" style="color: var(--gem-color);">0 ₽</span>
                        </div>
                        <div class="score-row">
                            <span class="score-lbl">Алмазов извлечено</span>
                            <span id="gems-view" class="score-val">0 / 0</span>
                        </div>
                    </div>

                </div>

                <div>
                    <button id="action-trigger" class="trigger-btn btn-start-round">Начать Раунд</button>
                    <button id="cashout-trigger" class="trigger-btn btn-cashout-round">Вывести Прибыль</button>
                </div>
            </div>

            <!-- Зона Поля -->
            <div class="board-wrapper">
                <div class="mines-grid" id="grid-container"></div>
            </div>
        </div>
    </div>

    <script>
        // Высококачественный Аудио Движок (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playPremiumSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'click') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'gem') {
                // Двойной перелив кристалла
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.06); // A5
                osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.2); 
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'cashout') {
                // Восходящий мажорный аккорд
                const notes = [523.25, 659.25, 783.99, 1046.5];
                notes.forEach((freq, idx) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(freq, audioCtx.currentTime + idx * 0.05);
                    g.gain.setValueAtTime(0.06, audioCtx.currentTime + idx * 0.05);
                    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + idx * 0.05 + 0.3);
                    o.start(); o.stop(audioCtx.currentTime + idx * 0.05 + 0.3);
                });
            } else if (type === 'boom') {
                // Мощный взрыв с басом
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(90, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(20, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        // Объемные кастомные SVG-шаблоны
        const GEM_SVG_PREMIUM = `
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M32 2L10 22L32 62L54 22L32 2Z" fill="url(#gem-main-grad)"/>
            <path d="M32 2L22 22L32 62L42 22L32 2Z" fill="url(#gem-core-grad)"/>
            <path d="M10 22H54L32 2L10 22Z" fill="rgba(255,255,255,0.2)"/>
            <defs>
                <linearGradient id="gem-main-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00ffcc"/><stop offset="50%" stop-color="#00a3ff"/><stop offset="100%" stop-color="#0055ff"/>
                </linearGradient>
                <linearGradient id="gem-core-grad" x1="50%" y1="0%" x2="50%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff"/><stop offset="30%" stop-color="#00ffaa"/><stop offset="100%" stop-color="#0044cc"/>
                </linearGradient>
            </defs>
        </svg>`;

        const MINE_SVG_PREMIUM = `
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="32" r="18" fill="url(#mine-sphere)" stroke="#ff1a35" stroke-width="1.5"/>
            <circle cx="32" cy="32" r="6" fill="#ff3344"><animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/></circle>
            <path d="M32 4V10M32 54V60M4 32H10M54 32H60M12 12L17 17M47 47L52 52M12 52L17 47M47 12L52 17" stroke="#ff3344" stroke-width="3" stroke-linecap="round"/>
            <defs>
                <radialGradient id="mine-sphere" cx="35%" cy="35%" r="70%">
                    <stop offset="0%" stop-color="#ff6b81"/><stop offset="40%" stop-color="#2d0006"/><stop offset="100%" stop-color="#050001"/>
                </radialGradient>
            </defs>
        </svg>`;

        // Инициализация Стейта
        let balance = 1000;
        let betValue = 100;
        let minesAmount = 3;
        let isRoundActive = false;
        let logicMap = [];
        let gemsFoundCount = 0;
        let maxGemsAvailable = 22;

        const gridContainer = document.getElementById('grid-container');
        const actionTrigger = document.getElementById('action-trigger');
        const cashoutTrigger = document.getElementById('cashout-trigger');
        const betField = document.getElementById('bet-field');
        const minesField = document.getElementById('mines-field');
        const balanceView = document.getElementById('balance-view');
        const multView = document.getElementById('mult-view');
        const profitView = document.getElementById('profit-view');
        const gemsView = document.getElementById('gems-view');
        const stageWrapper = document.getElementById('stage-wrapper');

        function generateBlankGrid() {
            gridContainer.innerHTML = '';
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell-3d disabled';
                cell.dataset.index = i;
                gridContainer.appendChild(cell);
            }
        }

        function changeBet(type) {
            if(isRoundActive) return;
            let current = parseInt(betField.value) || 100;
            if(type === 'min') current = 10;
            if(type === 'x2') current *= 2;
            if(type === '1/2') current = Math.floor(current / 2);
            if(type === 'max') current = balance;

            current = Math.max(10, Math.min(current, balance));
            betField.value = current;
            playPremiumSound('click');
        }

        function getFairMultiplier(mines, gems) {
            if (gems === 0) return 0.00;
            let prob = 1;
            for (let i = 0; i < gems; i++) {
                prob *= (25 - mines - i) / (25 - i);
            }
            return Math.max(1.01, (0.97 / prob)).toFixed(2); // 97% RTP Математика
        }

        function syncUI() {
            const currentMult = getFairMultiplier(minesAmount, gemsFoundCount);
            multView.innerText = `x${currentMult}`;
            
            const calculatedProfit = Math.floor(betValue * currentMult);
            profitView.innerText = isRoundActive && gemsFoundCount > 0 ? `${calculatedProfit.toLocaleString()} ₽` : `0 ₽`;
            gemsView.innerText = `${gemsFoundCount} / ${maxGemsAvailable}`;
            balanceView.innerHTML = `${balance.toLocaleString()} <span>₽</span>`;
        }

        // Эффект взрыва частиц при нахождении кристалла
        function createSparkles(targetElement) {
            for (let i = 0; i < 12; i++) {
                const spark = document.createElement('div');
                spark.className = 'sparkle';
                const angle = Math.random() * Math.PI * 2;
                const distance = 30 + Math.random() * 45;
                spark.style.setProperty('--x', `${Math.cos(angle) * distance}px`);
                spark.style.setProperty('--y', `${Math.sin(angle) * distance}px`);
                spark.style.left = `calc(50% - 2px)`;
                spark.style.top = `calc(50% - 2px)`;
                targetElement.appendChild(spark);
                setTimeout(() => spark.remove(), 500);
            }
        }

        function startRound() {
            betValue = parseInt(betField.value);
            minesAmount = parseInt(minesField.value);

            if(isNaN(betValue) || betValue < 10) return alert('Минимум инвестиций — 10 ₽');
            if(betValue > balance) return alert('Ваш капитал меньше суммы сделки');
            if(isNaN(minesAmount) || minesAmount < 1 || minesAmount > 24) return alert('Выберите количество мин от 1 до 24');

            balance -= betValue;
            isRoundActive = true;
            gemsFoundCount = 0;
            maxGemsAvailable = 25 - minesAmount;

            betField.disabled = true;
            minesField.disabled = true;
            actionTrigger.style.display = 'none';
            cashoutTrigger.style.display = 'block';
            cashoutTrigger.disabled = true;

            syncUI();
            playPremiumSound('click');

            // Заполнение карты
            logicMap = Array(25).fill('gem');
            let minesPlanted = 0;
            while(minesPlanted < minesAmount) {
                let rIdx = Math.floor(Math.random() * 25);
                if(logicMap[rIdx] !== 'mine') {
                    logicMap[rIdx] = 'mine';
                    minesPlanted++;
                }
            }

            const cells = document.querySelectorAll('.cell-3d');
            cells.forEach(cell => {
                cell.className = 'cell-3d';
                cell.innerHTML = '';
                cell.style.opacity = '1';
                cell.addEventListener('click', cellInteraction);
            });
        }

        function cellInteraction(e) {
            if(!isRoundActive) return;
            const cell = e.currentTarget;
            const index = parseInt(cell.dataset.index);

            if(cell.classList.contains('revealed')) return;

            if(logicMap[index] === 'mine') {
                // Подрыв на мине
                cell.classList.add('revealed', 'has-mine');
                cell.innerHTML = MINE_SVG_PREMIUM;
                
                // Тряска экрана и звук взрыва
                stageWrapper.classList.add('shake-anim');
                playPremiumSound('boom');
                setTimeout(() => stageWrapper.classList.remove('shake-anim'), 400);

                finishGame(false);
            } else {
                // Алмаз успешно открыт
                cell.classList.add('revealed', 'has-gem');
                cell.innerHTML = GEM_SVG_PREMIUM;
                createSparkles(cell);
                gemsFoundCount++;
                cashoutTrigger.disabled = false;
                playPremiumSound('gem');
                syncUI();

                if(gemsFoundCount === maxGemsAvailable) {
                    finishGame(true);
                }
            }
        }

        function finishGame(isWinner) {
            isRoundActive = false;
            actionTrigger.style.display = 'block';
            cashoutTrigger.style.display = 'none';
            betField.disabled = false;
            minesField.disabled = false;

            if(isWinner) {
                const multiplier = getFairMultiplier(minesAmount, gemsFoundCount);
                const finalPayout = Math.floor(betValue * multiplier);
                balance += finalPayout;
                playPremiumSound('cashout');
            }

            // Потоковое красивое вскрытие поля (очередью с задержкой)
            const cells = document.querySelectorAll('.cell-3d');
            cells.forEach((cell, idx) => {
                cell.removeEventListener('click', cellInteraction);
                if(!cell.classList.contains('revealed')) {
                    setTimeout(() => {
                        cell.classList.add('revealed', 'lost-reveal');
                        if(logicMap[idx] === 'mine') {
                            cell.innerHTML = MINE_SVG_PREMIUM;
                        } else {
                            cell.innerHTML = GEM_SVG_PREMIUM;
                        }
                    }, idx * 30); // Эффект «Волны сканирования»
                }
            });

            syncUI();
            verifyCapital();
        }

        cashoutTrigger.addEventListener('click', () => {
            if(isRoundActive && gemsFoundCount > 0) finishGame(true);
        });

        function verifyCapital() {
            if (balance < 10) {
                setTimeout(() => {
                    if (confirm('Ваш инвестиционный баланс исчерпан. Зачислить венчурный бонус в размере 500 ₽?')) {
                        balance = 500;
                        syncUI();
                        playPremiumSound('cashout');
                    }
                }, 1200);
            }
        }

        actionTrigger.addEventListener('click', startRound);

        // Инициализация при старте
        generateBlankGrid();
        syncUI();
    </script>
</body>
</html>
