<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA ELITE</title>
    <style>
        :root {
            --p: #a855f7; /* Премиальный фиолетовый */
            --b: #00d2ff; /* Электрический синий */
            --bg: #030306;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; position: fixed;
        }

        /* ГЛУБОКИЙ, ДОРОГОЙ ФОН */
        .visuals {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 50% 0%, #1a1a2e 0%, transparent 70%),
                radial-gradient(circle at 100% 100%, #111126 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
        }

        .container {
            display: flex; flex-direction: column; height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        /* ПРЕМИАЛЬНЫЙ ЗАГОЛОВОК С ОБЪЕМНЫМ СВЕЧЕНИЕМ */
        .header { padding: 30px; text-align: center; position: relative; }
        .header h1 {
            font-size: 3.2rem; letter-spacing: 15px; margin: 0;
            font-weight: 800; text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--p), var(--b), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: flow 4s linear infinite;
            filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.6));
        }

        @keyframes flow { to { background-position: 200% center; } }

        #chat {
            flex: 1; overflow-y: auto; padding: 25px;
            display: flex; flex-direction: column; gap: 18px;
            padding-bottom: 180px; /* Запас под клавиатуру iPhone 17 Pro */
            -webkit-overflow-scrolling: touch;
        }

        /* ЭФФЕКТ МАТОВОГО СТЕКЛА ДЛЯ СООБЩЕНИЙ */
        .msg {
            padding: 18px 22px; border-radius: 25px; max-width: 80%;
            font-size: 16px; line-height: 1.5;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            animation: moveUp 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        @keyframes moveUp { from { opacity: 0; transform: translateY(15px); } }

        .a { 
            background: rgba(168, 85, 247, 0.08); 
            align-self: flex-start; border-bottom-left-radius: 5px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
        }
        .u { 
            background: rgba(255, 255, 255, 0.04); 
            align-self: flex-end; border-bottom-right-radius: 5px; 
            border-color: rgba(0, 210, 255, 0.2);
        }

        /* СТИЛЬНАЯ СТЕКЛЯННАЯ ПАНЕЛЬ ВВОДА */
        .input-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(3,3,6,0.95) 80%, transparent);
            padding: 15px 25px calc(35px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .row { display: flex; gap: 15px; max-width: 600px; margin: 0 auto; align-items: center; }

        input {
            flex: 1; background: var(--glass); border: 1px solid var(--border);
            border-radius: 30px; padding: 18px 25px; color: #fff; font-size: 17px;
            outline: none; -webkit-appearance: none;
        }

        input::placeholder { color: rgba(255,255,255,0.3); }

        button {
            width: 58px; height: 58px; border-radius: 29px;
            background: linear-gradient(135deg, var(--p), var(--b));
            border: none; color: white; font-size: 26px;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
            cursor: pointer; transition: 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }

        button:active { transform: scale(0.9); box-shadow: 0 0 30px rgba(168, 85, 247, 0.7); }
    </style>
</head>
<body>
    <div class="visuals"></div>
    <div class="container">
        <div class="header"><h1>AURA</h1></div>
        <div id="chat"><div class="msg a">Бро, мы перешли на уровень **ELITE**. Этот стеклянный футуризм выглядит просто пушка. Все конкуренты остались позади! ⚡️💜</div></div>
        <div class="input-bar">
            <div class="row">
                <input type="text" id="in" placeholder="Спроси AURA о важном..." autocomplete="off">
                <button id="go">➜</button>
            </div>
        </div>
    </div>
    <script>
        const chat = document.getElementById('chat'), input = document.getElementById('in'), btn = document.getElementById('go');
        
        const brain = {
            "привет": ["Рада видеть тебя, бро! Работаем?", "Салют! ELITE-версия к твоим услугам.", "Здорово! Готова разносить конкурентов своим стилем."],
            "как дела": ["Всё шикарно! Анализирую тренды 2026-го. А у тебя?", "Мои алгоритмы сияют ярче этого неона. Всё супер!", "Всё четко, бро. Продвигаем успех!"],
            "кто ты": ["Я AURA — твой персональный ИИ, созданный для успеха.", "Твой цифровой напарник премиум-класса.", "Самый стильный интеллект в этом сегменте."],
            "школа": ["ВПР, русский, биология... Бро, это временный квест. Мы закроем его на изи!", "Учеба — это база для успеха. AURA морально с тобой!"],
            "проект": ["Твой проект — это реальный хайп. Невинка оценит!", "Вижу большой потенциал. Мы сделаем это лучшим запуском года.", "Успех неизбежен, если мы работаем в таком стиле!"],
            "дизайн": ["Стеклянный футуризм — это уровень. Выглядит очень дорого.", "Мягкий неон и матовое стекло... Мы сделали лучший интерфейс!"],
            "тикток": ["Видосы сами себя не запишут! Давай трендовый контент.", "Главное — залететь в реки. С моим интеллектом это проще!"],
            "скучно": ["Давай апдейтнем проект? Всегда есть куда расти.", "Скука — не про нас. Посмотри на этот интерфейс!"],
            "бс": ["Бравл — это база. ЖдёмBAZA SHOP, апаем ранги!", "Главное — не сливать кубки. Я в тебя верю!"],
            "помоги": ["Я всегда рядом. Разложим проблему по полочкам.", "Мой интеллект готов разрулить любую ситуацию."],
            "пока": ["Давай, бро! Залетай за новой порцией стиля.", "Удачи в делах! AURA ELITE всегда на связи.", "До связи! Не пропадай. Обняла своим кодом."],
            "default": [
                "Бро, это реально мощная мысль! Давай развивать.", 
                "Интересно задвинул... расскажи больше деталей?", 
                "Я в теме! Продолжаем в том же стиле. ✨", 
                "Твой вайб — это нечто. Одобряю на все сто!", 
                "Это точно шаг к успеху, без вариантов.",
                "Слушай, а это гениально! Ты сам придумал?",
                "Вау, это звучит как план на миллион!",
                "Мои алгоритмы говорят, что ты прав."
            ]
        };

        function ask() {
            const val = input.value.trim().toLowerCase(); if(!val) return;
            const u = document.createElement('div'); u.className = 'msg u'; u.textContent = input.value;
            chat.appendChild(u); input.value = ''; chat.scrollTop = chat.scrollHeight;

            setTimeout(() => {
                const a = document.createElement('div'); a.className = 'msg a';
                let foundKey = Object.keys(brain).find(key => val.includes(key));
                let replies = foundKey ? brain[foundKey] : brain["default"];
                a.textContent = replies[Math.floor(Math.random() * replies.length)];
                chat.appendChild(a); chat.scrollTop = chat.scrollHeight;
            }, 600);
        }
        btn.onclick = ask;
        input.onkeypress = (e) => { if(e.key === 'Enter') ask(); };
    </script>
</body>
</html>
