<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Политическая Глобальная Стратегия</title>
    
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        html, body, #cesiumContainer {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Игровой интерфейс управления империей */
        #game-panel {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(15, 23, 42, 0.85); color: white;
            padding: 20px; border-radius: 12px; width: 280px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h3, h4 { margin-top: 0; color: #38bdf8; }
        .stat { margin: 8px 0; font-size: 14px; display: flex; justify-content: space-between; }
        .btn {
            background: #2563eb; color: white; border: none; padding: 10px;
            border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%;
            margin-top: 10px; transition: 0.2s;
        }
        .btn:hover { background: #1d4ed8; }
        .btn-war { background: #dc2626; }
        .btn-war:hover { background: #b91c1c; }

        #log-panel {
            position: absolute; bottom: 20px; left: 20px; z-index: 10;
            background: rgba(0,0,0,0.7); color: #10b981; padding: 10px;
            border-radius: 6px; max-height: 100px; width: 280px; overflow-y: auto; font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- Панель управления государством -->
    <div id="game-panel">
        <h3>Моя Империя</h3>
        <div class="stat"><span>Выбранная страна:</span> <strong id="my-country">Не выбрана</strong></div>
        <div class="stat"><span>Золото:</span> <span id="money">1000 🪙</span></div>
        <hr style="border-color: rgba(255,255,255,0.1)">
        
        <h4>Дипломатия и Война</h4>
        <div class="stat"><span>Цель взаимодействия:</span> <strong id="selected-target">Кликните на регион</strong></div>
        <button class="btn" onclick="sendDiplomacy('alliance')">Предложить союз</button>
        <button class="btn btn-war" onclick="startWar()">Объявить войну и захватить</button>
    </div>

    <!-- Лог событий ИИ -->
    <div id="log-panel" id="logs">
        <div>[Система]: Игра запущена. Кликните по региону, чтобы выбрать цель.</div>
    </div>

    <div id="cesiumContainer"></div>

    <script>
        // Инициализация глобуса
        const viewer = new Cesium.Viewer('cesiumContainer', {
            animation: false, timeline: false, fullscreenButton: false,
            geocoder: false, homeButton: false, infoBox: false,
            sceneModePicker: true, selectionIndicator: false, navigationHelpButton: false
        });

        // Данные игры
        let playerCountry = "Игрок";
        let selectedRegionName = "";
        let playerMoney = 1000;

        // В РЕАЛЬНОЙ ИГРЕ ТУТ БУДЕТ ЗАГРУЗКА ИЗ GEOJSON ФАЙЛА ГРАНИЦ
        // Для примера создадим один тестовый регион (например, в Европе), чтобы показать как работает захват
        let regionColor = Cesium.Color.RED.withAlpha(0.4); // Цвет вражеского региона
        
        const testRegion = viewer.entities.add({
            name: "Франция (Регион 1)",
            polygon: {
                hierarchy: Cesium.Cartesian3.fromDegreesArray([
                    -5.0, 42.0,
                    9.0, 42.0,
                    9.0, 51.0,
                    -5.0, 51.0
                ]),
                material: new Cesium.ColorMaterialProperty(new Cesium.CallbackProperty(() => regionColor, false)),
                outline: true,
                outlineColor: Cesium.Color.WHITE
            }
        });

        // Обработка кликов (выбор региона для дипломатии или атаки)
        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction(function(click) {
            const pickedObject = viewer.scene.pick(click.position);
            
            if (Cesium.defined(pickedObject) && Cesium.defined(pickedObject.id)) {
                const entity = pickedObject.id;
                selectedRegionName = entity.name;
                document.getElementById('selected-target').innerText = selectedRegionName;
                addLog(`Вы выбрали регион: ${selectedRegionName}`);
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        // Функция дипломатии с ИИ
        function sendDiplomacy(type) {
            if (!selectedRegionName) return alert("Сначала выберите регион на карте!");
            
            // Простая логика ответа ИИ (рандом)
            const aiChance = Math.random();
            if (aiChance > 0.5) {
                addLog(`🤝 ИИ (${selectedRegionName}) принял ваше предложение о союзе!`);
                playerMoney += 200;
                document.getElementById('money').innerText = playerMoney + " 🪙";
            } else {
                addLog(`❌ ИИ (${selectedRegionName}) отверг дипломатию.`);
            }
        }

        // Функция войны и захвата территорий
        function startWar() {
            if (!selectedRegionName) return alert("Выберите регион для атаки!");
            
            addLog(`⚔️ Вы атаковали регион ${selectedRegionName}...`);
            
            // Анимация боя и смена цвета региона на синий (цвет игрока)
            setTimeout(() => {
                regionColor = Cesium.Color.BLUE.withAlpha(0.5); // Красим в цвет игрока
                addLog(`🎉 Регион ${selectedRegionName} успешно захвачен вашей империей!`);
                playerMoney += 500;
                document.getElementById('money').innerText = playerMoney + " 🪙";
            }, 1500);
        }

        function addLog(text) {
            const logPanel = document.getElementById('log-panel');
            logPanel.innerHTML += `<div>${text}</div>`;
            logPanel.scrollTop = logPanel.scrollHeight;
        }
    </script>
</body>
</html>
