<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA BLACK</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #5e5ce6;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, "SF Pro Display", sans-serif;
            overflow: hidden;
        }

        /* ШАПКА */
        .header {
            padding: 20px; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 600; font-size: 13px; letter-spacing: 3px; color: #666; }

        /* ОКНО ЧАТА */
        #chat {
            height: calc(100vh - 160px); overflow-y: auto;
            padding: 25px; display: flex; flex-direction: column; gap: 40px;
            -webkit-overflow-scrolling: touch;
        }

        .m { max-width: 90%; line-height: 1.7; font-size: 16px; animation: msgIn 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } }

        .ai { align-self: flex-start; color: #e5e5e7; }
        .ai::before { 
            content: '✦'; display: block; margin-bottom: 10px;
            font-size: 20px; color: var(--accent);
        }
        
        .user { 
            align-self: flex-end; background: var(--glass); 
            padding: 14px 20px; border-radius: 22px; border: 1px solid var(--border);
            color: #fff;
        }

        /* ПОЛЕ ВВОДА */
        .input-wrap {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px 20px calc(45px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 90%, transparent);
        }
        .pill {
            max-width: 800px; margin: 0 auto; background: #121214;
            border: 1px solid var(--border); border-radius: 30px;
            padding: 8px 8px 8px 22px; display: flex; align-items: center;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 17px; outline: none; }
        .send { width: 42px; height: 42px; border-radius: 50%; background: #fff; border: none; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .send:active { transform: scale(0.9); background: var(--accent); color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">AURA INTELLIGENCE</div>
    </div>

    <div id="chat"></div>

    <div class="input-wrap">
        <div class="pill">
            <input type="text" id="in" placeholder="Задай вопрос..." autocomplete="off">
            <button id="go" class="send">↑</button>
        </div>
    </div>

    <script>
        const win = document.getElementById('chat'), input = document.getElementById('in'), btn = document.getElementById('go');

        window.onload = () => {
            add("Система готова. Я здесь, чтобы помогать с твоими проектами, учебой и любыми вопросами. Что обсудим?", 'ai');
        };

        function process() {
            const val = input.value.trim(); if(!val) return;
            add(val, 'user');
            input.value = '';

            // МГНОВЕННАЯ ЛОГИКА (БЕЗ ПРИПИСОК ПРО ПОИСК)
            setTimeout(() => {
                let ans = "";
                const q = val.toLowerCase();

                if (q.includes('бравл') || q.includes('baza')) {
                    ans = "Для развития BAZA SHOP сейчас лучше всего сделать упор на быстрые выдачи и отзывы. В Бравле актуален контроль карты — подсказать лучших бойцов под текущую ротацию?";
                } else if (q.includes('школ') || q.includes('биол') || q.includes('геогр')) {
                    ans = "В 8 классе эти темы разбираются подробно. Если это биология Пасечника — там сейчас акцент на физиологии. Какую конкретно задачу нужно решить?";
                } else if (q.includes('невинк') || q.includes('чп')) {
                    ans = "Твой проект ЧП | Невинка — отличная база для новостей города. Рекомендую использовать форматы коротких сводок и проверять информацию через официальные чаты безопасности.";
                } else if (q.includes('кто') || q.includes('что')) {
                    ans = "Я изучила информацию. Речь идет о важном событии/личности. Если вкратце — это оказало большое влияние на свою сферу. Рассказать подробнее?";
                } else {
                    ans = "Я проанализировала твой вопрос. Лучший способ решить это — разбить задачу на части. Давай начнем с самого первого шага, что скажешь?";
                }

                add(ans, 'ai');
            }, 400);
        }

        function add(t, type) {
            const d = document.createElement('div');
            d.className = `m ${type}`;
            d.textContent = t;
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }

        btn.onclick = process;
        input.onkeypress = (e) => { if(e.key === 'Enter') process(); };
    </script>
</body>
</html>
