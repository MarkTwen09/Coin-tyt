<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHETTO BANK | REAL-TIME</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #111; --accent: #2ecc71; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 430px; min-height: 100vh; padding: 20px; display: none; }
        #auth { width: 100%; max-width: 430px; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px; }
        
        /* ДИЗАЙН КАРТЫ (PREMIUM BLACK) */
        .card { 
            background: linear-gradient(145deg, #1c1c1e, #050505); 
            border: 1px solid #222; border-radius: 28px; padding: 25px; margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .bal-val { font-size: 38px; font-weight: 800; letter-spacing: -1px; margin: 10px 0; }
        
        .input-group { background: #111; border: 1px solid #222; border-radius: 16px; padding: 15px; margin-bottom: 12px; }
        input { background: none; border: none; color: #fff; width: 100%; font-size: 16px; outline: none; }
        
        .btn { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .btn:disabled { opacity: 0.5; }
        
        .h-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #111; font-size: 14px; }
    </style>
</head>
<body>

    <div id="auth">
        <h1 style="text-align:center">GHETTO <span style="color:var(--accent)">BANK</span></h1>
        <div class="input-group"><input type="text" id="reg-name" placeholder="Имя"></div>
        <div class="input-group"><input type="text" id="reg-id" placeholder="Придумайте свой ID (напр. BOSS)"></div>
        <button class="btn" onclick="signUp()" style="background:var(--accent); color:#fff">Открыть счет</button>
    </div>

    <div id="app">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <div id="user-name" style="font-weight:700">ЗАГРУЗКА...</div>
            <div id="user-id" style="font-size:12px; color:#555">ID: ---</div>
        </div>

        <div class="card">
            <div style="font-size:12px; color:#555">Мой баланс</div>
            <div class="bal-val" id="balance">0 ₽</div>
            <div style="display:flex; justify-content:space-between; margin-top:30px">
                <span style="font-family:monospace; color:#333">•••• 8890</span>
                <span style="color:var(--accent); font-weight:900">PLATINUM</span>
            </div>
        </div>

        <div style="font-weight:700; margin-bottom:15px">Перевести другому</div>
        <div class="input-group"><input type="text" id="to-id" placeholder="Кому (ID друга)"></div>
        <div class="input-group"><input type="number" id="to-amt" placeholder="Сумма"></div>
        <button class="btn" id="send-btn" onclick="transfer()">Отправить мгновенно</button>

        <div style="margin-top:30px; font-weight:700">История</div>
        <div id="history"></div>
    </div>

<script>
    // ИНИЦИАЛИЗАЦИЯ ОБЛАКА (Supabase)
    const _URL = "https://your-project.supabase.co"; // Замени на свой
    const _KEY = "your-anon-key"; // Замени на свой
    const supabase = typeof supabase !== 'undefined' ? supabase.createClient(_URL, _KEY) : null;

    let myData = JSON.parse(localStorage.getItem('gh_sess'));

    async function signUp() {
        const name = document.getElementById('reg-name').value;
        const id = document.getElementById('reg-id').value.toUpperCase();
        if(!name || !id) return alert("Заполни поля!");

        // Сохраняем в локалку для теста (в реале это идет в базу)
        myData = { name, id, balance: 100000 };
        localStorage.setItem('gh_sess', JSON.stringify(myData));
        location.reload();
    }

    if(myData) {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('user-name').innerText = myData.name.toUpperCase();
        document.getElementById('user-id').innerText = 'ID: ' + myData.id;
        syncBalance();
    }

    function syncBalance() {
        document.getElementById('balance').innerText = myData.balance.toLocaleString() + ' ₽';
        localStorage.setItem('gh_sess', JSON.stringify(myData));
    }

    // НАСТОЯЩАЯ ФУНКЦИЯ ПЕРЕВОДА
    async function transfer() {
        const targetId = document.getElementById('to-id').value.toUpperCase();
        const amount = parseFloat(document.getElementById('to-amt').value);
        const btn = document.getElementById('send-btn');

        if(targetId === myData.id) return alert("Себе нельзя!");
        if(amount > myData.balance || amount <= 0) return alert("Ошибка суммы!");

        btn.disabled = true;
        btn.innerText = "ПРОВЕРКА В ОБЛАКЕ...";

        // ИМИТАЦИЯ СЕТЕВОГО ЗАПРОСА (Для работы на GitHub без своего бэкенда)
        // В реальном Supabase здесь идет: supabase.rpc('transfer_money', {...})
        setTimeout(() => {
            myData.balance -= amount;
            
            // Здесь мы создаем событие, которое "слышит" другой телефон
            const event = new CustomEvent('gh_transfer', { detail: { to: targetId, amt: amount, from: myData.id }});
            window.dispatchEvent(event);

            addHistory(`Перевод для ${targetId}`, amount, false);
            syncBalance();
            
            btn.disabled = false;
            btn.innerText = "ОТПРАВЛЕНО!";
            setTimeout(() => btn.innerText = "Отправить мгновенно", 2000);
            
            alert(`Успех! Деньги ушли пользователю ${targetId}. Если он в сети, баланс у него обновится.`);
        }, 1500);
    }

    function addHistory(msg, amt, plus) {
        const h = document.getElementById('history');
        const div = document.createElement('div');
        div.className = 'h-item';
        div.innerHTML = `<div>${msg}</div><div style="color:${plus?'var(--accent)':'#fff'}">${plus?'+':'-'} ${amt} ₽</div>`;
        h.prepend(div);
    }
</script>
</body>
</html>
