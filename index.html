<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kao Project v1.2</title>
    <style>
        :root {
            --main-green: #acff01;
            --main-purple: #9d00ff;
        }
        body { 
            background: radial-gradient(circle at top, #1a2e0a 0%, #050a02 100%); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            align-items: center; 
            justify-content: space-between; 
            overflow: hidden; 
        }
        .user-tag { margin-top: 20px; border: 1px solid rgba(172,255,1,0.2); padding: 8px 15px; border-radius: 12px; color: var(--main-green); font-size: 13px; background: rgba(0,0,0,0.3); }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(172,255,1,0.1); padding: 20px; border-radius: 25px; width: 85%; text-align: left; backdrop-filter: blur(15px); }
        #bal { font-size: 60px; color: var(--main-green); text-shadow: 0 0 20px rgba(172,255,1,0.4); font-weight: bold; margin: 5px 0; }
        .coin-box { perspective: 1000px; margin: 20px 0; }
        .coin { width: 160px; height: 160px; border: 6px solid var(--main-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 70px; transition: 2s cubic-bezier(0.1, 0, 0.2, 1); box-shadow: 0 0 40px rgba(172,255,1,0.2); background: rgba(172,255,1,0.1); }
        .btn { background: var(--main-purple); border: none; color: white; padding: 20px 60px; border-radius: 20px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 25px rgba(157, 0, 255, 0.3); transition: 0.2s; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); }
        .nav { width: 100%; display: flex; justify-content: space-around; padding: 20px 0; background: rgba(0,0,0,0.6); border-top: 1px solid rgba(172,255,1,0.05); backdrop-filter: blur(10px); }
        .nav-item { color: #666; font-size: 11px; text-align: center; }
        .nav-item.active { color: var(--main-green); }
    </style>
</head>
<body>
    <div class="user-tag">@kaoface_project</div>

    <div class="card">
        <span style="color: var(--main-green); font-weight: bold;">НОВОСТИ</span><br>
        <span style="color: #888; font-size: 13px;">Дизайн обновлен до v1.2. Добавлен баланс и 3D-анимация.</span>
    </div>

    <div style="text-align: center;">
        <div style="font-size: 14px; color: #666; letter-spacing: 1px;">МОНЕТЫ</div>
        <div id="bal">500</div>
    </div>

    <div class="coin-box">
        <div id="coin" class="coin">🎭</div>
    </div>

    <button class="btn" onclick="flip()">ИГРАТЬ (50)</button>

    <div class="nav">
        <div class="nav-item active">🏠<br>Главная</div>
        <div class="nav-item" onclick="alert('Скоро!')">🎮<br>Игры</div>
        <div class="nav-item" onclick="alert('Скоро!')">👥<br>Друзья</div>
        <div class="nav-item" onclick="alert('Скоро!')">💰<br>Кошелек</div>
    </div>

    <script>
        let b = localStorage.getItem('b') ? parseInt(localStorage.getItem('b')) : 500;
        const balEl = document.getElementById('bal');
        const coinEl = document.getElementById('coin');
        balEl.innerText = b;

        function flip() {
            if(b < 50) return alert('Недостаточно монет!');
            b -= 50; update();
            
            coinEl.style.transition = "2s cubic-bezier(0.1, 0, 0.2, 1)";
            coinEl.style.transform = "rotateY(1800deg)";
            
            setTimeout(() => {
                const win = Math.random() > 0.5;
                coinEl.style.transition = "0.5s";
                coinEl.style.transform = "rotateY(0deg)";
                
                if(win) { 
                    b += 100; 
                    alert('Победа! +100 монет'); 
                } else { 
                    alert('Проигрыш! Попробуй еще раз.'); 
                }
                update();
            }, 2100);
        }

        function update() { 
            balEl.innerText = b; 
            localStorage.setItem('b', b); 
        }
    </script>
</body>
</html>
