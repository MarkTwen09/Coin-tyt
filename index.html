<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic Core</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.9);
            --border-color: rgba(55, 65, 81, 0.8);
            --active-color: #10b981;
            --enemy-color: #ef4444;
            --text-main: #f3f4f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        /* Задний фон */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
            pointer-events: none;
        }

        /* Мобильный компактный HUD сверху */
        .top-hud {
            position: absolute;
            top: 16px;
            left: 12px;
            right: 12px;
            height: 60px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
        }

        .hud-item span {
            font-size: 16px;
            font-weight: 700;
            margin-top: 2px;
        }

        /* Нормальная адаптивная игровая карта */
        .map-container {
            position: absolute;
            top: 90px;
            bottom: 180px;
            left: 12px;
            right: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 8px;
            z-index: 5;
        }

        .sector {
            background: rgba(31, 41, 55, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: all 0.2s ease;
            padding: 6px;
            text-align: center;
        }

        .sector-name {
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sector-buildings {
            font-size: 14px;
            margin-top: 4px;
            letter-spacing: 2px;
        }

        /* Цвета владельцев */
        .sector.player {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--active-color);
            box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.1);
        }
        .sector.player .sector-name { color: #6ee7b7; }

        .sector.enemy-ger { background: rgba(245, 158, 11, 0.1); border-color: #f59e0b; }
        .sector.enemy-fra { background: rgba(59, 130, 246, 0.1); border-color: #3b82f6; }
        .sector.enemy-pol { background: rgba(139, 92, 246, 0.1); border-color: #8b5cf6; }

        .sector.selected {
            border-width: 2px;
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(255,255,255,0.2);
        }

        /* Нижняя панель управления */
        .bottom-panel {
            position: absolute;
            bottom: 16px;
            left: 12px;
            right: 12px;
            height: 150px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px;
            z-index: 10;
            display: none;
            backdrop-filter: blur(8px);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }

        .panel-header {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
            color: #e5e7eb;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .btn {
            background: #1f2937;
            border: 1px solid #374151;
            color: #fff;
            padding: 10px 4px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .btn:active { background: #374151; }
        .btn span { color: #9ca3af; font-size: 9px; font-weight: 400; }

        .btn-attack {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--enemy-color);
            grid-column: span 3;
            font-size: 13px;
            padding: 14px;
        }
        .btn-attack:active { background: rgba(239, 68, 68, 0.4); }

        /* Окно выбора фракции */
        .start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #090d16;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .start-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #1f2937;
            border: 1px solid #4b5563;
            color: #fff;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <!-- Старт -->
    <div class="start-screen" id="start-screen">
        <div class="start-card">
            <h2 style="letter-spacing: 1px;">ВЫБОР СЕКТОРA</h2>
            <select id="faction-select">
                <option value="Германия">ГЕРМАНИЯ (Центр)</option>
                <option value="Франция">ФРАНЦИЯ (Запад)</option>
                <option value="Польша">ПОЛЬША (Восток)</option>
            </select>
            <button class="btn" style="width:100%; padding:14px; background:var(--active-color); color:#000; font-size:14px;" onclick="initGame()">НАЧАТЬ ОПЕРАЦИЮ</button>
        </div>
    </div>

    <!-- HUD -->
    <div class="top-hud">
        <div class="hud-item" style="color: #f59e0b;">БАНК<span id="m-val">1200</span></div>
        <div class="hud-item" style="color: #9ca3af;">СТАЛЬ<span id="s-val">600</span></div>
        <div class="hud-item" style="color: #ef4444;">ВОЙСКА<span id="t-val">15 ДИВ.</span></div>
    </div>

    <!-- Сетка карты -->
    <div class="map-container" id="map-grid"></div>

    <!-- Панель управления снизу -->
    <div class="bottom-panel" id="control-panel">
        <div class="panel-header" id="panel-title">Регион</div>
        <div class="actions-grid" id="actions-container"></div>
    </div>

    <script>
        let res = { money: 1200, steel: 600, troops: 15 };
        let playerSide = '';
        let selectedId = null;

        const sectors = [
            { id: 1, name: "Нормандия", native: "Франция", owner: "Франция", buildings: [] },
            { id: 2, name: "Иль-де-Франс", native: "Франция", owner: "Франция", buildings: [] },
            { id: 3, name: "Прованс", native: "Франция", owner: "Франция", buildings: [] },
            { id: 4, name: "Рейнланд", native: "Германия", owner: "Германия", buildings: [] },
            { id: 5, name: "Берлин-Пруссия", native: "Германия", owner: "Германия", buildings: [] },
            { id: 6, name: "Бавария", native: "Германия", owner: "Германия", buildings: [] },
            { id: 7, name: "Поморье", native: "Польша", owner: "Польша", buildings: [] },
            { id: 8, name: "Мазовия", native: "Польша", owner: "Польша", buildings: [] },
            { id: 9, name: "Силезия", native: "Польша", owner: "Польша", buildings: [] }
        ];

        function initGame() {
            playerSide = document.getElementById('faction-select').value;
            sectors.forEach(s => {
                if (s.native === playerSide) s.owner = "Игрок";
            });
            document.getElementById('start-screen').style.display = 'none';
            renderMap();
            startTicks();
        }

        function renderMap() {
            const grid = document.getElementById('map-grid');
            grid.innerHTML = '';
            
            sectors.forEach(s => {
                const div = document.createElement('div');
                div.className = `sector`;
                if (s.owner === "Игрок") div.classList.add('player');
                else if (s.native === "Германия") div.classList.add('enemy-ger');
                else if (s.native === "Франция") div.classList.add('enemy-fra');
                else if (s.native === "Польша") div.classList.add('enemy-pol');

                if (s.id === selectedId) div.classList.add('selected');

                div.innerHTML = `
                    <div class="sector-name">${s.name}</div>
                    <div class="sector-buildings">${s.buildings.join('')}</div>
                `;
                
                div.onclick = () => selectSector(s.id);
                grid.appendChild(div);
            });
        }

        function selectSector(id) {
            selectedId = id;
            renderMap();
            
            const s = sectors.find(x => x.id === id);
            const panel = document.getElementById('control-panel');
            const title = document.getElementById('panel-title');
            const actions = document.getElementById('actions-container');
            
            panel.style.display = 'block';
            title.innerText = `${s.name} (${s.owner === 'Игрок' ? 'Ваш сектор' : 'ИИ сектор'})`;
            
            if (s.owner === "Игрок") {
                actions.innerHTML = `
                    <button class="btn" onclick="build('🏦')">🏦 Банк<span>300💰</span></button>
                    <button class="btn" onclick="build('🏭')">🏭 Завод<span>200💰/100📦</span></button>
                    <button class="btn" onclick="build('⚔️')">⚔️ База<span>400💰/200📦</span></button>
                `;
            } else {
                actions.innerHTML = `
                    <button class="btn btn-attack" onclick="attack(${s.id})">⚔️ НАЧАТЬ БЛИЦКРИГ (1 ДИВ.)</button>
                `;
            }
        }

        function build(type) {
            const s = sectors.find(x => x.id === selectedId);
            if (type === '🏦' && res.money >= 300) { res.money -= 300; s.buildings.push('🏦'); }
            else if (type === '🏭' && res.money >= 200 && res.steel >= 100) { res.money -= 200; res.steel -= 100; s.buildings.push('🏭'); }
            else if (type === '⚔️' && res.money >= 400 && res.steel >= 200) { res.money -= 400; res.steel -= 200; s.buildings.push('⚔️'); }
            else { alert("Недостаточно ресурсов"); return; }
            
            updateHUD();
            renderMap();
            selectSector(selectedId);
        }

        function attack(id) {
            if (res.troops < 1) { alert("Нет свободных дивизий"); return; }
            res.troops--;
            updateHUD();
            
            const s = sectors.find(x => x.id === id);
            document.getElementById('control-panel').style.display = 'none';
            
            setTimeout(() => {
                if (Math.random() > 0.4) {
                    alert(`Успех! Сектор ${s.name} захвачен!`);
                    s.owner = "Игрок";
                } else {
                    alert(`Штурм отбит. Дивизия уничтожена.`);
                }
                renderMap();
            }, 1500);
        }

        function startTicks() {
            setInterval(() => {
                res.money += 20;
                res.steel += 10;
                sectors.forEach(s => {
                    if (s.owner === "Игрок") {
                        s.buildings.forEach(b => {
                            if (b === '🏦') res.money += 40;
                            if (b === '🏭') res.steel += 20;
                            if (b === '⚔️') res.troops += 1;
                        });
                    }
                });
                updateHUD();
            }, 4000);
        }

        function updateHUD() {
            document.getElementById('m-val').innerText = res.money;
            document.getElementById('s-val').innerText = res.steel;
            document.getElementById('t-val').innerText = `${res.troops} ДИВ.`;
        }
    </script>
</body>
</html>
