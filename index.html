<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLIXY ELITE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #2e67f8; --bg: #000000; --text-dim: #717171; --heart: #ff2d55; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }

        .app { height: 100vh; overflow-y: auto; padding: 20px 20px 160px; }
        
        /* ПОИСК */
        .search-box {
            position: sticky; top: 0; background: var(--bg); z-index: 100;
            padding: 40px 0 20px;
        }
        .search-inner {
            background: rgba(255,255,255,0.1); border-radius: 14px;
            display: flex; align-items: center; padding: 12px 16px;
        }
        .search-inner input {
            background: none; border: none; color: #fff; margin-left: 10px;
            width: 100%; outline: none; font-size: 16px;
        }

        .track-card {
            display: flex; align-items: center; padding: 12px;
            background: rgba(255,255,255,0.05); border-radius: 20px; margin-bottom: 10px;
        }
        .track-card img { width: 52px; height: 52px; border-radius: 12px; margin-right: 15px; object-fit: cover; }
        .track-meta { flex: 1; }
        .track-meta h4 { font-size: 16px; font-weight: 600; }
        .track-meta p { font-size: 13px; color: var(--text-dim); }
        
        .actions { display: flex; gap: 15px; align-items: center; color: #444; }
        .is-fav { color: var(--heart) !important; }

        .fab {
            position: fixed; right: 25px; bottom: 100px;
            width: 60px; height: 60px; background: var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000;
        }

        /* PLAYER */
        .player {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #151515 0%, #000 100%);
            z-index: 2000; transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            padding: 20px 30px; display: flex; flex-direction: column; align-items: center;
        }
        .player.active { transform: translateY(-100%); }
        .p-nav { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .cover-wrap { position: relative; width: 88%; aspect-ratio: 1; margin: 20px 0 40px; }
        .glow { position: absolute; inset: 15px; background-size: cover; filter: blur(45px); opacity: 0.6; z-index: -1; }
        .big-img { width: 100%; height: 100%; border-radius: 24px; object-fit: cover; }

        .seek-wrap { width: 100%; margin: 30px 0; }
        .range { width: 100%; -webkit-appearance: none; background: transparent; }
        .range::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        .range::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; background: #fff; border-radius: 50%; margin-top: -4px; }

        .controls { display: flex; justify-content: space-around; align-items: center; width: 100%; }
        .p-btn { width: 75px; height: 75px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }

        .mini {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: rgba(25,25,25,0.9); backdrop-filter: blur(20px);
            height: 64px; border-radius: 20px; display: flex; align-items: center; padding: 0 15px; z-index: 500;
        }
        .mini img { width: 44px; height: 44px; border-radius: 10px; margin-right: 15px; }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; z-index: 3000; align-items: center; justify-content: center; padding: 25px;
        }
        .modal-body { background: #1c1c1e; width: 100%; border-radius: 28px; padding: 25px; }
        input[type="text"] { width: 100%; background: #2c2c2e; border: none; padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 12px; }
    </style>
</head>
<body>

<div class="app">
    <div class="search-box">
        <div class="search-inner">
            <i class="fas fa-search" style="color:#555"></i>
            <input type="text" id="searchInput" placeholder="Поиск музыки..." oninput="filterTracks()">
        </div>
    </div>
    <div id="list"></div>
</div>

<div class="fab" onclick="modal(true)"><i class="fas fa-plus" style="color:white"></i></div>

<div class="modal" id="modal" onclick="if(event.target==this) modal(false)">
    <div class="modal-body">
        <h2 style="margin-bottom:20px">Добавить трек</h2>
        <input type="text" id="n" placeholder="Название">
        <input type="text" id="a" placeholder="Артист">
        <input type="file" id="fi" accept="image/*" style="margin-bottom:10px">
        <input type="file" id="fa" accept="audio/*">
        <button style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; color:#fff; font-weight:700" onclick="add()">Загрузить</button>
    </div>
</div>

<div class="mini" id="mini" style="display:none" onclick="openP()">
    <img id="m-i">
    <div class="track-meta"><h4 id="m-t"></h4><p id="m-a"></p></div>
    <i class="fas fa-play" id="m-p" onclick="event.stopPropagation(); toggle();" style="font-size:22px"></i>
</div>

<div class="player" id="full">
    <div class="p-nav">
        <i class="fas fa-chevron-down" onclick="closeP()" style="font-size:24px"></i>
        <i id="f-h" class="far fa-heart" onclick="toggleFav(currentTrackId)" style="font-size:24px"></i>
    </div>
    <div class="cover-wrap">
        <div id="glow" class="glow"></div>
        <img id="f-i" class="big-img">
    </div>
    <div style="width:100%">
        <h1 id="f-t" style="font-size:26px"></h1>
        <p id="f-a" style="font-size:18px; color:var(--text-dim)"></p>
    </div>
    <div class="seek-wrap">
        <input type="range" class="range" id="seek" value="0">
        <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:12px; color:#444">
            <span id="cur">0:00</span><span id="dur">0:00</span>
        </div>
    </div>
    <div class="controls">
        <i class="fas fa-step-backward" onclick="prev()" style="font-size:24px"></i>
        <div class="p-btn" onclick="toggle()"><i id="f-p" class="fas fa-play"></i></div>
        <i class="fas fa-step-forward" onclick="next()" style="font-size:24px"></i>
    </div>
</div>

<script>
    const audio = new Audio();
    let db, currentList = [], filteredList = [], currentIndex = -1, currentTrackId = null;

    const req = indexedDB.open("FlixyDB", 1);
    req.onupgradeneeded = e => { e.target.result.createObjectStore("songs", {keyPath:"id", autoIncrement:true}); };
    req.onsuccess = e => { db = e.target.result; render(); };

    function modal(s) { document.getElementById('modal').style.display = s?'flex':'none'; }

    async function add() {
        const n=document.getElementById('n').value, a=document.getElementById('a').value;
        const fi=document.getElementById('fi').files[0], fa=document.getElementById('fa').files[0];
        if(!n||!a||!fi||!fa) return alert("Файлы!");
        const song = {n, a, i:await toB(fi), s:await toB(fa), fav:false};
        const tx = db.transaction("songs","readwrite");
        tx.objectStore("songs").add(song);
        tx.oncomplete = () => { render(); modal(false); };
    }

    const toB = f => new Promise(res => { const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(f); });

    function render() {
        const l = document.getElementById('list'); l.innerHTML = '';
        currentList = [];
        db.transaction("songs").objectStore("songs").openCursor().onsuccess = e => {
            const c = e.target.result;
            if(c) { currentList.push(c.value); c.continue(); }
            else { filterTracks(); }
        };
    }

    function filterTracks() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        filteredList = currentList.filter(s => s.n.toLowerCase().includes(q) || s.a.toLowerCase().includes(q));
        const l = document.getElementById('list'); l.innerHTML = '';
        filteredList.forEach((s, idx) => {
            const d = document.createElement('div');
            d.className = 'track-card';
            d.onclick = () => { currentIndex = idx; play(s); };
            d.innerHTML = `
                <img src="${s.i}">
                <div class="track-meta"><h4>${s.n}</h4><p>${s.a}</p></div>
                <div class="actions">
                    <i class="${s.fav?'fas':'far'} fa-heart ${s.fav?'is-fav':''}" onclick="event.stopPropagation(); toggleFav(${s.id})"></i>
                    <i class="fas fa-trash" onclick="event.stopPropagation(); del(${s.id})" style="font-size:14px"></i>
                </div>`;
            l.prepend(d);
        });
    }

    function toggleFav(id) {
        const tx = db.transaction("songs","readwrite");
        const store = tx.objectStore("songs");
        store.get(id).onsuccess = e => {
            const s = e.target.result;
            s.fav = !s.fav;
            store.put(s);
            tx.oncomplete = () => { 
                render(); 
                if(currentTrackId === id) {
                    document.getElementById('f-h').className = s.fav ? 'fas fa-heart is-fav' : 'far fa-heart';
                }
            };
        };
    }

    function del(id) {
        if(!confirm("Удалить?")) return;
        const tx = db.transaction("songs","readwrite");
        tx.objectStore("songs").delete(id);
        tx.oncomplete = () => render();
    }

    function play(s) {
        if(!s) return;
        currentTrackId = s.id;
        audio.src = s.s; audio.play();
        document.getElementById('mini').style.display = 'flex';
        document.getElementById('m-t').innerText = document.getElementById('f-t').innerText = s.n;
        document.getElementById('m-a').innerText = document.getElementById('f-a').innerText = s.a;
        document.getElementById('m-i').src = document.getElementById('f-i').src = s.i;
        document.getElementById('glow').style.backgroundImage = `url(${s.i})`;
        document.getElementById('f-h').className = s.fav ? 'fas fa-heart is-fav' : 'far fa-heart';
        updateUI(true);
    }

    function next() { currentIndex++; if(currentIndex >= filteredList.length) currentIndex = 0; play(filteredList[currentIndex]); }
    function prev() { currentIndex--; if(currentIndex < 0) currentIndex = filteredList.length - 1; play(filteredList[currentIndex]); }
    function toggle() { audio.paused?audio.play():audio.pause(); updateUI(!audio.paused); }
    function updateUI(p) {
        document.getElementById('m-p').className = document.getElementById('f-p').className = 'fas '+(p?'fa-pause':'fa-play');
        p ? document.getElementById('full').classList.add('playing') : document.getElementById('full').classList.remove('playing');
    }
    function openP() { document.getElementById('full').classList.add('active'); }
    function closeP() { document.getElementById('full').classList.remove('active'); }

    const sk = document.getElementById('seek');
    audio.ontimeupdate = () => {
        if(!audio.duration) return;
        sk.value = (audio.currentTime/audio.duration)*100;
        document.getElementById('cur').innerText = fmt(audio.currentTime);
        document.getElementById('dur').innerText = fmt(audio.duration);
    };
    sk.oninput = function() { audio.currentTime = (this.value/100)*audio.duration; };
    const fmt = t => { const m=Math.floor(t/60), s=Math.floor(t%60); return m+":"+(s<10?'0':'')+s; };
    audio.onended = next;
</script>
</body>
</html>
