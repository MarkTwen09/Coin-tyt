<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAO PROJECT</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        .tab { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .bal { font-size: 40px; color: #acff01; font-weight: bold; margin: 20px 0; }
        .coin-btn { width: 150px; height: 150px; border-radius: 50%; border: 5px solid #acff01; background: #111; font-size: 60px; color: white; margin: 20px auto; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .btn { background: #9d00ff; border: none; color: white; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 16px; width: 80%; margin: 10px 0; cursor: pointer; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 15px; margin: 10px auto; width: 85%; border: 1px solid #333; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; padding: 15px; font-size: 12px; color: #666; cursor: pointer; }
        .nav-item.active { color: #acff01; font-weight: bold; }
    </style>
</head>
<body>

    <div style="padding: 10px; border-bottom: 1px solid #222; font-weight: bold; color: #acff01;">KAO EMPIRE v2.0</div>

    <div id="home" class="tab active">
        <div class="bal" id="b1">500</div>
        <div id="coin_face" class="coin-btn" onclick="flip()">🎭</div>
        <p>Нажми на монету, чтобы бросить</p>
        <div style="display: flex; justify-content: center; gap: 10px;">
            <button class="btn" style="width: auto;" onclick="setBet(10)">10</button>
            <button class="btn" style="width: auto; background: #acff01; color: black;" onclick="setBet(50)">50</button>
            <button class="btn" style="width: auto;" onclick="setBet(100)">100</button>
        </div>
    </div>

    <div id="earn" class="tab">
        <h2>ЗАДАНИЯ</h2>
        <div class="card">
            <div>Подписка на ТГ (+1000)</div>
            <button class="btn" id="task1" onclick="claim(1000, 'task1')">ПРОВЕРИТЬ</button>
        </div>
        <div class="card">
            <div>Пригласить друга (+500)</div>
            <button class="btn" id="task2" onclick="claim(500, 'task2')">ПРОВЕРИТЬ</button>
        </div>
    </div>

    <div id="wallet" class="tab">
        <h2>КОШЕЛЕК</h2>
        <div class="card" style="background: linear-gradient(45deg, #111, #222); height: 150px; display: flex; flex-direction: column; justify-content: center;">
            <div style="color: #666;">БАЛАНС</div>
            <div class="bal" id="b2">500</div>
        </div>
        <button class="btn" onclick="alert('Вывод от 50.000 монет')">ВЫВЕСТИ</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="show('home', this)">🏠 ИГРА</div>
        <div class="nav-item" onclick="show('earn', this)">💎 ЗАДАНИЯ</div>
        <div class="nav-item" onclick="show('wallet', this)">💰 КОШЕЛЕК</div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('k_bal')) || 500;
        let bet = 50;

        function update() {
            document.getElementById('b1').innerText = balance;
            document.getElementById('b2').innerText = balance;
            localStorage.setItem('k_bal', balance);
        }
        update();

        function show(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }function setBet(v) {
            bet = v;
            alert("Ставка: " + v);
        }

        function flip() {
            if (balance < bet) return alert("Мало монет!");
            balance -= bet;
            update();
            
            let cf = document.getElementById('coin_face');
            cf.innerText = "⏳";
            
            setTimeout(() => {
                let win = Math.random() > 0.5;
                if (win) {
                    balance += bet * 2;
                    cf.innerText = "🎭";
                    alert("ПОБЕДА!");
                } else {
                    cf.innerText = "🪙";
                    alert("ПРОИГРЫШ!");
                }
                update();
            }, 500);
        }

        function claim(amt, id) {
            if (localStorage.getItem(id)) return alert("Уже получено!");
            balance += amt;
            localStorage.setItem(id, "done");
            document.getElementById(id).innerText = "ГОТОВО";
            document.getElementById(id).style.background = "#333";
            update();
            alert("Начислено: " + amt);
        }
    </script>
</body>
</html>
