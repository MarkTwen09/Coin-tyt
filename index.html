<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Clicker: Evolution</title>
    <style>
        :root {
            --bg-color: #050509;
            --panel-bg: rgba(20, 20, 35, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            
            /* Неоновые цвета */
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --blue: #3d34ff;
            --gold: #ffcc00;
            
            /* Текстуры скинов (CSS градиенты) */
            --skin-default: radial-gradient(circle, #ffd700, #ff8c00);
            --skin-neon: radial-gradient(circle, #00ffff, #3d34ff);
            --skin-ruby: radial-gradient(circle, #ff0044, #800000);
            --skin-dark: radial-gradient(circle, #333, #000);
            --skin-cosmic: conic-gradient(#ff00ff, #00ffff, #ff00ff);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 10%, rgba(61, 52, 255, 0.3) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(255, 0, 255, 0.2) 0px, transparent 50%);
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Общие стили панелей (Glassmorphism) */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Левая панель: Клик и Баланс */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .balance-card {
            position: absolute;
            top: 20px;
            padding: 15px 40px;
            text-align: center;
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .balance-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.6);
        }

        .balance-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px var(--cyan);
        }

        /* Стилизация монеты */
        .coin-container {
            perspective: 1000px;
            cursor: pointer;
        }

        .coin {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: var(--skin-default); /* Дефолтный скин */
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.5), inset 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8rem;
            transition: transform 0.1s, box-shadow 0.3s;
            position: relative;
            transform-style: preserve-3d;
        }

        .coin::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 8px solid rgba(255,255,255,0.2);
            box-sizing: border-box;
        }

        .coin:active {
            transform: scale(0.92) rotateX(10deg);
        }

        /* Эффект +1 при клике */
        .click-score {
            position: absolute;
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--cyan);
            text-shadow: 0 0 5px var(--cyan);
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
        }@keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* Правая панель: Кейсы и Инвентарь */
        .side-panel {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .panel-header {
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Кейсы */
        .case-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .case-item:hover {
            border-color: var(--blue);
            background: rgba(61, 52, 255, 0.1);
        }

        .case-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .case-icon {
            font-size: 2rem;
            width: 50px; height: 50px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
        }

        .case-name { font-weight: bold; display: block; }
        .case-price { color: var(--gold); font-size: 0.9rem; }

        .btn {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 15px var(--cyan);
        }

        .btn:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }

        /* Инвентарь */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .skin-item {
            aspect-ratio: 1/1;
            border-radius: 10px;
            border: 2px solid var(--border-color);
            cursor: pointer;
            position: relative;
            transition: 0.2s;
            overflow: hidden;
        }

        .skin-item:hover {
            transform: scale(1.05);
        }

        .skin-item.active {
            border-color: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
        }

        .skin-item.active::after {
            content: '✓';
            position: absolute;
            bottom: 5px; right: 5px;
            background: var(--cyan);
            color: black;
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 0.8rem; font-weight: bold;
        }

        .skin-preview {
            width: 100%; height: 100%;
        }

        /* Редкости скинов */
        .rarity-common { border-color: #888; }
        .rarity-rare { border-color: var(--blue); box-shadow: inset 0 0 10px rgba(61, 52, 255, 0.3); }
        .rarity-epic { border-color: var(--magenta); box-shadow: inset 0 0 10px rgba(255, 0, 255, 0.3); }
        .rarity-legendary { border-color: var(--gold); box-shadow: inset 0 0 15px rgba(255, 204, 0, 0.3); }/* Окно открытия кейса */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center; align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            width: 400px;
            padding: 30px;
            text-align: center;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .drop-rarity {
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .drop-name {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 20px;
            display: block;
        }

        .drop-preview {
            width: 150px; height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        /* Уведомления */
        #notif-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
        }

        .notif {
            background: rgba(255, 0, 68, 0.2);
            border: 1px solid #ff0044;
            color: #ffb3c6;
            padding: 15px 25px;
            border-radius: 8px;
            margin-top: 10px;
            backdrop-filter: blur(5px);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-area">
        <div class="balance-card glass-panel">
            <div class="balance-label">БАЛАНС</div>
            <div class="balance-value" id="balance">0</div>
        </div>

        <div class="coin-container" id="clickArea">
            <div class="coin" id="coinVisual">💰</div>
        </div>
    </div>

    <div class="side-panel">
        
        <div class="glass-panel" style="padding: 20px;">
            <div class="panel-header">🛒 МАГАЗИН КЕЙСОВ</div>
            
            <div class="case-item glass-panel">
                <div class="case-info">
                    <div class="case-icon" style="color: var(--blue);">📦</div>
                    <div>
                        <span class="case-name">Стандарт</span>
                        <span class="case-price">150 🪙</span>
                    </div>
                </div>
                <button class="btn" onclick="tryOpenCase('standard')">Открыть</button>
            </div>

            <div class="case-item glass-panel">
                <div class="case-info">
                    <div class="case-icon" style="color: var(--magenta);">🎁</div>
                    <div>
                        <span class="case-name">Элитный</span>
                        <span class="case-price">1,000 🪙</span>
                    </div>
                </div>
                <button class="btn" onclick="tryOpenCase('elite')">Открыть</button>
            </div>
        </div>

        <div class="glass-panel" style="padding: 20px; flex: 1;">
            <div class="panel-header">🎒 ИНВЕНТАРЬ СКИНОВ</div>
            <div class="inventory-grid" id="inventoryGrid">
                </div>
        </div>
    </div><div class="modal-overlay" id="modalOverlay">
        <div class="modal-content glass-panel" id="modalContent">
            <span class="drop-rarity" id="dropRarity">ОБЫЧНЫЙ</span>
            <span class="drop-name" id="dropName">Название скина</span>
            <div class="drop-preview" id="dropPreview"></div>
            <button class="btn" onclick="closeModal()">Забрать</button>
        </div>
    </div>

    <div id="notif-container"></div>

    <script>
        // --- ДАННЫЕ ИГРЫ ---
        
        // База данных скинов
        const SKINS_DB = {
            'default': { id: 'default', name: 'Классика', style: 'var(--skin-default)', shadow: 'rgba(255, 204, 0, 0.5)', rarity: 'common', icon: '💰' },
            'neon_blue': { id: 'neon_blue', name: 'Неон', style: 'var(--skin-neon)', shadow: 'rgba(0, 255, 255, 0.5)', rarity: 'rare', icon: '💎' },
            'ruby_vortex': { id: 'ruby_vortex', name: 'Рубин', style: 'var(--skin-ruby)', shadow: 'rgba(255, 0, 68, 0.5)', rarity: 'epic', icon: '❤️' },
            'dark_matter': { id: 'dark_matter', name: 'Пустота', style: 'var(--skin-dark)', shadow: 'rgba(255, 255, 255, 0.1)', rarity: 'epic', icon: '⚫' },
            'cosmic': { id: 'cosmic', name: 'Космос', style: 'var(--skin-cosmic)', shadow: 'rgba(255, 0, 255, 0.5)', rarity: 'legendary', icon: '🌌' }
        };

        // Настройки кейсов (какие скины могут выпасть и монеты)
        const CASES_DB = {
            'standard': {
                price: 150,
                coinMin: 10, coinMax: 300,
                skins: [
                    { id: 'neon_blue', chance: 0.1 }, // 10% шанс
                    { id: 'dark_matter', chance: 0.02 } // 2% шанс
                ]
            },
            'elite': {
                price: 1000,
                coinMin: 100, coinMax: 2000,
                skins: [
                    { id: 'neon_blue', chance: 0.3 },
                    { id: 'ruby_vortex', chance: 0.15 },
                    { id: 'dark_matter', chance: 0.1 },
                    { id: 'cosmic', chance: 0.05 } // 5% шанс
                ]
            }
        };

        // Состояние игры (загрузка из LS или дефолт)
        let gameState = JSON.parse(localStorage.getItem('neonClickerSave')) || {
            balance: 0,
            ownedSkins: ['default'], // Массив ID купленных скинов
            activeSkin: 'default'
        };

        // --- ЭЛЕМЕНТЫ DOM ---
        const ui = {
            balance: document.getElementById('balance'),
            coinVisual: document.getElementById('coinVisual'),
            clickArea: document.getElementById('clickArea'),
            inventory: document.getElementById('inventoryGrid'),
            modal: document.getElementById('modalOverlay'),
            dropRarity: document.getElementById('dropRarity'),
            dropName: document.getElementById('dropName'),
            dropPreview: document.getElementById('dropPreview'),
            modalContent: document.getElementById('modalContent'),
            notif: document.getElementById('notif-container')
        };

        const rarityInfo = {
            common: { name: 'Обычный', color: '#888' },
            rare: { name: 'Редкий', color: 'var(--blue)' },
            epic: { name: 'Эпический', color: 'var(--magenta)' },
            legendary: { name: 'Легендарный', color: 'var(--gold)' }
        };

        // --- ЛОГИКА ИГРЫ ---

        // Сохранение
        function saveGame() {
            localStorage.setItem('neonClickerSave', JSON.stringify(gameState));
        }

        // Обновление интерфейса
        function updateUI() {
            ui.balance.innerText = gameState.balance.toLocaleString();
            renderInventory();
            applySkin(gameState.activeSkin);
        }

        // Применение скина к главной монетеfunction applySkin(skinId) {
            const skin = SKINS_DB[skinId];
            if (!skin) return;
            ui.coinVisual.style.background = skin.style;
            ui.coinVisual.style.boxShadow = 0 0 50px ${skin.shadow}, inset 0 0 20px rgba(0,0,0,0.5);
            ui.coinVisual.innerText = skin.icon;
        }

        // Рендер сетки инвентаря
        function renderInventory() {
            ui.inventory.innerHTML = '';
            
            gameState.ownedSkins.forEach(skinId => {
                const skin = SKINS_DB[skinId];
                if (!skin) return;

                const item = document.createElement('div');
                item.className = skin-item rarity-${skin.rarity} glass-panel ${skinId === gameState.activeSkin ? 'active' : ''};
                item.onclick = () => selectSkin(skinId);

                const preview = document.createElement('div');
                preview.className = 'skin-preview';
                preview.style.background = skin.style;
                preview.style.display = 'flex';
                preview.style.justifyContent = 'center';
                preview.style.alignItems = 'center';
                preview.style.fontSize = '2rem';
                preview.innerText = skin.icon;

                item.appendChild(preview);
                ui.inventory.appendChild(item);
            });
        }

        // Выбор скина в инвентаре
        function selectSkin(skinId) {
            gameState.activeSkin = skinId;
            updateUI();
            saveGame();
        }

        // --- МЕХАНИКА КЛИКА ---
        ui.clickArea.addEventListener('click', (e) => {
            gameState.balance += 1;
            ui.balance.innerText = gameState.balance.toLocaleString(); // Быстрое обновление до сейва
            
            createClickEffect(e);
            // Сейвим реже, чтобы не тормозило, например, каждый 10-й клик, или при выходе. 
            // Но для надежности сейвим сейчас.
            saveGame(); 
        });

        function createClickEffect(e) {
            const rect = ui.clickArea.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const score = document.createElement('div');
            score.className = 'click-score';
            score.innerText = '+1';
            score.style.left = ${x}px;
            score.style.top = ${y}px;

            ui.clickArea.appendChild(score);

            setTimeout(() => score.remove(), 600);
        }

        // --- МЕХАНИКА КЕЙСОВ ---

        function tryOpenCase(caseType) {
            const cDef = CASES_DB[caseType];
            
            if (gameState.balance < cDef.price) {
                showNotif("Недостаточно монет для открытия!");
                return;
            }

            gameState.balance -= cDef.price;
            updateUI();
            
            openCaseAnimation(cDef);
            saveGame();
        }

        function openCaseAnimation(cDef) {
            // 1. Определяем дроп
            let droppedSkinId = null;
            let droppedCoins = Math.floor(Math.random() * (cDef.coinMax - cDef.coinMin + 1)) + cDef.coinMin;

            // Ролл скинов (проверяем от самых редких)
            // Сортируем скины в кейсе по шансу (возрастанию), чтобы сначала проверять легендарки
            const sortedSkins = [...cDef.skins].sort((a, b) => a.chance - b.chance);
            
            for (let skinDrop of sortedSkins) {
                if (Math.random() < skinDrop.chance) {
                    // Проверяем, нет ли уже такого скина (если не хотим дубликатов)
                    if (!gameState.ownedSkins.includes(skinDrop.id)) {
                        droppedSkinId = skinDrop.id;
                        break; // Выпал один скин, выходим
                    }
                }
            }// 2. Начисляем
            gameState.balance += droppedCoins;
            let isNewSkin = false;
            if (droppedSkinId) {
                gameState.ownedSkins.push(droppedSkinId);
                isNewSkin = true;
            }

            // 3. Показываем модалку
            showDropModal(droppedCoins, droppedSkinId);
        }

        function showDropModal(coins, skinId) {
            ui.modal.style.display = 'flex';
