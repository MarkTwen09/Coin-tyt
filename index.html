<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA PHANTOM</title>
    <style>
        :root {
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.03);
            --accent: #007aff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        /* ГАМБУРГЕР МЕНЮ */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: #0a0a0a; border-right: 1px solid var(--border);
            z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 25px; box-sizing: border-box;
        }
        .sidebar.active { left: 0; box-shadow: 20px 0 80px rgba(0,0,0,0.9); }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 999; display: none; backdrop-filter: blur(8px);
        }
        .overlay.active { display: block; }

        /* ИНТЕРФЕЙС */
        .main { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }
        .nav {
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(25px); border-bottom: 1px solid var(--border);
        }
        .m-btn { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }
        .status { font-size: 11px; color: var(--accent); letter-spacing: 2px; font-weight: 800; }

        #chat-flow {
            flex: 1; overflow-y: auto; padding: 25px;
            display: flex; flex-direction: column; gap: 35px;
            padding-bottom: 180px; -webkit-overflow-scrolling: touch;
        }

        /* СООБЩЕНИЯ (СТИЛЬ APPLE AI) */
        .msg { max-width: 90%; font-size: 17px; line-height: 1.6; animation: msgIn 0.4s ease; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(15px); } }

        .ai-msg { align-self: flex-start; color: #f0f0f0; }
        .ai-msg::before { 
            content: '✦'; display: block; margin-bottom: 10px;
            font-size: 24px; font-weight: bold;
            background: linear-gradient(90deg, #007aff, #ff2d55);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .user-msg { 
            align-self: flex-end; background: var(--card); 
            padding: 16px 22px; border-radius: 24px; border: 1px solid var(--border);
            backdrop-filter: blur(15px);
        }

        /* ВВОД (СТИЛЬ GROK) */
        .input-zone {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px 20px calc(45px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }
        .pill {
            max-width: 800px; margin: 0 auto; background: #151517;
            border: 1px solid var(--border); border-radius: 35px;
            padding: 8px 8px 8px 24px; display: flex; align-items: center;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 17px; outline: none; }
        .send-btn { 
            width: 44px; height: 44px; border-radius: 22px; background: #fff; 
            border: none; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.9); background: var(--accent); color: #fff; }

        /* ИСТОРИЯ */
        .h-item { padding: 12px; margin-bottom: 8px; border-radius: 12px; font-size: 14px; color: #888; cursor: pointer; }
        .h-item:hover { background: var(--card); color: #fff; }
        .new-btn { width: 100%; padding: 12px; margin-bottom: 25px; border-radius: 12px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <button class="new-btn" onclick="startNew()">+ NEW CONVERSATION</button>
        <div id="history-box" style="flex: 1; overflow-y: auto;"></div>
        <button class="new-btn" onclick="clearAll()" style="border-color: #ff3b30; color: #ff3b30;">WIPE ALL</button>
    </div>

    <div class="main">
        <div class="nav">
            <button class="m-btn" onclick="toggle()">☰</button>
            <div class="status">PHANTOM CORE</div>
            <div style="width: 32px;"></div>
        </div>
        <div id="chat-flow"></div>
        <div class="input-zone">
            <div class="pill">
                <input type="text" id="user-in" placeholder="Спроси о чем угодно..." autocomplete="off">
                <button id="send-trigger" class="send-btn">↑</button>
            </div>
        </div>
    </div>

    <script>
        const flow = document.getElementById('chat-flow'), input = document.getElementById('user-in'), 
              btn = document.getElementById('send-trigger'), sbar = document.getElementById('sidebar'), 
              ovl = document.getElementById('overlay'), hBox = document.getElementById('history-box');

        let brain = JSON.parse(localStorage.getItem('aura_phantom_v1')) || [];
        let curIdx = brain.length > 0 ? 0 : -1;

        function init() {
            renderHistory();
            if (curIdx === -1) startNew(); else loadChat(curIdx);
        }

        function toggle() { sbar.classList.toggle('active'); ovl.classList.toggle('active'); }
        ovl.onclick = toggle;

        function startNew() {
            brain.unshift({ title: "Новый чат", msgs: [] });
            curIdx = 0; save(); loadChat(0);
            if (sbar.classList.contains('active')) toggle();
        }

        function loadChat(i) {
            curIdx = i; flow.innerHTML = '';
            if (brain[i].msgs.length === 0) {
                addMsg("Я — AURA PHANTOM. Мои серверы активны, интеллект на максимуме. Решаю задачи, помогаю с бизнесом и учебой. Жду твой запрос.", 'ai-msg');
            } else {
                brain[i].msgs.forEach(m => addMsg(m.t, m.type));
            }
            renderHistory();
            if (sbar.classList.contains('active')) toggle();
        }

        async function process() {
            const val = input.value.trim(); if(!val) return;
            addMsg(val, 'user-msg');
            brain[curIdx].msgs.push({t: val, type: 'user-msg'});
            if (brain[curIdx].msgs.length === 1) brain[curIdx].title = val;
            input.value = '';

            // УМНАЯ ЛОГИКА (ГАРАНТИЯ СКОРОСТИ)
            setTimeout(() => {
                let res = "";
                const low = val.toLowerCase();

                if (low.includes('бравл')) res = "В Бравле сейчас нужно апать мету. Твой BAZA SHOP — отличная тема, давай сделаем рекламный пост для ТГ?";
                else if (low.includes('школ') || low.includes('учеб') || low.includes('биол')) res = "8 класс — это база. По биологии Пасечника я могу разобрать любую главу прямо сейчас. Какое задание?";
                else if (low.includes('невинк') || low.includes('проект')) res = "Проект ЧП | Невинка будет летать. Давай продумаем, как защитить канал или привлечь новых людей.";
                else res = "Я проанализировала запрос через PHANTOM CORE. Для твоего iPhone 17 Pro это решается мгновенно: нужно просто разбить задачу на части. Давай начнем?";

                addMsg(res, 'ai-msg');
                brain[curIdx].msgs.push({t: res, type: 'ai-msg'});
                save();
            }, 350);
        }

        function addMsg(t, type) {
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.textContent = t;
            flow.appendChild(d);
            flow.scrollTop = flow.scrollHeight;
        }

        function renderHistory() {
            hBox.innerHTML = brain.map((c, i) => `<div class="h-item" onclick="loadChat(${i})">${c.title.substring(0, 22)}...</div>`).join('');
        }

        function save() { localStorage.setItem('aura_phantom_v1', JSON.stringify(brain)); }
        function clearAll() { if(confirm("Удалить историю?")) { localStorage.clear(); location.reload(); } }

        btn.onclick = process;
        input.onkeypress = (e) => { if(e.key === 'Enter') process(); };
        init();
    </script>
</body>
</html>
