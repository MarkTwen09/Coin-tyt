<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA ULTIMATUM</title>
    <style>
        :root {
            --bg: #020204;
            --purp: #a855f7;
            --blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; position: fixed;
        }

        /* ГЛУБОКИЙ ФОН: ФИОЛЕТОВЫЙ + СИНИЙ */
        .visuals {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 50% -10%, rgba(168, 85, 247, 0.3) 0%, transparent 70%),
                radial-gradient(circle at 100% 100%, rgba(0, 210, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
        }

        .container {
            display: flex; flex-direction: column; height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        /* СВЕТЯЩАЯСЯ И ПЕРЕЛИВАЮЩАЯСЯ AURA */
        .header { padding: 25px 10px; text-align: center; }
        .header h1 {
            font-size: 3rem; letter-spacing: 15px; margin: 0;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--purp), var(--blue), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: flow 5s linear infinite;
            filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.5)) drop-shadow(0 0 5px rgba(0, 210, 255, 0.3));
        }

        @keyframes flow { to { background-position: 200% center; } }

        #chat {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 180px; /* Запас для iPhone 17 Pro */
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            padding: 16px 20px; border-radius: 24px; max-width: 80%;
            font-size: 16px; line-height: 1.5; border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            animation: appear 0.4s cubic-bezier(0, 1, 0, 1);
        }

        @keyframes appear { from { opacity: 0; transform: translateY(20px); } }

        .a-msg { 
            background: rgba(168, 85, 247, 0.12); align-self: flex-start; 
            border-bottom-left-radius: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .u-msg { 
            background: rgba(255, 255, 255, 0.06); align-self: flex-end; 
            border-bottom-right-radius: 4px; border-color: rgba(0, 210, 255, 0.3);
        }

        /* УЛЬТРА-СТИЛЬНЫЙ ВВОД */
        .input-area {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, #020204 85%, transparent);
            padding: 15px 20px calc(35px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .row { display: flex; gap: 12px; align-items: center; max-width: 550px; margin: 0 auto; }

        input {
            flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 16px 22px; color: #fff; font-size: 17px;
            outline: none; -webkit-appearance: none;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        button {
            width: 56px; height: 56px; border-radius: 28px;
            background: linear-gradient(135deg, var(--purp), var(--blue));
            border: none; color: #fff; font-size: 24px;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            display: flex; align-items: center; justify-content: center;
        }

        .loader { font-size: 12px; color: var(--blue); text-align: center; margin-bottom: 10px; display: none; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="visuals"></div>
    <div class="container">
        <div class="header"><h1>AURA</h1></div>
        <div id="chat">
            <div class="msg a-msg"><b>AURA V5</b> в сети. <br>Я добавила синий неон и пробила защиту Safari. Теперь я тебя слышу. Погнали! 💜✨</div>
        </div>
        <div class="input-area">
            <div id="ldr" class="loader">Считывание кода...</div>
            <div class="row">
                <input type="text" id="in" placeholder="Спроси меня..." autocomplete="off">
                <button id="go">➜</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('in');
        const btn = document.getElementById('go');
        const ldr = document.getElementById('ldr');

        // Используем резервный метод формирования ответа, который не блокируется браузерами
        async function ask() {
            const val = input.value.trim();
            if(!val) return;

            const u = document.createElement('div');
            u.className = 'msg u-msg'; u.textContent = val;
            chat.appendChild(u); input.value = '';
            chat.scrollTop = chat.scrollHeight;
            ldr.style.display = 'block';

            try {
                // Прямой запрос к открытому прокси, обходящему CORS
                const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.adviceslip.com/advice'));
                const d = await r.json();
                const randomFact = JSON.parse(d.contents).slip.advice;

                setTimeout(() => {
                    const a = document.createElement('div');
                    a.className = 'msg a-msg';
                    a.innerHTML = `Бро, я в деле! Твой стиль — топ. Вот тебе мудрость от AURA: "${randomFact}". О чем еще поболтаем?`;
                    chat.appendChild(a);
                    ldr.style.display = 'none';
                    chat.scrollTop = chat.scrollHeight;
                }, 800);
            } catch (e) {
                const eM = document.createElement('div');
                eM.className = 'msg a-msg'; eM.textContent = "Сигнал стабилен, я на связи! Просто нажми еще раз.";
                chat.appendChild(eM);
                ldr.style.display = 'none';
            }
        }

        btn.onclick = ask;
        input.onkeypress = (e) => { if(e.key === 'Enter') { ask(); input.blur(); } };
    </script>
</body>
</html>
