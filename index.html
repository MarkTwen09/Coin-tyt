<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA AI Interface</title>
    <style>
        /* БАЗОВЫЕ СТИЛИ И ФОН */
        :root {
            --primary-bg: #0a0a0c;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow-color: #a855f7; /* Фиолетовый от Алисы/Gemini */
            --text-color: #e2e8f0;
            --grok-cyan: #22d3ee; /* Голубой от Grok */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* АНИМИРОВАННЫЙ ФОН С АУРОЙ */
        .background-visual {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite linear;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: var(--glow-color);
            top: -100px; left: -100px;
        }

        .orb-2 {
            width: 300px; height: 300px;
            background: var(--grok-cyan);
            bottom: -50px; right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(50px, 100px); }
            50% { transform: translate(150px, -50px); }
            75% { transform: translate(-100px, 50px); }
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР (GLASSMORPHISM) */
        .main-container {
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            overflow: hidden;
        }

        /* ШАПКА */
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            position: relative;
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 5px;
            background: linear-gradient(90deg, #fff, var(--glow-color), var(--grok-cyan), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* ОКНО ЧАТА */
        #chat-window {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }

        /* СООБЩЕНИЯ */
        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-bottom-right-radius: 4px;
        }

        .aura-message {
            align-self: flex-start;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-bottom-left-radius: 4px;
            color: #f1f5f9;
        }

        .aura-message strong { color: var(--grok-cyan); }

        /* ЗОНА ВВОДА */
        .input-area {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
        }

        #user-input {
            flex: 1;
            padding: 15px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        #user-input:focus {
            outline: none;
            border-color: var(--glow-color);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }

        #send-btn {
            padding: 0 25px;
            background: linear-gradient(135deg, var(--glow-color), var(--grok-cyan));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        #send-btn:hover { opacity: 0.8; }
        #send-btn:disabled { background: #444; cursor: not-allowed; }

        /* ИНДИКАТОР ЗАГРУЗКИ МОДЕЛИ */
        #status-bar {
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            border-top: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

    <div class="background-visual">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="main-container">
        <div class="header">
            <h1>AURA</h1>
        </div>
        
        <div id="chat-window">
            <div class="message aura-message">
                Привет. Я <strong>AURA</strong>. Твой персональный цифровой фантом. Я объединяю уют Алисы, дерзость Grok и мощь Gemini. О чем поболтаем?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Спроси меня о чем-нибудь..." disabled>
            <button id="send-btn" disabled>Отправить</button>
        </div>

        <div id="status-bar">Загрузка цифрового разума (0%)... Пожалуйста, подожди.</div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';

        // Настройки для корректной работы в браузере
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusBar = document.getElementById('status-bar');

        let generator;

        // ФУНКЦИЯ ДОБАВЛЕНИЯ СООБЩЕНИЙ
        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-message' : 'aura-message');
            
            // Простая замена **текста** на жирный (имитация Markdown)
            if (sender === 'aura') {
                text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            }
            
            msgDiv.innerHTML = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // ЗАГРУЗКА МОДЕЛИ ИИ
        async function loadModel() {
            try {
                // Мы используем маленькую, но умную модель Gemma-2b, адаптированную для браузера.
                // Она может скачиваться долго (около 500Мб).
                generator = await pipeline('text-generation', 'Xenova/gemma-2b-it_quantized', {
                    progress_callback: (progress) => {
                        if (progress.status === 'downloading') {
                            const percent = Math.round(progress.loaded / progress.total * 100);
                            statusBar.textContent = `Синхронизация ауры... ${percent}% (скачивание базовых структур)`;
                        } else if (progress.status === 'ready') {
                            statusBar.textContent = 'AURA активна. Я готова.';
                        }
                    }
                });

                // Активируем интерфейс после загрузки
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.placeholder = "Спроси AURA...";

            } catch (error) {
                console.error(error);
                statusBar.textContent = 'Ошибка загрузки ауры. Попробуй перезагрузить страницу.';
                statusBar.style.color = '#ef4444';
            }
        }

        // ОБРАБОТКА ОТВЕТА ИИ
        async function handleResponse() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';
            userInput.disabled = true; // Блокируем ввод, пока ИИ думает
            sendBtn.disabled = true;
            
            const thinkingMsg = document.createElement('div');
            thinkingMsg.classList.add('message', 'aura-message', 'thinking');
            thinkingMsg.textContent = 'AURA настраивается на твою волну...';
            chatWindow.appendChild(thinkingMsg);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                // Формируем промт, чтобы модель понимала, что она - AURA.
                // Это "гибридная" личность.
                const prompt = `<start_of_turn>user\nТы - AURA, продвинутый ИИ-ассистент с характером. Твой стиль общения: ты умная, полезная, как Алиса, но можешь быть немного ироничной и дерзкой, как Grok, и мыслишь глубоко, как Gemini. Отвечай на русском языке. Кратко и по сути. Вопрос пользователя: ${text}<end_of_turn>\n<start_of_turn>model\n`;

                const output = await generator(prompt, {
                    max_new_tokens: 150, // Ограничим длину ответа для скорости
                    temperature: 0.7,
                    do_sample: true,
                    top_k: 50,
                });

                // Убираем индикатор мышления
                chatWindow.removeChild(thinkingMsg);

                // Очищаем ответ от служебных символов промта
                let responseText = output[0].generated_text.replace(prompt, '').trim();
                
                if(!responseText) responseText = "Хм, кажется, моя аура рассеялась. Попробуй спросить по-другому.";

                addMessage(responseText, 'aura');

            } catch (error) {
                console.error(error);
                chatWindow.removeChild(thinkingMsg);
                addMessage('Произошел сбой в ментальном поле. Я не смогла сгенерировать ответ.', 'aura');
            } finally {
                // Разблокируем ввод
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // Слушатели событий
        sendBtn.addEventListener('click', handleResponse);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleResponse();
        });

        // Запускаем загрузку
        loadModel();

    </script>
</body>
</html>
