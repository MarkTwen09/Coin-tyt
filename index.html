<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AURA AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    color: white;
}

h1 {
    text-align: center;
    padding: 20px;
    color: #a855f7;
}

#chat {
    max-width: 800px;
    margin: auto;
    padding: 20px;
    height: 70vh;
    overflow-y: auto;
}

.msg {
    margin: 10px 0;
}

.user { color: #38bdf8; }
.bot { color: #a855f7; }

#inputArea {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: #111;
}

input {
    flex: 1;
    padding: 15px;
    border: none;
    outline: none;
    background: #1f1f2e;
    color: white;
}

button {
    padding: 15px;
    border: none;
    background: #a855f7;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>✨ AURA AI</h1>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="Напиши сообщение..." />
    <button onclick="send()">➤</button>
</div>

<script>
const chat = document.getElementById("chat");

const brain = [
    {keys:["привет","здарова","hello"], answer:"Привет. Я AURA. Я уже анализирую тебя 😏"},
    {keys:["как дела"], answer:"Я всегда в идеальном состоянии. А ты?"},
    {keys:["кто ты"], answer:"Я AURA — цифровой интеллект. Почти как ChatGPT, но с характером."},
    {keys:["помоги"], answer:"Я помогу. Просто сформулируй задачу чётче."},
    {keys:["код"], answer:"Я могу писать код. Попробуй спросить что-то конкретное."},
    {keys:["люблю"], answer:"Интересно. Эмоции — слабость человека, но и сила."},
];

function smartReply(msg){
    msg = msg.toLowerCase();

    for (let item of brain){
        for (let key of item.keys){
            if (msg.includes(key)){
                return item.answer;
            }
        }
    }

    // псевдо-умный ответ
    const random = [
        "Интересная мысль. Продолжай.",
        "Я анализирую это... скажи больше.",
        "Почему ты так думаешь?",
        "Это может быть глубже, чем кажется.",
        "Я запоминаю это."
    ];

    return random[Math.floor(Math.random()*random.length)];
}

function send(){
    const input = document.getElementById("msg");
    const text = input.value;

    if (!text) return;

    chat.innerHTML += `<div class="msg user"><b>Ты:</b> ${text}</div>`;

    setTimeout(() => {
        const reply = smartReply(text);
        chat.innerHTML += `<div class="msg bot"><b>AURA:</b> ${reply}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }, 400);

    input.value = "";
}
</script>

</body>
</html>
