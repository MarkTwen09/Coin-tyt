<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA SUPREME</title>
    <style>
        :root {
            --bg: #030303;
            --accent: #5e9bff;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #a0a0a0;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden; position: fixed;
        }

        /* АНИМИРОВАННЫЙ ФОН ПРЕМИУМ-КЛАССА */
        .bg-canvas {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 50% -10%, rgba(94, 155, 255, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.08) 0%, transparent 40%);
        }

        .app { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }

        /* МИНИМАЛИСТИЧНЫЙ ХЕДЕР */
        .header {
            padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-bottom: 0.5px solid var(--border);
        }
        .header h1 { font-size: 1.4rem; margin: 0; font-weight: 500; letter-spacing: 4px; color: #fff; }
        
        .controls { display: flex; gap: 15px; }
        .c-btn { background: none; border: none; color: var(--text-dim); font-size: 12px; font-weight: 500; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .c-btn:hover { color: #fff; }

        #chat {
            flex: 1; overflow-y: auto; padding: 30px;
            display: flex; flex-direction: column; gap: 35px;
            padding-bottom: 200px; -webkit-overflow-scrolling: touch;
        }

        /* СООБЩЕНИЯ В СТИЛЕ ЛЮКС */
        .m { max-width: 85%; font-size: 16px; line-height: 1.7; animation: slideIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } }

        .ai { align-self: flex-start; position: relative; padding-left: 0; color: #efefef; }
        .ai::before { content: '✦'; display: block; margin-bottom: 8px; color: var(--accent); font-size: 22px; }

        .user { 
            align-self: flex-end; background: var(--glass); 
            padding: 16px 24px; border-radius: 24px;
            border: 0.5px solid var(--border);
            backdrop-filter: blur(50px) saturate(180%); -webkit-backdrop-filter: blur(50px) saturate(180%);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        /* ФУТУРИСТИЧНЫЙ ВВОД */
        .input-wrapper {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 25px 25px calc(45px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }

        .glass-panel {
            max-width: 800px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.05); border: 0.5px solid var(--border);
            border-radius: 40px; padding: 10px 10px 10px 30px;
            display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(60px) brightness(1.1); -webkit-backdrop-filter: blur(60px) brightness(1.1);
        }

        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 17px; outline: none; }
        input::placeholder { color: rgba(255,255,255,0.25); }

        .send {
            width: 48px; height: 48px; border-radius: 24px;
            background: #fff; border: none; color: #000;
            font-size: 24px; cursor: pointer; transition: 0.3s;
        }
        .send:active { transform: scale(0.85); background: var(--accent); color: #fff; }
    </style>
</head>
<body>
    <div class="bg-canvas"></div>
    <div class="app">
        <div class="header">
            <h1>AURA</h1>
            <div class="controls">
                <button class="c-btn" onclick="save()">Save</button>
                <button class="c-btn" onclick="clearC()">Reset</button>
            </div>
        </div>
        <div id="chat">
            <div class="m ai">Система SUPREME запущена. Мой интеллект охватывает науку, жизнь, знаменитостей и задачи. Я готова к любому уровню сложности.</div>
        </div>
        <div class="input-wrapper">
            <div class="glass-panel">
                <input type="text" id="in" placeholder="Спроси о чем угодно..." autocomplete="off">
                <button id="go" class="send">↑</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat'), input = document.getElementById('in'), btn = document.getElementById('go');

        // МЕГА-БАЗА ЗНАНИЙ (Умная логика)
        const supremeLogic = {
            "учеб": "По учёбе я помогу с любым предметом. Что именно нужно разобрать: биологию Пасечника, русский или сложную задачу?",
            "задач": "Присылай условие! Я разложу её по действиям и объясню логику решения.",
            "кто так": "Я знаю многих знаменитостей — от блогеров и рэперов до ученых. О ком именно хочешь узнать?",
            "помоги": "Я рядом. Расскажи, что случилось, и мы вместе найдем лучшее решение для этой ситуации.",
            "жизн": "В жизни главное — баланс между твоими проектами (как BAZA SHOP) и отдыхом. Что тебя беспокоит?",
            "бравл": "В Бравле сейчас решают скилл и знание меты. Если хочешь поднять ранги, давай обсудим тактику за твоих мейнов.",
            "невинк": "В Невинномысске всегда есть место для крутых идей. Твой проект ЧП | Невинка — это уровень!",
            "айфон": "На твоём iPhone 17 Pro мой дизайн должен выглядеть максимально плавно. Это же флагман!",
            "дизайн": "Я убрала всё лишнее. Теперь это чистый Glassmorphism — стиль, который выглядит дорого и успешно.",
            "привет": ["Салют! Рада видеть тебя. Какой план на сегодня?", "Приветствую. Я в режиме максимальной производительности."],
            "дела": ["Мои нейроны работают идеально. Готова разносить любые вопросы!", "Всё отлично, создаю лучший контент вместе с тобой."],
            "кто ты": ["Я AURA — высшая ступень твоего персонального интеллекта.", "Твой напарник в коде, учебе и жизни."],
            "default": [
                "Это серьезный вопрос. Давай проанализируем его глубже?",
                "Интересно. С точки зрения логики, здесь лучше поступить так...",
                "Я поняла запрос. Вот что я думаю по этому поводу...",
                "Твой вайб — это успех. Эта идея определенно сработает!",
                "Расскажи больше подробностей, чтобы я могла выдать максимально точный ответ."
            ]
        };

        function ask() {
            const val = input.value.trim(); if(!val) return;
            add(val, 'user');
            input.value = '';
            
            setTimeout(() => {
                const low = val.toLowerCase();
                let reply = supremeLogic["default"][Math.floor(Math.random() * supremeLogic["default"].length)];
                
                for (let key in supremeLogic) {
                    if (low.includes(key) && key !== "default") {
                        reply = Array.isArray(supremeLogic[key]) ? supremeLogic[key][Math.floor(Math.random() * supremeLogic[key].length)] : supremeLogic[key];
                        break;
                    }
                }
                add(reply, 'ai');
            }, 600);
        }

        function add(t, type) {
            const d = document.createElement('div');
            d.className = `m ${type}`;
            d.innerHTML = t.replace(/\n/g, '<br>');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function clearC() { if(confirm("Reset chat?")) chat.innerHTML = '<div class="m ai">Память очищена. Я готова к новым вызовам.</div>'; }
        
        function save() {
            const history = Array.from(chat.children).map(m => (m.classList.contains('ai') ? 'AURA: ' : 'Я: ') + m.innerText).join('\n');
            const blob = new Blob([history], {type: 'text/plain'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'aura_supreme_log.txt'; a.click();
        }

        btn.onclick = ask;
        input.onkeypress = (e) => { if(e.key === 'Enter') { ask(); input.blur(); } };
    </script>
</body>
</html>
