<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --bg-deep: #000000;
            --sidebar: #0a0a0a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-deep);
            color: #ececec;
            height: 100vh;
            overflow: hidden;
        }

        /* Эффект Deep Obsidian */
        .obsidian-glass {
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
        }

        .chat-input-container {
            background: #0f0f0f;
            border: 1px solid var(--border);
            transition: border-color 0.2s ease;
        }

        .chat-input-container:focus-within {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .sidebar-item {
            transition: all 0.2s ease;
            border-radius: 8px;
            margin-bottom: 4px;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .sidebar-item.active {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
        }

        /* Математический блок */
        .math-result {
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid #fff;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-node { animation: fadeIn 0.3s ease-out forwards; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-[280px] bg-[#0a0a0a] border-r border-white/[0.05] flex flex-col hidden md:flex">
        <div class="p-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 bg-white rounded-sm flex items-center justify-center text-black font-bold text-xs">A</div>
                <span class="text-sm font-medium tracking-tight">Aura Intelligence</span>
            </div>
            <button onclick="createNewChat()" class="p-1.5 hover:bg-white/10 rounded-md transition">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v16m8-8H4"/></svg>
            </button>
        </div>

        <div id="chat-list" class="flex-1 overflow-y-auto px-3 mt-4">
            </div>

        <div class="p-5 border-t border-white/[0.05]">
            <div class="flex items-center gap-3 text-xs text-white/40">
                <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>
                <span>Engine 4.0 Stable</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[#000]">
        <header class="h-14 border-b border-white/[0.05] flex items-center justify-between px-6">
            <span class="text-xs font-medium text-white/40 uppercase tracking-widest">Model: Obsidian-X1</span>
            <div class="flex items-center gap-4">
                <button class="text-xs text-white/40 hover:text-white transition">Docs</button>
                <div class="w-7 h-7 bg-[#222] rounded-full flex items-center justify-center text-[10px] font-bold">KAO</div>
            </div>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto scroll-smooth">
            <div id="welcome" class="h-full flex flex-col items-center justify-center space-y-4 opacity-30">
                <div class="w-12 h-12 border border-white/20 rounded-xl flex items-center justify-center text-2xl font-light">∫</div>
                <p class="text-sm font-light tracking-wide">Aura Neural Link Connected.</p>
            </div>
        </div>

        <div class="p-6 md:p-10 bg-gradient-to-t from-black via-black/90 to-transparent">
            <div class="max-w-3xl mx-auto">
                <div class="chat-input-container rounded-xl p-4 flex flex-col gap-2">
                    <textarea id="user-input" 
                              rows="1"
                              oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                              onkeydown="if(event.key === 'Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"
                              placeholder="Запросить вычисление или задать вопрос..."
                              class="bg-transparent outline-none resize-none w-full text-[15px] placeholder:text-white/20"></textarea>
                    
                    <div class="flex items-center justify-between pt-2">
                        <div class="flex gap-2">
                            <button class="p-1.5 text-white/20 hover:text-white/60 transition">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12l-18 12 4.5-12-4.5-12z"/></svg>
                            </button>
                        </div>
                        <button onclick="sendMessage()" class="bg-white text-black px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-white/90 transition active:scale-95">
                            Отправить
                        </button>
                    </div>
                </div>
                <p class="text-[10px] text-white/10 text-center mt-4 tracking-widest uppercase">System: Quantum Logic Enabled</p>
            </div>
        </div>
    </main>

    <script>
        let chats = JSON.parse(localStorage.getItem('aura_obsidian_v1')) || [];
        let currentChatId = null;

        // Математическая логика
        const NeuralMath = {
            evaluate(input) {
                try {
                    // Регулярка для поиска математики (цифры, знаки, скобки, функции)
                    let mathPattern = /[0-9.+\-*/^()|sqrt|sin|cos|tan|pi|e ]+/g;
                    let match = input.match(mathPattern);
                    
                    if (!match) return null;
                    
                    let expr = match.join('').trim();
                    if (expr.length < 2) return null;

                    // Замена для JS Math
                    let prepared = expr.toLowerCase()
                        .replace(/sqrt/g, 'Math.sqrt')
                        .replace(/sin/g, 'Math.sin')
                        .replace(/cos/g, 'Math.cos')
                        .replace(/tan/g, 'Math.tan')
                        .replace(/pi/g, 'Math.PI')
                        .replace(/\^/g, '**');

                    let result = Function('"use strict"; return (' + prepared + ')')();
                    
                    if (isNaN(result) || result === Infinity) return null;
                    return { raw: expr, val: result.toLocaleString('ru-RU', {maximumFractionDigits: 5}) };
                } catch (e) { return null; }
            }
        };

        function save() {
            localStorage.setItem('aura_obsidian_v1', JSON.stringify(chats));
            renderChatList();
        }

        function createNewChat() {
            const id = Date.now();
            chats.unshift({ id, name: 'New Session', messages: [] });
            currentChatId = id;
            renderMessages();
            save();
        }

        function deleteChat(id, e) {
            e.stopPropagation();
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) currentChatId = chats.length > 0 ? chats[0].id : null;
            save();
            renderMessages();
        }

        function sendMessage() {
            const el = document.getElementById('user-input');
            const text = el.value.trim();
            if (!text) return;

            if (!currentChatId) createNewChat();

            const chat = chats.find(c => c.id === currentChatId);
            if (chat.messages.length === 0) chat.name = text.substring(0, 24);

            chat.messages.push({ role: 'user', content: text });
            renderMessages();
            el.value = '';
            el.style.height = '';

            setTimeout(() => {
                const math = NeuralMath.evaluate(text);
                let response = math 
                    ? `Обнаружена математическая структура. Результат вычисления:\n\n<div class="math-result">RESULT: ${math.val}<br><span class="text-[10px] opacity-30">ORIGIN: ${math.raw}</span></div>`
                    : `Запрос обработан в рамках лингвистической модели. Для решения уравнений используйте стандартную математическую запись.`;
                
                chat.messages.push({ role: 'aura', content: response });
                renderMessages();
                save();
            }, 600);
        }

        function renderMessages() {
            const box = document.getElementById('messages');
            const welcome = document.getElementById('welcome');
            const chat = chats.find(c => c.id === currentChatId);

            box.innerHTML = '';
            if (!chat || chat.messages.length === 0) {
                box.appendChild(welcome);
                return;
            }

            chat.messages.forEach(m => {
                const div = document.createElement('div');
                div.className = `p-6 md:px-20 msg-node ${m.role === 'aura' ? 'bg-white/[0.02]' : ''}`;
                
                div.innerHTML = `
                    <div class="max-w-3xl mx-auto flex gap-6">
                        <div class="w-6 h-6 rounded-sm bg-${m.role === 'user' ? '[#333]' : 'white'} flex-shrink-0 flex items-center justify-center text-${m.role === 'user' ? 'white/40' : 'black'} text-[10px] font-bold">
                            ${m.role === 'user' ? 'U' : 'A'}
                        </div>
                        <div class="text-[15px] leading-relaxed text-white/90">
                            ${m.content}
                        </div>
                    </div>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = chats.map(c => `
                <div onclick="currentChatId = ${c.id}; renderMessages(); renderChatList();" 
                     class="sidebar-item group flex items-center justify-between px-3 py-2.5 cursor-pointer text-[13px] ${c.id === currentChatId ? 'active' : 'text-white/40'}">
                    <span class="truncate">${c.name}</span>
                    <button onclick="deleteChat(${c.id}, event)" class="opacity-0 group-hover:opacity-100 p-1 hover:text-white transition">✕</button>
                </div>
            `).join('');
        }

        // Init
        if (chats.length > 0) {
            currentChatId = chats[0].id;
            renderChatList();
            renderMessages();
        }
    </script>
</body>
</html>
