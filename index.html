<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Stars — Купить Telegram Stars</title>
    <style>
        :root {
            --main-bg: #f5f7fa;
            --card-bg: #ffffff;
            --accent-blue: #87cefa;
            --text-dark: #333;
            --input-bg: #f9f9f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--main-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 22px;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        input, select {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border-radius: 18px;
            border: 1px solid #eee;
            background: var(--input-bg);
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        .icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        /* Ползунок */
        .slider-container {
            margin: 25px 0;
            text-align: center;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 5px;
            padding: 0;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        .buy-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .buy-btn:hover {
            background-color: #70bce8;
        }

        .buy-btn:active {
            transform: scale(0.98);
        }

        .footer-logo {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            color: var(--text-dark);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="footer-logo">🌙 MOON STARS</div>
    <br>
    <h1>Купить Telegram Stars</h1>
    <p>Пополните баланс Stars себе или друзьям через наш сервис.</p>

    <div class="input-group">
        <span class="icon">@</span>
        <input type="text" id="username" placeholder="Введите Telegram username">
    </div>

    <div class="input-group">
        <span class="icon">💳</span>
        <select>
            <option>RUB (СБП)</option>
            <option>TON</option>
            <option>Звезды (Обмен)</option>
        </select>
    </div>

    <div class="input-group">
        <span class="icon">⭐</span>
        <input type="number" id="starsAmount" placeholder="Количество (100 - 25000)" min="100" max="25000">
    </div>

    <div class="slider-container">
        <input type="range" id="starsSlider" min="100" max="5000" step="50" value="100">
    </div>

    <button class="buy-btn" onclick="redirectToTG()">Купить Stars</button>
</div>

<script>
    const slider = document.getElementById('starsSlider');
    const input = document.getElementById('starsAmount');
    
    // Твой аккаунт для связи
    const myTelegram = "ТВОЙ_ЮЗЕРНЕЙМ"; 

    // Синхронизация слайдера и поля ввода
    slider.oninput = function() {
        input.value = this.value;
    }
    input.oninput = function() {
        slider.value = this.value;
    }

    function redirectToTG() {
        const user = document.getElementById('username').value;
        const amount = document.getElementById('starsAmount').value;

        if(!user || !amount) {
            alert("Пожалуйста, заполните все поля");
            return;
        }

        // Формируем текст сообщения
        const message = `Привет! Я хочу купить ${amount} звёзд для аккаунта @${user.replace('@', '')}.`;
        const encodedMessage = encodeURIComponent(message);
        
        // Перенаправление в Telegram
        window.location.href = `https://t.me/${myTelegram}?text=${encodedMessage}`;
    }
</script>

</body>
</html>
