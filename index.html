<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA MOBILE</title>
    <style>
        :root {
            --bg: #08080a;
            --aura-purp: #a855f7;
            --aura-blue: #22d3ee;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; position: fixed; width: 100%;
        }

        /* СОЧНЫЙ ФОН */
        .visuals {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 20% 30%, #1e1b4b 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #312e81 0%, transparent 40%);
        }

        .glow-orb {
            position: absolute; width: 300px; height: 300px;
            background: var(--aura-purp); filter: blur(100px); opacity: 0.2;
            animation: move 10s infinite alternate ease-in-out;
        }

        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(50%, 50%); } }

        /* ИНТЕРФЕЙС ПОД IPHONE */
        .app {
            display: flex; flex-direction: column; height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .header { padding: 20px; text-align: center; }
        .header h1 {
            font-size: 2.2rem; letter-spacing: 8px; margin: 0;
            background: linear-gradient(90deg, #fff, var(--aura-purp), var(--aura-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        #chat {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            padding: 14px 18px; border-radius: 20px; max-width: 80%;
            font-size: 16px; line-height: 1.4; border: 1px solid var(--border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            animation: pop 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        @keyframes pop { from { opacity: 0; transform: scale(0.95); } }

        .aura { background: rgba(168, 85, 247, 0.15); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: var(--glass); align-self: flex-end; border-color: var(--aura-blue); border-bottom-right-radius: 4px; }

        /* ЗОНА ВВОДА ПОД ПАЛЕЦ */
        .controls {
            padding: 15px 20px; display: flex; gap: 12px;
            background: rgba(0,0,0,0.6); border-top: 1px solid var(--border);
            align-items: center;
        }

        input {
            flex: 1; background: rgba(255,255,255,0.08); border: 1px solid var(--border);
            border-radius: 25px; padding: 14px 20px; color: #fff; font-size: 17px;
            outline: none; -webkit-appearance: none;
        }

        button {
            width: 50px; height: 50px; border-radius: 25px;
            background: var(--aura-purp); border: none; color: white;
            font-size: 20px; box-shadow: 0 0 15px var(--aura-purp);
            display: flex; align-items: center; justify-content: center;
        }

        .typing { font-size: 13px; color: var(--aura-blue); padding-left: 20px; display: none; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="visuals"><div class="glow-orb"></div></div>
    
    <div class="app">
        <div class="header"><h1>AURA</h1></div>
        
        <div id="chat">
            <div class="msg aura">Бро, <b>AURA</b> готова. Теперь я полностью оптимизирована под твой Айфон. Проверяй, как летает!</div>
        </div>

        <div id="loading" class="typing">AURA настраивает нейроны...</div>

        <div class="controls">
            <input type="text" id="input" placeholder="Спроси что угодно..." autocomplete="off">
            <button id="btn">➜</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const btn = document.getElementById('btn');
        const loading = document.getElementById('loading');

        async function talk() {
            const val = input.value.trim();
            if(!val) return;

            const uM = document.createElement('div');
            uM.className = 'msg user';
            uM.textContent = val;
            chat.appendChild(uM);
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            loading.style.display = 'block';

            try {
                // Стабильный шлюз через Hugging Face (модель Mistral-7B)
                const response = await fetch('https://api-inference.huggingface.co/models/Mistralai/Mistral-7B-Instruct-v0.2', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        inputs: `[INST] Ты - нейросеть AURA. Отвечай на русском языке, коротко и круто. Вопрос: ${val} [/INST]`,
                        parameters: { max_new_tokens: 250, temperature: 0.7 }
                    })
                });

                const data = await response.json();
                let reply = data[0].generated_text.split('[/INST]')[1] || "Я задумалась. Давай еще раз?";

                const aM = document.createElement('div');
                aM.className = 'msg aura';
                aM.innerHTML = reply.trim();
                chat.appendChild(aM);

            } catch (e) {
                const err = document.createElement('div');
                err.className = 'msg aura';
                err.textContent = "Сервер занят. Подожди 5 секунд и попробуй снова!";
                chat.appendChild(err);
            } finally {
                loading.style.display = 'none';
                chat.scrollTop = chat.scrollHeight;
            }
        }

        btn.onclick = talk;
        input.onkeypress = (e) => { if(e.key === 'Enter') { talk(); input.blur(); } };
    </script>
</body>
</html>
