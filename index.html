<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Stars — Premium Digital Assets</title>
    <style>
        :root {
            --bg-dark: #0a0c10;
            --card-bg: rgba(20, 24, 33, 0.9);
            --accent-gold: #c5a059;
            --accent-blue: #0088cc;
            --accent-sber: #21a038;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.05);
        }

        /* АНИМАЦИЯ ПРИ ЗАХОДЕ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal { opacity: 0; animation: fadeInUp 0.8s ease forwards; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* УВЕДОМЛЕНИЯ ПОКУПОК */
        #notification-toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(20, 24, 33, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid var(--accent-gold);
            padding: 12px 20px;
            border-radius: 100px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            z-index: 2000;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #notification-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-star { color: var(--accent-gold); }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(197, 160, 89, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 100% 100%, rgba(0, 136, 204, 0.05) 0%, transparent 30%);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-main); padding: 20px 0; overflow-x: hidden;
        }

        .header-logo { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }
        .logo span { color: var(--accent-gold); }

        /* РУЛЕТКА */
        .slider-wrapper { width: 100%; overflow: hidden; margin-bottom: 25px; position: relative; }
        .services-slider { display: flex; gap: 15px; padding: 0 20px; overflow-x: auto; scrollbar-width: none; }
        .services-slider::-webkit-scrollbar { display: none; }
        .service-card { min-width: 85%; height: 150px; border-radius: 28px; padding: 24px; position: relative; display: flex; flex-direction: column; justify-content: flex-end; text-decoration: none; color: white; flex-shrink: 0; }
        .vpn-card { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .shop-card { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .card-tag { position: absolute; top: 24px; left: 24px; font-size: 10px; font-weight: 800; text-transform: uppercase; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 10px; }
        .card-title { font-size: 20px; font-weight: 800; }
        .card-arrow { position: absolute; top: 24px; right: 24px; font-size: 20px; opacity: 0.7; }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-container { width: 90%; max-width: 380px; background: var(--card-bg); backdrop-filter: blur(25px); border-radius: 32px; padding: 28px; border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(0,0,0,0.8); text-align: center; margin-bottom: 24px; }
        .tabs-container { position: relative; display: flex; background: rgba(0, 0, 0, 0.4); padding: 4px; border-radius: 16px; margin-bottom: 28px; }
        .tab-slider { position: absolute; top: 4px; left: 4px; height: calc(100% - 8px); width: calc(50% - 4px); background: rgba(255, 255, 255, 0.05); border-radius: 12px; transition: 0.3s; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--text-dim); font-weight: 700; font-size: 11px; text-transform: uppercase; cursor: pointer; position: relative; z-index: 2; }
        .tab-btn.active { color: var(--text-main); }

        .tg-input { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 16px; padding: 16px 16px 16px 44px; color: white; outline: none; }
        .price-display { padding: 24px; background: rgba(255,255,255,0.02); border-radius: 24px; margin: 24px 0; border: 1px solid var(--border); }
        .val-main { font-size: 28px; font-weight: 800; }
        .val-sub { font-size: 14px; color: var(--accent-gold); font-weight: 600; }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 32px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #fff; border-radius: 50%; border: 5px solid var(--bg-dark); }

        .buy-btn { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 18px; font-size: 13px; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        .faq-section { width: 90%; max-width: 380px; margin-bottom: 30px; }
        .faq-item { background: rgba(255, 255, 255, 0.02); border-radius: 16px; margin-bottom: 8px; border: 1px solid var(--border); overflow: hidden; }
        .faq-question { padding: 16px; width: 100%; text-align: left; background: none; border: none; color: var(--text-main); font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .faq-answer { padding: 0 16px; max-height: 0; overflow: hidden; transition: 0.3s; color: var(--text-dim); font-size: 12px; }
        .faq-item.active .faq-answer { padding: 0 16px 16px 16px; max-height: 100px; }

        .ref-card { width: 90%; max-width: 380px; background: linear-gradient(135deg, rgba(197, 160, 89, 0.1) 0%, rgba(0, 136, 204, 0.05) 100%); border-radius: 28px; padding: 24px; border: 1px solid rgba(197, 160, 89, 0.15); text-align: center; }
        .ref-btn { display: block; width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.2); border-radius: 14px; color: #fff; font-size: 12px; font-weight: 600; text-decoration: none; margin-top: 10px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(20px); }
        .payment-card { width: 92%; max-width: 350px; background: #12141a; border-radius: 35px; padding: 30px 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .card-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(33, 160, 56, 0.4); border-radius: 20px; padding: 20px; cursor: pointer; }
        .card-num { font-family: monospace; font-size: 18px; font-weight: 700; color: #fff; }
        .done-btn { width: 100%; padding: 18px; background: var(--accent-sber); color: #fff; border: none; border-radius: 20px; font-size: 14px; font-weight: 800; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

<!-- ТОСТ УВЕДОМЛЕНИЙ -->
<div id="notification-toast">
    <span class="toast-star">✦</span> <span id="toast-text"></span>
</div>

<div class="header-logo reveal delay-1">
    <div class="logo">MOON<span>STARS</span></div>
</div>

<div class="slider-wrapper reveal delay-2">
    <div class="services-slider" id="serv-slider">
        <a href="https://t.me/Tgeshka_vpn" class="service-card vpn-card" target="_blank">
            <span class="card-arrow">↗</span>
            <div class="card-tag">Безопасность</div>
            <div class="card-title">Tgeshka VPN</div>
        </a>
        <a href="https://marktwen09.github.io/Coin-tyt/" class="service-card shop-card" target="_blank">
            <span class="card-arrow">↗</span>
            <div class="card-tag">Маркетплейс</div>
            <div class="card-title">Moon Shop</div>
        </a>
    </div>
</div>

<div class="main-container reveal delay-3">
    <div class="tabs-container">
        <div class="tab-slider" id="slider-bg"></div>
        <button class="tab-btn active" onclick="setMode('stars', 0)">Stars</button>
        <button class="tab-btn" onclick="setMode('premium', 100)">Premium</button>
    </div>

    <div style="position: relative; text-align: left;">
        <label style="font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block;">Telegram Username</label>
        <div id="input-box" style="position: relative;">
            <span style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--accent-gold);">@</span>
            <input type="text" id="username" class="tg-input" placeholder="Введите ник" oninput="handleInput(this)">
        </div>
        <div id="profile-box" style="display:none; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.03); border:1px solid var(--border); padding:12px 16px; border-radius:18px;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div id="p-avatar" style="width:36px; height:36px; background:var(--accent-gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; color:#000;">?</div>
                <div id="p-name" style="font-weight:600;"></div>
            </div>
            <button onclick="resetUser()" style="background:none; border:none; color:var(--text-dim); font-size:20px;">×</button>
        </div>
    </div>

    <div class="price-display">
        <div class="val-main" id="display-val">100 STARS</div>
        <div class="val-sub" id="display-price">170 ₽</div>
    </div>

    <input type="range" id="slider" min="0" max="5" step="1" value="0" oninput="update()">
    <button class="buy-btn" onclick="checkout()">Оформить заказ</button>
</div>

<div class="faq-section reveal delay-4">
    <div class="faq-item">
        <button class="faq-question" onclick="toggleFaq(this)">Сроки доставки? <span>+</span></button>
        <div class="faq-answer">От 5 до 15 минут.</div>
    </div>
</div>

<div class="ref-card reveal delay-4">
    <div style="font-weight: 800; font-size: 14px;">Партнерка</div>
    <div class="ref-btn" onclick="copyRef()">Скопировать ссылку</div>
</div>

<div class="modal-overlay" id="modal">
    <div class="payment-card">
        <div class="card-box" onclick="copyCard()">
            <div class="card-num">2202 2088 9003 9648</div>
            <div style="font-size: 9px; color: var(--accent-sber); margin-top: 8px;">КОПИРОВАТЬ</div>
        </div>
        <button class="done-btn" onclick="done()">Я оплатил</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="background:none; border:none; color:var(--text-dim); margin-top:20px;">Отмена</button>
    </div>
</div>

<script>
    let mode = 'stars';
    let confirmedUser = "";
    const data = {
        stars: [{t:"100 STARS", p:170}, {t:"150 STARS", p:240}, {t:"250 STARS", p:445}, {t:"500 STARS", p:830}, {t:"1000 STARS", p:1540}, {t:"2500 STARS", p:3700}],
        premium: [{t:"3 МЕСЯЦА", p:1200}, {t:"6 МЕСЯЦЕВ", p:1550}, {t:"12 МЕСЯЦЕВ", p:2750}]
    };

    const reviews = [
        "@shelolkx купил(а) 100⭐️",
        "@Twwwwerk купил(а) 100⭐️",
        "@kseniawwwwaqw купил(а) 150⭐️",
        "@ablps купил(а) 150⭐️",
        "@rusik_14456 купил(а) 150⭐️",
        "@sanyatuttam купил(а) 250⭐️",
        "Клиент купил(а) премиум 6 месяцев",
        "@Asabiii0007 купил(а) премиум 12 месяцев"
    ];

    function showReview() {
        const toast = document.getElementById('notification-toast');
        const text = document.getElementById('toast-text');
        const randomReview = reviews[Math.floor(Math.random() * reviews.length)];
        
        text.innerText = randomReview;
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }

    // Запуск отзывов каждые 20 секунд (чтобы чаще мелькали, но не бесили)
    setInterval(showReview, 20000);
    setTimeout(showReview, 5000); // Первый показ через 5 сек

    // РУЛЕТКА
    const servSlider = document.getElementById('serv-slider');
    let scrollPos = 0;
    setInterval(() => {
        scrollPos += 0.8;
        if (scrollPos >= servSlider.scrollWidth - servSlider.clientWidth) scrollPos = 0;
        servSlider.scrollLeft = scrollPos;
    }, 30);

    function toggleFaq(btn) {
        btn.parentElement.classList.toggle('active');
        btn.querySelector('span').innerText = btn.parentElement.classList.contains('active') ? '−' : '+';
    }

    function handleInput(input) {
        let val = input.value.trim().replace('@', '');
        if (val.length > 3) {
            setTimeout(() => {
                if(input.value.length > 3) {
                    confirmedUser = val;
                    document.getElementById('input-box').style.display = 'none';
                    document.getElementById('profile-box').style.display = 'flex';
                    document.getElementById('p-name').innerText = val;
                    document.getElementById('p-avatar').innerText = val.charAt(0).toUpperCase();
                }
            }, 800);
        }
    }

    function resetUser() {
        confirmedUser = "";
        document.getElementById('username').value = "";
        document.getElementById('input-box').style.display = 'block';
        document.getElementById('profile-box').style.display = 'none';
    }

    function update() {
        const val = document.getElementById('slider').value;
        document.getElementById('display-val').innerText = data[mode][val].t;
        document.getElementById('display-price').innerText = data[mode][val].p + " ₽";
    }

    function setMode(m, pos) {
        mode = m;
        document.getElementById('slider-bg').style.transform = `translateX(${pos}%)`;
        document.getElementById('slider').max = mode === 'stars' ? 5 : 2;
        document.getElementById('slider').value = 0;
        update();
    }

    function copyCard() {
        navigator.clipboard.writeText("2202208890039648");
    }

    function checkout() {
        if(!confirmedUser) return alert("Введите ник");
        document.getElementById('modal').style.display = 'flex';
    }

    function done() {
        const item = data[mode][document.getElementById('slider').value];
        const text = `Заказ: ${item.t} | @${confirmedUser}`;
        window.location.href = `https://t.me/kaoface?text=${encodeURIComponent(text)}`;
    }
</script>

</body>
</html>
