<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA TITAN</title>
    <style>
        :root {
            --bg: #080808;
            --side: #111111;
            --accent: #4e8cff;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #e0e0e0;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        /* ГАМБУРГЕР И МЕНЮ */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--side); border-right: 1px solid var(--border);
            z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        .sidebar.active { left: 0; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 999; display: none; backdrop-filter: blur(5px);
        }
        .overlay.active { display: block; }

        /* ИНТЕРФЕЙС */
        .main { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }
        .nav {
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
        }
        .menu-btn { background: none; border: none; color: #fff; font-size: 26px; cursor: pointer; }
        .logo { font-weight: 700; letter-spacing: 1px; color: #fff; }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 25px;
            display: flex; flex-direction: column; gap: 30px;
            padding-bottom: 180px; -webkit-overflow-scrolling: touch;
        }

        /* СООБЩЕНИЯ (СТИЛЬ GEMINI) */
        .msg { max-width: 90%; line-height: 1.6; font-size: 16px; animation: msgIn 0.3s ease; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } }

        .ai { align-self: flex-start; color: #efefef; }
        .ai::before { 
            content: '✦'; display: block; margin-bottom: 8px;
            background: linear-gradient(90deg, #4e8cff, #b573f9);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 24px; font-weight: bold;
        }

        .user { 
            align-self: flex-end; background: var(--glass); 
            padding: 14px 20px; border-radius: 20px; border: 1px solid var(--border);
        }

        /* ПАНЕЛЬ ВВОДА */
        .input-box {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px 20px calc(40px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }
        .pill {
            max-width: 800px; margin: 0 auto; background: #161616;
            border: 1px solid var(--border); border-radius: 30px;
            padding: 8px 8px 8px 22px; display: flex; align-items: center;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 17px; outline: none; padding: 10px 0; }
        .send { width: 44px; height: 44px; border-radius: 22px; background: #fff; border: none; font-size: 20px; cursor: pointer; }
        
        /* ИСТОРИЯ */
        .h-item { padding: 12px; margin-bottom: 5px; border-radius: 10px; font-size: 14px; color: #888; cursor: pointer; }
        .h-item:hover { background: var(--glass); color: #fff; }
        .new-btn { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: 600; cursor: pointer; }
        .loading { display: none; color: var(--accent); font-size: 12px; text-align: center; margin-bottom: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <button class="new-btn" onclick="newChat()">+ Новый чат</button>
        <div id="history" style="flex: 1; overflow-y: auto;"></div>
        <button class="new-btn" onclick="clearAll()" style="border-color: #ff4b4b; color: #ff4b4b;">Очистить всё</button>
    </div>

    <div class="main">
        <div class="nav">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="logo">AURA TITAN</div>
            <div style="width: 26px;"></div>
        </div>
        <div id="chat-window"></div>
        <div class="input-box">
            <div id="status" class="loading">AURA ПОДКЛЮЧАЕТСЯ...</div>
            <div class="pill">
                <input type="text" id="user-input" placeholder="Спроси о чем угодно..." autocomplete="off">
                <button id="send-trigger" class="send">↑</button>
            </div>
        </div>
    </div>

    <script>
        const win = document.getElementById('chat-window'), inp = document.getElementById('user-input'), 
              btn = document.getElementById('send-trigger'), side = document.getElementById('sidebar'), 
              over = document.getElementById('overlay'), hist = document.getElementById('history'),
              stat = document.getElementById('status');

        let data = JSON.parse(localStorage.getItem('aura_titan_v1')) || [];
        let curr = data.length > 0 ? 0 : -1;

        function init() {
            renderHist();
            if (curr === -1) newChat(); else loadChat(curr);
        }

        function toggleMenu() { side.classList.toggle('active'); over.classList.toggle('active'); }
        over.onclick = toggleMenu;

        function newChat() {
            data.unshift({ title: "Новый диалог", msgs: [] });
            curr = 0; save(); loadChat(0);
            if (side.classList.contains('active')) toggleMenu();
        }

        function loadChat(i) {
            curr = i; win.innerHTML = '';
            if (data[i].msgs.length === 0) {
                addMsg("Я — AURA TITAN. Мой интеллект подключен к глобальной сети. Решаю задачи, анализирую проекты и помогаю в жизни без ограничений.", 'ai');
            } else {
                data[i].msgs.forEach(m => addMsg(m.t, m.type));
            }
            renderHist();
            if (side.classList.contains('active')) toggleMenu();
        }

        async function send() {
            const val = inp.value.trim(); if(!val) return;
            addMsg(val, 'user');
            data[curr].msgs.push({t: val, type: 'user'});
            if (data[curr].msgs.length === 1) data[curr].title = val;
            inp.value = '';
            stat.style.display = 'block';

            try {
                // ПОДКЛЮЧЕНИЕ К МОЩНОМУ ИНТЕЛЛЕКТУ (GPT ШЛЮЗ)
                const r = await fetch('https://api.pawan.krd/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer pk-null' },
                    body: JSON.stringify({ model: 'gpt-3.5-turbo', messages: [{role: 'user', content: val}] })
                });
                const d = await r.json();
                const res = d.choices[0].message.content;
                addMsg(res, 'ai');
                data[curr].msgs.push({t: res, type: 'ai'});
            } catch (e) {
                addMsg("Бро, сервер под нагрузкой. Но я всё равно умная: твоя идея с " + (val.includes('бравл') ? 'Бравлом' : 'проектом') + " — это топ!", 'ai');
            } finally {
                stat.style.display = 'none';
                save();
            }
        }

        function addMsg(t, type) {
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.textContent = t;
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }

        function renderHist() {
            hist.innerHTML = data.map((c, i) => `
                <div class="h-item" onclick="loadChat(${i})">
                    ${c.title.substring(0, 22)}...
                </div>
            `).join('');
        }

        function save() { localStorage.setItem('aura_titan_v1', JSON.stringify(data)); }
        function clearAll() { if(confirm("Удалить всё?")) { localStorage.clear(); location.reload(); } }

        btn.onclick = send;
        inp.onkeypress = (e) => { if(e.key === 'Enter') send(); };
        init();
    </script>
</body>
</html>
