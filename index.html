<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHETTO PRIVATE | NEXT GEN</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg: #000;
            --surface: #111;
            --accent: #ffdd2d; /* Золото Тинькофф */
            --text: #fff;
            --secondary: #8e8e93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; }
        
        #app { width: 100%; max-width: 430px; min-height: 100vh; padding: 25px 16px; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .user-tag { background: var(--surface); border: 1px solid #222; padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: 600; }

        /* КАРТА */
        .card { 
            background: linear-gradient(145deg, #1a1a1a, #000); 
            border: 1px solid #333; border-radius: 24px; padding: 30px; margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .balance { font-size: 42px; font-weight: 800; letter-spacing: -1.5px; margin: 10px 0; }
        
        /* ДЕЙСТВИЯ */
        .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 35px; }
        .act-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .act-icon { width: 58px; height: 58px; background: var(--surface); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: 0.1s; border: 1px solid #222; }
        .act-item:active .act-icon { transform: scale(0.92); background: #222; }
        .act-text { font-size: 11px; color: var(--secondary); font-weight: 500; }

        /* ПЕРЕВОДЫ */
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 15px; }
        .input-box { background: var(--surface); border: 1px solid #222; border-radius: 16px; padding: 18px; margin-bottom: 15px; }
        input { background: none; border: none; color: #fff; width: 100%; font-size: 16px; outline: none; }
        
        .send-btn { background: var(--accent); color: #000; border: none; width: 100%; padding: 20px; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .send-btn:active { opacity: 0.8; }

        /* ИСТОРИЯ */
        .history { margin-top: 30px; }
        .h-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #111; }
        .h-name { font-weight: 600; font-size: 15px; }
        .h-sub { font-size: 12px; color: var(--secondary); }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div id="my-name" style="font-weight: 800; font-size: 22px;">GHETTO</div>
        <div class="user-tag" id="my-id">ID: LOADING...</div>
    </div>

    <div class="card">
        <div style="color: var(--secondary); font-size: 13px; font-weight: 600;">Доступно средств</div>
        <div class="balance" id="balance">0 ₽</div>
        <div style="margin-top: 35px; display: flex; justify-content: space-between; font-family: monospace; color: #444;">
            <span>•••• 7789</span>
            <span style="color: var(--accent); font-weight: 900; font-style: italic;">PREMIUM</span>
        </div>
    </div>

    <div class="actions">
        <div class="act-item" onclick="topUp()"><div class="act-icon" style="background:var(--accent); color:#000">+</div><div class="act-text">Пополнить</div></div>
        <div class="act-item"><div class="act-icon">🧾</div><div class="act-text">Счета</div></div>
        <div class="act-item"><div class="act-icon">📊</div><div class="act-text">Лимиты</div></div>
        <div class="act-item" onclick="logout()"><div class="act-icon">🚪</div><div class="act-text">Выйти</div></div>
    </div>

    <div class="section-title">Мгновенный перевод</div>
    <div class="input-box">
        <input type="text" id="target-id" placeholder="ID получателя (напр. GH-1234)">
    </div>
    <div class="input-box">
        <input type="number" id="amount" placeholder="Сумма перевода">
    </div>
    <button class="send-btn" onclick="sendMoney()">Подтвердить перевод</button>

    <div class="history" id="history">
        <div class="section-title">История операций</div>
    </div>
</div>

<script>
    // КОНФИГУРАЦИЯ БАЗЫ (Публичная для тестов)
    const firebaseConfig = {
        databaseURL: "https://ghetto-bank-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myProfile = JSON.parse(localStorage.getItem('g_user'));
    
    // Регистрация если нет профиля
    if (!myProfile) {
        let name = prompt("Добро пожаловать в Private Banking. Введите ваше имя:");
        let id = "GH-" + Math.floor(Math.random() * 8999 + 1000);
        myProfile = { name, id, balance: 100000 };
        localStorage.setItem('g_user', JSON.stringify(myProfile));
        db.ref('users/' + id).set(myProfile);
    }

    // Следим за своим балансом в реальном времени!
    db.ref('users/' + myProfile.id).on('value', (snap) => {
        const data = snap.val();
        if (data) {
            document.getElementById('balance').innerText = data.balance.toLocaleString() + ' ₽';
            document.getElementById('my-id').innerText = 'ID: ' + data.id;
            document.getElementById('my-name').innerText = data.name.toUpperCase();
            myProfile.balance = data.balance;
        }
    });

    // ФУНКЦИЯ ПЕРЕВОДА (ОБЩАЯ БАЗА)
    async function sendMoney() {
        const targetId = document.getElementById('target-id').value.trim();
        const amount = parseFloat(document.getElementById('amount').value);

        if (!targetId || isNaN(amount) || amount <= 0) return alert("Введите данные!");
        if (amount > myProfile.balance) return alert("Недостаточно средств!");
        if (targetId === myProfile.id) return alert("Нельзя переводить самому себе!");

        const targetRef = db.ref('users/' + targetId);
        const snap = await targetRef.once('value');
        const targetData = snap.val();

        if (!targetData) return alert("Пользователь с таким ID не найден!");

        // ПРОВОДИМ ТРАНЗАКЦИЮ В ОБЛАКЕ
        try {
            await db.ref('users/' + myProfile.id).update({ balance: myProfile.balance - amount });
            await targetRef.update({ balance: targetData.balance + amount });
            
            // Логируем
            addHistory(`Перевод: ${targetData.name}`, amount, false);
            alert(`Успешно переведено ${amount} ₽ пользователю ${targetData.name}`);
            document.getElementById('amount').value = '';
            document.getElementById('target-id').value = '';
        } catch (e) {
            alert("Ошибка сети!");
        }
    }

    function topUp() {
        let a = prompt("Сумма пополнения (симуляция кэша):");
        if (a) db.ref('users/' + myProfile.id).update({ balance: myProfile.balance + parseFloat(a) });
    }

    function addHistory(name, amt, plus) {
        const h = document.getElementById('history');
        const i = document.createElement('div');
        i.className = 'h-item';
        i.innerHTML = `<div><div class="h-name">${name}</div><div class="h-sub">${new Date().toLocaleTimeString()}</div></div>
                       <div style="font-weight:700; color:${plus?'#34c759':'#fff'}">${plus?'+':'-'} ${amt.toLocaleString()} ₽</div>`;
        h.insertBefore(i, h.children[1]);
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>

</body>
</html>
