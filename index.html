<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Stars — Premium Digital Assets</title>
    <style>
        :root {
            --bg-dark: #0a0c10;
            --card-bg: rgba(20, 24, 33, 0.9);
            --accent-gold: #c5a059;
            --accent-blue: #0088cc;
            --accent-sber: #21a038;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.05);
        }

        /* АНИМАЦИЯ ЗАХОДА */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reveal {
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(197, 160, 89, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 100% 100%, rgba(0, 136, 204, 0.05) 0%, transparent 30%);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-main); padding: 20px 0; overflow-x: hidden;
        }

        /* ИНДИКАТОР СТАТУСА */
        .status-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(33, 160, 56, 0.1);
            border: 1px solid rgba(33, 160, 56, 0.3);
            padding: 6px 12px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #21a038;
            border-radius: 50%;
            box-shadow: 0 0 10px #21a038;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .status-text {
            font-size: 10px;
            font-weight: 700;
            color: #21a038;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header-logo { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }
        .logo span { color: var(--accent-gold); }

        /* СЛАЙДЕР (РУЛЕТКА) */
        .slider-wrapper { width: 100%; overflow: hidden; margin-bottom: 25px; position: relative; }
        .services-slider { display: flex; gap: 15px; padding: 0 20px; scroll-behavior: smooth; overflow-x: auto; scrollbar-width: none; }
        .services-slider::-webkit-scrollbar { display: none; }
        .service-card { min-width: 85%; height: 150px; border-radius: 28px; padding: 24px; position: relative; display: flex; flex-direction: column; justify-content: flex-end; text-decoration: none; color: white; flex-shrink: 0; }
        .vpn-card { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .shop-card { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .card-tag { position: absolute; top: 24px; left: 24px; font-size: 10px; font-weight: 800; text-transform: uppercase; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 10px; }
        .card-title { font-size: 20px; font-weight: 800; }
        .card-desc { font-size: 12px; opacity: 0.9; margin-top: 4px; }
        .card-arrow { position: absolute; top: 24px; right: 24px; font-size: 20px; opacity: 0.7; }

        /* КОНТЕЙНЕР */
        .main-container { width: 90%; max-width: 380px; background: var(--card-bg); backdrop-filter: blur(25px); border-radius: 32px; padding: 28px; border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(0,0,0,0.8); text-align: center; margin-bottom: 24px; }
        .tabs-container { position: relative; display: flex; background: rgba(0, 0, 0, 0.4); padding: 4px; border-radius: 16px; margin-bottom: 28px; }
        .tab-slider { position: absolute; top: 4px; left: 4px; height: calc(100% - 8px); width: calc(50% - 4px); background: rgba(255, 255, 255, 0.05); border-radius: 12px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--text-dim); font-weight: 700; font-size: 11px; text-transform: uppercase; cursor: pointer; position: relative; z-index: 2; }
        .tab-btn.active { color: var(--text-main); }

        #profile-box { display: none; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); padding: 12px 16px; border-radius: 18px; margin-top: 10px; }
        .profile-avatar { width: 36px; height: 36px; background: var(--accent-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #000; }
        .tg-input { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 16px; padding: 16px 16px 16px 44px; color: white; outline: none; }
        .at-sign { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--accent-gold); }

        .price-display { padding: 24px; background: rgba(255,255,255,0.02); border-radius: 24px; border: 1px solid var(--border); margin: 24px 0; }
        .val-main { font-size: 28px; font-weight: 800; }
        .val-sub { font-size: 14px; color: var(--accent-gold); font-weight: 600; }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 32px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #fff; border-radius: 50%; border: 5px solid var(--bg-dark); }

        .buy-btn { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 18px; font-size: 13px; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        /* FAQ */
        .faq-section { width: 90%; max-width: 380px; margin-bottom: 30px; }
        .faq-item { background: rgba(255, 255, 255, 0.02); border-radius: 16px; margin-bottom: 8px; border: 1px solid var(--border); overflow: hidden; }
        .faq-question { padding: 16px; width: 100%; text-align: left; background: none; border: none; color: var(--text-main); font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .faq-answer { padding: 0 16px; max-height: 0; overflow: hidden; transition: 0.3s ease-out; color: var(--text-dim); font-size: 12px; line-height: 1.6; }
        .faq-item.active .faq-answer { padding: 0 16px 16px 16px; max-height: 200px; }

        .ref-card { width: 90%; max-width: 380px; background: linear-gradient(135deg, rgba(197, 160, 89, 0.1) 0%, rgba(0, 136, 204, 0.05) 100%); border-radius: 28px; padding: 24px; border: 1px solid rgba(197, 160, 89, 0.15); margin-bottom: 24px; text-align: center; }
        .ref-btn { display: block; width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.2); border-radius: 14px; color: #fff; font-size: 12px; font-weight: 600; text-decoration: none; margin-top: 10px; cursor: pointer; }

        /* МОДАЛКА ОПЛАТЫ */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(20px); }
        .payment-card { width: 92%; max-width: 350px; background: #12141a; border-radius: 35px; padding: 30px 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .pay-icon { width: 50px; height: 50px; background: rgba(33, 160, 56, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .pay-title { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 8px; }
        .pay-steps { text-align: left; background: rgba(255,255,255,0.02); border-radius: 16px; padding: 15px; margin-bottom: 20px; font-size: 11px; color: var(--text-dim); line-height: 1.5; }
        .pay-steps b { color: var(--accent-gold); }
        .card-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(33, 160, 56, 0.4); border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.2s; }
        .card-num { font-family: monospace; font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 1px; }
        .copy-hint { font-size: 9px; color: var(--accent-sber); font-weight: 800; margin-top: 8px; text-transform: uppercase; }
        .done-btn { width: 100%; padding: 18px; background: var(--accent-sber); color: #fff; border: none; border-radius: 20px; font-size: 14px; font-weight: 800; margin-top: 20px; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

<!-- ИНДИКАТОР -->
<div class="status-badge reveal">
    <div class="status-dot"></div>
    <div class="status-text">Работает / 24/7</div>
</div>

<div class="header-logo reveal delay-1">
    <div class="logo">MOON<span>STARS</span></div>
</div>

<div class="slider-wrapper reveal delay-2">
    <div class="services-slider" id="serv-slider">
        <a href="https://t.me/Tgeshka_vpn" class="service-card vpn-card" target="_blank">
            <span class="card-arrow">↗</span>
            <div class="card-tag">Безопасность</div>
            <div>
                <div class="card-title">Tgeshka VPN</div>
                <div class="card-desc">Безлимитный доступ и высокая скорость</div>
            </div>
        </a>
        <a href="https://marktwen09.github.io/Coin-tyt/" class="service-card shop-card" target="_blank">
            <span class="card-arrow">↗</span>
            <div class="card-tag">Маркетплейс</div>
            <div>
                <div class="card-title">Moon Shop</div>
                <div class="card-desc">Донат в игры и цифровые товары</div>
            </div>
        </a>
    </div>
</div>

<div class="main-container reveal delay-3">
    <div class="tabs-container">
        <div class="tab-slider" id="slider-bg"></div>
        <button class="tab-btn active" onclick="setMode('stars', 0)">Stars</button>
        <button class="tab-btn" onclick="setMode('premium', 100)">Premium</button>
    </div>

    <div class="input-group" style="position: relative; text-align: left;">
        <label style="font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block;">Telegram Username</label>
        <div id="input-box" style="position: relative;">
            <span class="at-sign">@</span>
            <input type="text" id="username" class="tg-input" placeholder="Введите ник" oninput="handleInput(this)">
        </div>
        <div id="profile-box">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="profile-avatar" id="p-avatar">?</div>
                <div id="p-name" style="font-weight: 600;">Username</div>
            </div>
            <button onclick="resetUser()" style="background:none; border:none; color:var(--text-dim); font-size:20px;">×</button>
        </div>
    </div>

    <div class="price-display">
        <div class="val-main" id="display-val">100 STARS</div>
        <div class="val-sub" id="display-price">170 ₽</div>
    </div>

    <input type="range" id="slider" min="0" max="5" step="1" value="0" oninput="update()">
    <button class="buy-btn" onclick="checkout()">Оформить заказ</button>
</div>

<div class="faq-section reveal delay-4">
    <div style="font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; margin-bottom: 12px; letter-spacing: 1px;">Вопросы</div>
    <div class="faq-item">
        <button class="faq-question" onclick="toggleFaq(this)">Как быстро придут Stars? <span>+</span></button>
        <div class="faq-answer">Начисление занимает от 5 до 15 минут.</div>
    </div>
</div>

<div class="ref-card reveal delay-4">
    <div style="font-weight: 800; font-size: 14px;">Партнерка</div>
    <div class="ref-btn" onclick="copyRef()">Ссылка</div>
</div>

<div class="modal-overlay" id="modal">
    <div class="payment-card">
        <div class="pay-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#21A038" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
        <div class="pay-title">Оплата</div>
        <div class="card-box" onclick="copyCard()">
            <div class="card-num">2202 2088 9003 9648</div>
            <div class="copy-hint" id="copy-text">Нажмите, чтобы скопировать</div>
        </div>
        <button class="done-btn" onclick="done()">Я оплатил</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="background:none; border:none; color:var(--text-dim); margin-top:20px; font-size:12px;">Отмена</button>
    </div>
</div>

<script>
    let mode = 'stars';
    let confirmedUser = "";
    const data = {
        stars: [{t:"100 STARS", p:170}, {t:"150 STARS", p:240}, {t:"250 STARS", p:445}, {t:"500 STARS", p:830}, {t:"1000 STARS", p:1540}, {t:"2500 STARS", p:3700}],
        premium: [{t:"3 МЕСЯЦА", p:1200}, {t:"6 МЕСЯЦЕВ", p:1550}, {t:"12 МЕСЯЦЕВ", p:2750}]
    };

    // РУЛЕТКА
    const servSlider = document.getElementById('serv-slider');
    let scrollPos = 0;
    let isPaused = false;

    function autoScroll() {
        if (!isPaused) {
            scrollPos += 0.8;
            if (scrollPos >= servSlider.scrollWidth - servSlider.clientWidth) scrollPos = 0;
            servSlider.scrollLeft = scrollPos;
        }
    }
    setInterval(autoScroll, 30);

    servSlider.addEventListener('touchstart', () => isPaused = true);
    servSlider.addEventListener('touchend', () => {
        setTimeout(() => { isPaused = false; scrollPos = servSlider.scrollLeft; }, 2000);
    });

    function toggleFaq(btn) {
        btn.parentElement.classList.toggle('active');
        btn.querySelector('span').innerText = btn.parentElement.classList.contains('active') ? '−' : '+';
    }

    function handleInput(input) {
        let val = input.value.trim().replace('@', '');
        if (val.length > 3) {
            setTimeout(() => { if(input.value.length > 3) showProfile(val); }, 800);
        }
    }

    function showProfile(name) {
        confirmedUser = name;
        document.getElementById('input-box').style.display = 'none';
        document.getElementById('profile-box').style.display = 'flex';
        document.getElementById('p-name').innerText = name;
        document.getElementById('p-avatar').innerText = name.charAt(0).toUpperCase();
    }

    function resetUser() {
        confirmedUser = "";
        document.getElementById('username').value = "";
        document.getElementById('input-box').style.display = 'block';
        document.getElementById('profile-box').style.display = 'none';
    }

    function update() {
        const val = document.getElementById('slider').value;
        document.getElementById('display-val').innerText = data[mode][val].t;
        document.getElementById('display-price').innerText = data[mode][val].p + " ₽";
    }

    function setMode(m, pos) {
        mode = m;
        document.getElementById('slider-bg').style.transform = `translateX(${pos}%)`;
        document.getElementById('slider').max = mode === 'stars' ? 5 : 2;
        document.getElementById('slider').value = 0;
        update();
    }

    function copyCard() {
        navigator.clipboard.writeText("2202208890039648");
        document.getElementById('copy-text').innerText = "СКОПИРОВАНО!";
        setTimeout(() => { document.getElementById('copy-text').innerText = "Нажмите, чтобы скопировать"; }, 2000);
    }

    function checkout() {
        if(!confirmedUser) return alert("Введите Username");
        document.getElementById('modal').style.display = 'flex';
    }

    function done() {
        const item = data[mode][document.getElementById('slider').value];
        const text = `Заказ:\nТовар: ${item.t}\nСумма: ${item.p}₽\nКлиент: @${confirmedUser}`;
        window.location.href = `https://t.me/kaoface?text=${encodeURIComponent(text)}`;
    }
</script>

</body>
</html>
