<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CHANGE | DIGITAL EMPIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --card: rgba(20, 20, 20, 0.8);
            --neon: #00f2ff;
            --gold: #ffcc00;
            --red: #ff3c3c;
            --text: #ffffff;
            --border: 1px solid rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0a1114 0%, #030303 100%);
        }

        /* HEADER */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--border);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .brand { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 3px; }
        .brand span { color: var(--neon); }

        .balance-box { text-align: right; }
        .balance-label { font-size: 0.7rem; color: #777; text-transform: uppercase; }
        .balance-val { color: var(--neon); font-size: 1.4rem; font-weight: 700; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }

        /* SCROLL AREA */
        main {
            height: calc(100vh - 150px);
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 30px;
        }

        .section-header {
            font-size: 0.8rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px 5px;
        }

        /* CREATE PANEL */
        .create-form {
            background: var(--card);
            border: var(--border);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            padding: 12px;
            color: #fff;
            border-radius: 8px;
            margin-bottom: 10px;
            font-family: 'Rajdhani', sans-serif;
        }

        input:focus { border-color: var(--neon); }

        button.main-btn {
            width: 100%;
            padding: 12px;
            background: var(--neon);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        /* MARKET ITEMS */
        .market-list { display: flex; flex-direction: column; gap: 12px; }

        .item {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .item:hover { border-color: var(--neon); }

        .coin-meta { display: flex; align-items: center; gap: 15px; }
        .coin-icon {
            width: 45px; height: 45px; border-radius: 50%;
            background: #111; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; color: var(--neon); font-size: 1.2rem;
        }

        .coin-name { font-weight: 700; font-size: 1.1rem; }
        .coin-owner { font-size: 0.75rem; color: #666; }

        .price-data { text-align: right; }
        .price { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--text); }
        .change { font-size: 0.8rem; font-weight: 700; }
        .up { color: var(--neon); }
        .down { color: var(--red); }

        .trade-btns { display: flex; gap: 5px; margin-top: 10px; }
        .trade-btns button {
            flex: 1; padding: 6px; border-radius: 5px; border: 1px solid #333;
            background: transparent; color: #fff; font-size: 0.7rem; cursor: pointer;
        }
        .btn-buy:active { background: var(--neon); color: #000; }

        /* NAV */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(10,10,10,0.9); border-top: var(--border);
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-link { color: #555; text-decoration: none; font-size: 0.7rem; text-align: center; }
        .nav-link.active { color: var(--neon); }

        /* ANIMATION */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .live-dot { width: 8px; height: 8px; background: var(--neon); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

<header>
    <div class="brand">X-<span>EMPIRE</span></div>
    <div class="balance-box">
        <div class="balance-label">Global Funds</div>
        <div class="balance-val" id="balanceDisplay">1000.00</div>
    </div>
</header>

<main>
    <div class="section-header"><span class="live-dot"></span> Mint Your Currency</div>
    <div class="create-form">
        <input type="text" id="cName" placeholder="Coin Name">
        <input type="text" id="cTicker" placeholder="Ticker (3-4 Letters)">
        <button class="main-btn" onclick="createToken()">Deploy to Market</button>
    </div>

    <div class="section-header">Live Trading Floor</div>
    <div class="market-list" id="marketList">
        </div>
</main>

<nav>
    <a href="#" class="nav-link active">MARKET</a>
    <a href="#" class="nav-link">WALLETS</a>
    <a href="#" class="nav-link">HISTORY</a>
    <a href="#" class="nav-link">SYSTEM</a>
</nav>

<script>
    // ИГРОВАЯ ДАТА
    let state = {
        balance: parseFloat(localStorage.getItem('ex_bal')) || 1000.00,
        tokens: JSON.parse(localStorage.getItem('ex_tokens')) || [
            { id: 1, name: "Brawl Static", ticker: "BST", price: 10.5, change: 1.2, owner: "System" },
            { id: 2, name: "Baza Shop", ticker: "BAZA", price: 2.1, change: -0.5, owner: "System" }
        ]
    };

    function save() {
        localStorage.setItem('ex_bal', state.balance);
        localStorage.setItem('ex_tokens', JSON.stringify(state.tokens));
    }

    function createToken() {
        const n = document.getElementById('cName').value;
        const t = document.getElementById('cTicker').value.toUpperCase();
        if(!n || !t) return alert("Fill data!");
        
        state.tokens.unshift({
            id: Date.now(),
            name: n,
            ticker: t,
            price: 1.00,
            change: 0,
            owner: "You"
        });
        save();
        render();
        document.getElementById('cName').value = '';
        document.getElementById('cTicker').value = '';
    }

    function trade(id, type) {
        const t = state.tokens.find(x => x.id === id);
        if(type === 'buy') {
            if(state.balance >= t.price) {
                state.balance -= t.price;
                t.price *= 1.02; // Рост 2% при покупке
                t.change += 0.5;
            }
        } else {
            state.balance += t.price * 0.98; // 2% налог при продаже
            t.price *= 0.98; // Падение при продаже
            t.change -= 0.5;
        }
        save();
        render();
    }

    function render() {
        document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
        const list = document.getElementById('marketList');
        list.innerHTML = '';

        state.tokens.forEach(t => {
            const el = document.createElement('div');
            el.className = 'item';
            el.innerHTML = `
                <div class="coin-meta">
                    <div class="coin-icon">${t.ticker[0]}</div>
                    <div>
                        <div class="coin-name">${t.name}</div>
                        <div class="coin-owner">${t.owner} • ${t.ticker}</div>
                    </div>
                </div>
                <div class="price-data">
                    <div class="price">${t.price.toFixed(2)}</div>
                    <div class="change ${t.change >= 0 ? 'up' : 'down'}">
                        ${t.change >= 0 ? '▲' : '▼'} ${Math.abs(t.change).toFixed(1)}%
                    </div>
                    <div class="trade-btns">
                        <button class="btn-buy" onclick="trade(${t.id}, 'buy')">BUY</button>
                        <button onclick="trade(${t.id}, 'sell')">SELL</button>
                    </div>
                </div>
            `;
            list.appendChild(el);
        });
    }

    // ЖИВОЙ РЫНОК (РАНДОМНЫЕ ДВИЖЕНИЯ)
    setInterval(() => {
        state.tokens.forEach(t => {
            const move = (Math.random() * 0.2 - 0.1); 
            t.price += move;
            if(t.price < 0.1) t.price = 0.1;
            t.change = (Math.random() * 5 - 2.5).toFixed(1);
        });
        render();
    }, 3000);

    render();
</script>
</body>
</html>
