<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura X-Grok | Quantum Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020202;
            --bg-grad-1: #090915;
            --bg-grad-2: #020202;
            --accent-violet: #a78bfa;
            --accent-cyan: #22d3ee;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, var(--bg-grad-1) 0%, var(--bg-grad-2) 60%), var(--bg-deep);
            color: #ececec;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.01em;
            padding: calc(env(safe-area-inset-top) + 10px) 0 env(safe-area-inset-bottom) 0;
        }

        /* Glassmorphism Grok Style */
        .glass-block {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        /* Свечение на границах */
        .glow-border {
            border: 1px solid transparent;
            background-image: linear-gradient(var(--bg-grad-2), var(--bg-grad-2)), linear-gradient(135deg, var(--accent-violet) 0%, var(--accent-cyan) 100%);
            background-origin: border-box;
            background-clip: content-box, border-box;
        }

        .chat-container::-webkit-scrollbar { width: 3px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .input-glass {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-glass:focus-within {
            border-color: rgba(167, 139, 250, 0.5);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.15);
        }

        /* Анимация сообщений */
        .msg-enter {
            animation: cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s msgSlide forwards;
        }

        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Математический блок в стиле Grok */
        .math-block {
            padding: 24px;
            border-radius: 20px;
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
        }

        /* Кнопки в сайдбаре */
        .sidebar-link {
            transition: all 0.2s ease;
            color: rgba(255,255,255,0.4);
            border-radius: 12px;
        }

        .sidebar-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.04);
        }

        .sidebar-link.active {
            color: #fff;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex h-screen">

    <aside id="sidebar" class="w-80 bg-[#060608] border-r border-white/5 flex flex-col hidden md:flex transition-transform duration-300 ease-in-out">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-7 h-7 bg-white rounded-lg"></div>
                <span class="text-sm font-semibold tracking-widest uppercase">Aura X-Grok</span>
            </div>
            
            <button onclick="createNewChat()" class="w-full py-4 px-6 glass-block rounded-xl text-xs font-medium hover:bg-white/5 transition flex items-center justify-between group mb-8">
                <span>+ Новая сессия</span>
                <span class="opacity-40 group-hover:opacity-100 transition">Ctrl+N</span>
            </button>

            <nav id="chat-list" class="flex-1 overflow-y-auto chat-container space-y-1 pr-2">
                </nav>
        </div>

        <div class="mt-auto p-8 border-t border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-gray-700 to-gray-500 flex items-center justify-center text-black text-xs font-black">MP</div>
                <div class="text-[11px]">
                    <p class="font-medium text-white">Mark P.</p>
                    <p class="uppercase tracking-widest text-white/40">Premium Access</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] text-white/30 uppercase tracking-[0.2em]">Live</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-black p-4 md:p-8">
        
        <header class="h-16 flex md:hidden items-center justify-between px-6 border border-white/5 glass-block mb-4 z-40">
            <button onclick="toggleSidebar()" class="p-2 text-white/40 hover:text-white transition">☰</button>
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-white rounded-lg flex items-center justify-center text-black font-bold">A</div>
                <span class="font-semibold text-white">Aura</span>
            </div>
            <button onclick="createNewChat()" class="p-2 text-white/40 hover:text-white transition">+</button>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto chat-container max-w-[850px] mx-auto w-full space-y-8 py-10 px-4 md:px-0 scroll-smooth">
            <div id="welcome" class="h-full flex flex-col items-center justify-center text-center opacity-30">
                <div class="w-16 h-16 border border-white/10 rounded-2xl mb-8 flex items-center justify-center text-4xl font-light">α</div>
                <h2 class="text-3xl font-light tracking-widest uppercase">Готова к расчету</h2>
                <p class="text-base mt-4 max-w-sm">Я обучена сложной математике и квантовым вычислениям. Введите задачу.</p>
            </div>
        </div>

        <div class="w-full max-w-[850px] mx-auto p-4 md:p-0 mt-8 mb-4">
            <div class="input-glass rounded-2xl p-2 flex items-end gap-3 relative">
                <textarea id="user-input" 
                          rows="1"
                          oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                          onkeydown="if(event.key === 'Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"
                          placeholder="Запросить расчет..."
                          class="bg-transparent outline-none resize-none flex-1 py-4 px-6 text-[16px] placeholder:text-white/20 leading-relaxed"></textarea>
                
                <button onclick="sendMessage()" class="w-14 h-14 rounded-xl flex items-center justify-center hover:scale-105 active:scale-95 transition flex-shrink-0 group">
                    <svg viewBox="0 0 24 24" width="24" height="24" class="text-white/40 group-hover:text-violet-400 transition" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        let chats = JSON.parse(localStorage.getItem('aura_grok_v1')) || [];
        let currentChatId = null;

        // Продвинутая математика
        const Engine = {
            evaluate(input) {
                try {
                    // Регулярка для поиска математических выражений (цифры, знаки, скобки, функции)
                    const cleanExpr = input.match(/[0-9.+\-*/^()|sqrt|sin|cos|tan|pi|e ]+/g);
                    if (!cleanExpr) return null;
                    
                    const expr = cleanExpr.join('').trim();
                    if (expr.length < 2) return null;

                    const safeEval = expr.toLowerCase()
                        .replace(/sqrt/g, 'Math.sqrt')
                        .replace(/sin/g, 'Math.sin')
                        .replace(/cos/g, 'Math.cos')
                        .replace(/pi/g, 'Math.PI')
                        .replace(/\^/g, '**');

                    const res = Function('"use strict"; return (' + safeEval + ')')();
                    
                    // Форматирование результата
                    const formattedRes = isNaN(res) || res === Infinity 
                        ? 'Ошибка вычисления' 
                        : Number.isInteger(res) ? res.toLocaleString('ru-RU') : res.toLocaleString('ru-RU', { maximumFractionDigits: 6 });

                    return { raw: expr, val: formattedRes };
                } catch (e) { return null; }
            }
        };

        function sendMessage() {
            const el = document.getElementById('user-input');
            const val = el.value.trim();
            if(!val) return;

            if(!currentChatId) createNewChat();

            const chat = chats.find(c => c.id === currentChatId);
            if(chat.messages.length === 0) chat.name = val.substring(0, 30);

            addMessage('user', val);
            el.value = '';
            el.style.height = '';

            // Aura Logic
            setTimeout(() => {
                const math = Engine.evaluate(val);
                let response = math 
                    ? `<div class="math-block glass-block glow-border msg-enter"><p class="text-[10px] text-white/40 mb-3 uppercase tracking-widest">Квантовый Результат</p><p class="text-4xl font-light tracking-tight">Value: ${math.val}</p><p class="text-[10px] text-white/20 mt-5italic">Expression: ${math.raw}</p></div>`
                    : `Запрос обработан. Модель классифицировала ввод как текстовую информацию. Требуется ли аналитический разбор данных?`;
                
                chat.messages.push({ role: 'user', content: val });
                chat.messages.push({ role: 'aura', content: response });
                addMessage('aura', response);
                save();
            }, 600);
        }

        function addMessage(role, content) {
            const box = document.getElementById('messages');
            const welcome = document.getElementById('welcome');
            if(welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = `w-full ${role === 'user' ? 'flex justify-end' : ''} msg-enter`;
            
            div.innerHTML = role === 'user' 
                ? `<div class="p-6 md:px-10 glass-block border-white/5 max-w-[85%] text-[16px] leading-relaxed text-white">${content}</div>`
                : `<div class="max-w-[100%]">${content}</div>`;
            
            box.appendChild(div);
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        function createNewChat() {
            const id = Date.now();
            chats.unshift({ id, name: 'Новая сессия', messages: [] });
            currentChatId = id;
            document.getElementById('messages').innerHTML = '';
            renderList();
            save();
            if (window.innerWidth < 768) toggleSidebar(false);
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) {
                currentChatId = chats.length > 0 ? chats[0].id : null;
                renderMessages();
            }
            save();
        }

        function renderMessages() {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            const chat = chats.find(c => c.id === currentChatId);
            if (chat && chat.messages.length > 0) {
                chat.messages.forEach(m => addMessage(m.role, m.content));
            } else {
                box.innerHTML = `
                <div id="welcome" class="h-full flex flex-col items-center justify-center text-center opacity-30">
                    <div class="w-16 h-16 border border-white/10 rounded-2xl mb-8 flex items-center justify-center text-4xl font-light">α</div>
                    <h2 class="text-3xl font-light tracking-widest uppercase">Готова к расчету</h2>
                    <p class="text-base mt-4 max-w-sm">Я обучена сложной математике и квантовым вычислениям. Введите задачу.</p>
                </div>`;
            }
        }

        function save() {
            localStorage.setItem('aura_grok_v1', JSON.stringify(chats));
            renderList();
        }

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = chats.map(c => `
                <div onclick="selectChat(${c.id})" class="sidebar-link group flex items-center justify-between px-4 py-3 cursor-pointer ${c.id === currentChatId ? 'active' : ''}">
                    <span class="text-sm truncate pr-4">${c.name}</span>
                    <button onclick="deleteChat(${c.id}, event)" class="opacity-0 group-hover:opacity-100 p-1.5 hover:text-red-400 transition">✕</button>
                </div>
            `).join('');
        }

        function selectChat(id) {
            currentChatId = id;
            renderMessages();
            renderList();
            if (window.innerWidth < 768) toggleSidebar(false);
        }

        function toggleSidebar(force) {
            const sb = document.getElementById('sidebar');
            const open = force !== undefined ? force : !sb.classList.contains('hidden');
            
            sb.classList.toggle('hidden', open);
            sb.classList.toggle('flex', !open);
            if (!open) {
                sb.classList.add('fixed', 'inset-0', 'w-full', 'z-50');
            } else {
                sb.classList.remove('fixed', 'inset-0', 'w-full', 'z-50');
            }
        }

        // Init
        if (chats.length > 0) {
            currentChatId = chats[0].id;
            renderMessages();
            renderList();
        }
    </script>
</body>
</html>
