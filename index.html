<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Stars — Элитное Пополнение</title>
    <style>
        :root {
            --bg-deep-space: #0f121e;
            --card-space-dark: #1b1f2e;
            --moon-silver: #e0e6ed;
            --star-gold: #fcc200;
            --t-blue: #24A1DE;
            --error-red: #ff4d4d;
            --radius-card: 28px;
            --radius-input: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background-color: var(--bg-deep-space);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--moon-silver);
            padding: 20px;
        }

        .main-card {
            width: 100%;
            max-width: 420px;
            background-color: var(--card-space-dark);
            border-radius: var(--radius-card);
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .logo-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 26px;
            font-weight: 800;
            color: var(--star-gold);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        h1 { font-size: 20px; margin: 0; color: white; }
        .subtitle { font-size: 13px; color: #8b9bb4; margin: 8px 0 25px; }

        .input-wrapper { text-align: left; margin-bottom: 25px; }
        .label { font-size: 13px; color: #8b9bb4; margin: 0 0 8px 4px; display: block; }

        .input-group { position: relative; }
        
        .tg-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border-radius: var(--radius-input);
            background-color: #161a25;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        /* Стиль ошибки */
        .tg-input.invalid {
            border-color: var(--error-red);
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.2);
        }

        .at-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-weight: bold;
        }

        .price-display-card {
            background-color: #161a25;
            padding: 20px;
            border-radius: var(--radius-input);
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stars-line { font-size: 30px; font-weight: 800; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .star-icon { color: var(--star-gold); }
        .cost-line { font-size: 15px; color: #8b9bb4; margin-top: 5px; }
        .cost-line strong { color: var(--t-blue); }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #11141e;
            border-radius: 5px;
            margin-bottom: 35px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(36, 161, 222, 0.5);
        }

        .buy-action-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--t-blue);
            color: white;
            border: none;
            border-radius: var(--radius-input);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .buy-action-btn:disabled {
            background-color: #334155;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Тот самый счетчик */
        .live-counter {
            margin-top: 15px;
            font-size: 12px;
            color: #2ecc71;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 500;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: #2ecc71;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .benefits-bar {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 11px;
            color: #6a7c97;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="logo-title"><span>🌙</span> MOON STARS</div>
    <h1>Купить Telegram Stars</h1>
    <p class="subtitle">Элитный сервис мгновенного пополнения</p>

    <div class="input-wrapper">
        <label class="label">Ваш никнейм</label>
        <div class="input-group">
            <span class="at-icon">@</span>
            <input type="text" id="username" class="tg-input" placeholder="username" autocomplete="off">
        </div>
    </div>

    <div class="price-display-card">
        <div class="stars-line"><span class="star-icon">⭐</span> <span id="starsDisplay">100</span></div>
        <div class="cost-line">К оплате: <strong id="priceDisplay">170 ₽</strong></div>
    </div>

    <input type="range" id="priceSlider" min="0" max="5" step="1" value="0">

    <button class="buy-action-btn" id="buyBtn" onclick="processOrder()">Продолжить к оплате</button>

    <div class="live-counter">
        <div class="dot"></div>
        Сегодня выполнено <span id="orderCount">42</span> заказа
    </div>

    <div class="benefits-bar">
        <span>💎 1000+ успешно</span>
        <span>🛡️ Гарантия</span>
        <span>👤 @kaoface</span>
    </div>
</div>

<script>
    const pricelist = [
        { stars: 100, price: 170 },
        { stars: 150, price: 240 },
        { stars: 250, price: 445 },
        { stars: 500, price: 830 },
        { stars: 1000, price: 1540 },
        { stars: 2500, price: 3700 }
    ];

    const slider = document.getElementById('priceSlider');
    const starsDisplay = document.getElementById('starsDisplay');
    const priceDisplay = document.getElementById('priceDisplay');
    const usernameInput = document.getElementById('username');
    const buyBtn = document.getElementById('buyBtn');
    const orderCountDisplay = document.getElementById('orderCount');

    // --- ЛОГИКА СЧЕТЧИКА ЗАКАЗОВ ---
    function updateOrderCounter() {
        const now = new Date();
        const hour = now.getHours();
        // Генерируем число на основе часа дня (вечером больше, утром меньше)
        const baseOrders = 35; 
        const hourlyBonus = Math.floor(hour * 1.5); 
        const randomVariation = Math.floor(Math.random() * 5);
        
        orderCountDisplay.innerText = baseOrders + hourlyBonus + randomVariation;
    }
    
    updateOrderCounter();
    setInterval(updateOrderCounter, 3600000); // Обновление каждый час

    // --- ЛОГИКА ВАЛИДАЦИИ ---
    usernameInput.addEventListener('input', function() {
        const val = this.value.trim().replace('@', '');
        const tgRegex = /^[a-zA-Z0-9_]{3,32}$/; // Латиница, цифры, подчёркивание, от 3 символов
        
        if (val.length > 0 && !tgRegex.test(val)) {
            this.classList.add('invalid');
            buyBtn.disabled = true;
        } else if (val.length < 3 && val.length > 0) {
            this.classList.add('invalid');
            buyBtn.disabled = true;
        } else {
            this.classList.remove('invalid');
            buyBtn.disabled = false;
        }
    });

    // --- ЛОГИКА СЛАЙДЕРА ---
    slider.addEventListener('input', function() {
        const data = pricelist[this.value];
        starsDisplay.innerText = data.stars;
        priceDisplay.innerText = `${data.price} ₽`;
    });

    function processOrder() {
        const user = usernameInput.value.trim().replace('@', '');
        const currentData = pricelist[slider.value];
        
        if(!user || user.length < 3) {
            usernameInput.classList.add('invalid');
            return;
        }

        const message = `Приветствую! Заказываю в Moon Stars:\n\n⭐ Пак: ${currentData.stars} звёзд\n💰 Сумма: ${currentData.price} ₽\n👤 Юзер: @${user}`;
        window.location.href = `https://t.me/kaoface?text=${encodeURIComponent(message)}`;
    }
</script>

</body>
</html>
