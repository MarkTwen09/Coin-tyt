<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA | ZENITH ULTRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .bg-fx { position: fixed; inset: 0; z-index: -1; background: radial-gradient(at 50% -10%, #2e1065 0%, #000 80%); }
        .bg-fx::after { content: ''; position: absolute; inset: 0; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; pointer-events: none; }
        
        /* Glassmorphism 3.0 */
        .card-ai { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-left: 3px solid #a855f7; }
        .card-user { background: linear-gradient(135deg, #a855f7 0%, #4f46e5 100%); border-radius: 30px 30px 4px 30px; box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3); align-self: flex-end; }
        
        #flow { height: calc(100vh - 190px); scroll-behavior: smooth; }
        #flow::-webkit-scrollbar { width: 0; }

        .input-box { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px; }
        .input-box:focus-within { border-color: #a855f7; box-shadow: 0 0 40px rgba(168, 85, 247, 0.2); }
        
        .logo { font-weight: 900; font-style: italic; background: linear-gradient(to right, #fff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.05em; }
        .btn-action { background: #fff; color: #000; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-action:active { transform: scale(0.85); }
    </style>
</head>
<body class="flex flex-col">
    <div class="bg-fx"></div>

    <header class="pt-16 pb-6 px-10 flex justify-between items-center border-b border-white/5">
        <h1 class="text-3xl logo">AURA</h1>
        <div class="flex items-center gap-2 opacity-40">
            <div class="w-1.5 h-1.5 bg-green-500 rounded-full"></div>
            <span class="text-[8px] tracking-[0.4em] uppercase">Private Node</span>
        </div>
    </header>

    <main id="flow" class="overflow-y-auto p-6 space-y-10 flex flex-col pt-12"></main>

    <div id="wait" class="hidden px-10 py-2 text-[9px] text-purple-400 tracking-[0.5em] uppercase animate-pulse">Computing...</div>

    <footer class="p-8 pb-14">
        <div class="max-w-4xl mx-auto input-box flex items-center p-2 shadow-2xl">
            <input type="text" id="textInput" class="w-full bg-transparent px-6 py-4 text-sm outline-none text-white placeholder-white/20" placeholder="Sync with Zenith..." autocomplete="off">
            <button onclick="execute()" class="btn-action">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
        </div>
    </footer>

    <script>
        
        const SECRET = 'AIzaSyBqzLQRQVdHBqPHXldvizRASgpNQkMcQ5I'; 

        async function execute() {
            const input = document.getElementById('textInput');
            const flow = document.getElementById('flow');
            const wait = document.getElementById('wait');
            const val = input.value.trim();
            if (!val) return;

            input.value = '';
            flow.innerHTML += `<div class="card-user p-6 text-sm max-w-[85%] leading-relaxed">${val}</div>`;
            flow.scrollTo(0, flow.scrollHeight);
            wait.classList.remove('hidden');

            try {
                // Прямой запрос к стабильной версии
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${SECRET}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await res.json();
                wait.classList.add('hidden');

                if (data.error) {
                    flow.innerHTML += `<div class="p-5 bg-red-900/30 border border-red-500/50 rounded-3xl text-[10px] text-red-400 text-center uppercase tracking-widest">Error: ${data.error.message}</div>`;
                } else {
                    const responseText = data.candidates[0].content.parts[0].text;
                    flow.innerHTML += `<div class="card-ai p-8 text-sm max-w-[90%] leading-loose border-l-4 border-purple-500">${responseText}</div>`;
                }
            } catch (e) {
                wait.classList.add('hidden');
                flow.innerHTML += `<div class="text-red-500 text-center text-[10px] uppercase tracking-widest">Check VPN Connection</div>`;
            }
            flow.scrollTo({ top: flow.scrollHeight, behavior: 'smooth' });
        }
        document.getElementById('textInput').onkeypress = (e) => { if(e.key === 'Enter') execute(); };
    </script>
</body>
</html>
