<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA NEXT GEN</title>
    <style>
        :root {
            --bg: #0e0e10;
            --card: rgba(23, 23, 26, 0.7);
            --accent: #4b90ff;
            --text: #e3e3e3;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; position: fixed;
        }

        /* МЯГКИЙ ГРАДИЕНТ КАК У GEMINI */
        .visuals {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 50% -20%, rgba(75, 144, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
        }

        .container {
            display: flex; flex-direction: column; height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        .header { padding: 40px 20px 20px; text-align: left; max-width: 600px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .header h1 {
            font-size: 2.2rem; letter-spacing: -1px; margin: 0;
            background: linear-gradient(90deg, #4b90ff, #ff71cd);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        #chat {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 24px;
            padding-bottom: 180px; max-width: 700px; margin: 0 auto; width: 100%;
            box-sizing: border-box; -webkit-overflow-scrolling: touch;
        }

        /* СТИЛЬ СООБЩЕНИЙ КАК В GEMINI */
        .msg {
            max-width: 85%; line-height: 1.6; font-size: 16px;
            animation: fadeIn 0.5s ease forwards; opacity: 0;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .a { align-self: flex-start; display: flex; gap: 12px; }
        .a::before { content: '✦'; color: var(--accent); font-size: 20px; }

        .u { 
            align-self: flex-end; background: var(--card); 
            padding: 12px 20px; border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        /* ИНПУТ В СТИЛЕ СТЕКЛЯННОЙ ПАНЕЛИ */
        .input-wrapper {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px 20px calc(40px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 60%, transparent);
        }

        .input-card {
            max-width: 700px; margin: 0 auto;
            background: var(--card); border: 1px solid var(--glass-border);
            border-radius: 32px; padding: 6px 6px 6px 20px;
            display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }

        input {
            flex: 1; background: transparent; border: none;
            color: #fff; font-size: 17px; outline: none; padding: 12px 0;
        }

        button {
            width: 48px; height: 48px; border-radius: 24px;
            background: #fff; border: none; color: #000;
            font-size: 20px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }

        button:active { transform: scale(0.9); background: var(--accent); color: #fff; }
    </style>
</head>
<body>
    <div class="visuals"></div>
    <div class="container">
        <div class="header"><h1>AURA</h1></div>
        <div id="chat">
            <div class="msg a">Привет! Я — AURA. Я использую обновленные алгоритмы для ответов и новый стеклянный интерфейс. О чем хочешь поговорить сегодня?</div>
        </div>
        <div class="input-wrapper">
            <div class="input-card">
                <input type="text" id="in" placeholder="Введите запрос..." autocomplete="off">
                <button id="go">↑</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat'), input = document.getElementById('in'), btn = document.getElementById('go');

        const brain = {
            "невин": "Невинномысск — отличный город для старта проектов. Как там сейчас обстановка?",
            "бравл": "В Бравле сейчас важно следить за метой. Каких персонажей апаешь в последнее время?",
            "база": "BAZA SHOP — серьезный проект. С таким дизайном, как у меня, продажи точно пойдут вверх!",
            "айфон": "iPhone 17 Pro — это мощь. На нем мой интерфейс должен летать максимально плавно.",
            "школ": "8-й класс — время непростое, особенно с ВПР. Если что, я поддержу!",
            "биолог": "Учебник Пасечника? Да уж, классика. Но мы тут создаем технологии будущего, это покруче!",
            "тикток": "Для Тиктока важен свет и glitchcore вайб. Уже есть идеи для нового залета в реки?",
            "привет": "Привет! Рада тебя видеть. Чем я могу помочь твоему проекту сегодня?",
            "дела": "Мои системы работают на 100%. Готова к твоим самым сложным запросам!",
            "дизайн": "Я постаралась стать похожей на Gemini — больше стекла, меньше лишнего шума. Тебе нравится?",
            "умная": "Я постоянно учусь. Каждое твое сообщение делает мои ответы точнее.",
            "кто ты": "Я AURA — искусственный интеллект, созданный быть твоим напарником в учебе и бизнесе."
        };

        const defaults = [
            "Это интересный вопрос. Давай разберем его подробнее?",
            "Мои алгоритмы показывают, что это отличная идея для твоего развития.",
            "Я понимаю тебя. Это шаг к успеху твоего проекта.",
            "Интересно! Расскажи больше, чтобы я могла дать точный совет.",
            "Я на связи и готова помогать. Что именно тебя интересует в этой теме?"
        ];

        function ask() {
            const text = input.value.trim(); if(!text) return;
            
            // Сообщение пользователя
            const u = document.createElement('div'); u.className = 'msg u'; u.textContent = text;
            chat.appendChild(u); input.value = ''; chat.scrollTop = chat.scrollHeight;

            setTimeout(() => {
                const a = document.createElement('div'); a.className = 'msg a';
                const lower = text.toLowerCase();
                
                // Интеллектуальный поиск по ключам
                let reply = "";
                for (let key in brain) {
                    if (lower.includes(key)) {
                        reply = brain[key];
                        break;
                    }
                }
                
                if (!reply) {
                    reply = defaults[Math.floor(Math.random() * defaults.length)];
                }

                a.textContent = reply;
                chat.appendChild(a);
                chat.scrollTop = chat.scrollHeight;
            }, 800);
        }

        btn.onclick = ask;
        input.onkeypress = (e) => { if(e.key === 'Enter') ask(); };
    </script>
</body>
</html>
