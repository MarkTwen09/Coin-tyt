<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA INFINITY</title>
    <style>
        :root {
            --bg: #030305;
            --aura-main: #a855f7;
            --aura-sec: #22d3ee;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: #fff;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            overflow: hidden;
        }

        /* УЛЬТРА-СОЧНЫЙ ФОН */
        .visuals {
            position: absolute; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at 50% 50%, #121212, #000);
        }

        .glow {
            position: absolute; width: 400px; height: 400px;
            background: var(--aura-main); filter: blur(120px);
            border-radius: 50%; opacity: 0.3;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(120%, 80%) scale(1.5); }
        }

        /* ИНТЕРФЕЙС */
        .app {
            display: flex; flex-direction: column;
            height: 100vh; max-width: 600px; margin: 0 auto;
            backdrop-filter: blur(20px);
        }

        .header {
            padding: 50px 20px 20px; text-align: center;
        }

        .header h1 {
            font-size: 3rem; letter-spacing: 12px; margin: 0;
            background: linear-gradient(90deg, #fff, var(--aura-main), var(--aura-sec), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradientText 5s linear infinite;
        }

        @keyframes gradientText { to { background-position: 200% center; } }

        #chat {
            flex: 1; overflow-y: auto; padding: 25px;
            display: flex; flex-direction: column; gap: 20px;
            scrollbar-width: none;
        }

        .msg {
            padding: 16px 20px; border-radius: 22px; max-width: 85%;
            font-size: 1.05rem; line-height: 1.5;
            border: 1px solid var(--border);
            backdrop-filter: blur(5px);
            animation: slideUp 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }

        .aura { 
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.15), rgba(34, 211, 238, 0.1));
            align-self: flex-start; border-bottom-left-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .user { 
            background: var(--glass); align-self: flex-end; 
            border-bottom-right-radius: 4px; border-color: var(--aura-sec);
        }

        /* ПОЛЕ ВВОДА */
        .controls {
            padding: 30px 20px; display: flex; gap: 12px;
            background: rgba(0,0,0,0.6); border-top: 1px solid var(--border);
            padding-bottom: calc(30px + env(safe-area-inset-bottom));
        }

        input {
            flex: 1; background: rgba(255,255,255,0.07); border: 1px solid var(--border);
            border-radius: 18px; padding: 18px; color: #fff; font-size: 17px;
            outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--aura-main); box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }

        button {
            width: 55px; height: 55px; border-radius: 18px;
            background: var(--aura-main); border: none; color: white;
            font-size: 1.5rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        button:active { transform: scale(0.9); }

        .loader { display: none; color: var(--aura-sec); font-size: 0.9rem; margin-left: 25px; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="visuals"><div class="glow"></div></div>
    
    <div class="app">
        <div class="header"><h1>AURA</h1></div>
        
        <div id="chat">
            <div class="msg aura">Бро, <b>AURA</b> на связи. Я обновила протоколы — теперь я умная, сочная и летаю прямо на твоём 17 Pro. Регистрация не нужна, я уже всё подключила. Что на уме?</div>
        </div>

        <div id="loader" class="loader">AURA сканирует реальность...</div>

        <div class="controls">
            <input type="text" id="input" placeholder="Спроси что угодно..." autocomplete="off">
            <button id="btn">></button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');

        async function talk() {
            const val = input.value.trim();
            if(!val) return;

            // Сообщение юзера
            const uM = document.createElement('div');
            uM.className = 'msg user';
            uM.textContent = val;
            chat.appendChild(uM);
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            loader.style.display = 'block';

            try {
                // Используем бесплатный API шлюз (через Llama-3-70B)
                const response = await fetch('https://api.airforce/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'llama-3-70b-instruct',
                        messages: [{ role: 'system', content: 'Ты - AURA. Умная, стильная, дерзкая нейросеть. Отвечай на русском.' }, { role: 'user', content: val }]
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;

                const aM = document.createElement('div');
                aM.className = 'msg aura';
                aM.innerHTML = reply;
                chat.appendChild(aM);

            } catch (e) {
                const errorM = document.createElement('div');
                errorM.className = 'msg aura';
                errorM.textContent = "Бро, сигнал прервался. Давай еще раз?";
                chat.appendChild(errorM);
            } finally {
                loader.style.display = 'none';
                chat.scrollTop = chat.scrollHeight;
            }
        }

        btn.onclick = talk;
        input.onkeypress = (e) => { if(e.key === 'Enter') talk(); };
    </script>
</body>
</html>
