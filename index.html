<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Clicker Pro: Skins & Cases</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00c8;
            --neon-purple: #9d00ff;
            --gold: #ffcc00;
            --bg: #05050a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* --- ЛЕВАЯ ЧАСТЬ: КЛИКЕР --- */
        .clicker-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .balance-display {
            position: absolute;
            top: 40px;
            background: var(--glass);
            padding: 15px 40px;
            border-radius: 50px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            font-size: 2rem;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .coin-btn {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            transition: 0.1s;
            position: relative;
            box-shadow: 0 0 60px rgba(255,255,255,0.1);
        }

        .coin-btn:active {
            transform: scale(0.92);
        }

        /* --- ПРАВАЯ ЧАСТЬ: МАГАЗИН И ИНВЕНТАРЬ --- */
        .shop-section {
            width: 450px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
        }

        h2 {
            font-size: 1.2rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--neon-blue);
            padding-bottom: 5px;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
        }

        .card:hover {
            border-color: var(--neon-pink);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-family: 'Orbitron';
        }

        .btn:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* Инвентарь */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .inv-item {
            aspect-ratio: 1;
            background: var(--glass);
            border-radius: 8px;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
        }.inv-item.active {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* МОДАЛЬНОЕ ОКНО */
        .overlay {
            position: fixed; top:0; left:0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .drop-card {
            padding: 40px;
            text-align: center;
            border: 2px solid var(--neon-pink);
            border-radius: 20px;
            background: #000;
            box-shadow: 0 0 40px var(--neon-pink);
        }

        .drop-icon {
            font-size: 6rem;
            margin: 20px 0;
            display: block;
        }

        /* Анимация клика */
        .plus-one {
            position: absolute;
            color: var(--neon-blue);
            font-weight: bold;
            pointer-events: none;
            animation: moveUp 0.6s forwards;
            font-size: 1.5rem;
        }

        @keyframes moveUp {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <section class="clicker-section">
        <div class="balance-display"><span id="balance">0</span> 🪙</div>
        <div class="coin-btn" id="mainCoin">💰</div>
    </section>

    <section class="shop-section">
        <h2>Магазин Кейсов</h2>
        <div class="card">
            <div>
                <b>Обычный кейс</b><br>
                <small style="color:var(--gold)">Цена: 100 🪙</small>
            </div>
            <button class="btn" onclick="openCase('standard')">Открыть</button>
        </div>
        <div class="card">
            <div>
                <b>Элитный кейс</b><br>
                <small style="color:var(--gold)">Цена: 1,000 🪙</small>
            </div>
            <button class="btn" onclick="openCase('elite')">Открыть</button>
        </div>

        <h2>Инвентарь скинов</h2>
        <div class="inventory-grid" id="inventory">
            </div>
    </section>

    <div class="overlay" id="overlay">
        <div class="drop-card">
            <h1 id="dropMsg">ВЫ ВЫИГРАЛИ!</h1>
            <span class="drop-icon" id="dropIcon">💰</span>
            <h2 id="dropName" style="border:none">+500 Монет</h2>
            <button class="btn" onclick="closeModal()">ЗАБРАТЬ</button>
        </div>
    </div>

    <script>
        // --- ДАННЫЕ СКИНОВ ---
        const SKINS = {
            'default': { name: 'Золото', icon: '💰', style: 'radial-gradient(circle, #ffd700, #ff8c00)', shadow: '#ffcc00' },
            'neon': { name: 'Киберпанк', icon: '💎', style: 'radial-gradient(circle, #00f2ff, #0066ff)', shadow: '#00f2ff' },
            'ruby': { name: 'Рубин', icon: '🔴', style: 'radial-gradient(circle, #ff0044, #800000)', shadow: '#ff0044' },
            'dark': { name: 'Тень', icon: '🌑', style: 'radial-gradient(circle, #444, #000)', shadow: '#ffffff' },
            'void': { name: 'Апокалипсис', icon: '🌋', style: 'conic-gradient(#ff0000, #ff00c8, #ff0000)', shadow: '#ff00c8' }
        };

        // --- ГЛОБАЛЬНОЕ СОСТОЯНИЕ ---
        let state = JSON.parse(localStorage.getItem('save_game')) || {
            coins: 0,
            owned: ['default'],
            active: 'default'
        };

        const balEl = document.getElementById('balance');
        const coinEl = document.getElementById('mainCoin');
        const invEl = document.getElementById('inventory');

        // --- ЛОГИКА ОБНОВЛЕНИЯ UI ---
        function updateUI() {
            balEl.innerText = state.coins.toLocaleString();
            
            // Применяем скин
            const s = SKINS[state.active];
            coinEl.innerText = s.icon;
            coinEl.style.background = s.style;
            coinEl.style.boxShadow = 0 0 50px ${s.shadow}66;// Рендер инвентаря
            invEl.innerHTML = '';
            state.owned.forEach(id => {
                const item = document.createElement('div');
                item.className = inv-item ${id === state.active ? 'active' : ''};
                item.style.background = SKINS[id].style;
                item.innerText = SKINS[id].icon;
                item.onclick = () => {
                    state.active = id;
                    updateUI();
                    save();
                };
                invEl.appendChild(item);
            });
        }

        function save() {
            localStorage.setItem('save_game', JSON.stringify(state));
        }

        // --- КЛИК ---
        coinEl.onclick = (e) => {
            state.coins += 1;
            
            // Анимация цифры
            const p = document.createElement('div');
            p.className = 'plus-one';
            p.innerText = '+1';
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);

            updateUI();
            save();
        };

        // --- КЕЙСЫ ---
        window.openCase = function(type) {
            const price = type === 'standard' ? 100 : 1000;
            
            if (state.coins < price) {
                alert("Нужно больше золота! Кликай!");
                return;
            }

            state.coins -= price;

            let dropSkin = null;
            let dropCoins = 0;

            if (type === 'standard') {
                dropCoins = Math.floor(Math.random() * 200) + 10;
                // Шанс 15% на скин Neon или Dark
                if (Math.random() < 0.15) {
                    const pool = ['neon', 'dark'];
                    dropSkin = pool[Math.floor(Math.random() * pool.length)];
                }
            } else {
                dropCoins = Math.floor(Math.random() * 1500) + 200;
                // Шанс 30% на редкие скины
                if (Math.random() < 0.3) {
                    const pool = ['ruby', 'void', 'neon'];
                    dropSkin = pool[Math.floor(Math.random() * pool.length)];
                }
            }

            // Начисляем приз
            state.coins += dropCoins;
            if (dropSkin && !state.owned.includes(dropSkin)) {
                state.owned.push(dropSkin);
            }

            showModal(dropCoins, dropSkin);
            updateUI();
            save();
        };

        // --- МОДАЛКА ---
        function showModal(c, s) {
            const modal = document.getElementById('overlay');
            const msg = document.getElementById('dropMsg');
            const icon = document.getElementById('dropIcon');
            const name = document.getElementById('dropName');

            modal.style.display = 'flex';

            if (s && !state.owned.includes(s)) {
                msg.innerText = "НОВЫЙ СКИН!";
                icon.innerText = SKINS[s].icon;
                name.innerText = SKINS[s].name;
            } else {
                msg.innerText = "ВЫИГРЫШ";
                icon.innerText = "💰";
                name.innerText = +${c} Монет;
            }
        }

        window.closeModal = function() {
            document.getElementById('overlay').style.display = 'none';
        }

        // Старт
        updateUI();

    </script>
</body>
</html>
