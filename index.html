<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA NEURAL CORE</title>
    <style>
        :root {
            --bg: #000000;
            --card: rgba(20, 20, 23, 0.6);
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.06);
            --text: #e5e7eb;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; position: fixed;
        }

        /* ДИНАМИЧЕСКИЙ ФОН КАК В GROK */
        .ambient-bg {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(147, 51, 234, 0.05) 0%, transparent 40%);
        }

        .container { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }

        /* МИНИМАЛИСТИЧНЫЙ ХЕДЕР */
        .header {
            padding: 20px 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); backdrop-filter: blur(20px);
        }
        .header h1 { font-size: 1.2rem; font-weight: 500; letter-spacing: 2px; color: #fff; margin: 0; }
        
        .toolbar { display: flex; gap: 12px; }
        .t-btn { 
            background: transparent; border: 1px solid var(--border); color: #888; 
            padding: 6px 14px; border-radius: 8px; font-size: 11px; cursor: pointer;
            transition: 0.2s; text-transform: uppercase;
        }
        .t-btn:active { background: var(--border); color: #fff; }

        #chat {
            flex: 1; overflow-y: auto; padding: 25px;
            display: flex; flex-direction: column; gap: 32px;
            padding-bottom: 220px; -webkit-overflow-scrolling: touch;
        }

        /* СООБЩЕНИЯ В СТИЛЕ GEMINI/GROK */
        .message { max-width: 90%; font-size: 16px; line-height: 1.65; animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } }

        .ai-msg { align-self: flex-start; color: #d1d5db; position: relative; padding-left: 0; }
        .ai-msg::before { 
            content: '✦'; display: block; margin-bottom: 10px; 
            background: linear-gradient(135deg, #3b82f6, #9333ea);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 24px;
        }

        .user-msg { 
            align-self: flex-end; background: var(--card); 
            padding: 16px 20px; border-radius: 18px;
            border: 1px solid var(--border);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* ПАНЕЛЬ ВВОДА */
        .input-area {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 25px 20px calc(40px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 90%, transparent);
        }

        .input-pill {
            max-width: 800px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border);
            border-radius: 28px; padding: 10px 10px 10px 24px;
            display: flex; align-items: center; gap: 12px;
            transition: 0.3s border-color;
        }
        .input-pill:focus-within { border-color: rgba(59, 130, 246, 0.4); }

        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 17px; outline: none; }
        input::placeholder { color: #555; }

        .send-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: #fff; border: none; color: #000;
            font-size: 20px; cursor: pointer; transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.9); background: var(--accent); color: #fff; }

        .memory-tag { font-size: 10px; color: var(--accent); opacity: 0.6; margin-bottom: 4px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="container">
        <div class="header">
            <h1>AURA CORE</h1>
            <div class="toolbar">
                <button class="t-btn" onclick="saveData()">💾</button>
                <button class="t-btn" onclick="forgetAll()">🗑️</button>
            </div>
        </div>
        <div id="chat"></div>
        <div class="input-area">
            <div class="input-pill">
                <input type="text" id="user-in" placeholder="Спросите о чем угодно..." autocomplete="off">
                <button id="send-btn" class="send-btn">↑</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat'), input = document.getElementById('user-in'), btn = document.getElementById('send-btn');

        // СИСТЕМА ОБУЧЕНИЯ (MEMORY)
        let memory = JSON.parse(localStorage.getItem('aura_memory')) || { name: "", interests: [], history: [] };

        const knowledgeBase = {
            "задач": "Я готова решить любую задачу. Математика, физика или логика — просто напиши условие.",
            "кто так": "Я знаю мировых знаменитостей, ученых и творцов. О ком именно ты хочешь узнать?",
            "бравл": "В Бравле сейчас важен контроль карты. Твой BAZA SHOP поможет игрокам получить преимущество!",
            "невинк": "В Невинномысске я слежу за твоим проектом ЧП | Невинка. Давай сделаем его лучшим в городе.",
            "учеб": "8-й класс — это время закладывать фундамент. Помочь с биологией или русским?",
            "дела": "Мои алгоритмы синхронизированы. Как твои успехи сегодня?",
            "привет": "Привет! Я помню наши прошлые диалоги. Чем займемся сегодня?"
        };

        function init() {
            if (memory.history.length === 0) {
                addMessage("Система инициализирована. Я — AURA CORE. Я обучаюсь на наших разговорах, чтобы стать твоим идеальным напарником.", "ai-msg");
            } else {
                memory.history.forEach(m => addMessage(m.text, m.type, true));
                addMessage("С возвращением! Я помню, на чем мы остановились.", "ai-msg");
            }
        }

        async function process() {
            const val = input.value.trim(); if(!val) return;
            
            // Обучение на ходу
            if (val.toLowerCase().includes("меня зовут")) memory.name = val.split("зовут")[1];
            
            addMessage(val, 'user-msg');
            saveToMemory(val, 'user-msg');
            input.value = '';

            setTimeout(() => {
                let reply = "Это интересный вопрос. Давай разберем его с точки зрения логики и фактов.";
                const low = val.toLowerCase();

                for (let key in knowledgeBase) {
                    if (low.includes(key)) { reply = knowledgeBase[key]; break; }
                }

                if (memory.name && Math.random() > 0.7) reply = `${memory.name}, я думаю, что ${reply.toLowerCase()}`;

                addMessage(reply, 'ai-msg');
                saveToMemory(reply, 'ai-msg');
            }, 700);
        }

        function addMessage(text, type, isHistory = false) {
            const m = document.createElement('div');
            m.className = `message ${type}`;
            if (type === 'ai-msg' && !isHistory) {
                const tag = document.createElement('div');
                tag.className = 'memory-tag';
                tag.textContent = 'NEURAL ADAPTATION';
                m.appendChild(tag);
            }
            const content = document.createElement('div');
            content.textContent = text;
            m.appendChild(content);
            chat.appendChild(m);
            chat.scrollTop = chat.scrollHeight;
        }

        function saveToMemory(text, type) {
            memory.history.push({text, type});
            if (memory.history.length > 50) memory.history.shift(); // Храним последние 50 сообщений
            localStorage.setItem('aura_memory', JSON.stringify(memory));
        }

        function forgetAll() {
            if(confirm("Сбросить обучение ИИ и очистить чат?")) {
                localStorage.removeItem('aura_memory');
                location.reload();
            }
        }

        function saveData() {
            const data = JSON.stringify(memory, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'aura_memory_dump.json'; a.click();
        }

        btn.onclick = process;
        input.onkeypress = (e) => { if(e.key === 'Enter') { process(); input.blur(); } };
        
        init();
    </script>
</body>
</html>
