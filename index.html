<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLIXY ELITE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #2e67f8;
            --bg: #000000;
            --surface: #121212;
            --text: #ffffff;
            --text-dim: #777;
            --danger: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; height: 100vh; }

        /* Контейнер */
        .app { height: 100vh; overflow-y: auto; padding: 60px 16px 160px; scrollbar-width: none; }
        .app::-webkit-scrollbar { display: none; }

        .logo { font-size: 26px; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 30px; }

        /* Список треков */
        .track-item {
            display: flex; align-items: center; padding: 12px;
            background: rgba(255,255,255,0.03); border-radius: 16px; margin-bottom: 8px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .track-item img { width: 52px; height: 52px; border-radius: 10px; margin-right: 14px; object-fit: cover; }
        .track-meta { flex: 1; }
        .track-meta h4 { font-size: 16px; font-weight: 600; }
        .track-meta p { font-size: 13px; color: var(--text-dim); }
        .del-btn { color: #333; padding: 10px; transition: 0.2s; }
        .del-btn:hover { color: var(--danger); }

        /* Кнопка Плюс */
        .fab {
            position: fixed; right: 20px; bottom: 100px;
            width: 60px; height: 60px; background: var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(46, 103, 248, 0.4); z-index: 1500;
        }

        /* Плеер */
        .full-player {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #1a1a1c 0%, #000 100%);
            z-index: 2500; transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 20px 25px; display: flex; flex-direction: column; align-items: center;
        }
        .full-player.active { transform: translateY(-100%); }

        .handle { width: 40px; height: 5px; background: #333; border-radius: 10px; margin-bottom: 40px; }
        
        .big-cover { 
            width: 85%; aspect-ratio: 1; border-radius: 20px; object-fit: cover;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); transition: 0.5s ease;
        }
        .playing .big-cover { transform: scale(1.05); animation: pulse 3s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1.05); } 50% { transform: scale(1.0); } }

        .seek-bar { width: 100%; height: 4px; -webkit-appearance: none; background: #333; border-radius: 2px; margin: 40px 0 10px; }
        .seek-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #fff; border-radius: 50%; }

        .main-controls { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 20px; }
        .play-btn { width: 80px; height: 80px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; }

        /* Мини-плеер */
        .mini {
            position: fixed; bottom: 20px; left: 10px; right: 10px;
            background: rgba(20,20,20,0.9); backdrop-filter: blur(20px);
            height: 64px; border-radius: 18px; display: flex; align-items: center;
            padding: 0 12px; z-index: 1000; border: 1px solid rgba(255,255,255,0.05);
        }
        .mini img { width: 44px; height: 44px; border-radius: 10px; margin-right: 12px; }

        /* Модалка */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; z-index: 3000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-body { background: #1c1c1e; width: 100%; border-radius: 24px; padding: 25px; border: 1px solid #333; }
        input { width: 100%; background: #2c2c2e; border: none; padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 12px; }
        .btn-add { width: 100%; background: var(--accent); color: #fff; padding: 16px; border-radius: 14px; border: none; font-weight: 700; }
    </style>
</head>
<body id="body">

<div class="app">
    <div class="logo">FLIXY</div>
    <div id="list"></div>
</div>

<div class="fab" onclick="showM(true)"><i class="fas fa-plus" style="color:#fff; font-size:24px;"></i></div>

<div class="modal" id="modal" onclick="if(event.target==this) showM(false)">
    <div class="modal-body">
        <h3 style="margin-bottom:20px">Загрузить музыку</h3>
        <input type="text" id="name" placeholder="Название">
        <input type="text" id="artist" placeholder="Исполнитель">
        <p style="font-size:12px; color:#555; margin-bottom:5px">Обложка и MP3:</p>
        <input type="file" id="img" accept="image/*">
        <input type="file" id="snd" accept="audio/*">
        <button class="btn-add" onclick="upload()">Добавить</button>
    </div>
</div>

<div class="mini" id="mini" style="display:none" onclick="openP()">
    <img id="m-i" src="">
    <div class="track-meta"><h4 id="m-t"></h4><p id="m-a"></p></div>
    <i class="fas fa-play" id="m-p" onclick="event.stopPropagation(); toggle();" style="font-size:22px; margin:0 10px"></i>
</div>

<div class="full-player" id="full">
    <div class="handle" onclick="closeP()"></div>
    <img id="f-i" class="big-cover">
    <div style="width:100%; margin-top:40px">
        <h1 id="f-t" style="font-size:28px"></h1>
        <p id="f-a" style="font-size:18px; color:var(--text-dim)"></p>
    </div>
    <input type="range" class="seek-bar" id="seek" value="0">
    <div style="display:flex; justify-content:space-between; width:100%; color:#444; font-size:12px">
        <span id="cur">0:00</span><span id="dur">0:00</span>
    </div>
    <div class="main-controls">
        <i class="fas fa-random" style="color:#222"></i>
        <i class="fas fa-step-backward" style="font-size:24px"></i>
        <div class="play-btn" onclick="toggle()"><i class="fas fa-play" id="f-p"></i></div>
        <i class="fas fa-step-forward" style="font-size:24px"></i>
        <i class="fas fa-redo" style="color:#222"></i>
    </div>
</div>

<script>
    const audio = new Audio();
    let db;

    const req = indexedDB.open("FlixyDB", 1);
    req.onupgradeneeded = e => { e.target.result.createObjectStore("songs", {keyPath:"id", autoIncrement:true}); };
    req.onsuccess = e => { db = e.target.result; render(); };

    function showM(s) { document.getElementById('modal').style.display = s?'flex':'none'; }

    async function upload() {
        const n=document.getElementById('name').value, a=document.getElementById('artist').value;
        const fi=document.getElementById('img').files[0], fa=document.getElementById('snd').files[0];
        if(!n||!a||!fi||!fa) return alert("Файлы!");
        const song = {n, a, i:await toB64(fi), s:await toB64(fa)};
        const tx = db.transaction("songs","readwrite");
        tx.objectStore("songs").add(song);
        tx.oncomplete = () => { render(); showM(false); };
    }

    const toB64 = f => new Promise(res => { const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(f); });

    function render() {
        const l = document.getElementById('list'); l.innerHTML = '';
        db.transaction("songs").objectStore("songs").openCursor().onsuccess = e => {
            const c = e.target.result;
            if(c) {
                const s = c.value;
                const d = document.createElement('div');
                d.className = 'track-item';
                d.onclick = () => play(s);
                d.innerHTML = `<img src="${s.i}"><div class="track-meta"><h4>${s.n}</h4><p>${s.a}</p></div>
                               <div class="del-btn" onclick="event.stopPropagation(); del(${s.id})"><i class="fas fa-trash"></i></div>`;
                l.prepend(d); c.continue();
            }
        };
    }

    function del(id) {
        if(confirm("Удалить трек?")) {
            const tx = db.transaction("songs","readwrite");
            tx.objectStore("songs").delete(id);
            tx.oncomplete = () => render();
        }
    }

    function play(s) {
        audio.src = s.s; audio.play();
        document.getElementById('mini').style.display = 'flex';
        document.getElementById('m-t').innerText = document.getElementById('f-t').innerText = s.n;
        document.getElementById('m-a').innerText = document.getElementById('f-a').innerText = s.a;
        document.getElementById('m-i').src = document.getElementById('f-i').src = s.i;
        updateUI(true);
    }

    function toggle() { audio.paused?audio.play():audio.pause(); updateUI(!audio.paused); }
    
    function updateUI(p) {
        const i = p?'fa-pause':'fa-play';
        document.getElementById('m-p').className = 'fas '+i;
        document.getElementById('f-p').className = 'fas '+i;
        p ? document.getElementById('full').classList.add('playing') : document.getElementById('full').classList.remove('playing');
    }

    function openP() { document.getElementById('full').classList.add('active'); }
    function closeP() { document.getElementById('full').classList.remove('active'); }

    const sk = document.getElementById('seek');
    audio.ontimeupdate = () => {
        if(!audio.duration) return;
        sk.value = (audio.currentTime/audio.duration)*100;
        document.getElementById('cur').innerText = fmt(audio.currentTime);
        document.getElementById('dur').innerText = fmt(audio.duration);
    };
    sk.oninput = function() { audio.currentTime = (this.value/100)*audio.duration; };
    const fmt = t => { const m=Math.floor(t/60), s=Math.floor(t%60); return m+":"+(s<10?'0':'')+s; };
</script>
</body>
</html>
