<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapok Desktop</title>
    <style>
        :root {
            --tg-bg: #0f0f0f;
            --tg-sidebar: #181818;
            --tg-active: #2b2b2b;
            --tg-text: #ffffff;
            --tg-hint: #aaaaaa;
            --tg-button: #ffffff;
            --tg-msg-out: #2b2b2b;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Боковая панель */
        .sidebar {
            width: 300px;
            background-color: var(--tg-sidebar);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-icon { width: 20px; height: 2px; background: white; position: relative; }
        .menu-icon::before, .menu-icon::after { content: ''; position: absolute; width: 20px; height: 2px; background: white; top: -6px; }
        .menu-icon::after { top: 6px; }

        .search-bar {
            background: #242424;
            border: none;
            border-radius: 8px;
            padding: 10px;
            margin: 0 15px 15px;
            color: white;
            outline: none;
        }

        .chat-list { overflow-y: auto; flex: 1; }
        .chat-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .chat-item.active { background-color: var(--tg-active); }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #555, #222);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Основное окно чата */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* Классический фон TG */
            background-blend-mode: overlay;
            background-color: #0a0a0a;
        }

        .chat-header {
            padding: 10px 20px;
            background: rgba(24, 24, 24, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .messages {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .msg {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            position: relative;
        }
        .msg.in { background: #181818; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.out { background: var(--tg-msg-out); align-self: flex-end; border-bottom-right-radius: 2px; }

        .input-area {
            padding: 15px 20px;
            background: rgba(24, 24, 24, 0.9);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .msg-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 15px;
        }

        .tapok-logo {
            width: 35px;
            filter: invert(1);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="menu-icon"></div>
            <input type="text" class="search-bar" placeholder="Поиск">
        </div>
        <div class="chat-list">
            <div class="chat-item active">
                <div class="avatar"><img src="https://i.ibb.co/Xxd9Y3q/image.png" style="width:100%; filter:invert(1);"></div>
                <div class="info">
                    <div style="font-weight:600">Tapok Messenger</div>
                    <div style="color:var(--tg-hint); font-size:13px">Это твоя версия мода</div>
                </div>
            </div>
            <div class="chat-item">
                <div class="avatar" style="background:#4a6ea5">Б</div>
                <div class="info">
                    <div style="font-weight:600">Baza Shop</div>
                    <div style="color:var(--tg-hint); font-size:13px">Заказ принят</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <div>
                <div style="font-weight:600">Tapok Support</div>
                <div style="color:var(--tg-hint); font-size:12px">в сети</div>
            </div>
            <img src="https://i.ibb.co/Xxd9Y3q/image.png" class="tapok-logo" alt="Logo">
        </div>

        <div class="messages">
            <div class="msg in">Привет! Это оболочка Tapok. Все файлы собраны в один.</div>
            <div class="msg in">Чтобы это стало модом, ты можешь менять этот код как хочешь.</div>
            <div class="msg out">Выглядит как настоящий Телеграм!</div>
        </div>

        <div class="input-area">
            <span style="font-size:20px; cursor:pointer">📎</span>
            <input type="text" class="msg-input" placeholder="Написать сообщение...">
            <span style="font-size:20px; cursor:pointer">🎤</span>
        </div>
    </div>

</body>
</html>
