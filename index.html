<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA | SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .aura-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% -20%, #2e1065 0%, #000 85%); }
        .aura-bg::after { content: ''; position: absolute; inset: 0; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; pointer-events: none; }
        
        .msg-ai { background: rgba(255,255,255,0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; border-left: 4px solid #a855f7; }
        .msg-user { background: linear-gradient(135deg, #a855f7, #6366f1); border-radius: 24px 24px 4px 24px; align-self: flex-end; box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3); }

        #chat-flow { height: calc(100vh - 180px); scroll-behavior: smooth; mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent); }
        #chat-flow::-webkit-scrollbar { width: 0; }
        
        .input-pill { background: rgba(15,15,15,0.85); backdrop-filter: blur(50px); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; }
        .shimmer { background: linear-gradient(90deg, #fff, #a855f7, #fff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shim 5s linear infinite; font-weight: 900; }
        @keyframes shim { to { background-position: 200% center; } }
    </style>
</head>
<body class="flex flex-col">
    <div class="aura-bg"></div>

    <header class="pt-16 pb-5 px-10 flex justify-between items-center border-b border-white/5">
        <h1 class="text-2xl shimmer italic uppercase">Aura</h1>
        <div class="text-[8px] tracking-[0.4em] opacity-40 uppercase">Supreme 1.0</div>
    </header>

    <main id="chat-flow" class="overflow-y-auto p-6 space-y-8 flex flex-col pt-10">
        <div class="msg-ai p-6 text-sm max-w-[90%] leading-relaxed italic opacity-80">
            AURA ONLINE. Канал зашифрован. Жду команду...
        </div>
    </main>

    <div id="status" class="hidden px-10 py-2 text-[9px] text-purple-400 tracking-[0.4em] uppercase animate-pulse">Computing...</div>

    <footer class="p-6 pb-12">
        <div class="max-w-4xl mx-auto input-pill flex items-center p-2 shadow-2xl">
            <input type="text" id="userInput" class="w-full bg-transparent px-6 py-4 text-sm outline-none text-white placeholder-white/20" placeholder="Sync with Aura..." autocomplete="off">
            <button onclick="send()" class="bg-white text-black h-12 w-12 flex items-center justify-center rounded-full active:scale-90 transition-all">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
        </div>
    </footer>

    <script>
        // ТВОЙ НОВЫЙ ЗАШИФРОВАННЫЙ КЛЮЧ УЖЕ ВНУТРИ
        const _0xHASH = 'QUl6YVN5QXM0WElDOUl4S2M3dHBNSzdQUlhmZk11RlNVSjZyZVFR';

        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat-flow');
            const status = document.getElementById('status');
            const val = input.value.trim();
            if (!val) return;

            const K = atob(_0xHASH); 
            input.value = '';
            chat.innerHTML += `<div class="msg-user p-6 text-sm max-w-[85%]">${val}</div>`;
            chat.scrollTo(0, chat.scrollHeight);
            status.classList.remove('hidden');

            try {
                // ИСПРАВЛЕННЫЙ URL (теперь модель точно найдется)
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${K}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await r.json();
                status.classList.add('hidden');

                if (data.error) {
                    chat.innerHTML += `<div class="p-5 bg-red-900/20 text-red-300 rounded-3xl text-[10px] text-center uppercase">Ошибка системы: ${data.error.status}</div>`;
                    console.error(data.error);
                } else {
                    const aiText = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="msg-ai p-7 text-sm max-w-[90%] leading-relaxed">${aiText}</div>`;
                }
            } catch (err) {
                status.classList.add('hidden');
                chat.innerHTML += `<div class="text-red-500 text-center text-[10px] uppercase tracking-widest">Критическая ошибка сети</div>`;
            }
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
        }
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
