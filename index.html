<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIXY | Стриминговая платформа</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111;
            --accent: #bcff00; /* Неоновый лайм */
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Шапка с логотипом */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, #000, transparent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo span {
            color: var(--accent);
            margin-left: 2px;
        }

        /* Главный экран */
        .hero {
            padding: 60px 5% 20px;
            text-align: left;
        }

        .hero h1 {
            font-size: 48px;
            margin: 0;
            font-weight: 900;
        }

        .hero p {
            color: #888;
            font-size: 18px;
            max-width: 600px;
        }

        /* Сетка видео */
        .content {
            padding: 20px 5% 100px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
        }

        .video-item {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            transition: all 0.4s ease;
        }

        .video-item:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(188, 255, 0, 0.1);
        }

        /* Настройки плеера */
        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #000;
        }

        .video-info {
            padding: 20px;
        }

        .video-info h3 {
            margin: 0 0 10px 0;
            font-size: 22px;
        }

        .video-info p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">flix<span>▶</span>y</a>
</header>

<section class="hero">
    <h1>Моя библиотека</h1>
    <p>Здесь я собираю лучшие видео и проекты. Всё, что загружено вручную.</p>
</section>

<main class="content">
    <div class="video-grid">
        
        <div class="video-item">
            <video controls poster="images/preview.jpg">
                <source src="videos/movie.mp4" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
            <div class="video-info">
                <div class="badge">NEW</div>
                <h3>Название видео</h3>
                <p>Это описание твоего контента. Ты можешь изменить его в коде в любой момент.</p>
            </div>
        </div>
        </div>
</main>

</body>
</html>
