<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAO Premium App</title>
    <style>
        :root {
            --bg: #03060e;
            --primary: #acff01; /* Неоновый зеленый */
            --secondary: #9d00ff; /* Фиолетовый */
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(172, 255, 1, 0.15);
            --text: #ffffff;
            --text-muted: #808da4;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(157, 0, 255, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(172, 255, 1, 0.05) 0%, transparent 40%);
            color: var(--text);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }

        /* Header & Balance */
        .header {
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(3, 6, 14, 0.5);
            backdrop-filter: blur(10px);
        }

        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; border: 2px solid var(--border); }
        .user-tag { color: var(--primary); font-size: 14px; font-weight: 500; }

        .balance-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 15px;
            text-align: right;
            box-shadow: 0 0 15px rgba(172, 255, 1, 0.1);
        }
        .balance-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 28px; color: var(--primary); font-weight: bold; text-shadow: 0 0 10px rgba(172, 255, 1, 0.5); }

        /* Main Content & Screens */
        .main-container { flex-grow: 1; position: relative; overflow: hidden; }
        
        .screen {
            position: absolute; width: 100%; height: 100%;
            opacity: 0; visibility: hidden; transform: translateY(20px);
            transition: all 0.4s ease;
            display: flex; flex-direction: column; align-items: center; padding: 25px; box-sizing: border-box;
        }
        .screen.active { opacity: 1; visibility: visible; transform: translateY(0); }

        /* Game Screen Elements */
        .news-bar {
            background: var(--glass); border: 1px solid var(--border);
            width: 100%; padding: 15px; border-radius: 18px;
            margin-bottom: 25px; display: flex; gap: 12px; align-items: center;
        }
