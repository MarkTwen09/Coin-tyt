<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Military Theatre v2</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --panel-bg: rgba(20, 25, 31, 0.96);
            --border-color: #2f363d;
            --gold: #dfa837;
            /* Цвет твоей фракции — мягкий военный зеленый */
            --player-color: #2e7559;
            --player-stroke: #3b9c75;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e11;
            color: #cbd5e1;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            background-color: #0f141c;
        }

        .leaflet-control-zoom { display: none !important; }
        .leaflet-control-attribution { background: rgba(0,0,0,0.7) !important; color: #444 !important; }

        /* HUD сверху */
        .game-hud {
            position: absolute;
            top: 0; left: 0; width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, rgba(16,21,27,1) 0%, rgba(16,21,27,0.85) 100%);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        .hud-profile { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; }
        .hud-level { background: #238636; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        
        .resource-group { display: flex; gap: 16px; max-width: 65%; overflow-x: auto; }
        .res-cell { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 600; }
        .res-cell span { color: #fff; }

        /* Нижний док управления */
        .action-dock {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: var(--panel-bg);
            border-top: 2px solid var(--border-color);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            padding: 20px 16px;
            z-index: 100;
            display: none;
            box-shadow: 0 -8px 32px rgba(0,0,0,0.7);
            animation: slideUp 0.2s cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .dock-title { font-size: 20px; font-weight: 800; color: #ffffff; margin-bottom: 4px; }
        .dock-subtitle { font-size: 12px; color: #8b949e; text-transform: uppercase; margin-bottom: 16px; }
        
        .dock-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .game-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .game-btn:active { background: #30363d; }
        .btn-attack { background: #852222; border-color: #b53333; color: #fff; grid-column: span 2; }
    </style>
</head>
<body>

    <div class="game-hud">
        <div class="hud-profile">
            <div class="hud-level">78-Й</div>
            <span style="color: var(--gold);">⚡ 1,466</span>
        </div>
        <div class="resource-group">
            <div class="res-cell">🪵 <span>12.4K</span></div>
            <div class="res-cell">🪙 <span>9.2K</span></div>
            <div class="res-cell">📦 <span>5.9K</span></div>
            <div class="res-cell">💵 <span>7.6K</span></div>
        </div>
    </div>

    <div id="map"></div>

    <div class="action-dock" id="control-dock">
        <div class="dock-title" id="country-name">Название Государства</div>
        <div class="dock-subtitle" id="country-status">Статус региона</div>
        <div class="dock-buttons" id="action-buttons-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Создаем карту и фиксируем фокус на Европе
        const map = L.map('map', {
            center: [53.9, 27.5], 
            zoom: 5,
            minZoom: 3,
            maxZoom: 7,
            zoomSnap: 0.5
        });

        // Грузим подложку темных тайлов CartoDB
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB'
        }).addTo(map);

        // Список стран, которые мы отслеживаем в нашей игре
        const myEmpire = "Belarus";
        const playableCountries = ["Belarus", "Ukraine", "Poland", "Lithuania", "Latvia", "Estonia", "Russia", "Germany"];
        
        let geojsonLayer;

        // Задаем стили: Твоя страна — сочный хаки, остальные — нейтральный тактический серый контур
        function getFeatureStyle(feature) {
            const cName = feature.properties.name;
            if (cName === myEmpire) {
                return {
                    fillColor: '#2e7559',      // Тот самый мягкий военный зеленый
                    fillOpacity: 0.45,         // Идеальная прозрачность поверх карты
                    color: '#3b9c75',          // Контур твоих границ
                    weight: 2.5,
                    opacity: 1
                };
            } else if (playableCountries.includes(cName)) {
                return {
                    fillColor: '#2c353d',      // Нейтральные соседние страны
                    fillOpacity: 0.15,
                    color: '#4e5a65',          // Четкие, аккуратные границы
                    weight: 1.5,
                    opacity: 0.6
                };
            } else {
                // Все остальные страны мира, не участвующие в сессии, делаем полностью прозрачными
                return { fillOpacity: 0, color: 'transparent', weight: 0 };
            }
        }

        // Подгружаем ОФИЦИАЛЬНЫЕ и точные границы стран мира (высокое разрешение GeoJSON)
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(response => response.json())
            .then(data => {
                geojsonLayer = L.geoJSON(data, {
                    style: getFeatureStyle,
                    onEachFeature: (feature, layer) => {
                        const countryName = feature.properties.name;
                        
                        // Игнорируем страны, которые нам не нужны в геймплее
                        if (!playableCountries.includes(countryName)) return;

                        // Эффект наведения
                        layer.on('mouseover', () => {
                            layer.setStyle({ fillOpacity: countryName === myEmpire ? 0.6 : 0.35 });
                        });
                        layer.on('mouseout', () => {
                            geojsonLayer.resetStyle(layer);
                        });

                        // Клик по стране — выезжает меню
                        layer.on('click', (e) => {
                            document.getElementById('control-dock').style.display = 'block';
                            
                            // Переводим названия на русский для красоты интерфейса
                            let displayName = countryName;
                            if(countryName === 'Belarus') displayName = 'Белорусская ССР';
                            if(countryName === 'Ukraine') displayName = 'Украинская ССР';
                            if(countryName === 'Poland') displayName = 'Польская Республика';
                            if(countryName === 'Russia') displayName = 'Российская Федерация';

                            document.getElementById('country-name').innerText = displayName;
                            const buttonsContainer = document.getElementById('action-buttons-container');

                            if (countryName === myEmpire) {
                                document.getElementById('country-status').innerText = 'Ваша суверенная территория';
                                buttonsContainer.innerHTML = `
                                    <button class="game-btn" onclick="alert('Строительство начато')">🔨 Построить ДОТ</button>
                                    <button class="game-btn" onclick="alert('Завод запущен')">🏭 На завод</button>
                                `;
                            } else {
                                document.getElementById('country-status').innerText = 'Вражеская фракция (ИИ)';
                                buttonsContainer.innerHTML = `
                                    <button class="game-btn btn-attack" onclick="annexCountry('${countryName}', layer)">⚔️ ОБЪЯВИТЬ ВОЙНУ И НАЧАТЬ ШТУРМ</button>
                                `;
                            }
                            L.DomEvent.stopPropagation(e);
                        });
                    }
                }).addTo(map);
            });

        // Закрытие дока при клике на воду
        map.on('click', () => {
            document.getElementById('control-dock').style.display = 'none';
        });

        // Логика захвата — перекрашивает страну на лету в твой цвет
        function annexCountry(name, layer) {
            alert(`[ШТАБ]: Войска выдвинулись на штурм границ!`);
            setTimeout(() => {
                // Меняем глобального владельца на эту страну
                layer.feature.properties.name = myEmpire; 
                layer.setStyle(getFeatureStyle(layer.feature));
                alert(`[ПОБЕДА]: Территория успешно аннексирована! Границы перекрашены.`);
                document.getElementById('control-dock').style.display = 'none';
            }, 1200);
        }
    </script>
</body>
</html>
