<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГЕТТО БАНК | Твой район — твои правила</title>
    <style>
        /* Основные стили */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .bank-container {
            width: 400px;
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 2px solid #333;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 5px;
            color: #ff0000;
            text-shadow: 2px 2px #000;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .balance-card {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #ff0000;
        }

        .balance-label {
            font-size: 0.9rem;
            color: #aaa;
        }

        .balance-amount {
            font-size: 2.5rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            background-color: #ff0000;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background-color: #b30000;
            transform: translateY(-2px);
        }

        .history {
            margin-top: 25px;
            text-align: left;
            font-size: 0.8rem;
            color: #555;
        }

        /* Декоративный элемент */
        .graffiti {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 5rem;
            opacity: 0.05;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bank-container">
        <h1>ГЕТТО</h1>
        <div class="subtitle">Банк для тех, кто в игре</div>

        <div class="balance-card">
            <div class="balance-label">Твой общак:</div>
            <div class="balance-amount" id="balance">1 250 000 ₽</div>
        </div>

        <div class="actions">
            <button onclick="updateBalance(50000)">Приход</button>
            <button onclick="updateBalance(-50000)" style="background: #333;">Расход</button>
        </div>

        <div class="history">
            <div>Последняя движуха: Перевод на район... OK</div>
            <div>Статус: Под защитой Aura AI</div>
        </div>
    </div>

    <div class="graffiti">GHETTO</div>

    <script>
        let currentBalance = 1250000;

        function updateBalance(amount) {
            currentBalance += amount;
            document.getElementById('balance').innerText = currentBalance.toLocaleString() + ' ₽';
        }
    </script>
</body>
</html>
