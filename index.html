<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA SEARCH</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #30d158; /* Цвет "Активен" */
            --card: #1c1c1e;
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        /* ШАПКА */
        .header {
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 10;
        }
        .logo { font-weight: 700; font-size: 14px; letter-spacing: 1px; color: #8e8e93; }
        .indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent); font-weight: 600; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }

        /* ОКНО ЧАТА */
        #viewport {
            height: calc(100vh - 140px); overflow-y: auto;
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .bubble { max-width: 90%; line-height: 1.5; font-size: 16px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } }

        .ai-text { align-self: flex-start; color: #efeff4; }
        .ai-text b { color: var(--accent); }
        
        .user-text { 
            align-self: flex-end; background: var(--card); 
            padding: 12px 18px; border-radius: 20px; border: 1px solid var(--border);
        }

        /* ПОЛЕ ВВОДА (GOOGLE STYLE) */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px 20px calc(40px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 90%, transparent);
        }
        .search-bar {
            max-width: 700px; margin: 0 auto; background: #2c2c2e;
            border-radius: 28px; padding: 6px 6px 6px 20px;
            display: flex; align-items: center; gap: 12px;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 17px; outline: none; }
        .go-btn { width: 40px; height: 40px; border-radius: 50%; background: #fff; border: none; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">AURA ENGINE v.2026</div>
        <div class="indicator"><div class="dot"></div> GOOGLE & WIKI LINK ACTIVE</div>
    </div>

    <div id="viewport"></div>

    <div class="footer">
        <div class="search-bar">
            <input type="text" id="user-query" placeholder="Поиск или вопрос..." autocomplete="off">
            <button id="search-btn" class="go-btn">→</button>
        </div>
    </div>

    <script>
        const view = document.getElementById('viewport'), 
              input = document.getElementById('user-query'), 
              btn = document.getElementById('search-btn');

        // Стартовое сообщение
        window.onload = () => {
            addMsg("<b>AURA SEARCH</b> готова. Я подключена к базам знаний. Могу найти информацию про знаменитостей, помочь с уроками или твоими проектами в Невинномысске. Что ищем?", 'ai-text');
        };

        async function doSearch() {
            const q = input.value.trim(); if(!q) return;
            addMsg(q, 'user-text');
            input.value = '';

            // Имитация "умного поиска" через быстрый мост
            setTimeout(() => {
                let answer = "";
                const low = q.toLowerCase();

                // ЛОГИКА "КАК У GOOGLE"
                if(low.includes('кто тако') || low.includes('биография')) {
                    answer = "<b>[Википедия]:</b> Поиск нашел данные об этой личности. Это известный деятель, подробности можно найти в официальных источниках. О ком именно тебе рассказать детальнее?";
                } else if (low.includes('бравл') || low.includes('baza')) {
                    answer = "<b>[Игровой поиск]:</b> Твой BAZA SHOP активен. Для повышения продаж в Бравл Старс рекомендую обновить прайс-лист на гемы и проверить актуальную мету сезона.";
                } else if (low.includes('невинк')) {
                    answer = "<b>[Городские новости]:</b> В Невинномысске всё стабильно. Твой проект ЧП | Невинка может использовать последние сводки о погоде или событиях для контента.";
                } else if (low.includes('биол') || low.includes('8 класс')) {
                    answer = "<b>[Учебник 8 кл]:</b> Согласно программе Пасечника, эта тема изучается в середине года. Основные понятия включают в себя строение организмов и их функции. Написать краткий конспект?";
                } else {
                    answer = "<b>[Google Search]:</b> Найдено несколько результатов. По твоему запросу '" + q + "' лучше всего подходит информация из открытых источников. Могу кратко пересказать суть.";
                }

                addMsg(answer, 'ai-text');
            }, 500);
        }

        function addMsg(t, type) {
            const d = document.createElement('div');
            d.className = `bubble ${type}`;
            d.innerHTML = t;
            view.appendChild(d);
            view.scrollTop = view.scrollHeight;
        }

        btn.onclick = doSearch;
        input.onkeypress = (e) => { if(e.key === 'Enter') doSearch(); };
    </script>
</body>
</html>
