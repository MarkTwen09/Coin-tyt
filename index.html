<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GHETTO BANK PRO</title>
    <style>
        :root { --bg: #000; --card: #121212; --accent: #ffde00; --red: #ff3b30; }
        body {
            background: var(--bg); color: #fff; font-family: -apple-system, sans-serif;
            margin: 0; padding: env(safe-area-inset-top) 15px 100px 15px; user-select: none;
        }
        .header { display: flex; justify-content: space-between; padding: 20px 5px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #222; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-val { font-size: 18px; font-weight: 800; }
        
        .main-balance { background: var(--card); border-radius: 30px; padding: 25px; margin-bottom: 20px; border: 1px solid #222; position: relative; overflow: hidden; }
        .main-balance::after { content: 'BLACK'; position: absolute; right: -10px; bottom: 10px; font-size: 40px; font-weight: 900; opacity: 0.05; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            background: var(--card); border: 1px solid #333; color: #fff; padding: 20px 10px;
            border-radius: 22px; font-weight: 700; font-size: 13px; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); background: #222; }
        .btn.primary { background: var(--accent); color: #000; border: none; }
        .btn.danger { border-color: var(--red); color: var(--red); }

        .log-box { margin-top: 25px; background: #080808; border-radius: 20px; padding: 15px; height: 120px; overflow-y: auto; font-size: 12px; border: 1px solid #111; }
        .log-entry { margin-bottom: 8px; border-left: 2px solid var(--accent); padding-left: 8px; }
        
        #death-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
    </style>
</head>
<body>

<div id="death-screen">
    <h1 style="color:var(--red); font-size: 40px;">ТЫ СЛИЛСЯ</h1>
    <button class="btn primary" onclick="location.reload()">НАЧАТЬ СНАЧАЛА</button>
</div>

<div class="header">
    <div style="font-weight: 900; font-size: 24px;">GHETTO <span style="color:var(--accent)">BANK</span></div>
    <div id="day-counter" style="color:#888;">ДЕНЬ 1</div>
</div>

<div class="main-balance">
    <div class="stat-label">Доступный нал</div>
    <div id="money" style="font-size: 36px; font-weight: 800;">500 ₽</div>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-label">Товар на складе</div>
        <div id="stock" class="stat-val">0 г.</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Энергия</div>
        <div id="energy" class="stat-val">100%</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Розыск (Полиция)</div>
        <div id="wanted" class="stat-val" style="color: #34c759;">НЕТ</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Авторитет</div>
        <div id="rep" class="stat-val">0</div>
    </div>
</div>

<div class="action-grid">
    <button class="btn" onclick="buyStock()">Закупить товар (-500₽)</button>
    <button class="btn" onclick="sellStock()">Толкнуть на районе</button>
    <button class="btn" onclick="rest()">Отлежаться (Энергия)</button>
    <button class="btn danger" onclick="bribe()">Дать на лапу (-1000₽)</button>
</div>

<div class="log-box" id="logs">
    <div class="log-entry">Добро пожаловать в игру. Не попадись копам.</div>
</div>

<script>
    let state = {
        money: 500, stock: 0, energy: 100, wanted: 0, rep: 0, day: 1
    };

    function log(msg, color = '#888') {
        const box = document.getElementById('logs');
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.style.borderLeftColor = color;
        div.innerHTML = `[${state.day} дн.] ${msg}`;
        box.prepend(div);
    }

    function update() {
        document.getElementById('money').innerText = Math.floor(state.money).toLocaleString() + ' ₽';
        document.getElementById('stock').innerText = state.stock + ' г.';
        document.getElementById('energy').innerText = state.energy + '%';
        document.getElementById('day-counter').innerText = 'ДЕНЬ ' + state.day;
        document.getElementById('rep').innerText = state.rep;
        
        let w = document.getElementById('wanted');
        if(state.wanted > 70) { w.innerText = 'ОПАСНО'; w.style.color = 'var(--red)'; }
        else if(state.wanted > 30) { w.innerText = 'СЛЕДЯТ'; w.style.color = '#ff9500'; }
        else { w.innerText = 'ЧИСТО'; w.style.color = '#34c759'; }

        if(state.energy <= 0 || state.wanted >= 100) {
            document.getElementById('death-screen').style.display = 'flex';
        }
    }

    function buyStock() {
        if(state.money >= 500 && state.energy >= 10) {
            state.money -= 500;
            state.stock += 10;
            state.energy -= 10;
            log('Закупил 10г товара у поставщика.', '#34c759');
            nextTurn();
        } else { log('Нет денег или сил.', 'var(--red)'); }
        update();
    }

    function sellStock() {
        if(state.stock > 0 && state.energy >= 20) {
            let gain = state.stock * (80 + Math.random() * 100);
            state.money += gain;
            state.stock = 0;
            state.energy -= 20;
            state.wanted += 15;
            state.rep += 5;
            log(`Скинул товар за ${Math.floor(gain)}₽. Копы начали копать.`, 'var(--accent)');
            nextTurn();
        } else { log('Нечего продавать или ты слишком устал.', 'var(--red)'); }
        update();
    }

    function rest() {
        state.energy = Math.min(100, state.energy + 40);
        state.wanted = Math.max(0, state.wanted - 5);
        log('Ты отоспался. Внимание копов чуть упало.');
        nextTurn();
        update();
    }

    function bribe() {
        if(state.money >= 1000) {
            state.money -= 1000;
            state.wanted = 0;
            log('Дал на лапу майору. Розыск снят.', '#5856d6');
        } else { log('Недостаточно денег для взятки!'); }
        update();
    }

    function nextTurn() {
        state.day++;
        // Случайные события
        if(Math.random() > 0.8) {
            let theft = state.money * 0.1;
            state.money -= theft;
            log(`Шныри украли у тебя ${Math.floor(theft)}₽ ночью!`, 'var(--red)');
        }
        update();
    }

    update();
</script>
</body>
</html>
