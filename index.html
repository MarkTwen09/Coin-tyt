<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHETTO PRIVATE</title>
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --accent: #ffffff;
            --gray: #8e8e93;
            --border: #222222;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--accent); font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; justify-content: center; }
        
        /* AUTH SCREEN */
        #auth { width: 100%; max-width: 430px; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px; }
        .auth-title { font-size: 32px; font-weight: 700; margin-bottom: 40px; text-align: center; }
        
        /* MAIN APP */
        #app { width: 100%; max-width: 430px; min-height: 100vh; display: none; padding: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .user-info { font-size: 14px; font-weight: 600; cursor: pointer; background: var(--card); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); }

        /* CARD */
        .main-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; margin-bottom: 30px; }
        .balance-title { font-size: 13px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .balance-val { font-size: 38px; font-weight: 700; letter-spacing: -1px; }

        /* ACTIONS */
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .btn-act { background: var(--card); border: 1px solid var(--border); color: #fff; padding: 18px; border-radius: 16px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; }
        .btn-act:active { background: #1a1a1a; }
        .btn-main { background: #fff; color: #000; border: none; padding: 18px; border-radius: 16px; font-weight: 700; font-size: 16px; width: 100%; cursor: pointer; }

        /* CONTACTS */
        .section-header { font-size: 18px; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .add-btn { color: var(--gray); font-size: 24px; cursor: pointer; }
        .contacts { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .contacts::-webkit-scrollbar { display: none; }
        .contact-box { min-width: 80px; text-align: center; background: var(--card); padding: 15px 10px; border-radius: 20px; border: 1px solid var(--border); }
        .avatar { width: 44px; height: 44px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-weight: 700; border: 1px solid #333; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 350px; border-radius: 24px; padding: 30px; border: 1px solid var(--border); text-align: center; }
        .sum-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #333; color: #fff; font-size: 40px; text-align: center; margin: 30px 0; font-weight: 700; }

        /* HISTORY */
        .history-item { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); }
        .h-name { font-weight: 600; margin-bottom: 4px; }
        .h-time { font-size: 12px; color: var(--gray); }
    </style>
</head>
<body>

    <div id="auth">
        <div class="auth-title">GHETTO PRIVATE</div>
        <input type="text" id="reg-name" placeholder="Ваше имя" style="background:var(--card); border:1px solid var(--border); padding:20px; border-radius:16px; color:#fff; font-size:16px; text-align:center; margin-bottom:20px;">
        <button class="btn-main" onclick="register()">Открыть счет</button>
    </div>

    <div id="app">
        <div class="header">
            <div class="user-info" onclick="showMyID()" id="user-display">Загрузка...</div>
            <div style="font-size: 20px;">🏦</div>
        </div>

        <div class="main-card">
            <div class="balance-title">Доступный остаток</div>
            <div class="balance-val" id="bal">0 ₽</div>
            <div style="margin-top: 30px; font-family: monospace; color: var(--gray);">•••• 7789</div>
        </div>

        <div class="action-row">
            <div class="btn-act" onclick="receiveMoney()">📥 Принять</div>
            <div class="btn-act" onclick="deposit()">➕ Пополнить</div>
        </div>

        <div class="section-header">
            Контакты
            <div class="add-btn" onclick="addContact()">+</div>
        </div>
        <div class="contacts" id="contacts-list"></div>

        <div class="section-header" style="margin-top: 20px;">История</div>
        <div id="history"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div id="target-name" style="color: var(--gray); font-weight: 600;"></div>
            <input type="number" id="amt" class="sum-input" placeholder="0">
            <button class="btn-main" onclick="confirmTransfer()">Отправить</button>
            <div onclick="closeModal()" style="margin-top: 20px; color: var(--gray); cursor: pointer;">Отмена</div>
        </div>
    </div>

<script>
    let user = JSON.parse(localStorage.getItem('gh_u')) || null;
    let bal = parseFloat(localStorage.getItem('gh_b')) || 100000;
    let friends = JSON.parse(localStorage.getItem('gh_f')) || [];
    let currentFriend = null;

    function register() {
        const n = document.getElementById('reg-name').value;
        if(n.length < 2) return alert("Имя слишком короткое");
        user = { name: n, id: "GH-" + Math.floor(Math.random()*9000+1000) };
        localStorage.setItem('gh_u', JSON.stringify(user));
        location.reload();
    }

    if(user) {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('user-display').innerText = `${user.name} | ${user.id}`;
        init();
    }

    function init() {
        updateUI();
        renderFriends();
    }

    function updateUI() {
        document.getElementById('bal').innerText = bal.toLocaleString() + ' ₽';
        localStorage.setItem('gh_b', bal);
    }

    function showMyID() {
        alert(`Ваш личный ID: ${user.id}\nДайте его другу, чтобы он добавил вас в контакты.`);
    }

    function renderFriends() {
        const list = document.getElementById('contacts-list');
        list.innerHTML = '';
        friends.forEach(f => {
            const d = document.createElement('div');
            d.className = 'contact-box';
            d.onclick = () => openModal(f);
            d.innerHTML = `<div class="avatar">${f.name[0]}</div><div style="font-size:11px;font-weight:600;">${f.name}</div>`;
            list.appendChild(d);
        });
    }

    function addContact() {
        const id = prompt("Введите ID друга (напр. GH-1234):");
        if(id && id.includes("GH-")) {
            const name = prompt("Имя друга:");
            if(name) {
                friends.push({id, name});
                localStorage.setItem('gh_f', JSON.stringify(friends));
                renderFriends();
            }
        }
    }

    function openModal(f) {
        currentFriend = f;
        document.getElementById('target-name').innerText = `ПЕРЕВОД ДЛЯ ${f.name.toUpperCase()}`;
        document.getElementById('modal').style.display = 'flex';
    }

    function confirmTransfer() {
        const val = parseFloat(document.getElementById('amt').value);
        if(val > 0 && val <= bal) {
            bal -= val;
            const code = `TX-${user.id}-${btoa(val)}`; // Реальный шифр суммы
            alert(`УСПЕШНО!\nСкопируйте этот код и отправьте другу:\n\n${code}`);
            log(currentFriend.name, val, false);
            updateUI();
            closeModal();
        } else { alert("Недостаточно средств"); }
    }

    function receiveMoney() {
        const code = prompt("Вставьте код перевода:");
        if(code && code.startsWith("TX-")) {
            try {
                const amt = parseFloat(atob(code.split('-')[2]));
                let used = JSON.parse(localStorage.getItem('gh_used') || '[]');
                if(used.includes(code)) return alert("Этот код уже был использован.");
                
                bal += amt;
                used.push(code);
                localStorage.setItem('gh_used', JSON.stringify(used));
                log("Приход", amt, true);
                updateUI();
                alert(`Деньги зачислены: ${amt} ₽`);
            } catch(e) { alert("Неверный код!"); }
        }
    }

    function deposit() {
        const a = prompt("Сумма пополнения:");
        if(a) { bal += parseFloat(a); updateUI(); log("Депозит", a, true); }
    }

    function log(n, a, p) {
        const h = document.getElementById('history');
        const i = document.createElement('div');
        i.className = 'history-item';
        i.innerHTML = `<div><div class="h-name">${n}</div><div class="h-time">${new Date().toLocaleTimeString()}</div></div>
                       <div style="font-weight:700; color:${p?'#34c759':'#fff'}">${p?'+':'-'} ${parseFloat(a).toLocaleString()} ₽</div>`;
        h.prepend(i);
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
