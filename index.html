<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Clash JS: Golden Edition</title>
    <style>
        :root { --gold: #f1c40f; --elixir: #ff00ff; --blue: #3498db; --red: #e74c3c; }
        body { margin: 0; overflow: hidden; font-family: 'Verdana', sans-serif; background: #111; }
        
        /* UI ЛОББИ */
        #lobby { position: absolute; width: 100%; height: 100%; background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .title { font-size: 60px; color: white; text-shadow: 4px 4px 0px #000; margin-bottom: 50px; }
        .btn-battle { padding: 25px 80px; font-size: 35px; background: #4cd137; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 0 #44bd32; transition: 0.1s; }
        .btn-battle:active { transform: translateY(5px); box-shadow: 0 5px 0 #44bd32; }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        #game-ui { position: absolute; bottom: 0; width: 100%; height: 160px; display: none; flex-direction: column; align-items: center; z-index: 50; }
        .hand { display: flex; gap: 15px; pointer-events: auto; padding: 20px; background: rgba(0,0,0,0.7); border-radius: 20px 20px 0 0; border: 2px solid #555; }
        .card { width: 100px; height: 130px; background: #f5f5f5; border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px solid #333; position: relative; transition: 0.2s; }
        .card.selected { border-color: var(--gold); transform: scale(1.1) translateY(-10px); z-index: 60; }
        .card .cost { position: absolute; top: -10px; left: -10px; background: var(--elixir); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; }
        
        #elixir-container { width: 350px; height: 20px; background: #222; border-radius: 10px; margin-bottom: 10px; border: 2px solid #fff; overflow: hidden; }
        #elixir-fill { height: 100%; background: linear-gradient(90deg, #9b59b6, #ff00ff); width: 50%; transition: width 0.3s; }

        /* HP Bars в мире */
        .hp-bar-container { position: absolute; width: 60px; height: 8px; background: #000; border: 1px solid #fff; display: none; }
        .hp-bar-fill { height: 100%; background: #2ecc71; width: 100%; }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="title">CLASH JS <br><span style="font-size: 25px;">MOBILE EDITION</span></div>
        <button class="btn-battle" onclick="startBattle()">В БОЙ!</button>
    </div>

    <div id="game-ui">
        <div id="elixir-container"><div id="elixir-fill"></div></div>
        <div class="hand">
            <div class="card selected" onclick="pick('knight', this)"><div class="cost">3</div>🛡️<br>РЫЦАРЬ</div>
            <div class="card" onclick="pick('archer', this)"><div class="cost">2</div>🏹<br>ЛУЧНИК</div>
            <div class="card" onclick="pick('giant', this)"><div class="cost">5</div>👹<br>ГИГАНТ</div>
        </div>
    </div>

    <div id="hp-player" class="hp-bar-container"><div class="hp-bar-fill"></div></div>
    <div id="hp-bot" class="hp-bar-container"><div class="hp-bar-fill"></div></div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const CONFIG = {
            knight: { hp: 800, dmg: 60, range: 1.5, speed: 0.04, rate: 1000, cost: 3, color: 0x3498db },
            archer: { hp: 300, dmg: 40, range: 6.0, speed: 0.06, rate: 800, cost: 2, color: 0xe67e22 },
            giant:  { hp: 2500, dmg: 120, range: 1.8, speed: 0.02, rate: 2000, cost: 5, color: 0x27ae60, towerOnly: true }
        };

        let scene, camera, renderer, clock;
        let units = [], towers = [], elixir = 5, botElixir = 5, selectedCard = 'knight', isBattle = false;

        window.startBattle = () => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            document.querySelectorAll('.hp-bar-container').forEach(el => el.style.display = 'block');
            initGame();
        };

        window.pick = (type, el) => {
            selectedCard = type;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        };

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x3d3d3d);
            scene.fog = new THREE.Fog(0x3d3d3d, 10, 50);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 22, 18);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(10, 20, 10);
            scene.add(light);

            // Арена (более красивая)
            const groundGeo = new THREE.PlaneGeometry(16, 28);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x2ecc71, roughness: 0.8 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // Река посередине
            const river = new THREE.Mesh(new THREE.PlaneGeometry(16, 2), new THREE.MeshStandardMaterial({color: 0x3498db}));
            river.rotation.x = -Math.PI/2;
            river.position.y = 0.01;
            scene.add(river);

            // Создание башен
            towers.push(createTower(0, 10, 'player', 'hp-player'));
            towers.push(createTower(0, -10, 'bot', 'hp-bot'));
            
            clock = new THREE.Clock();
            isBattle = true;
            animate();
        }

        function createTower(x, z, team, uiId) {
            const group = new THREE.Group();
            const base = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.8, 4, 8), new THREE.MeshStandardMaterial({color: 0x7f8c8d}));
            const roof = new THREE.Mesh(new THREE.ConeGeometry(1.8, 1.5, 8), new THREE.MeshStandardMaterial({color: team === 'player' ? 0x2980b9 : 0xc0392b}));
            roof.position.y = 2.5;
            group.add(base, roof);
            group.position.set(x, 2, z);
            scene.add(group);
            return { mesh: group, team, hp: 3000, maxHp: 3000, uiId };
        }

        function spawnUnit(type, x, z, team) {
            const c = CONFIG[type];
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.6), new THREE.MeshStandardMaterial({color: team === 'player' ? 0x3498db : 0xe74c3c}));
            mesh.position.set(x, 0.5, z);
            scene.add(mesh);

            units.push({ mesh, team, ...c, currentHp: c.hp, lastAttack: 0 });
        }

        window.addEventListener('mousedown', (e) => {
            if(!isBattle) return;
            const cost = CONFIG[selectedCard].cost;
            if(elixir < cost) return;

            const ray = new THREE.Raycaster();
            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            ray.setFromCamera(mouse, camera);
            const hits = ray.intersectObjects(scene.children);
            
            if(hits.length > 0) {
                const pt = hits[0].point;
                if(pt.z > 1) { // Своя половина
                    spawnUnit(selectedCard, pt.x, pt.z, 'player');
                    elixir -= cost;
                }
            }
        });

        function updateHPBars() {
            towers.forEach(t => {
                const vector = t.mesh.position.clone();
                vector.y += 4;
                vector.project(camera);
                
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = -(vector.y * 0.5 - 0.5) * window.innerHeight;
                
                const el = document.getElementById(t.uiId);
                el.style.left = (x - 30) + 'px';
                el.style.top = y + 'px';
                el.children[0].style.width = (t.hp / t.maxHp * 100) + '%';
            });
        }

        function animate() {
            if(!isBattle) return;
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime() * 1000;

            // Логика эликсира (накопление 1 ед. за 2.5 сек)
            elixir = Math.min(10, elixir + 0.007);
            botElixir = Math.min(10, botElixir + 0.007);
            document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';

            // ИИ Бота (умный спавн)
            if(botElixir >= 5) {
                const types = ['knight', 'archer', 'giant'];
                const t = types[Math.floor(Math.random() * 3)];
                spawnUnit(t, (Math.random()-0.5)*8, -10, 'bot');
                botElixir -= CONFIG[t].cost;
            }

            units.forEach((u, i) => {
                let targets = [...units.filter(en => en.team !== u.team), ...towers.filter(t => t.team !== u.team)];
                if(u.towerOnly) targets = towers.filter(t => t.team !== u.team);

                let closest = null, minDist = Infinity;
                targets.forEach(t => {
                    const d = u.mesh.position.distanceTo(t.mesh.position);
                    if(d < minDist) { minDist = d; closest = t; }
                });

                if(closest) {
                    if(minDist > u.range) {
                        const dir = new THREE.Vector3().subVectors(closest.mesh.position, u.mesh.position).normalize();
                        u.mesh.position.add(dir.multiplyScalar(u.speed));
                        u.mesh.lookAt(closest.mesh.position);
                    } else {
                        if(delta - u.lastAttack > u.rate) {
                            closest.hp !== undefined ? closest.hp -= u.dmg : closest.currentHp -= u.dmg;
                            u.lastAttack = delta;
                            // Мини-анимация удара
                            u.mesh.scale.set(1.2, 1.2, 1.2);
                            setTimeout(() => u.mesh.scale.set(1, 1, 1), 100);
                        }
                    }
                }

                if(u.currentHp <= 0) {
                    scene.remove(u.mesh);
                    units.splice(i, 1);
                }
            });

            updateHPBars();
            
            towers.forEach(t => {
                if(t.hp <= 0) {
                    isBattle = false;
                    alert(t.team === 'player' ? "БАШНЯ ПАЛА! ПОРАЖЕНИЕ!" : "ПОБЕДА! ВЫ СОКРУШИЛИ ВРАГА!");
                    location.reload();
                }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
