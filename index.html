<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Mini Royale</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: none; }
        #instructions { position: absolute; bottom: 10px; width: 100%; text-align: center; color: white; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>
    <div id="ui">
        Твоя башня: <span id="pHealth">100</span>%<br>
        Башня бота: <span id="eHealth">100</span>%
    </div>
    <div id="instructions">Кликни на свою половину поля, чтобы выпустить юнита!</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Инициализация сцены ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2ecc71);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light, new THREE.AmbientLight(0x404040));

        // --- Объекты ---
        const arenaGeo = new THREE.PlaneGeometry(10, 20);
        const arenaMat = new THREE.MeshStandardMaterial({ color: 0x27ae60 });
        const arena = new THREE.Mesh(arenaGeo, arenaMat);
        arena.rotation.x = -Math.PI / 2;
        scene.add(arena);

        // Башни
        const createTower = (z, color) => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 2), new THREE.MeshStandardMaterial({ color }));
            mesh.position.set(0, 1.5, z);
            scene.add(mesh);
            return mesh;
        };

        const playerTower = createTower(8, 0x3498db);
        const enemyTower = createTower(-8, 0xe74c3c);

        camera.position.set(0, 12, 12);
        camera.lookAt(0, 0, 0);

        // --- Геймплей ---
        let playerHP = 100, enemyHP = 100;
        const units = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function spawnUnit(zPos, color, team) {
            const unit = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color }));
            unit.position.set((Math.random() - 0.5) * 4, 0.4, zPos);
            unit.userData = { team: team, speed: team === 'player' ? -0.05 : 0.05 };
            scene.add(unit);
            units.push(unit);
        }

        // Клик игрока
        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(arena);
            if (intersects.length > 0 && intersects[0].point.z > 0) {
                spawnUnit(intersects[0].point.z, 0x0000ff, 'player');
            }
        });

        // Бот спавнит юнитов
        setInterval(() => spawnUnit(-7, 0xff0000, 'bot'), 3000);

        // --- Игровой цикл ---
        function animate() {
            requestAnimationFrame(animate);

            units.forEach((u, index) => {
                u.position.z += u.userData.speed;

                // Урон башням
                if (u.position.z < -8 && u.userData.team === 'player') {
                    enemyHP -= 5;
                    removeUnit(u, index);
                } else if (u.position.z > 8 && u.userData.team === 'bot') {
                    playerHP -= 5;
                    removeUnit(u, index);
                }

                // Столкновения юнитов
                units.forEach((u2, index2) => {
                    if (u.userData.team !== u2.userData.team && u.position.distanceTo(u2.position) < 0.6) {
                        removeUnit(u, index);
                        removeUnit(u2, index2);
                    }
                });
            });

            document.getElementById('pHealth').innerText = playerHP;
            document.getElementById('eHealth').innerText = enemyHP;

            if(playerHP <= 0) alert("Ты проиграл!");
            if(enemyHP <= 0) alert("Победа!");

            renderer.render(scene, camera);
        }

        function removeUnit(unit, index) {
            scene.remove(unit);
            units.splice(index, 1);
        }

        animate();
    </script>
</body>
</html>
