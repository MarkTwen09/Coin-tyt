<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Clicker: Definitive Edition</title>
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #050508;
            --panel: rgba(255, 255, 255, 0.05);
            --glow: rgba(0, 242, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .app {
            display: flex;
            width: 95vw;
            height: 90vh;
            max-width: 1100px;
            gap: 20px;
        }

        /* ИГРОВАЯ ЗОНА */
        .clicker-section {
            flex: 1.5;
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .balance-info {
            position: absolute;
            top: 40px;
            text-align: center;
        }

        #balance {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 20px var(--glow);
        }

        /* МОНЕТА */
        #main-btn {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: var(--panel);
            border: 4px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px;
            cursor: pointer;
            box-shadow: 0 0 40px var(--glow), inset 0 0 20px var(--glow);
            transition: transform 0.1s;
        }

        #main-btn:active { transform: scale(0.92); }

        /* МАГАЗИН И ИНВЕНТАРЬ */
        .side-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.5; }

        .item-card {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border: 1px solid transparent;
        }

        .item-card:hover { border-color: var(--accent); }

        .btn-buy {
            background: var(--accent);
            color: black;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* СЕТКА ИНВЕНТАРЯ */
        .inv-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .skin-slot {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
        }

        .skin-slot.active {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--glow);
        }
        /* МОДАЛКА ВЫИГРЫША */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-box {
            background: #111;
            border: 2px solid var(--accent);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 0 50px var(--glow);
        }

        /* ЧАСТИЦЫ КЛИКА */
        .plus-one {
            position: absolute;
            color: var(--accent);
            font-weight: bold;
            pointer-events: none;
            animation: flyUp 0.7s ease-out forwards;
        }

        @keyframes flyUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="app">
        <section class="clicker-section">
            <div class="balance-info">
                <p style="opacity:0.5; font-size: 12px; letter-spacing: 2px;">WALLET BALANCE</p>
                <div id="balance">0</div>
            </div>
            <div id="main-btn">💰</div>
        </section>

        <section class="side-section">
            <div class="panel">
                <h2>Store Cases</h2>
                <div class="item-card">
                    <div><b>Common Case</b><br><small style="color:var(--accent)">100 🪙</small></div>
                    <button class="btn-buy" onclick="gameOpenCase(100)">OPEN</button>
                </div>
                <div class="item-card">
                    <div><b>Epic Lootbox</b><br><small style="color:var(--accent)">500 🪙</small></div>
                    <button class="btn-buy" onclick="gameOpenCase(500)">OPEN</button>
                </div>
            </div>

            <div class="panel" style="flex:1">
                <h2>Skins Collection</h2>
                <div class="inv-grid" id="inv-container"></div>
            </div>
        </section>
    </div>

    <div class="modal" id="win-modal" onclick="closeModal()">
        <div class="modal-box">
            <h3 style="opacity:0.6; margin-bottom: 10px;">CONGRATULATIONS!</h3>
            <div id="win-icon" style="font-size: 80px; margin-bottom: 15px;">🎁</div>
            <h1 id="win-text" style="color: var(--accent);">+500 Coins</h1>
            <p style="margin-top: 20px; font-size: 12px; opacity: 0.5;">Click to close</p>
        </div>
    </div>

    <script>
        // 1. БАЗА СКИНОВ
        const SKINS_DATA = {
            's1': { icon: '💰', color: '#ffcc00' },
            's2': { icon: '💎', color: '#00f2ff' },
            's3': { icon: '🔥', color: '#ff4d00' },
            's4': { icon: '🍀', color: '#00ff44' },
            's5': { icon: '⚡', color: '#ffff00' },
            's6': { icon: '💀', color: '#ffffff' }
        };

        // 2. СОСТОЯНИЕ (Загрузка)
        let storage = JSON.parse(localStorage.getItem('neon_clicker_v3')) || {
            coins: 0,
            owned: ['s1'],
            active: 's1'
        };

        const balDisplay = document.getElementById('balance');
        const mainBtn = document.getElementById('main-btn');
        const invContainer = document.getElementById('inv-container');

        // 3. ОБНОВЛЕНИЕ ЭКРАНА
        function refresh() {
            balDisplay.innerText = Math.floor(storage.coins).toLocaleString();
            
            const currentSkin = SKINS_DATA[storage.active];
            mainBtn.innerText = currentSkin.icon;
            
            // Меняем цвета темы под скин
            document.documentElement.style.setProperty('--accent', currentSkin.color);
            document.documentElement.style.setProperty('--glow', currentSkin.color + '66');
            // Рисуем инвентарь
            invContainer.innerHTML = '';
            storage.owned.forEach(id => {
                const slot = document.createElement('div');
                slot.className = skin-slot ${id === storage.active ? 'active' : ''};
                slot.innerText = SKINS_DATA[id].icon;
                slot.onclick = () => {
                    storage.active = id;
                    save();
                    refresh();
                };
                invContainer.appendChild(slot);
            });
        }

        function save() {
            localStorage.setItem('neon_clicker_v3', JSON.stringify(storage));
        }

        // 4. КЛИК
        mainBtn.addEventListener('click', (e) => {
            storage.coins += 1;
            
            // Эффект цифры
            const p = document.createElement('div');
            p.className = 'plus-one';
            p.innerText = '+1';
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);

            save();
            refresh();
        });

        // 5. ЛОГИКА КЕЙСОВ
        window.gameOpenCase = function(price) {
            if (storage.coins < price) {
                alert("NOT ENOUGH COINS!");
                return;
            }

            storage.coins -= price;

            let wonSkin = null;
            let wonCoins = Math.floor(Math.random() * (price * 2.5));

            // 30% шанс на скин
            if (Math.random() < 0.3) {
                const keys = Object.keys(SKINS_DATA);
                const randomId = keys[Math.floor(Math.random() * keys.length)];
                if (!storage.owned.includes(randomId)) {
                    wonSkin = randomId;
                    storage.owned.push(wonSkin);
                }
            }

            storage.coins += wonCoins;
            showModal(wonCoins, wonSkin);
            save();
            refresh();
        };

        function showModal(coins, skinId) {
            const modal = document.getElementById('win-modal');
            const icon = document.getElementById('win-icon');
            const text = document.getElementById('win-text');

            if (skinId) {
                icon.innerText = SKINS_DATA[skinId].icon;
                text.innerText = "NEW SKIN!";
            } else {
                icon.innerText = "💰";
                text.innerText = +${coins} Coins;
            }
            modal.style.display = 'flex';
        }

        window.closeModal = function() {
            document.getElementById('win-modal').style.display = 'none';
        }

        // Запуск
        refresh();
    </script>
</body>
</html>
