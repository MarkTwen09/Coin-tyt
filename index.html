<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Светский Дом — Новости и Блокировки</title>
    <style>
        :root {
            --bg-color: #111112;
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --accent-blue: #0a84ff;
            --border-color: #2c2c2e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            letter-spacing: -0.02em;
        }
        header {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }
        .logo { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; color: #ffffff; margin: 0; }
        .subtitle { font-size: 0.9rem; color: var(--text-muted); margin-top: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }
        .grid-item {
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            line-height: 1.5;
        }
        .grid-date { font-size: 0.75rem; color: var(--accent-blue); font-weight: 700; margin-bottom: 8px; }
        .grid-text { font-size: 1.05rem; color: var(--text-main); margin: 0; white-space: pre-wrap; }
        
        /* Стили админки */
        #adminModal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #1c1c1e;
            padding: 25px; border-radius: 12px; border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; width: 90%; max-width: 400px;
        }
        #adminModal h3 { margin-top: 0; color: #fff; }
        #adminModal input, #adminModal textarea {
            width: 100%; padding: 10px; margin-bottom: 15px;
            background: #2c2c2e; border: 1px solid var(--border-color);
            color: #fff; border-radius: 6px; box-sizing: border-box;
        }
        #adminModal button {
            background: var(--accent-blue); color: #fff; border: none;
            padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold;
        }
        footer { max-width: 1100px; margin: 60px auto 0 auto; padding: 40px 20px; border-top: 1px solid var(--border-color); text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Светский Дом</div>
        <div class="subtitle">Мониторинг блокировок и актуальные новости</div>
    </header>

    <div class="container">
        <div class="news-grid" id="newsContainer"></div>
    </div>

    <div id="adminModal">
        <h3 id="modalTitle">Вход в систему</h3>
        <div id="authSection">
            <input type="password" id="passwordInput" placeholder="Введите секретный код">
            <button onclick="checkPassword()">Войти</button>
        </div>
        <div id="postSection" style="display: none;">
            <textarea id="postTextInput" rows="5" placeholder="Текст новой новости..."></textarea>
            <button onclick="saveAndDownload()">Опубликовать и Скачать файл</button>
        </div>
    </div>

    <footer>
        <p>«Светский Дом», 2026.</p>
    </footer>

    <script id="newsData" type="application/json">
[
  {
    "date": "25 июня, 02:30",
    "text": "Добро пожаловать на обновленный сайт «Светский Дом»! Теперь все новости о блокировках, VPN и обновлениях рунета публикуются здесь напрямую из нашей защищенной панели."
  }
]
    </script>

    <script>
        // Зашифрованный хэш твоего пароля (SHA-256 от "09012012Mark")
        const targetHash = "56037a5083cfc0bc3d2e0df40129bc6f62da601ff7a6aa03e67c8b0e77d94e24";

        // Отображение новостей на странице
        function displayNews() {
            const rawData = document.getElementById('newsData').textContent;
            const news = JSON.parse(rawData);
            const container = document.getElementById('newsContainer');
            
            let html = '';
            // Выводим в обратном порядке (свежие сверху)
            for(let i = news.length - 1; i >= 0; i--) {
                html += `
                    <div class="grid-item">
                        <div class="grid-date">${news[i].date}</div>
                        <p class="grid-text">${news[i].text}</p>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // Хэширование для проверки пароля
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Вызов админки по кнопкам Ctrl + M
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'm' || e.key === 'ь' || e.key === 'M')) {
                const modal = document.getElementById('adminModal');
                modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
            }
        });

        // Проверка пароля
        async function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const inputHash = await sha256(input);
            
            if (inputHash === targetHash) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('postSection').style.display = 'block';
                document.getElementById('modalTitle').innerText = 'Новая публикация';
            } else {
                alert('Неверный код доступа!');
            }
        }

        // Генерация нового index.html и скачивание
        function saveAndDownload() {
            const text = document.getElementById('postTextInput').value;
            if(!text) return alert('Введите текст!');

            const rawData = document.getElementById('newsData').textContent;
            const news = JSON.parse(rawData);

            // Создаем объект новой новости
            const options = { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' };
            const formattedDate = new Date().toLocaleDateString('ru-RU', options);
            
            news.push({
                date: formattedDate,
                text: text
            });

            // Форматируем новые данные новостей с отступами
            const updatedJsonText = JSON.stringify(news, null, 2);

            // Берем весь текущий HTML-код страницы
            let entireHtml = document.documentElement.outerHTML;

            // Находим старый блок данных и заменяем его на обновленный
            const oldScriptRegExp = /<script id="newsData" type="application\/json">([\s\S]*?)<\/script>/;
            entireHtml = entireHtml.replace(oldScriptRegExp, `<script id="newsData" type="application/json">\n${updatedJsonText}\n    <\/script>`);

            // Очищаем форму перед сохранением исходного кода
            entireHtml = '<!DOCTYPE html>\n' + entireHtml;

            // Скачиваем обновленный файл index.html
            const blob = new Blob([entireHtml], {type: 'text/html'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'index.html';
            link.click();

            // Скрываем модалку
            document.getElementById('adminModal').style.display = 'none';
            document.getElementById('postTextInput').value = '';
            alert('Файл index.html успешно обновлен и скачан! Перетащи его на GitHub, чтобы обновить сайт для всех.');
            location.reload();
        }

        displayNews();
    </script>
</body>
</html>
