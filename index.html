<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA AI</title>

<style>
:root{
    --glass-bg: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.1);
    --accent: #8a5cff;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at 20% 20%, #1b1b2f, #0f0f17 60%);
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* HEADER */
.header{
    padding:15px;
    text-align:center;
    font-weight:bold;
    font-size:20px;
    letter-spacing:2px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border-bottom:1px solid var(--glass-border);
}

/* CHAT AREA */
.chat{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.message{
    padding:14px 16px;
    border-radius:18px;
    max-width:80%;
    backdrop-filter: blur(25px);
    background: var(--glass-bg);
    border:1px solid var(--glass-border);
    animation:fade 0.25s ease;
    word-wrap: break-word;
}

.user{
    align-self:flex-end;
    background: linear-gradient(135deg, rgba(138,92,255,0.4), rgba(0,255,200,0.15));
}

.ai{
    align-self:flex-start;
}

/* INPUT */
.input-area{
    display:flex;
    padding:12px;
    gap:10px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border-top:1px solid var(--glass-border);
}

input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:16px;
    background: rgba(255,255,255,0.08);
    color:white;
    font-size:16px;
    outline:none;
}

button{
    padding:14px 18px;
    border:none;
    border-radius:16px;
    font-weight:bold;
    cursor:pointer;
    background: linear-gradient(135deg,#8a5cff,#00ffd0);
    color:white;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

/* MOBILE OPTIMIZATION */
@media (max-width:600px){
    .message{
        max-width:95%;
        font-size:15px;
    }
    .header{
        font-size:18px;
    }
}

@keyframes fade{
    from{opacity:0; transform:translateY(5px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">AURA</div>

<div class="chat" id="chat"></div>

<div class="input-area">
    <input type="text" id="input" placeholder="Введите математический пример...">
    <button onclick="send()">→</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMessage(text, type){
    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function solveMath(expression){
    try{
        expression = expression
            .replace(/√/g, "Math.sqrt")
            .replace(/sqrt/gi, "Math.sqrt")
            .replace(/sin/gi, "Math.sin")
            .replace(/cos/gi, "Math.cos")
            .replace(/tan/gi, "Math.tan")
            .replace(/log/gi, "Math.log")
            .replace(/\^/g, "**");

        let result = Function('"use strict";return (' + expression + ')')();
        
        if(typeof result === "number" && !isNaN(result)){
            return "Ответ: " + result;
        } else {
            return null;
        }
    }catch{
        return null;
    }
}

function send(){
    const text = input.value.trim();
    if(!text) return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(()=>{
        let mathResult = solveMath(text);

        if(mathResult){
            addMessage(mathResult, "ai");
        } else {
            addMessage("Я специализируюсь на решении математических выражений. Попробуй пример.", "ai");
        }
    },300);
}

input.addEventListener("keypress", e=>{
    if(e.key==="Enter") send();
});
</script>

</body>
</html>
