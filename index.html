<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA NEON FIXED</title>
    <style>
        :root {
            --bg: #020205;
            --purp: #a855f7;
            --blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; position: fixed;
        }

        /* ФОН: СЛИЯНИЕ ФИОЛЕТОВОГО И СИНЕГО */
        .visuals {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 50% -10%, rgba(168, 85, 247, 0.25) 0%, transparent 60%),
                radial-gradient(circle at 100% 100%, rgba(0, 210, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
        }

        .container { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }

        /* ПЕРЕЛИВАЮЩАЯСЯ AURA С СИНЕ-ФИОЛЕТОВЫМ СВЕЧЕНИЕМ */
        .header { padding: 20px; text-align: center; }
        .header h1 {
            font-size: 3rem; letter-spacing: 14px; margin: 0; font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--purp), var(--blue), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: flow 5s linear infinite;
            filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.5)) drop-shadow(0 0 5px rgba(0, 210, 255, 0.3));
        }

        @keyframes flow { to { background-position: 200% center; } }

        #chat {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 180px; -webkit-overflow-scrolling: touch;
        }

        .msg {
            padding: 15px 20px; border-radius: 24px; max-width: 80%; font-size: 16px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            animation: bounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        @keyframes bounce { from { transform: scale(0.9); opacity: 0; } }

        .a-msg { background: rgba(168, 85, 247, 0.1); align-self: flex-start; border-bottom-left-radius: 4px; }
        .u-msg { background: rgba(255, 255, 255, 0.06); align-self: flex-end; border-bottom-right-radius: 4px; border-color: rgba(0, 210, 255, 0.3); }

        /* ВВОД БЕЗ ОБРЕЗОК */
        .input-zone {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, #020205 90%, transparent);
            padding: 15px 20px calc(35px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .row { display: flex; gap: 12px; max-width: 500px; margin: 0 auto; }

        input {
            flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 15px 20px; color: #fff; font-size: 17px; outline: none;
        }

        button {
            width: 54px; height: 54px; border-radius: 27px;
            background: linear-gradient(135deg, var(--purp), var(--blue));
            border: none; color: #fff; font-size: 22px;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        .ldr { display: none; text-align: center; color: var(--blue); font-size: 11px; margin-bottom: 8px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="visuals"></div>
    <div class="container">
        <div class="header"><h1>AURA</h1></div>
        <div id="chat">
            <div class="msg a-msg"><b>AURA V6</b> готова. <br>Если я не отвечаю — <b>вырубай VPN</b>, бро, он мешает сигналу! Проверяем синий неон? ⚡️</div>
        </div>
        <div class="input-zone">
            <div id="ldr" class="ldr">ИЩУ СИГНАЛ...</div>
            <div class="row">
                <input type="text" id="in" placeholder="Напиши AURA..." autocomplete="off">
                <button id="go">➜</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('in');
        const btn = document.getElementById('go');
        const ldr = document.getElementById('ldr');

        async function ask() {
            const val = input.value.trim();
            if(!val) return;

            const u = document.createElement('div');
            u.className = 'msg u-msg'; u.textContent = val;
            chat.appendChild(u); input.value = '';
            chat.scrollTop = chat.scrollHeight;
            ldr.style.display = 'block';

            try {
                // Прямой метод через стабильный шлюз (без ключей)
                const res = await fetch('https://api.pawan.krd/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer pk-null' },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{role: 'system', content: 'Ты - AURA, стильная нейросеть.'}, {role: 'user', content: val}]
                    })
                });

                const data = await res.json();
                const reply = data.choices[0].message.content;

                const a = document.createElement('div');
                a.className = 'msg a-msg'; a.textContent = reply;
                chat.appendChild(a);
            } catch (e) {
                const eM = document.createElement('div');
                eM.className = 'msg a-msg';
                eM.textContent = "Ошибка порта. Бро, вырубай VPN и попробуй еще раз!";
                chat.appendChild(eM);
            } finally {
                ldr.style.display = 'none';
                chat.scrollTop = chat.scrollHeight;
            }
        }

        btn.onclick = ask;
        input.onkeypress = (e) => { if(e.key === 'Enter') { ask(); input.blur(); } };
    </script>
</body>
</html>
