<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Игра: Угадай Страну</title>
    
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }

        /* Интерфейс будущей игры */
        #game-ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            pointer-events: auto;
        }

        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="quest">Задание: Найдите Францию и нажмите на нее!</div>
        <button onclick="flyToRandomCountry()">Показать случайный регион</button>
    </div>

    <div id="cesiumContainer"></div>

    <script>
        // Инициализация 3D глобуса (отключаем лишние стандартные кнопки для чистого интерфейса)
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(), // Включает 3D рельеф (горы)
            animation: false,
            timeline: false,
            fullscreenButton: false,
            geocoder: false,
            homeButton: false,
            infoBox: false,
            sceneModePicker: false,
            selectionIndicator: false,
            navigationHelpButton: false
        });

        // Настройка начального вида (как в начале вашего видео — вид на Северную Америку)
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(-95.0, 40.0, 10000000.0), // Координаты центра
            orientation: {
                heading: Cesium.Math.toRadians(0.0),
                pitch: Cesium.Math.toRadians(-90.0), // Смотрим строго вниз
                roll: 0.0
            }
        });

        // Функция плавного полета (зума) к координатам (пример из видео, когда карта приближается к Невинномысску)
        function flyToRandomCountry() {
            // Координаты Невинномысска (из конца вашего видео) для демонстрации зума
            const targetLon = 41.93;
            const targetLat = 44.63;

            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(targetLon, targetLat, 15000.0), // 15000 метров над землей
                duration: 4.0, // Время полета в секундах
                pitch: Cesium.Math.toRadians(-45.0) // Небольшой наклон камеры для эффекта 3D
            });

            document.getElementById('quest').innerText = "Вы прилетели к Ставропольскому краю!";
        }

        // Обработка кликов по глобусу (для механики угадывания стран)
        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction(function(click) {
            const ray = viewer.camera.getPickRay(click.position);
            const earthPosition = viewer.scene.globe.pick(ray, viewer.scene);
            
            if (Cesium.defined(earthPosition)) {
                const cartographic = Cesium.Cartographic.fromCartesian(earthPosition);
                const longitudeString = Cesium.Math.toDegrees(cartographic.longitude).toFixed(2);
                const latitudeString = Cesium.Math.toDegrees(cartographic.latitude).toFixed(2);

                // Выводим координаты клика. Сюда можно подключить проверку гео-зон (GeoJSON) стран
                alert(`Вы кликнули на координаты:\nДолгота: ${longitudeString}\nШирота: ${latitudeString}`);
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    </script>
</body>
</html>
