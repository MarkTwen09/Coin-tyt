<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p: #a855f7; --s: #6366f1; --bg: #030303; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Живой фон */
        .mesh { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4;
            background: radial-gradient(at 0% 0%, rgba(168,85,247,0.15) 0, transparent 50%), 
                        radial-gradient(at 100% 100%, rgba(99,102,241,0.15) 0, transparent 50%); }

        /* Сообщения в стиле High-Tech */
        .bubble-ai { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-left: 2px solid var(--p); 
                     backdrop-filter: blur(12px); border-radius: 22px 22px 22px 4px; animation: slideUp 0.4s ease-out; }
        .bubble-user { background: linear-gradient(135deg, var(--p), var(--s)); border-radius: 22px 22px 4px 22px; 
                       box-shadow: 0 10px 20px -10px rgba(168,85,247,0.5); animation: slideUp 0.3s ease-out; align-self: flex-end; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Поле ввода как у Grok */
        .input-wrap { background: rgba(20,20,20,0.8); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 32px; transition: 0.3s; }
        .input-wrap:focus-within { border-color: var(--p); box-shadow: 0 0 0 4px rgba(168,85,247,0.1); }

        #chat-content { height: calc(100vh - 180px); scroll-behavior: smooth; mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent); }
        #chat-content::-webkit-scrollbar { width: 0; }
        
        .aura-logo { font-weight: 900; letter-spacing: -0.05em; background: linear-gradient(to right, #fff, var(--p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="flex flex-col">
    <div class="mesh"></div>

    <header class="pt-12 pb-4 px-8 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-purple-500 animate-pulse"></div>
            <span class="aura-logo text-2xl uppercase italic">Aura</span>
        </div>
        <span class="text-[10px] font-mono opacity-40 uppercase tracking-[0.3em]">Core v1.5</span>
    </header>

    <main id="chat-content" class="overflow-y-auto p-6 space-y-6 flex flex-col pt-10"></main>

    <div id="wait" class="hidden px-10 py-2 text-[10px] text-purple-400 tracking-widest animate-pulse">AURA THINKING...</div>

    <footer class="p-6 pb-10">
        <div class="max-w-4xl mx-auto input-wrap flex items-center p-2">
            <input type="text" id="userInput" class="w-full bg-transparent px-5 py-4 text-sm outline-none" placeholder="Message Aura..." autocomplete="off">
            <button onclick="ask()" class="bg-white text-black h-12 w-12 flex items-center justify-center rounded-full active:scale-90 transition-all">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
        </div>
    </footer>

    <script>
        const API_KEY = 'AIzaSyDOqqL5RGsnseRbEnfn64YZdpZ7-2YIzOY';

        async function ask() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat-content');
            const wait = document.getElementById('wait');
            const val = input.value.trim();

            if (!val) return;

            input.value = '';
            chat.innerHTML += `<div class="bubble-user p-5 text-sm max-w-[85%]">${val}</div>`;
            chat.scrollTo(0, chat.scrollHeight);
            
            wait.classList.remove('hidden');

            try {
                // ИСПОЛЬЗУЕМ gemini-1.5-flash-latest ДЛЯ ИСПРАВЛЕНИЯ ОШИБКИ
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await response.json();
                wait.classList.add('hidden');

                if (data.error) {
                    chat.innerHTML += `<div class="p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-[10px] text-red-400 text-center uppercase">Error: ${data.error.message}</div>`;
                } else {
                    const reply = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="bubble-ai p-5 text-sm max-w-[90%] leading-relaxed">${reply}</div>`;
                }
            } catch (err) {
                wait.classList.add('hidden');
                chat.innerHTML += `<div class="text-red-500 text-center text-[10px]">NETWORK_TIMEOUT: CHECK VPN</div>`;
            }
            chat.scrollTo(0, chat.scrollHeight);
        }

        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') ask(); };
    </script>
</body>
</html>
