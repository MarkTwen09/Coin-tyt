<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iron Order: Total Theatre</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --panel-bg: rgba(18, 22, 28, 0.96);
            --border-color: #2f363d;
            --gold: #dfa837;
            --player-fill: rgba(46, 117, 89, 0.45);
            --player-stroke: #3b9c75;
            --ai-fill: rgba(61, 72, 82, 0.25);
            --ai-stroke: #4e5a65;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e11;
            color: #cbd5e1;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            background-color: #0f141c;
        }

        .leaflet-control-zoom { display: none !important; }
        .leaflet-control-attribution { background: rgba(0,0,0,0.7) !important; color: #444 !important; }

        /* Экран выбора страны при старте */
        .start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0e11;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            text-align: center;
        }

        .start-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .start-box h2 { font-size: 22px; margin-bottom: 10px; letter-spacing: 1px; color: #fff; }
        .start-box p { font-size: 13px; color: #8b949e; margin-bottom: 20px; }

        select {
            width: 100%;
            padding: 14px;
            background: #161b22;
            border: 1px solid #30363d;
            color: #fff;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            margin-bottom: 20px;
            appearance: none;
        }

        /* Верхний HUD */
        .game-hud {
            position: absolute;
            top: 0; left: 0; width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, rgba(16,21,27,1) 0%, rgba(16,21,27,0.85) 100%);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        .hud-profile { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; }
        .hud-level { background: #238636; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        
        .resource-group { display: flex; gap: 16px; max-width: 65%; overflow-x: auto; }
        .res-cell { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 600; }
        .res-cell span { color: #fff; }

        /* Нижний док управления */
        .action-dock {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: var(--panel-bg);
            border-top: 2px solid var(--border-color);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            padding: 20px 16px;
            z-index: 100;
            display: none;
            box-shadow: 0 -8px 32px rgba(0,0,0,0.7);
            animation: slideUp 0.2s cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .dock-title { font-size: 20px; font-weight: 800; color: #ffffff; margin-bottom: 2px; }
        .dock-subtitle { font-size: 12px; color: #8b949e; text-transform: uppercase; margin-bottom: 14px; }
        
        .buildings-status { font-size: 13px; color: var(--gold); font-weight: 600; margin-bottom: 14px; display: flex; gap: 8px; }

        .dock-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .game-btn:active { background: #30363d; }
        .btn-attack { background: #852222; border-color: #b53333; color: #fff; grid-column: span 2; font-size: 14px; padding: 16px; }
        .btn-attack:active { background: #a52a2a; }
        .btn-demolish { background: rgba(239, 64, 64, 0.1); border-color: rgba(239, 64, 64, 0.3); color: #ff6b6b; }
    </style>
</head>
<body>

    <div class="start-overlay" id="start-screen">
        <div class="start-box">
            <h2>ВЫБЕРИТЕ ФРАКЦИЮ</h2>
            <p>Ваша держава получит мягкое зеленое выделение штаба, остальные станут целями для экспансии.</p>
            <select id="faction-picker">
                <option value="Belarus">Белорусская ССР</option>
                <option value="Ukraine">Украинская ССР</option>
                <option value="Poland">Польша</option>
                <option value="Germany">Германия</option>
                <option value="France">Франция</option>
                <option value="Lithuania">Литва</option>
                <option value="Latvia">Латвия</option>
                <option value="Estonia">Эстония</option>
                <option value="Romania">Румыния</option>
            </select>
            <button class="game-btn" style="width: 100%; background: #238636; color: #fff; padding: 16px;" onclick="startGame()">УТВЕРДИТЬ ПЛАН</button>
        </div>
    </div>

    <div class="game-hud">
        <div class="hud-profile">
            <div class="hud-level">78-Й</div>
            <span style="color: var(--gold);">⚡ 1,466</span>
        </div>
        <div class="resource-group">
            <div class="res-cell">🪵 <span id="res-wood">12.4K</span></div>
            <div class="res-cell">🪙 <span id="res-iron">9.2K</span></div>
            <div class="res-cell">📦 <span id="res-oil">5.9K</span></div>
            <div class="res-cell">💵 <span id="res-cash">7.6K</span></div>
        </div>
    </div>

    <div id="map"></div>

    <div class="action-dock" id="control-dock">
        <div class="dock-title" id="country-name">Название Державы</div>
        <div class="dock-subtitle" id="country-status">Статус</div>
        <div class="buildings-status" id="country-buildings"></div>
        <div class="dock-buttons" id="action-buttons-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', {
            center: [52.5, 20.0], // Центр Европы для хорошего охвата
            zoom: 4.5,
            minZoom: 3.5,
            maxZoom: 7,
            zoomSnap: 0.5
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB'
        }).addTo(map);

        let playerEmpire = "";
        let geojsonLayer;
        
        // Хранилище динамических данных (владельцы и постройки в реальном времени)
        const gameState = {};

        // Список поддерживаемых европейских стран
        const europeanCountries = [
            "Belarus", "Ukraine", "Poland", "Lithuania", "Latvia", "Estonia", 
            "Germany", "France", "Romania", "Moldova", "Slovakia", "Czechia", 
            "Austria", "Hungary", "Bulgaria", "Italy", "Sweden", "Finland"
        ];

        // Словари перевода названий для интерфейса
        const nameTranslations = {
            "Belarus": "Белорусская ССР", "Ukraine": "Украинская ССР", "Poland": "Польша",
            "Germany": "Германия", "France": "Франция", "Lithuania": "Литва",
            "Latvia": "Латвия", "Estonia": "Эстония", "Romania": "Румыния",
            "Moldova": "Молдавия", "Slovakia": "Словакия", "Czechia": "Чехия",
            "Austria": "Австрия", "Hungary": "Венгрия", "Bulgaria": "Болгария",
            "Italy": "Италия", "Sweden": "Швеция", "Finland": "Финляндия"
        };

        function getStyle(feature) {
            const cName = feature.properties.name;
            const currentOwner = gameState[cName]?.owner;

            if (currentOwner === "player") {
                return {
                    fillColor: '#2e7559', // Мягкий хаки для игрока
                    fillOpacity: 0.45,
                    color: '#3b9c75',     // Плотный зеленый контур
                    weight: 2.5,
                    opacity: 1
                };
            } else if (europeanCountries.includes(cName)) {
                return {
                    fillColor: '#2c353d', // Тактический серый для ИИ
                    fillOpacity: 0.2,
                    color: '#4e5a65',     // Аккуратные тонкие границы
                    weight: 1.5,
                    opacity: 0.6
                };
            } else {
                return { fillOpacity: 0, color: 'transparent', weight: 0 }; // Прячем остальной мир
            }
        }

        // Старт игры после выбора фракции
        function startGame() {
            playerEmpire = document.getElementById('faction-picker').value;
            document.getElementById('start-screen').style.display = 'none';

            // Инициализируем состояние для каждой страны
            europeanCountries.forEach(c => {
                gameState[c] = {
                    owner: (c === playerEmpire) ? "player" : "ai",
                    buildings: []
                };
            });

            // Подгружаем полноценную карту высокого разрешения по всей Европе
            fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
                .then(res => res.json())
                .then(data => {
                    geojsonLayer = L.geoJSON(data, {
                        style: getStyle,
                        onEachFeature: (feature, layer) => {
                            const cName = feature.properties.name;
                            if (!europeanCountries.includes(cName)) return;

                            // Подсветка границ при наведении пальца/мыши
                            layer.on('mouseover', () => {
                                const isPlayer = gameState[cName].owner === "player";
                                layer.setStyle({ fillOpacity: isPlayer ? 0.6 : 0.4 });
                            });
                            layer.on('mouseout', () => {
                                geojsonLayer.resetStyle(layer);
                            });

                            // Тач / Клик по региону
                            layer.on('click', (e) => {
                                openTacticalDock(cName, layer);
                                L.DomEvent.stopPropagation(e);
                            });
                        }
                    }).addTo(map);
                });
        }

        // Открытие панели управления страной
        function openTacticalDock(cName, layer) {
            const dock = document.getElementById('control-dock');
            const nameField = document.getElementById('country-name');
            const statusField = document.getElementById('country-status');
            const bldField = document.getElementById('country-buildings');
            const btnContainer = document.getElementById('action-buttons-container');

            dock.style.display = 'block';
            nameField.innerText = nameTranslations[cName] || cName;

            const state = gameState[cName];

            // Показываем текущие постройки на базе
            if (state.buildings.length > 0) {
                bldField.innerHTML = `Инфраструктура: ${state.buildings.join(' ')}`;
            } else {
                bldField.innerHTML = 'Инфраструктура: Нет построек';
            }

            if (state.owner === "player") {
                statusField.innerText = 'ВАША СУВЕРЕННАЯ ТЕРРИТОРИЯ';
                statusField.style.color = '#6ee7b7';
                
                // Рендерим кнопки постройки и СНОСА
                btnContainer.innerHTML = `
                    <button class="game-btn" onclick="buildAsset('${cName}', '🏭 Завод', layer)">🔨 Возвести Завод</button>
                    <button class="game-btn" onclick="buildAsset('${cName}', '⚔️ ДОТ', layer)">🛡️ Построить ДОТ</button>
                    <button class="game-btn btn-demolish" style="grid-column: span 2;" onclick="demolishAssets('${cName}', layer)">🗑️ Демонтировать все здания</button>
                `;
            } else {
                statusField.innerText = 'ВРАЖЕСКИЙ СЕКТОР (ИИ)';
                statusField.style.color = '#ef4444';
                
                // Честная кнопка атаки и штурма рубежей
                btnContainer.innerHTML = `
                    <button class="game-btn btn-attack" onclick="launchAssault('${cName}', layer)">⚔️ НАЧАТЬ ШТУРМ И ПЕРЕБРОСКУ ДИВИЗИЙ</button>
                `;
            }
        }

        // Строительство объектов
        function buildAsset(cName, asset, layer) {
            if (gameState[cName].buildings.includes(asset)) {
                alert(`[ОШИБКА]: Объект ${asset} уже функционирует в данном регионе!`);
                return;
            }
            gameState[cName].buildings.push(asset);
            openTacticalDock(cName, layer); // Обновляем док
        }

        // Убирать / Сносить постройки
        function demolishAssets(cName, layer) {
            if (gameState[cName].buildings.length === 0) {
                alert(`[ШТАБ]: В регионе нет сооружений для сноса.`);
                return;
            }
            gameState[cName].buildings = [];
            alert(`[ПРИКАЗ]: Инфраструктура региона полностью демонтирована.`);
            openTacticalDock(cName, layer);
        }

        // Механика полноценного штурма и захвата земель
        function launchAssault(cName, layer) {
            alert(`[ШТУРМ]: Армия выдвинулась на позиции! Прорыв оборонительных линий государства ${nameTranslations[cName]}...`);
            
            setTimeout(() => {
                // Меняем владельца в базе данных игры
                gameState[cName].owner = "player";
                
                // Движок на лету пересчитывает стили и окрашивает регион в твой цвет
                geojsonLayer.resetStyle(layer);
                
                alert(`[ПОБЕДА]: Фронт прорван! ${nameTranslations[cName]} успешно аннексирована. Карта перекрашена в цвета империи.`);
                document.getElementById('control-dock').style.display = 'none';
            }, 1400);
        }

        // Скрытие панели при клике на море
        map.on('click', () => {
            document.getElementById('control-dock').style.display = 'none';
        });
    </script>
</body>
</html>
