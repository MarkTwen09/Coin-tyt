<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Clash JS: Battle Arena</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #222; }
        #lobby, #game-ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #lobby { background: linear-gradient(45deg, #1e3c72, #2a5298); color: white; }
        #game-ui { pointer-events: none; justify-content: flex-end; display: none; }
        
        .btn { padding: 15px 40px; font-size: 24px; cursor: pointer; background: #f1c40f; border: none; border-radius: 10px; color: #2c3e50; font-weight: bold; transition: 0.2s; box-shadow: 0 5px 0 #c29d0b; }
        .btn:hover { background: #f39c12; transform: translateY(-2px); }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #c29d0b; }

        .cards-container { pointer-events: auto; display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.6); padding: 15px; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .card { width: 80px; height: 110px; background: #ecf0f1; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #2c3e50; font-size: 12px; font-weight: bold; border: 3px solid #7f8c8d; }
        .card.active { border-color: #3498db; transform: scale(1.1); }
        .card img { width: 40px; margin-bottom: 5px; }

        #stats { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,1); pointer-events: none; font-size: 20px; }
        #elixir-bar { width: 300px; height: 20px; background: #34495e; border-radius: 10px; overflow: hidden; margin-bottom: 10px; border: 2px solid white; }
        #elixir-fill { width: 50%; height: 100%; background: #9b59b6; transition: width 0.1s; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>CLASH JS: ARENA</h1>
        <button class="btn" onclick="startGame()">В БОЙ!</button>
    </div>

    <div id="game-ui">
        <div id="stats">
            <div>ВАША БАШНЯ: <span id="pHP">2000</span></div>
            <div>БАШНЯ БОТА: <span id="eHP">2000</span></div>
        </div>
        
        <div id="elixir-bar"><div id="elixir-fill"></div></div>
        
        <div class="cards-container">
            <div class="card" onclick="selectCard('knight', this)" id="default-card">
                <div style="font-size:30px">🛡️</div>
                РЫЦАРЬ
                <span>3 эликс.</span>
            </div>
            <div class="card" onclick="selectCard('archer', this)">
                <div style="font-size:30px">🏹</div>
                ЛУЧНИК
                <span>2 эликс.</span>
            </div>
            <div class="card" onclick="selectCard('giant', this)">
                <div style="font-size:30px">👹</div>
                ГИГАНТ
                <span>5 эликс.</span>
            </div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, arena;
        let units = [];
        let elixir = 5;
        let selectedCard = 'knight';
        let isGameRunning = false;
        let towers = { player: null, enemy: null };
        let health = { player: 2000, enemy: 2000 };

        const CONFIG = {
            knight: { color: 0x3498db, speed: 0.04, hp: 100, cost: 3, size: 0.5 },
            archer: { color: 0xe67e22, speed: 0.06, hp: 50, cost: 2, size: 0.35 },
            giant:  { color: 0x27ae60, speed: 0.02, hp: 300, cost: 5, size: 0.8 }
        };

        window.startGame = function() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            initScene();
            isGameRunning = true;
            animate();
        };

        window.selectCard = function(type, el) {
            selectedCard = type;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        };

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x27ae60);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 12);
            camera.lookAt(0, 0, -2);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(5, 20, 10);
            scene.add(sun);

            // Арена
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(12, 22), new THREE.MeshStandardMaterial({ color: 0x2ecc71 }));
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // Башни (Сделаем их покрасивее)
            towers.player = createTower(8, 0x2980b9);
            towers.enemy = createTower(-8, 0xc0392b);
        }

        function createTower(z, color) {
            const group = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshStandardMaterial({ color: 0x7f8c8d }));
            const top = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.5, 2.5), new THREE.MeshStandardMaterial({ color }));
            top.position.y = 2;
            group.add(base, top);
            group.position.set(0, 2, z);
            scene.add(group);
            return group;
        }

        function createUnit(type, z, team) {
            const conf = CONFIG[type];
            const group = new THREE.Group();
            
            // Тело
            const body = new THREE.Mesh(new THREE.BoxGeometry(conf.size, conf.size * 1.5, conf.size), new THREE.MeshStandardMaterial({ color: team === 'player' ? 0x3498db : 0xe74c3c }));
            group.add(body);
            
            // "Голова"
            const head = new THREE.Mesh(new THREE.SphereGeometry(conf.size/2), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            head.position.y = conf.size;
            group.add(head);

            group.position.set((Math.random() - 0.5) * 5, conf.size, z);
            
            const unitObj = {
                mesh: group,
                type: type,
                team: team,
                hp: conf.hp,
                speed: team === 'player' ? -conf.speed : conf.speed
            };
            
            scene.add(group);
            units.push(unitObj);
        }

        // Клик по полю
        window.addEventListener('mousedown', (e) => {
            if (!isGameRunning) return;
            const cost = CONFIG[selectedCard].cost;
            if (elixir < cost) return;

            const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children);

            if (intersects.length > 0) {
                const pt = intersects[0].point;
                if (pt.z > 0) { // Только на своей половине
                    createUnit(selectedCard, pt.z, 'player');
                    elixir -= cost;
                }
            }
        });

        // Бот логика
        setInterval(() => {
            if (!isGameRunning) return;
            const types = ['knight', 'archer', 'giant'];
            const randomType = types[Math.floor(Math.random() * types.length)];
            createUnit(randomType, -7, 'bot');
        }, 4000);

        // Реген эликсира
        setInterval(() => {
            if (isGameRunning && elixir < 10) elixir += 0.5;
            document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';
        }, 500);

        function animate() {
            if (!isGameRunning) return;
            requestAnimationFrame(animate);

            units.forEach((u, i) => {
                u.mesh.position.z += u.speed;

                // Урон башням
                if (u.team === 'player' && u.mesh.position.z < -7.5) {
                    health.enemy -= u.type === 'giant' ? 10 : 2;
                    removeUnit(u, i);
                } else if (u.team === 'bot' && u.mesh.position.z > 7.5) {
                    health.player -= u.type === 'giant' ? 10 : 2;
                    removeUnit(u, i);
                }

                // Столкновения (мини-бой)
                units.forEach((u2, j) => {
                    if (u.team !== u2.team && u.mesh.position.distanceTo(u2.mesh.position) < 0.8) {
                        u.hp -= 1;
                        u2.hp -= 1;
                        if (u.hp <= 0) removeUnit(u, i);
                        if (u2.hp <= 0) removeUnit(u2, j);
                    }
                });
            });

            document.getElementById('pHP').innerText = Math.max(0, health.player);
            document.getElementById('eHP').innerText = Math.max(0, health.enemy);

            if (health.player <= 0 || health.enemy <= 0) {
                alert(health.player <= 0 ? "БОТ ПОБЕДИЛ!" : "ТЫ ПОБЕДИЛ!");
                location.reload();
            }

            renderer.render(scene, camera);
        }

        function removeUnit(u, i) {
            scene.remove(u.mesh);
            units.splice(i, 1);
        }
    </script>
</body>
</html>
