<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call of War Style Interface</title>
    
    <!-- Подключаем Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1b1e; font-family: 'Arial', sans-serif; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }

        /* Магия стилизации: превращаем обычную карту в винтажную военную из Call of War */
        .leaflet-tile-container {
            filter: sepia(25%) hue-rotate(-10deg) saturate(65%) contrast(105%) brightness(95%);
        }

        /* Полностью переработанный интерфейс под стиль скриншотов */
        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 55px;
            background: rgba(20, 21, 24, 0.92);
            border-bottom: 2px solid #2d2f35;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .resource-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ddd;
            font-size: 11px;
        }

        .resource-value {
            font-weight: bold;
            color: #fff;
            margin-top: 2px;
        }

        .gold-value {
            color: #ffcc00 !important;
        }

        /* Нижняя панель приказов */
        .bottom-ui {
            position: absolute;
            bottom: 15px; left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 450px;
            background: rgba(28, 30, 34, 0.95);
            border: 1px solid #3e4149;
            border-radius: 6px;
            padding: 10px 15px;
            z-index: 10;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .province-detail {
            color: #b9bbbe;
            font-size: 12px;
        }

        .province-detail strong {
            color: #fff;
            font-size: 15px;
            display: block;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-order {
            background: #2b66d2;
            color: #fff;
            border: 1px solid #3b76e2;
            padding: 8px 18px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-order:hover { background: #3b76e2; }
        .btn-order:disabled { background: #2a2c30; border-color: #333; color: #555; }
    </style>
</head>
<body>

    <!-- Верхний бар ресурсов как на скриншоте -->
    <div class="top-bar">
        <div class="resource-item">💵 <span class="resource-value">52k</span></div>
        <div class="resource-item">🪖 <span class="resource-value">14k</span></div>
        <div class="resource-item">🌾 <span class="resource-value">12k</span></div>
        <div class="resource-item">🪙 <span class="resource-value gold-value">9,000 Золото</span></div>
    </div>

    <!-- Нижняя панель управления армией -->
    <div class="bottom-ui">
        <div class="province-detail">
            <span id="prov-type">Провинция не выбрана</span>
            <strong id="prov-name">—</strong>
        </div>
        <button class="btn-order" id="order-btn" disabled>Атаковать</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Инициализируем карту (центрируем на Европу/Ближний Восток, как на image_4.png)
        const map = L.map('map', { 
            zoomControl: false,
            attributionControl: false 
        }).setView([45.0, 25.0], 4);

        // Используем топографический слой Esri Shaded Relief. 
        // Он дает идеальные тени гор, полей и пустынь без лишней спутниковой зелени.
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 8
        }).addTo(map);

        let currentSelected = null;

        // Стиль линий границ в стиле военных карт (тонкие, темно-серые/коричневые)
        const callOfWarBoundsStyle = {
            color: "#2b261f",
            weight: 1.2,
            fillColor: "#5c6f52", // Базовый оливково-серый цвет для нейтральных земель
            fillOpacity: 0.15
        };

        // Загружаем сетку регионов (разбивка мира)
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(geoData => {
                L.geoJSON(geoData, {
                    style: callOfWarBoundsStyle,
                    onEachFeature: function (feature, layer) {
                        layer.on('click', function (e) {
                            if (currentSelected) {
                                currentSelected.setStyle(callOfWarBoundsStyle);
                            }
                            
                            currentSelected = layer;

                            // При выборе провинция окрашивается в матовый фракционный цвет
                            layer.setStyle({
                                fillOpacity: 0.4,
                                fillColor: "#b84a39", // Матовый красный цвет атаки/захвата
                                weight: 1.8,
                                color: "#111"
                            });

                            // Обновляем инфо-панель
                            const name = feature.properties.ADMIN || "Регион";
                            document.getElementById('prov-name').innerText = name;
                            document.getElementById('prov-type').innerText = "ГЕО-ПРОВИНЦИЯ";
                            document.getElementById('order-btn').disabled = false;

                            map.panTo(e.latlng);
                        });
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
