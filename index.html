<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ghetto Bank Simulator</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #game-container {
            border: 2px solid #333;
            padding: 20px;
            width: 400px;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
        .stat { font-size: 1.2em; margin-bottom: 10px; }
        .btn {
            background: #222;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px;
            width: 100%;
            margin: 5px 0;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background: #00ff00; color: #000; }
        .btn:disabled { color: #444; border-color: #444; cursor: not-allowed; }
        #log {
            height: 150px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 5px;
            font-size: 0.8em;
            margin-top: 10px;
            color: #aaa;
        }
        .danger { color: #ff0000; }
        .success { color: #ffff00; }
    </style>
</head>
<body>

    <h1>🏦 GHETTO BANK</h1>
    
    <div id="game-container">
        <div class="stat">Баланс: <span id="money">100</span>$</div>
        <div class="stat">Репутация: <span id="rep">0</span></div>
        <div class="stat">Безопасность: <span id="security">1</span></div>
        <hr>
        
        <button class="btn" onclick="collectMicroloan()">Собрать проценты по микрозаймам (+1$)</button>
        
        <button class="btn" id="upgradeSec" onclick="upgradeSecurity()">Нанять вышибалу (Цена: 50$)</button>
        
        <button class="btn" id="laundry" onclick="moneyLaundering()">Отмыть деньги (Риск!)</button>
        
        <button class="btn" id="legalize" onclick="legalize()">Купить лицензию (Цена: 1000$)</button>

        <div id="log"></div>
    </div>

    <script>
        let money = 100;
        let rep = 0;
        let security = 1;
        let isLegal = false;
        let secCost = 50;

        const logElement = document.getElementById('log');

        function addLog(text, className = '') {
            const entry = document.createElement('div');
            entry.className = className;
            entry.innerText = `> ${text}`;
            logElement.prepend(entry);
        }

        function updateDisplay() {
            document.getElementById('money').innerText = Math.floor(money);
            document.getElementById('rep').innerText = rep;
            document.getElementById('security').innerText = security;
            document.getElementById('upgradeSec').innerText = `Нанять вышибалу (Цена: ${secCost}$)`;
            
            if(money < secCost) document.getElementById('upgradeSec').disabled = true;
            else document.getElementById('upgradeSec').disabled = false;

            if(money < 1000 || isLegal) document.getElementById('legalize').disabled = true;
            else document.getElementById('legalize').disabled = false;
        }

        function collectMicroloan() {
            let gain = 1 + (rep * 0.1);
            money += gain;
            rep += 1;
            addLog(`Собрано ${gain.toFixed(1)}$ с должников.`);
            checkRandomEvent();
            updateDisplay();
        }

        function upgradeSecurity() {
            if (money >= secCost) {
                money -= secCost;
                security += 1;
                secCost = Math.floor(secCost * 1.8);
                addLog("Безопасность повышена. Теперь грабить будут чуть реже.", "success");
                updateDisplay();
            }
        }

        function moneyLaundering() {
            let chance = Math.random();
            if (chance > 0.7) {
                let gain = money * 0.5;
                money += gain;
                addLog(`Успех! Отмыто ${gain.toFixed(0)}$.`, "success");
            } else {
                let loss = money * 0.3;
                money -= loss;
                rep -= 10;
                addLog(`Полиция накрыла точку! Потеряно ${loss.toFixed(0)}$.`, "danger");
            }
            updateDisplay();
        }

        function legalize() {
            if (money >= 1000) {
                money -= 1000;
                isLegal = true;
                addLog("Вы получили лицензию! Налоги выросли, но облавы прекратились.", "success");
                updateDisplay();
            }
        }

        function checkRandomEvent() {
            let eventChance = Math.random();
            
            // Ограбление (зависит от безопасности)
            if (eventChance < 0.15 && !isLegal) {
                let raidPower = Math.random() * 10;
                if (raidPower > security) {
                    let stolen = money * 0.4;
                    money -= stolen;
                    addLog(`МЕСТНАЯ БАНДА ОГРАБИЛА БАНК! Потеряно ${stolen.toFixed(0)}$.`, "danger");
                } else {
                    addLog("Охрана отбила нападение мелких воришек.");
                }
            }

            // Инфляция или налоги
            if (eventChance > 0.9) {
                let tax = isLegal ? money * 0.05 : money * 0.15;
                money -= tax;
                addLog(`Уплачено за "крышу" или налоги: ${tax.toFixed(0)}$.`, "danger");
            }
            
            // Случайный кризис
            if (eventChance > 0.45 && eventChance < 0.5) {
                rep = Math.floor(rep / 2);
                addLog("Слухи в гетто: ваш банк — кидалово. Репутация упала!", "danger");
            }
        }

        // Пассивный доход и инфляция
        setInterval(() => {
            if (money > 0) {
                money -= (money * 0.01); // Пассивное обесценивание денег
                updateDisplay();
            }
        }, 3000);

        updateDisplay();
    </script>
</body>
</html>
