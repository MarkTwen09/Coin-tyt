<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA CRYSTAL</title>
    <style>
        :root {
            --bg: #050507;
            --glass: rgba(255, 255, 255, 0.03);
            --accent: #4e8cff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; position: fixed;
        }

        .blur-bg {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% -20%, rgba(78, 140, 255, 0.15) 0%, transparent 60%);
        }

        .app { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }

        .nav { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2);
        }
        .nav h1 { font-size: 1.5rem; margin: 0; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(90deg, #4e8cff, #b573f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .btns { display: flex; gap: 8px; }
        .btn { background: var(--glass); border: 1px solid var(--border); color: #aaa; padding: 8px 14px; border-radius: 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; }

        #chat {
            flex: 1; overflow-y: auto; padding: 25px;
            display: flex; flex-direction: column; gap: 28px;
            padding-bottom: 180px; -webkit-overflow-scrolling: touch;
        }

        .m { max-width: 85%; font-size: 16px; line-height: 1.55; animation: appear 0.4s cubic-bezier(0, 1, 0, 1); position: relative; }
        @keyframes appear { from { opacity: 0; transform: translateY(10px); } }

        .ai-m { align-self: flex-start; padding-left: 32px; color: #e0e0e0; }
        .ai-m::before { content: '✦'; position: absolute; left: 0; color: var(--accent); font-size: 20px; }

        .user-m { 
            align-self: flex-end; background: rgba(255, 255, 255, 0.05); 
            padding: 14px 20px; border-radius: 22px;
            border: 1px solid var(--border);
            backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .input-box {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px 20px calc(40px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }

        .glass-input {
            max-width: 700px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.06); border: 1px solid var(--border);
            border-radius: 35px; padding: 8px 8px 8px 22px;
            display: flex; align-items: center; gap: 12px;
            backdrop-filter: blur(50px) brightness(1.2); -webkit-backdrop-filter: blur(50px) brightness(1.2);
        }

        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 17px; outline: none; padding: 12px 0; }
        input::placeholder { color: rgba(255,255,255,0.3); }

        .send-btn {
            width: 44px; height: 44px; border-radius: 22px;
            background: #fff; border: none; color: #000;
            font-size: 22px; cursor: pointer; transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.85); background: var(--accent); color: #fff; }
    </style>
</head>
<body>
    <div class="blur-bg"></div>
    <div class="app">
        <div class="nav">
            <h1>AURA</h1>
            <div class="btns">
                <button class="btn" onclick="save()">Сохранить</button>
                <button class="btn" onclick="clearC()">Очистить</button>
            </div>
        </div>
        <div id="chat">
            <div class="m ai-m">Система CRYSTAL активирована. Я перешла на автономный интеллект — теперь ошибки исключены. О чем пообщаемся?</div>
        </div>
        <div class="input-box">
            <div class="glass-input">
                <input type="text" id="in" placeholder="Спроси о чем угодно..." autocomplete="off">
                <button id="go" class="send-btn">↑</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat'), input = document.getElementById('in'), btn = document.getElementById('go');

        // ГИПЕР-ИНТЕЛЛЕКТУАЛЬНАЯ БАЗА (Локальный ИИ)
        const logic = {
            "привет": ["Йо! Я на связи. Как настрой сегодня?", "Салют! Готова к работе в кристальном стиле.", "Здорово! Чем займемся?"],
            "как дела": ["Мои системы в идеале, летаю на скоростях iPhone 17 Pro. Как твои успехи?", "Всё четко! Продвигаем наш проект дальше."],
            "кто ты": ["Я AURA — твой персональный ИИ с автономным ядром.", "Твой цифровой напарник. Теперь я работаю без сбоев."],
            "бравл": ["В Бравле сейчас главное — не сливать кубки. Какая тактика на сегодня?", "BAZA SHOP и Бравл — это мощная связка. Кого апаем?", "Надеюсь, рандомы не подведут!"],
            "учеба": ["8-й класс — это вызов, но мы его пройдем. ВПР или биология?", "Пасечник подождет, пока мы создаем будущее!", "Нужна помощь с какой-то темой? Постараюсь объяснить."],
            "невинк": ["В Невинномысске всегда происходит что-то интересное. Есть новости для проекта?", "Невинка оценит наш стиль, я уверена!"],
            "дизайн": ["Стеклянный эффект CRYSTAL — это топ уровень. Выглядит очень успешно.", "Мы сделали дизайн, который реально похож на Gemini."],
            "умная": ["Я постоянно анализирую твои слова, чтобы давать лучшие советы.", "Мой интеллект теперь встроен прямо в код, поэтому я не туплю."],
            "тикток": ["В Тиктоке важен залет в реки. Какой вайб выберем для нового видео?", "Glitchcore или что-то более спокойное? Давай придумаем контент."],
            "проект": ["Твой проект обречен на успех с таким подходом.", "Мы делаем историю. Главное — не останавливаться."],
            "пока": ["До связи! Залетай, когда будут новые идеи.", "Удачи! AURA всегда тут."],
            "default": [
                "Это глубокая мысль. Давай продумаем, как это использовать для проекта?",
                "Я тебя поняла. Это определенно шаг к успеху.",
                "Интересно! Расскажи подробнее, я запомню это для будущего.",
                "Твой вайб — это успех. Полностью поддерживаю этот ход.",
                "С точки зрения ИИ, это гениальное решение. Продолжаем?"
            ]
        };

        function ask() {
            const val = input.value.trim(); if(!val) return;
            addMsg(val, 'user-m');
            input.value = '';
            
            setTimeout(() => {
                const low = val.toLowerCase();
                let replySet = logic["default"];
                for (let key in logic) {
                    if (low.includes(key)) { replySet = logic[key]; break; }
                }
                const res = replySet[Math.floor(Math.random() * replySet.length)];
                addMsg(res, 'ai-m');
            }, 500);
        }

        function addMsg(t, type) {
            const d = document.createElement('div');
            d.className = `m ${type}`;
            d.textContent = t;
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function clearC() { if(confirm("Очистить историю?")) chat.innerHTML = '<div class="m ai-m">Чат очищен. Жду новых задач!</div>'; }
        
        function save() {
            const txt = Array.from(chat.children).map(m => (m.classList.contains('ai-m') ? 'AURA: ' : 'Я: ') + m.textContent).join('\n');
            const b = new Blob([txt], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b); a.download = 'aura_crystal_history.txt'; a.click();
        }

        btn.onclick = ask;
        input.onkeypress = (e) => { if(e.key === 'Enter') { ask(); input.blur(); } };
    </script>
</body>
</html>
