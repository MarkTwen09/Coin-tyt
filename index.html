<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AURA PRO</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
    background: #0a0a0d;
    color: #eaeaf0;
    font-family: system-ui, -apple-system;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
header {
    padding: 18px 24px;
    border-bottom: 1px solid #1c1c28;
    font-weight: 600;
    color: #a78bfa;
    letter-spacing: 1px;
}

/* CHAT */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* MESSAGE */
.msg {
    max-width: 720px;
    padding: 14px 18px;
    border-radius: 14px;
    line-height: 1.5;
    animation: fade 0.2s ease;
    white-space: pre-wrap;
}

.user {
    align-self: flex-end;
    background: #1f1f2e;
}

.bot {
    align-self: flex-start;
    background: #12121a;
    border: 1px solid #26263a;
}

/* INPUT */
#inputArea {
    display: flex;
    padding: 16px;
    border-top: 1px solid #1c1c28;
}

input {
    flex: 1;
    background: #12121a;
    border: 1px solid #26263a;
    border-radius: 10px;
    padding: 14px;
    color: white;
    outline: none;
}

input:focus {
    border-color: #8b5cf6;
}

button {
    margin-left: 10px;
    padding: 0 18px;
    border: none;
    border-radius: 10px;
    background: #8b5cf6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #a78bfa;
}

/* ANIMATION */
@keyframes fade {
    from {opacity:0; transform:translateY(6px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<header>✨ AURA PRO</header>

<div id="chat"></div>

<div id="inputArea">
    <input id="input" placeholder="Напиши сообщение..." />
    <button onclick="send()">→</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

/* MEMORY */
let memory = JSON.parse(localStorage.getItem("aura_memory") || "[]");

function saveMemory(user, bot){
    memory.push({user, bot});
    localStorage.setItem("aura_memory", JSON.stringify(memory));
}

/* UI */
function add(text, cls){
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* SMART LOGIC */
function reply(msg){
    msg = msg.toLowerCase();

    // память
    for(let m of memory.slice(-5)){
        if(msg.includes(m.user.toLowerCase())){
            return "Ты уже спрашивал это. Мой ответ: " + m.bot;
        }
    }

    if(msg.includes("привет")) return "Привет. Я AURA PRO.";
    if(msg.includes("кто ты")) return "Я локальный AI с памятью.";
    if(msg.includes("запомни")){
        let data = msg.replace("запомни","");
        return "Запомнила: " + data;
    }

    if(msg.includes("что ты знаешь обо мне")){
        return memory.length
            ? "Я помню " + memory.length + " вещей о тебе."
            : "Пока ничего. Расскажи мне что-нибудь.";
    }

    if(msg.includes("код")){
        return "Опиши задачу подробнее — я попробую помочь.";
    }

    const deep = [
        "Это звучит как интересная идея.",
        "Я вижу несколько вариантов развития.",
        "Попробуй взглянуть с другой стороны.",
        "Это можно улучшить. Хочешь разберём?",
        "Продолжай, я анализирую."
    ];

    return deep[Math.floor(Math.random()*deep.length)];
}

/* SEND */
function send(){
    const text = input.value.trim();
    if(!text) return;

    add(text, "user");
    input.value = "";

    setTimeout(()=>{
        const r = reply(text);
        add(r, "bot");
        saveMemory(text, r);
    }, 300);
}

input.addEventListener("keypress", e=>{
    if(e.key === "Enter") send();
});
</script>

</body>
</html>
