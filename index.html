<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash JS Ultimate</title>
    <style>
        :root { --gold: #ffd700; --elixir: #f0f; --p-color: #3498db; --e-color: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #222; font-family: sans-serif; }
        
        #lobby { position: absolute; inset: 0; background: radial-gradient(circle, #2980b9, #2c3e50); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .play-btn { background: #4cd137; color: white; border: none; padding: 15px 50px; font-size: 28px; border-radius: 15px; box-shadow: 0 6px 0 #3b9e2a; cursor: pointer; font-weight: bold; }

        #game-ui { position: absolute; bottom: 0; width: 100%; z-index: 50; display: none; flex-direction: column; align-items: center; padding-bottom: 15px; pointer-events: none; }
        
        #elixir-bar { width: 90%; height: 14px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        #elixir-fill { height: 100%; background: var(--elixir); width: 0%; transition: width 0.2s linear; }

        .cards-deck { display: flex; gap: 8px; pointer-events: auto; }
        .card { width: 85px; height: 110px; background: #fff; border-radius: 10px; border: 4px solid #444; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: 0.1s; }
        .card.active { border-color: var(--gold); transform: translateY(-10px); }
        .card .cost { position: absolute; top: -10px; left: -10px; background: var(--elixir); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; z-index: 5; }

        .hp-bar { position: absolute; width: 45px; height: 7px; background: #333; border: 1px solid #fff; pointer-events: none; border-radius: 3px; overflow: hidden; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; }
        .tower-hp { width: 90px; height: 12px; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="font-size: 48px; text-shadow: 2px 4px #000; margin-bottom: 20px;">CLASH JS</h1>
    <button class="play-btn" onclick="startGame()">В БОЙ!</button>
</div>

<div id="game-ui">
    <div id="elixir-bar"><div id="elixir-fill"></div></div>
    <div class="cards-deck">
        <div class="card active" onclick="pick('knight', this)"><div class="cost">3</div>🛡️<br>РЫЦАРЬ</div>
        <div class="card" onclick="pick('archer', this)"><div class="cost">2</div>🏹<br>ЛУЧНИК</div>
        <div class="card" onclick="pick('giant', this)"><div class="cost">5</div>👹<br>ГИГАНТ</div>
    </div>
</div>

<div id="hp-layer" style="position: absolute; inset: 0; pointer-events: none; z-index: 40;"></div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

<script type="module">
    import * as THREE from 'three';

    const CONFIG = {
        knight: { hp: 700, dmg: 45, range: 1.3, speed: 0.05, rate: 1000, cost: 3, color: 0x3498db, size: 0.6 },
        archer: { hp: 280, dmg: 35, range: 5.5, speed: 0.07, rate: 800, cost: 2, color: 0xe67e22, size: 0.45 },
        giant:  { hp: 2500, dmg: 120, range: 1.8, speed: 0.03, rate: 1500, cost: 5, color: 0x27ae60, size: 1.0, towerOnly: true }
    };

    let scene, camera, renderer, clock;
    let units = [], towers = [], elixir = 5, botElixir = 2, selectedCard = 'knight', isRunning = false;

    window.startGame = () => {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
        init();
        isRunning = true;
    };

    window.pick = (type, el) => {
        selectedCard = type;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x27ae60);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 22, 16);
        camera.lookAt(0, -2, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(5, 20, 10);
        scene.add(sun);

        // Поле
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(14, 28), new THREE.MeshStandardMaterial({ color: 0x2ecc71 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Река
        const river = new THREE.Mesh(new THREE.PlaneGeometry(14, 3), new THREE.MeshStandardMaterial({ color: 0x3498db }));
        river.rotation.x = -Math.PI / 2;
        river.position.y = 0.02;
        scene.add(river);

        // Башни
        towers.push(spawnTower(0, 10, 'player'));
        towers.push(spawnTower(0, -10, 'bot'));

        window.addEventListener('resize', onWindowResize);
        clock = new THREE.Clock();
        animate();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function spawnTower(x, z, team) {
        const group = new THREE.Group();
        const b = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.6, 4, 8), new THREE.MeshStandardMaterial({ color: 0xbdc3c7 }));
        const t = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.6, 2.2), new THREE.MeshStandardMaterial({ color: team === 'player' ? 0x2980b9 : 0xc0392b }));
        t.position.y = 2.3;
        group.add(b, t);
        group.position.set(x, 2, z);
        scene.add(group);

        const hpEl = createHPBar(true);
        return { mesh: group, team, hp: 3000, maxHp: 3000, hpEl };
    }

    function createHPBar(isTower) {
        const bar = document.createElement('div');
        bar.className = 'hp-bar' + (isTower ? ' tower-hp' : '');
        bar.innerHTML = '<div class="hp-fill"></div>';
        document.getElementById('hp-layer').appendChild(bar);
        return bar;
    }

    function spawnUnit(type, x, z, team) {
        const c = CONFIG[type];
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(c.size, c.size * 1.2, c.size), new THREE.MeshStandardMaterial({ color: team === 'player' ? 0x3498db : 0xe74c3c }));
        mesh.position.set(x, c.size/2, z);
        scene.add(mesh);
        const hpEl = createHPBar(false);
        units.push({ ...c, mesh, team, curHp: c.hp, hpEl, lastAtk: 0 });
    }

    // Слушатель для спавна (Mobile & PC)
    const handleInput = (e) => {
        if(!isRunning || elixir < CONFIG[selectedCard].cost) return;
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        
        const mouse = new THREE.Vector2((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1);
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, camera);
        const hits = ray.intersectObjects(scene.children);
        
        if(hits.length > 0) {
            const p = hits[0].point;
            if(p.z > 1.5) { // За рекой
                spawnUnit(selectedCard, p.x, p.z, 'player');
                elixir -= CONFIG[selectedCard].cost;
            }
        }
    };

    window.addEventListener('touchstart', handleInput);
    window.addEventListener('mousedown', (e) => { if(e.button === 0) handleInput(e); });

    function updateHPPos(obj, yOffset) {
        const v = obj.mesh.position.clone();
        v.y += yOffset;
        v.project(camera);
        const x = (v.x * 0.5 + 0.5) * window.innerWidth;
        const y = -(v.y * 0.5 - 0.5) * window.innerHeight;
        obj.hpEl.style.transform = `translate(${x - (obj.maxHp ? 45 : 22)}px, ${y}px)`;
        const p = (obj.hp || obj.curHp) / (obj.maxHp || obj.hp) * 100;
        obj.hpEl.children[0].style.width = Math.max(0, p) + '%';
    }

    function animate() {
        if(!isRunning) return;
        requestAnimationFrame(animate);
        const dt = clock.getElapsedTime() * 1000;

        elixir = Math.min(10, elixir + 0.007);
        botElixir = Math.min(10, botElixir + 0.005);
        document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';

        // Бот ИИ
        if(botElixir >= 4.5) {
            const t = ['knight', 'archer', 'giant'][Math.floor(Math.random()*3)];
            spawnUnit(t, (Math.random()-0.5)*10, -11, 'bot');
            botElixir -= CONFIG[t].cost;
        }

        units.forEach((u, i) => {
            let targets = [...units.filter(e => e.team !== u.team), ...towers.filter(t => t.team !== u.team)];
            if(u.towerOnly) targets = towers.filter(t => t.team !== u.team);
            
            let target = null, minDist = Infinity;
            targets.forEach(t => {
                const d = u.mesh.position.distanceTo(t.mesh.position);
                if(d < minDist) { minDist = d; target = t; }
            });

            if(target) {
                const d = u.mesh.position.distanceTo(target.mesh.position);
                if(d > u.range) {
                    const dir = new THREE.Vector3().subVectors(target.mesh.position, u.mesh.position).normalize();
                    u.mesh.position.add(dir.multiplyScalar(u.speed));
                    u.mesh.lookAt(target.mesh.position);
                } else if(dt - u.lastAtk > u.rate) {
                    target.hp !== undefined ? target.hp -= u.dmg : target.curHp -= u.dmg;
                    u.lastAtk = dt;
                }
            }
            updateHPPos(u, 1.5);
            if(u.curHp <= 0) {
                u.hpEl.remove();
                scene.remove(u.mesh);
                units.splice(i, 1);
            }
        });

        towers.forEach(t => {
            updateHPPos(t, 4.5);
            if(t.hp <= 0) {
                isRunning = false;
                alert(t.team === 'player' ? "ПОРАЖЕНИЕ..." : "ПОБЕДА!");
                location.reload();
            }
        });

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
