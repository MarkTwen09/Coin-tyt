<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghetto Bank Online</title>
    <style>
        :root { --bg: #000; --card: #111; --accent: #ffdd2d; --text: #fff; --gray: #888; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 400px; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .balance { font-size: 35px; font-weight: bold; margin: 10px 0; }
        .user-id { font-size: 12px; color: var(--gray); background: #222; padding: 5px 10px; border-radius: 10px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; background: #222; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); font-weight: bold; cursor: pointer; }
        .history-item { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .loader { color: var(--accent); font-size: 12px; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="letter-spacing: -1px;">GHETTO<span style="color:var(--accent)">BANK</span></h2>
        <span class="user-id" id="myId">ID: Loading...</span>
    </div>

    <div class="card">
        <div style="color: var(--gray); font-size: 14px;">Ваш баланс</div>
        <div class="balance" id="balanceDisplay">0.00 ₽</div>
        <div class="loader" id="syncStatus">Синхронизация с сетью...</div>
    </div>

    <div class="card">
        <h3 style="margin-top:0">Перевод</h3>
        <input type="text" id="targetId" placeholder="ID получателя">
        <input type="number" id="amount" placeholder="Сумма">
        <button onclick="sendMoney()">Отправить Гетто-рубли</button>
    </div>

    <h4>История операций</h4>
    <div id="history"></div>
</div>

<script>
    // Используем публичный бесплатный KV-база данных (Bucket name - придумай свой уникальный)
    const BUCKET = 'ghetto_bank_v1_main_storage'; 
    const API_URL = `https://kvdb.io/${BUCKET}/`;

    // 1. Генерируем или берем ID пользователя
    let myId = localStorage.getItem('ghetto_user_id') || Math.floor(1000 + Math.random() * 9000).toString();
    localStorage.setItem('ghetto_user_id', myId);
    document.getElementById('myId').innerText = 'ID: ' + myId;

    async function getBalance(id) {
        try {
            const r = await fetch(API_URL + id);
            if (!r.ok) return 5000; // Стартовый капитал новым игрокам
            return parseFloat(await r.text());
        } catch { return 5000; }
    }

    async function saveBalance(id, amount) {
        await fetch(API_URL + id, { method: 'POST', body: amount.toString() });
    }

    async function sync() {
        const b = await getBalance(myId);
        document.getElementById('balanceDisplay').innerText = b.toLocaleString() + ' ₽';
        document.getElementById('syncStatus').innerText = 'В сети (Обновлено)';
        return b;
    }

    async function sendMoney() {
        const to = document.getElementById('targetId').value;
        const sum = parseFloat(document.getElementById('amount').value);
        const status = document.getElementById('syncStatus');

        if (!to || !sum || sum <= 0) return alert('Введи данные');

        status.innerText = 'Связь с банком...';
        
        const myBalance = await sync();
        if (myBalance < sum) {
            alert('Недостаточно средств!');
            status.innerText = 'Ошибка транзакции';
            return;
        }

        const targetBalance = await getBalance(to);
        
        // Магия перевода:
        await saveBalance(myId, myBalance - sum);
        await saveBalance(to, targetBalance + sum);

        // Добавляем в историю
        const h = document.getElementById('history');
        h.innerHTML = `<div class="history-item">Отправлено ${sum}₽ пользователю ${to}</div>` + h.innerHTML;

        alert('Перевод выполнен успешно!');
        sync();
    }

    // Авто-обновление каждые 10 секунд
    setInterval(sync, 10000);
    sync();
</script>

</body>
</html>
