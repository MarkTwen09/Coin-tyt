<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Stars — Digital Assets</title>
    <style>
        :root {
            --bg: #0b0d13;
            --card: #161922;
            --accent: #3b82f6;
            --gold: #d4af37;
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow: hidden;
        }

        /* Основная карточка из твоей любимой версии */
        .main-container {
            width: 90%;
            max-width: 370px;
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; margin-bottom: 5px; }
        .logo span { color: var(--gold); }
        .sub { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .label { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        .tg-input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 15px; color: white; font-size: 15px; outline: none;
        }

        .display {
            background: rgba(255,255,255,0.02); border-radius: 16px; padding: 20px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .val { font-size: 26px; font-weight: 800; }
        .price { color: var(--gold); font-size: 15px; font-weight: 600; margin-top: 5px; }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #222; border-radius: 2px; margin-bottom: 25px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: white; border-radius: 50%; cursor: pointer; }

        .main-btn {
            width: 100%; padding: 16px; background: white; color: black; border: none; border-radius: 14px;
            font-size: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .main-btn:active { transform: scale(0.96); }

        /* ОКНО ОПЛАТЫ (ЧЕК) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px);
        }
        .receipt {
            width: 85%; max-width: 320px; background: #1c202b; border-radius: 20px; padding: 25px;
            border: 1px solid var(--gold); text-align: center;
        }
        .receipt-title { color: var(--gold); font-size: 12px; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }
        
        .card-box {
            background: #000; padding: 15px; border-radius: 12px; margin: 15px 0;
            border: 1px dashed #333; cursor: pointer;
        }
        .card-num { font-family: monospace; font-size: 16px; letter-spacing: 1px; color: #fff; }

        .confirm-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 700; margin-top: 10px; cursor: pointer; }
        .back-btn { background: none; border: none; color: #555; font-size: 11px; margin-top: 15px; cursor: pointer; text-transform: uppercase; }

    </style>
</head>
<body>

<div class="main-container">
    <div class="logo">MOON<span>STARS</span></div>
    <div class="sub">Professional Digital Service</div>

    <div class="input-group">
        <label class="label">Ваш Telegram ник</label>
        <input type="text" id="nick" class="tg-input" placeholder="@username">
    </div>

    <div class="display">
        <div class="val" id="val">100 STARS</div>
        <div class="price" id="price">170 ₽</div>
    </div>

    <input type="range" id="slider" min="0" max="5" step="1" value="0" oninput="update()">

    <button class="main-btn" onclick="openPay()">Оформить</button>
</div>

<div class="modal" id="modal">
    <div class="receipt">
        <div class="receipt-title">Кассовый счёт</div>
        <div style="font-size: 14px; color: var(--text-dim);">К оплате: <b style="color:white" id="m-sum">0 ₽</b></div>
        
        <div class="card-box" onclick="copyCard()">
            <div class="card-num">2202 2088 9003 9648</div>
            <div style="font-size: 9px; color: var(--accent); margin-top: 5px;">Нажмите, чтобы скопировать карту</div>
        </div>

        <div style="font-size: 11px; color: var(--text-dim); margin-bottom: 20px;">
            Получатель: <b style="color:white">MARK P.</b> (Сбербанк)
        </div>

        <button class="confirm-btn" onclick="finish()">Я оплатил</button>
        <button class="back-btn" onclick="closePay()">Назад</button>
    </div>
</div>

<script>
    const stars = [
        {t: "100 STARS", p: 170}, {t: "150 STARS", p: 240}, {t: "250 STARS", p: 445},
        {t: "500 STARS", p: 830}, {t: "1000 STARS", p: 1540}, {t: "2500 STARS", p: 3700}
    ];

    function update() {
        const v = document.getElementById('slider').value;
        document.getElementById('val').innerText = stars[v].t;
        document.getElementById('price').innerText = stars[v].p + " ₽";
    }

    function openPay() {
        if(!document.getElementById('nick').value) return alert("Введите ник!");
        const v = document.getElementById('slider').value;
        document.getElementById('m-sum').innerText = stars[v].p + " ₽";
        document.getElementById('modal').style.display = 'flex';
    }

    function closePay() { document.getElementById('modal').style.display = 'none'; }

    function copyCard() {
        navigator.clipboard.writeText("2202208890039648");
        alert("Карта скопирована!");
    }

    function finish() {
        const n = document.getElementById('nick').value.replace('@', '');
        const v = document.getElementById('slider').value;
        const text = `Moon Stars:\nОплатил заказ!\nТовар: ${stars[v].t}\nСумма: ${stars[v].p}₽\nНик: @${n}`;
        window.location.href = `https://t.me/kaoface?text=${encodeURIComponent(text)}`;
    }
</script>

</body>
</html>
