<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -10%, #2e1065 0%, #000 60%); z-index: -1; }
        .aura-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 24px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .user-bubble { background: linear-gradient(135deg, #4f46e5, #9333ea); border-radius: 20px 20px 4px 20px; align-self: flex-end; padding: 14px 18px; max-width: 85%; font-size: 14px; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3); }
        .ai-bubble { background: rgba(15, 15, 15, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px 20px 20px 4px; align-self: flex-start; padding: 14px 18px; max-width: 85%; font-size: 14px; position: relative; border-left: 3px solid #a855f7; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 150px; }
        #chat-flow::-webkit-scrollbar { width: 0; }
        .input-container { position: fixed; bottom: 0; left: 0; right: 0; padding: 25px; padding-bottom: calc(30px + env(safe-area-inset-bottom)); background: linear-gradient(to top, #000 70%, transparent); }
        .neon-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 100px; padding: 5px 5px 5px 20px; display: flex; align-items: center; transition: 0.3s; }
        .neon-input:focus-within { border-color: #a855f7; box-shadow: 0 0 20px rgba(168, 85, 247, 0.2); }
        input { background: transparent; border: none; color: #fff; font-size: 15px; outline: none; width: 100%; }
        .send-btn { background: #fff; color: #000; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
        .send-btn:active { transform: scale(0.9); }
        .status-dot { width: 8px; height: 8px; background: #a855f7; border-radius: 50%; box-shadow: 0 0 10px #a855f7; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <header class="pt-14 pb-4 px-6 flex justify-between items-center border-b border-white/5 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="status-dot"></div>
            <h1 class="text-xl font-bold tracking-tighter uppercase italic">Aura</h1>
        </div>
        <div class="text-[10px] text-gray-500 font-mono tracking-widest uppercase">Encryption: Active</div>
    </header>

    <div id="chat-flow">
        <div class="ai-bubble">Hello. I am Aura. My neural circuits are ready. What are we building today?</div>
    </div>

    <div id="loader" class="hidden px-8 py-2 text-[10px] text-purple-400 uppercase tracking-widest animate-pulse">Processing...</div>

    <div class="input-container">
        <div class="max-w-3xl mx-auto neon-input backdrop-blur-3xl">
            <input type="text" id="userInput" placeholder="Message Aura..." autocomplete="off">
            <button onclick="handleAsk()" class="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
        </div>
    </div>

    <script>
        const KEY = 'AIzaSyDOqqL5RGsnseRbEnfn64YZdpZ7-2YIzOY';

        async function handleAsk() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat-flow');
            const loader = document.getElementById('loader');
            const text = input.value.trim();

            if (!text) return;

            input.value = '';
            chat.innerHTML += `<div class="user-bubble">${text}</div>`;
            chat.scrollTo(0, chat.scrollHeight);
            
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                loader.classList.add('hidden');

                if (data.error) {
                    chat.innerHTML += `<div class="p-4 bg-red-500/10 border border-red-500/30 rounded-2xl text-[10px] text-red-400 text-center uppercase">System Error: ${data.error.message}</div>`;
                } else {
                    const aiMsg = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="ai-bubble">${aiMsg}</div>`;
                }
            } catch (err) {
                loader.classList.add('hidden');
                chat.innerHTML += `<div class="text-red-500 text-[10px] text-center uppercase tracking-widest">Network Error: Check Connection</div>`;
            }
            chat.scrollTo(0, chat.scrollHeight);
        }

        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') handleAsk(); };
    </script>
</body>
</html>
