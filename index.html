<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; }
        .aura-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 20px; }
        .user-msg { background: #111; border: 1px solid #333; align-self: flex-end; border-radius: 20px 20px 4px 20px; }
        .ai-msg { background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(99, 102, 241, 0.1)); border: 1px solid rgba(168, 85, 247, 0.3); align-self: flex-start; border-radius: 20px 20px 20px 4px; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
        #chat::-webkit-scrollbar { width: 0; }
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); background: linear-gradient(transparent, #000 40%); }
        input:focus { font-size: 16px !important; outline: none; border-color: #a855f7 !important; }
    </style>
</head>
<body>

    <header class="p-6 border-b border-white/5 text-center">
        <h1 class="text-xl font-black tracking-[0.4em] uppercase italic bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent">AURA</h1>
    </header>

    <div id="chat" class="flex flex-col gap-5">
        <div class="ai-msg p-4 max-w-[85%] text-sm">Aura is online. Waiting for your command...</div>
    </div>

    <div class="input-area">
        <div class="max-w-2xl mx-auto flex gap-3 p-2 aura-card">
            <input type="text" id="msgInput" class="w-full bg-transparent px-4 py-3 text-sm" placeholder="Ask Aura..." autocomplete="off">
            <button onclick="send()" class="bg-white text-black h-11 w-11 flex items-center justify-center rounded-full font-bold transition-transform active:scale-90">↑</button>
        </div>
    </div>

    <script>
    
        const MY_KEY = 'AIzaSyDOqqL5RGsnseRbEnfn64YZdpZ7-2YIzOY';

        async function send() {
            const input = document.getElementById('msgInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            chat.innerHTML += `<div class="user-msg p-4 max-w-[80%] text-sm shadow-xl">${text}</div>`;
            chat.scrollTo(0, chat.scrollHeight);

            const loader = document.createElement('div');
            loader.className = 'ai-msg p-4 max-w-[85%] text-xs animate-pulse text-purple-400';
            loader.innerText = 'Aura is generating response...';
            chat.appendChild(loader);

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await res.json();
                chat.removeChild(loader);

                if (data.error) {
                    // ЕСЛИ КЛЮЧ НЕВЕРНЫЙ, ОНА НАПИШЕТ ЭТО ТУТ:
                    chat.innerHTML += `<div class="p-4 bg-red-900/20 border border-red-500/50 rounded-xl text-[10px] text-red-400 text-center uppercase tracking-tighter">API Error: ${data.error.message}</div>`;
                } else {
                    const aiText = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="ai-msg p-4 max-w-[85%] text-sm leading-relaxed">${aiText}</div>`;
                }
            } catch (e) {
                chat.innerHTML += `<div class="text-red-500 text-center text-xs">Connection failed. Check network.</div>`;
            }
            chat.scrollTo(0, chat.scrollHeight);
        }
        document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') send() };
    </script>
</body>
</html>
