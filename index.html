<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHETTO OS | NEXT-GEN BANK</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
    <style>
        :root {
            --bg: #000;
            --card: #111;
            --accent: #2ecc71; /* Сочный зеленый */
            --text: #fff;
            --border: rgba(255,255,255,0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; overflow: hidden; }
        
        #app { width: 100%; max-width: 430px; height: 100vh; padding: 25px 20px; display: none; overflow-y: auto; }
        #auth { width: 100%; max-width: 430px; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .status { font-size: 11px; color: var(--accent); display: flex; align-items: center; gap: 5px; background: rgba(46, 204, 113, 0.1); padding: 5px 12px; border-radius: 20px; }
        .status::before { content: ""; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }

        /* КАРТА */
        .card { 
            background: linear-gradient(145deg, #1c1c1e, #000); 
            border: 1px solid var(--border); border-radius: 32px; padding: 30px; margin-bottom: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .bal-label { font-size: 13px; color: #666; font-weight: 600; margin-bottom: 10px; }
        .balance { font-size: 42px; font-weight: 800; letter-spacing: -1.5px; }

        /* ПЕРЕВОД */
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 20px; }
        .box-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        
        .input-wrap { background: #000; border: 1px solid #222; border-radius: 16px; padding: 12px 18px; margin-bottom: 12px; }
        .input-wrap label { display: block; font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        input { background: none; border: none; color: #fff; width: 100%; font-size: 16px; font-weight: 600; outline: none; }

        .btn { background: #fff; color: #000; border: none; width: 100%; padding: 20px; border-radius: 18px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-top { background: var(--accent); color: #fff; margin-bottom: 15px; }

        /* ИСТОРИЯ */
        .h-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; border-bottom: 1px solid #111; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .h-info div { font-weight: 600; font-size: 14px; }
        .h-info span { font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <div id="auth">
        <h1 style="text-align: center; font-size: 36px; margin-bottom: 40px;">GHETTO<br><span style="color:var(--accent)">PRIVATE</span></h1>
        <div class="input-wrap">
            <input type="text" id="reg-name" placeholder="Введите имя">
        </div>
        <button class="btn btn-top" onclick="register()">Открыть счет</button>
    </div>

    <div id="app">
        <div class="header">
            <div id="user-display" style="font-weight: 800; font-size: 20px;">BANKING</div>
            <div class="status">В сети</div>
        </div>

        <div class="card">
            <div class="bal-label">Ваш баланс</div>
            <div class="balance" id="main-bal">0 ₽</div>
            <div style="margin-top: 30px; font-size: 12px; color: #333; font-weight: 800;" id="my-id-label">ID: GH-0000</div>
        </div>

        <div class="box">
            <div class="box-title">Мгновенный перевод</div>
            <div class="input-wrap">
                <label>Кому (ID друга)</label>
                <input type="text" id="target-id" placeholder="GH-1234">
            </div>
            <div class="input-wrap">
                <label>Сумма</label>
                <input type="number" id="send-amt" placeholder="0">
            </div>
            <button class="btn" onclick="sendMoney()">Перевести мгновенно</button>
        </div>

        <div style="padding: 0 10px 20px;">
            <div style="font-size: 18px; font-weight: 700; margin-bottom: 15px;">История</div>
            <div id="history"></div>
        </div>
    </div>

<script>
    // НАСТРОЙКА СЕТИ (Бесплатные ключи для работы)
    const pubnub = new PubNub({
        publishKey: 'pub-c-46328331-5915-460d-8380-6060c580662d',
        subscribeKey: 'sub-c-7d92374e-60f1-4348-933e-e2e1374f639a',
        uuid: 'user-' + Math.random()
    });

    let me = JSON.parse(localStorage.getItem('gh_v4_me')) || null;

    function register() {
        const name = document.getElementById('reg-name').value;
        if(name.length < 2) return;
        const id = "GH-" + Math.floor(1000 + Math.random() * 9000);
        me = { name, id, balance: 250000 };
        localStorage.setItem('gh_v4_me', JSON.stringify(me));
        location.reload();
    }

    if(me) {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initNetwork();
        render();
    }

    function render() {
        document.getElementById('main-bal').innerText = me.balance.toLocaleString() + ' ₽';
        document.getElementById('my-id-label').innerText = 'ВАШ ID: ' + me.id;
        document.getElementById('user-display').innerText = me.name.toUpperCase();
        localStorage.setItem('gh_v4_me', JSON.stringify(me));
    }

    // ЛОГИКА СЕТИ: Слушаем входящие переводы
    function initNetwork() {
        pubnub.subscribe({ channels: [me.id] }); // Подписываемся на свой ID как на канал

        pubnub.addListener({
            message: function(m) {
                const data = m.message;
                if(data.type === 'transfer') {
                    me.balance += data.amount;
                    addHistory(`Входящий от ${data.fromName}`, data.amount, true);
                    render();
                    // Вибрация и уведомление
                    alert(`⚡ Мгновенное зачисление: +${data.amount} ₽ от ${data.fromName}`);
                }
            }
        });
    }

    // ОТПРАВКА ДЕНЕГ В ЭФИР
    function sendMoney() {
        const targetId = document.getElementById('target-id').value.toUpperCase().trim();
        const amount = parseFloat(document.getElementById('send-amt').value);

        if(!targetId || isNaN(amount) || amount <= 0) return alert("Введите данные!");
        if(amount > me.balance) return alert("Недостаточно баланса!");

        // 1. Списываем у себя
        me.balance -= amount;
        addHistory(`Перевод для ${targetId}`, amount, false);
        render();

        // 2. Отправляем сигнал через PubNub другу
        pubnub.publish({
            channel: targetId,
            message: {
                type: 'transfer',
                amount: amount,
                fromId: me.id,
                fromName: me.name
            }
        }, function(status, response) {
            if(!status.error) {
                alert(`Деньги успешно отправлены пользователю ${targetId}`);
                document.getElementById('send-amt').value = '';
            }
        });
    }

    function addHistory(title, amt, plus) {
        const h = document.getElementById('history');
        const div = document.createElement('div');
        div.className = 'h-item';
        div.innerHTML = `<div class="h-info"><div>${title}</div><span>${new Date().toLocaleTimeString()}</span></div>
                         <div style="font-weight:800; color:${plus ? 'var(--accent)' : '#fff'}">${plus ? '+' : '-'} ${amt.toLocaleString()}</div>`;
        h.prepend(div);
    }
</script>
</body>
</html>
