<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Политическая Глобальная Стратегия</title>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        html, body, #map {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #0d1117; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Игровой интерфейс сверху карты */
        #game-panel {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(15, 23, 42, 0.9); color: white;
            padding: 20px; border-radius: 16px; width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h3, h4 { margin-top: 0; color: #38bdf8; font-weight: 600; }
        .stat { margin: 10px 0; font-size: 14px; display: flex; justify-content: space-between; }
        .btn {
            background: #2563eb; color: white; border: none; padding: 12px;
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;
            margin-top: 10px; transition: 0.2s; font-size: 14px;
        }
        .btn:hover { background: #1d4ed8; }
        .btn-war { background: #dc2626; }
        .btn-war:hover { background: #b91c1c; }

        #log-panel {
            position: absolute; bottom: 20px; left: 20px; z-index: 10;
            background: rgba(15, 23, 42, 0.9); color: #10b981; padding: 12px;
            border-radius: 10px; max-height: 120px; width: 300px; overflow-y: auto; 
            font-size: 13px; border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div id="game-panel">
        <h3>Моя Империя</h3>
        <div class="stat"><span>Выбранная цель:</span> <strong id="selected-target" style="color: #f59e0b;">Кликните на карту</strong></div>
        <div class="stat"><span>Золото:</span> <span id="money" style="font-weight: bold; color: #eab308;">1000 🪙</span></div>
        <hr style="border-color: rgba(255,255,255,0.1)">
        
        <h4>Дипломатия и Война</h4>
        <button class="btn" onclick="sendDiplomacy()">Предложить союз</button>
        <button class="btn btn-war" onclick="startWar()">Объявить войну и захватить</button>
    </div>

    <div id="log-panel" id="logs">
        <div>[Система]: Карта загружена. Выберите регион для дипломатии или экспансии.</div>
    </div>

    <div id="map"></div>

    <script>
        // Инициализируем карту с красивым темным векторным стилем (похож на ночной режим Apple Maps)
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json', // Бесплатный темный стиль карты
            center: [37.61, 55.75], // Стартовая точка (Москва)
            zoom: 2, // Стартовый зум (видны страны)
            pitch: 0,
            maxZoom: 12
        });

        let selectedCoords = null;
        let playerMoney = 1000;

        // Включение вращения и базовых контроллеров
        map.addControl(new maplibregl.NavigationControl());

        // Отслеживаем клик по карте
        map.on('click', function (e) {
            selectedCoords = e.lngLat;
            
            // Округляем координаты для вывода
            const lng = selectedCoords.lng.toFixed(2);
            const lat = selectedCoords.lat.toFixed(2);
            
            document.getElementById('selected-target').innerText = `Регион (${lng}, ${lat})`;
            addLog(`Вы нацелились на сектор: Долгота ${lng}, Широта ${lat}`);
        });

        // Функция взаимодействия с ИИ
        function sendDiplomacy() {
            if (!selectedCoords) return alert("Сначала кликните по карте, чтобы выбрать регион!");
            
            if (Math.random() > 0.5) {
                addLog(`🤝 Местный правитель согласился на союз с вами!`);
                playerMoney += 150;
            } else {
                addLog(`❌ ИИ отклонил ваше дипломатическое предложение.`);
            }
            document.getElementById('money').innerText = playerMoney + " 🪙";
        }

        // Функция войны
        function startWar() {
            if (!selectedCoords) return alert("Выберите регион для атаки!");
            
            addLog(`⚔️ Отправка войск в сектор...`);
            
            setTimeout(() => {
                addLog(`🎉 Сектор успешно присоединен к вашей фракции! Получены трофеи.`);
                playerMoney += 300;
                document.getElementById('money').innerText = playerMoney + " 🪙";
                
                // Здесь в будущем мы будем добавлять цветную закраску поверх карты
            }, 1000);
        }

        function addLog(text) {
            const logPanel = document.getElementById('log-panel');
            logPanel.innerHTML += `<div>${text}</div>`;
            logPanel.scrollTop = logPanel.scrollHeight;
        }
    </script>
</body>
</html>
