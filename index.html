<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --aura-neon: #a855f7; }
        body { background-color: #050505; color: #e5e7eb; font-family: -apple-system, system-ui, sans-serif; margin: 0; }
        .glass-panel { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(25px); border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .aura-text { background: linear-gradient(to right, #fff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .user-msg { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 1.2rem 1.2rem 0 1.2rem; }
        .ai-msg { background: rgba(168, 85, 247, 0.05); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 1.2rem 1.2rem 1.2rem 0; }
        .chat-scroll { height: calc(100vh - 160px); scrollbar-width: none; }
        .chat-scroll::-webkit-scrollbar { display: none; }
        input:focus { font-size: 16px !important; outline: none; border-color: var(--aura-neon) !important; }
        .shimmer { animation: shimmer 2s infinite linear; background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.1), transparent); background-size: 200% 100%; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <nav class="p-5 flex justify-center items-center border-b border-white/5 bg-black/50">
        <h1 class="text-xl tracking-[0.2em] aura-text uppercase">Aura</h1>
    </nav>

    <div id="chat" class="chat-scroll overflow-y-auto p-4 space-y-6 flex flex-col">
        <div class="ai-msg p-4 self-start max-w-[85%] text-sm leading-relaxed">
            Ready to assist. System online.
        </div>
    </div>

    <div id="loading" class="hidden px-6 py-2 text-[10px] uppercase tracking-widest text-purple-400 animate-pulse">Aura is thinking...</div>

    <footer class="glass-panel p-4 pb-10">
        <div class="max-w-2xl mx-auto flex items-center gap-3 bg-white/5 p-2 rounded-3xl border border-white/10 focus-within:border-purple-500/50 transition-all">
            <input type="text" id="input" class="w-full bg-transparent px-4 py-3 text-sm" placeholder="Ask anything..." autocomplete="off">
            <button onclick="ask()" class="bg-white text-black h-10 w-10 flex items-center justify-center rounded-full hover:scale-105 active:scale-95 transition-all">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
        </div>
    </footer>

    <script>
        const KEY = 'AIzaSyDOqqL5RGsnseRbEnfn64YZdpZ7-2YIzOY';

        async function ask() {
            const input = document.getElementById('input');
            const chat = document.getElementById('chat');
            const loader = document.getElementById('loading');
            const text = input.value.trim();

            if (!text) return;

            // User Message
            input.value = '';
            chat.innerHTML += `<div class="user-msg p-4 self-end max-w-[85%] text-sm shadow-xl">${text}</div>`;
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });

            loader.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;

                loader.classList.add('hidden');
                chat.innerHTML += `<div class="ai-msg p-4 self-start max-w-[85%] text-sm leading-relaxed shadow-lg">${reply}</div>`;
                chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });

            } catch (err) {
                loader.classList.add('hidden');
                chat.innerHTML += `<div class="text-red-500 text-[10px] text-center uppercase tracking-widest">Connection Error: Check API Key</div>`;
            }
        }

        document.getElementById('input').addEventListener('keypress', (e) => { if (e.key === 'Enter') ask(); });
    </script>
</body>
</html>
