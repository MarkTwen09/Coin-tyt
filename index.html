<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>World Order: Evolution</title>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --accent: #238636;
            --border: #30363d;
            --gold: #f1e05a;
        }

        body {
            margin: 0; background: var(--bg); color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh;
        }

        /* БОКОВАЯ ПАНЕЛЬ */
        .sidebar {
            width: 350px; background: var(--panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px; z-index: 10;
        }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 8px; background: #21262d; border: 1px solid var(--border);
            color: #fff; cursor: pointer; border-radius: 6px; font-size: 12px;
        }
        .tab-btn.active { background: var(--accent); border-color: #fff; }

        .content-section { display: none; flex: 1; flex-direction: column; }
        .content-section.active { display: flex; }

        /* ЭКОНОМИКА */
        .stat-card {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px;
            margin-bottom: 15px; border: 1px solid var(--border);
        }
        .gold-text { color: var(--gold); font-size: 24px; font-weight: bold; }

        /* КАРТА */
        .map-wrapper {
            flex: 1; background: #05070a; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        svg { width: 90%; height: auto; transition: 0.3s; }
        .region {
            fill: #21262d; stroke: #000; stroke-width: 0.5; transition: 0.3s; cursor: pointer;
        }
        .region:hover { fill: #30363d !important; }

        /* ЧАТ / ПЕРЕГОВОРЫ */
        .msg-box {
            flex: 1; background: #0d1117; border-radius: 8px; padding: 10px;
            font-size: 13px; overflow-y: auto; margin-bottom: 10px;
        }
        .msg { margin-bottom: 8px; padding: 5px; border-radius: 4px; background: #1c2128; }
        
        input, select {
            background: #0d1117; border: 1px solid var(--border); color: #fff;
            padding: 10px; border-radius: 6px; margin-top: 5px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2 style="margin: 0 0 20px 0; color: var(--accent);">GLOBAL CONQUEST</h2>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('economy')">ЭКОНОМИКА</button>
            <button class="tab-btn" onclick="openTab('diplomacy')">ПЕРЕГОВОРЫ</button>
            <button class="tab-btn" onclick="openTab('army')">ВОЙНА</button>
        </div>

        <div id="economy" class="content-section active">
            <div class="stat-card">
                <label>Золотой запас:</label>
                <div class="gold-text"><span id="gold-val">500</span> 🪙</div>
                <small>Доход: +<span id="income-val">5</span>/сек</small>
            </div>
            <div class="stat-card">
                <b>Территории:</b> <span id="territory-count">0</span><br>
                <b>Население:</b> <span id="pop-count">0</span> млн.
            </div>
            <button class="tab-btn" style="background: #2ea44f; padding: 15px;" onclick="invest()">ИНВЕСТИРОВАТЬ (100 🪙)</button>
        </div>

        <div id="diplomacy" class="content-section">
            <div class="msg-box" id="diplomacy-log">
                <div class="msg"><b>Министерство:</b> Ожидаем ваших приказов, лидер.</div>
            </div>
            <label>Отправить депешу:</label>
            <select id="target-country">
                <option>ООН</option>
                <option>Соседняя страна</option><option>Торговый альянс</option>
            </select>
            <input type="text" id="msg-input" placeholder="Текст сообщения...">
            <button class="tab-btn" style="margin-top:10px" onclick="sendMessage()">ОТПРАВИТЬ</button>
        </div>

        <div id="army" class="content-section">
            <div class="stat-card">
                <b>Армия:</b> <span id="army-val">1000</span> чел.<br>
                <b>Готовность:</b> Высокая
            </div>
            <p style="font-size: 12px; opacity: 0.6;">Выберите регион на карте для экспансии. Стоимость захвата: 250 🪙</p>
        </div>
    </aside>

    <main class="map-wrapper">
        <svg viewBox="0 0 1000 500" id="world-map">
            <path class="region" d="M100,100 L300,100 L300,250 L100,250 Z" data-name="Северная Америка" onclick="handleRegionClick(this)"></path>
            <path class="region" d="M320,100 L500,100 L500,200 L320,200 Z" data-name="Европа" onclick="handleRegionClick(this)"></path>
            <path class="region" d="M520,80 L800,80 L800,250 L520,250 Z" data-name="Азия" onclick="handleRegionClick(this)"></path>
            <path class="region" d="M350,230 L500,230 L500,400 L350,400 Z" data-name="Африка" onclick="handleRegionClick(this)"></path>
            <path class="region" d="M150,270 L300,270 L300,450 L150,450 Z" data-name="Южная Америка" onclick="handleRegionClick(this)"></path>
            <path class="region" d="M600,270 L750,270 L750,420 L600,420 Z" data-name="Австралия" onclick="handleRegionClick(this)"></path>
            <path class="region" d="M550,40 L850,40 L800,100 L550,100 Z" data-name="Сибирь" onclick="handleRegionClick(this)"></path>
        </svg>
    </main>

    <script>
        // ДАННЫЕ ИГРЫ
        let state = {
            gold: 500,
            income: 5,
            territories: 0,
            color: '#238636'
        };

        // ТАБЫ
        function openTab(tabId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // ЭКОНОМИКА (Тик раз в секунду)
        setInterval(() => {
            state.gold += state.income;
            updateUI();
        }, 1000);

        function updateUI() {
            document.getElementById('gold-val').innerText = state.gold;
            document.getElementById('income-val').innerText = state.income;
            document.getElementById('territory-count').innerText = state.territories;
            document.getElementById('pop-count').innerText = state.territories * 45;
        }

        function invest() {
            if (state.gold >= 100) {
                state.gold -= 100;
                state.income += 2;
                addLog('Экономика', 'Вы инвестировали в заводы. Доход вырос!');
                updateUI();
            }
        }

        // КЛИК ПО КАРТЕ
        function handleRegionClick(el) {
            const regionName = el.getAttribute('data-name');
            const cost = 250;

            if (el.style.fill === 'rgb(35, 134, 54)') { // Если уже наш (в hex это #238636)
                addLog('Инфо', Регион ${regionName} уже под вашим контролем.);
                return;
            }

            if (state.gold >= cost) {
                state.gold -= cost;
                state.territories++;
                state.income += 5; // Каждая страна дает доход
                el.style.fill = state.color;
                el.style.stroke = '#fff';
                el.style.strokeWidth = '2';
                addLog('Война', Вы захватили ${regionName}! Доход увеличен.);
            } else {
                addLog('Ошибка', 'Недостаточно золота для экспансии!');
            }
            updateUI();
        }// ДИПЛОМАТИЯ
        function sendMessage() {
            const target = document.getElementById('target-country').value;
            const text = document.getElementById('msg-input').value;
            if (!text) return;

            addLog('Вы -> ' + target, text);
            document.getElementById('msg-input').value = '';

            // Случайный ответ от "ИИ"
            setTimeout(() => {
                const answers = ["Мы рассмотрим ваше предложение.", "Это неприемлемо!", "Нам нужно больше золота.", "Согласны на торговый пакт."];
                addLog(target, answers[Math.floor(Math.random()*answers.length)]);
            }, 2000);
        }

        function addLog(sender, text) {
            const log = document.getElementById('diplomacy-log');
            const msg = document.createElement('div');
            msg.className = 'msg';
            msg.innerHTML = <b>${sender}:</b> ${text};
            log.prepend(msg);
        }

        updateUI();
    </script>
</body>
</html>
