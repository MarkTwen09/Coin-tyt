<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLIXY — Твоя музыка</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #9ca3af;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            height: 100vh;
        }

        /* --- Layout --- */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 500px; /* Эмуляция мобильного экрана на ПК */
            margin: 0 auto;
            position: relative;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 24px; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- Content Area --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 160px 20px;
        }

        .section-title { font-size: 20px; margin: 25px 0 15px; font-weight: 700; }

        /* --- Publish Form --- */
        .publish-box {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
        input[type="text"], input[type="file"] {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            color: white;
            outline: none;
        }
        .btn-publish {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- Track Cards --- */
        .track-list { display: grid; gap: 15px; }
        .track-card {
            display: flex;
            align-items: center;
            background: var(--card);
            padding: 10px;
            border-radius: 15px;
            transition: 0.2s;
        }
        .track-card:active { transform: scale(0.98); background: rgba(255,255,255,0.15); }
        .track-cover { width: 50px; height: 50px; border-radius: 10px; margin-right: 15px; object-fit: cover; background: #222; }
        .track-info { flex: 1; }
        .track-info h4 { font-size: 15px; }
        .track-info p { font-size: 12px; color: var(--text-dim); }

        /* --- Player Bar (Floating) --- */
        .mini-player {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .player-info { flex: 1; margin-right: 15px; overflow: hidden; }
        .player-info h4 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .play-pause-btn { font-size: 24px; color: var(--primary); cursor: pointer; }

        /* --- Navigation --- */
        nav.tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 500px;
            background: rgba(5, 5, 5, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 15px 0 calc(15px + var(--safe-bottom));
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 101;
        }
        .tab-item { color: var(--text-dim); text-align: center; font-size: 10px; cursor: pointer; }
        .tab-item.active { color: var(--primary); }
        .tab-item i { display: block; font-size: 20px; margin-bottom: 4px; }

        /* Progress Bar */
        .progress-bar {
            position: absolute;
            top: 0; left: 0;
            height: 2px;
            background: var(--primary);
            width: 0%;
            transition: 0.1s;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">FLIXY</div>
        <i class="fas fa-user-circle" style="font-size: 24px;"></i>
    </header>

    <main id="main-content">
        <h2 class="section-title">Опубликовать трек</h2>
        <div class="publish-box">
            <div class="input-group">
                <label>Название трека</label>
                <input type="text" id="song-title" placeholder="Напр: Midnight City">
            </div>
            <div class="input-group">
                <label>Артист</label>
                <input type="text" id="song-artist" placeholder="Твое имя">
            </div>
            <div class="input-group">
                <label>Обложка (Файл)</label>
                <input type="file" id="song-cover" accept="image/*">
            </div>
            <div class="input-group">
                <label>Аудио (MP3)</label>
                <input type="file" id="song-audio" accept="audio/*">
            </div>
            <button class="btn-publish" onclick="publishSong()">Опубликовать на FLIXY</button>
        </div>

        <h2 class="section-title">Твоя лента</h2>
        <div class="track-list" id="track-list">
            </div>
    </main>

    <div class="mini-player" id="player" style="display: none;">
        <div class="progress-bar" id="p-bar"></div>
        <img src="" id="player-img" class="track-cover" alt="">
        <div class="player-info">
            <h4 id="player-title">Track Name</h4>
            <p id="player-artist" style="font-size: 11px; color: var(--text-dim);">Artist</p>
        </div>
        <div class="play-pause-btn" onclick="togglePlay()">
            <i class="fas fa-play" id="play-icon"></i>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active"><i class="fas fa-home"></i>Главная</div>
        <div class="tab-item"><i class="fas fa-search"></i>Поиск</div>
        <div class="tab-item"><i class="fas fa-layer-group"></i>Медиатека</div>
        <div class="tab-item"><i class="fas fa-bolt"></i>Flixy Plus</div>
    </nav>
</div>

<script>
    const trackList = document.getElementById('track-list');
    const audioPlayer = new Audio();
    let isPlaying = false;

    // Загрузка сохраненных треков из памяти браузера при старте
    window.onload = () => {
        const savedTracks = JSON.parse(localStorage.getItem('flixy_tracks') || '[]');
        savedTracks.forEach(renderTrack);
    };

    function publishSong() {
        const title = document.getElementById('song-title').value;
        const artist = document.getElementById('song-artist').value;
        const coverFile = document.getElementById('song-cover').files[0];
        const audioFile = document.getElementById('song-audio').files[0];

        if (!title || !artist || !coverFile || !audioFile) {
            alert("Заполни все поля и выбери файлы!");
            return;
        }

        // Читаем файлы в Base64 для сохранения (Внимание: для больших файлов лучше использовать IndexedDB)
        const readerCover = new FileReader();
        readerCover.onload = function(e) {
            const coverBase64 = e.target.result;
            
            const readerAudio = new FileReader();
            readerAudio.onload = function(e) {
                const audioBase64 = e.target.result;

                const newTrack = { id: Date.now(), title, artist, cover: coverBase64, audio: audioBase64 };
                
                // Сохраняем в localStorage
                const savedTracks = JSON.parse(localStorage.getItem('flixy_tracks') || '[]');
                savedTracks.push(newTrack);
                localStorage.setItem('flixy_tracks', JSON.stringify(savedTracks));

                renderTrack(newTrack);
                clearForm();
            };
            readerAudio.readAsDataURL(audioFile);
        };
        readerCover.readAsDataURL(coverFile);
    }

    function renderTrack(track) {
        const div = document.createElement('div');
        div.className = 'track-card';
        div.onclick = () => playTrack(track);
        div.innerHTML = `
            <img src="${track.cover}" class="track-cover">
            <div class="track-info">
                <h4>${track.title}</h4>
                <p>${track.artist}</p>
            </div>
            <i class="fas fa-play" style="color: var(--text-dim)"></i>
        `;
        trackList.prepend(div);
    }

    function playTrack(track) {
        document.getElementById('player').style.display = 'flex';
        document.getElementById('player-img').src = track.cover;
        document.getElementById('player-title').innerText = track.title;
        document.getElementById('player-artist').innerText = track.artist;
        
        audioPlayer.src = track.audio;
        audioPlayer.play();
        isPlaying = true;
        document.getElementById('play-icon').className = 'fas fa-pause';
    }

    function togglePlay() {
        if (isPlaying) {
            audioPlayer.pause();
            document.getElementById('play-icon').className = 'fas fa-play';
        } else {
            audioPlayer.play();
            document.getElementById('play-icon').className = 'fas fa-pause';
        }
        isPlaying = !isPlaying;
    }

    // Обновление прогресс-бара
    audioPlayer.ontimeupdate = () => {
        const prog = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        document.getElementById('p-bar').style.width = prog + '%';
    };

    function clearForm() {
        document.getElementById('song-title').value = '';
        document.getElementById('song-artist').value = '';
        document.getElementById('song-cover').value = '';
        document.getElementById('song-audio').value = '';
    }
</script>

</body>
</html>
