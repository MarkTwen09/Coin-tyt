<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Stars — Платежный Шлюз</title>
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: rgba(13, 17, 23, 0.95);
            --accent-gold: #c5a059;
            --sber-green: #21a038;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .main-card {
            width: 92%;
            max-width: 390px;
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            text-align: center;
            position: relative;
        }

        .status-badge {
            background: rgba(33, 160, 56, 0.1);
            color: var(--sber-green);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .logo { font-size: 20px; font-weight: 800; letter-spacing: 3px; margin-bottom: 25px; }
        .logo span { color: var(--accent-gold); }

        .input-box { margin-bottom: 25px; text-align: left; }
        .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: 600; }
        
        .tg-input {
            width: 100%; background: #000; border: 1px solid var(--border); border-radius: 15px;
            padding: 18px; color: white; font-size: 15px; outline: none; transition: 0.3s;
        }
        .tg-input:focus { border-color: var(--accent-gold); }

        .price-section {
            background: rgba(255,255,255,0.03); border-radius: 20px; padding: 25px; margin-bottom: 25px;
            border: 1px solid var(--border);
        }
        .amount { font-size: 32px; font-weight: 800; }
        .currency { color: var(--accent-gold); font-size: 16px; margin-left: 5px; }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #222; border-radius: 2px; margin-bottom: 30px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: white; border-radius: 50%; cursor: pointer; }

        .pay-btn {
            width: 100%; padding: 20px; background: var(--text-main); color: #000; border: none; border-radius: 20px;
            font-size: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        /* ПЛАТЕЖНОЕ ОКНО */
        .gateway-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
        }

        .gateway-card {
            width: 100%; max-width: 400px; padding: 40px 20px; text-align: center;
        }

        .sber-logo { width: 120px; margin-bottom: 30px; opacity: 0.9; }
        
        .payment-sum { font-size: 40px; font-weight: 800; margin-bottom: 10px; }
        .payment-to { color: var(--text-dim); font-size: 14px; margin-bottom: 40px; }

        .sber-action-btn {
            width: 100%; max-width: 300px; padding: 18px; background: var(--sber-green); color: white;
            border-radius: 18px; text-decoration: none; font-weight: 700; display: inline-block; margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(33, 160, 56, 0.3);
        }

        .sbp-notice { font-size: 12px; color: var(--text-dim); margin-top: 20px; }

        .done-btn { background: none; border: 1px solid #333; color: white; padding: 15px 30px; border-radius: 15px; cursor: pointer; margin-top: 30px; font-size: 13px; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="status-badge">● Шифрование SSL активно</div>
    <div class="logo">MOON<span>STARS</span></div>
    
    <div class="input-box">
        <label class="label">ID Получателя (Telegram)</label>
        <input type="text" id="user" class="tg-input" placeholder="@username" autocomplete="off">
    </div>

    <div class="price-section">
        <div class="amount" id="val">100</div>
        <div class="currency" id="label">STARS</div>
        <div style="font-size: 14px; color: var(--text-dim); margin-top: 10px;" id="price">170 ₽</div>
    </div>

    <input type="range" id="slider" min="0" max="5" step="1" value="0" oninput="update()">

    <button class="pay-btn" onclick="openGateway()">Перейти к оплате</button>
</div>

<div class="gateway-overlay" id="gateway">
    <div class="gateway-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Sberbank_Logo_2020.svg/2560px-Sberbank_Logo_2020.svg.png" class="sber-logo" alt="Сбер">
        
        <div class="payment-sum" id="g-price">170 ₽</div>
        <div class="payment-to">Получатель: <strong>MARK P.</strong></div>

        <a href="#" id="sber-link" class="sber-action-btn" onclick="copyCard()">Оплатить в Сбербанк Онлайн</a>
        
        <div style="color: var(--text-dim); font-size: 11px; margin-top: 10px;">
            Нажмите кнопку выше, чтобы открыть приложение банка.<br>
            Если приложение не открылось, номер карты скопирован.
        </div>

        <button class="done-btn" onclick="sendOrder()">Подтвердить оплату</button>
        <div class="sbp-notice">Безопасно через Систему Быстрых Платежей</div>
    </div>
</div>

<script>
    const stars = [
        {t: "100", p: 170}, {t: "150", p: 240}, {t: "250", p: 445},
        {t: "500", p: 830}, {t: "1000", p: 1540}, {t: "2500", p: 3700}
    ];

    function update() {
        const v = document.getElementById('slider').value;
        document.getElementById('val').innerText = stars[v].t;
        document.getElementById('price').innerText = stars[v].p + " ₽";
    }

    function openGateway() {
        const user = document.getElementById('user').value;
        if(!user) return alert("Укажите никнейм!");
        
        const price = stars[document.getElementById('slider').value].p;
        document.getElementById('g-price').innerText = price + " ₽";
        
        // Формируем ссылку на Сбер (попытка открыть приложение)
        document.getElementById('sber-link').href = "https://www.sberbank.ru/ru/person/dist_services/inner_sbol";
        
        document.getElementById('gateway').style.display = 'flex';
    }

    function copyCard() {
        navigator.clipboard.writeText("2202208890039648");
        alert("Номер карты скопирован! Вставьте его в приложении Сбербанка.");
    }

    function sendOrder() {
        const u = document.getElementById('user').value.replace('@', '');
        const item = stars[document.getElementById('slider').value];
        const text = `MOON STARS GATEWAY:\nСтатус: Оплачено\nТовар: ${item.t} STARS\nСумма: ${item.p}₽\nКлиент: @${u}`;
        window.location.href = `https://t.me/kaoface?text=${encodeURIComponent(text)}`;
    }
</script>

</body>
</html>
