<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Светский Дом — Главные новости и блокировки</title>
    <style>
        :root {
            --bg-color: #111112;
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --accent-red: #ff453a;
            --accent-blue: #0a84ff;
            --border-color: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            letter-spacing: -0.02em;
        }

        header {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #ffffff;
            margin: 0;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Главная новость */
        .main-news {
            display: block;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 40px;
            margin-bottom: 40px;
        }

        .main-news:hover .title { color: var(--accent-blue); }

        .tag {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent-red);
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            display: inline-block;
        }

        .main-news .title {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 0 0 15px 0;
            transition: color 0.2s;
        }

        .main-news .descr {
            font-size: 1.1rem;
            line-height: 1.5;
            color: var(--text-muted);
            margin: 0;
        }

        /* Сетка новостей */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .grid-item {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .grid-item:hover .grid-title { color: var(--accent-blue); }

        .grid-title {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.3;
            margin: 0 0 10px 0;
            transition: color 0.2s;
        }

        .grid-descr {
            font-size: 0.95rem;
            line-height: 1.4;
            color: var(--text-muted);
            margin: 0;
        }

        footer {
            max-width: 1100px;
            margin: 60px auto 0 auto;
            padding: 40px 20px;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .tg-link {
            font-weight: 600;
            color: var(--accent-blue);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Светский Дом</div>
        <div class="subtitle">Мониторинг блокировок и независимые новости</div>
    </header>

    <div class="container">
        <!-- Сюда новости будут вставляться автоматически -->
        <div id="mainNewsContainer"></div>
        <div class="news-grid" id="newsGridContainer"></div>
    </div>

    <footer>
        <p>«Светский Дом», 2026. Читайте наш <a href="ТВОЯ_ССЫЛКА_НА_ТГ" class="tg-link">Telegram-канал</a>.</p>
    </footer>

    <!-- А ВОТ ТЕПЕРЬ САМАЯ УДОБНАЯ ШТУКА -->
    <script>
        // БАЗА ДАННЫХ ТВОИХ НОВОСТЕЙ. 
        // Самая верхняя новость автоматически станет ГЛАВНОЙ (крупной). 
        // Все остальные пойдут вниз в красивую сетку.
        const myNews = [
            {
                tag: "Экстренно",
                title: "Масштабные сбои в рунете: под ударом крупнейшие платформы и VPN-протоколы",
                descr: "Пользователи по всей стране заявляют о невозможности получить доступ к привычным сервисам без включения продвинутых средств обхода."
            },
            {
                tag: "Инструкция",
                title: "Что делать, если ваш привычный VPN перестал подключаться?",
                descr: "Разбираем альтернативные протоколы ShadowSocks и Vless, которые пока держат удар."
            },
            {
                tag: "Discord",
                title: "Обновление статуса блокировки популярного мессенджера",
                descr: "Появились новые подробности о возможности полной разблокировки платформы для геймеров."
            },
            {
                tag: "Telegram",
                title: "Новые функции для обхода ограничений внутри приложений",
                descr: "Разработчики выкатили минорное обновление, улучшающее встроенные прокси."
            }
        ];

        // Этот скрипт сам распределяет новости по дизайну, ты его не трогаешь
        function renderNews() {
            if (myNews.length === 0) return;

            // 1. Ставим главную новость (самую первую в списке)
            const main = myNews[0];
            document.getElementById('mainNewsContainer').innerHTML = `
                <a href="#" class="main-news">
                    <span class="tag">${main.tag}</span>
                    <h2 class="title">${main.title}</h2>
                    <p class="descr">${main.descr}</p>
                </a>
            `;

            // 2. Все остальные новости пускаем в сетку ниже
            let gridHTML = '';
            for (let i = 1; i < myNews.length; i++) {
                gridHTML += `
                    <a href="#" class="grid-item">
                        <span class="tag" style="color: var(--accent-blue);">${myNews[i].tag}</span>
                        <h3 class="grid-title">${myNews[i].title}</h3>
                        <p class="grid-descr">${myNews[i].descr}</p>
                    </a>
                `;
            }
            document.getElementById('newsGridContainer').innerHTML = gridHTML;
        }

        // Запуск генерации при открытии сайта
        renderNews();
    </script>
</body>
</html>
