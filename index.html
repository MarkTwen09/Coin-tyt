<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crematory Tycoon | Пепельный Бизнес</title>
    <style>
        /* Общие стили и мрачная атмосфера */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #ff5722;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
        }

        header h1 {
            color: #ff5722;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Главный контейнер */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Панели */
        .panel {
            padding: 20px;
            overflow-y: auto;
        }

        /* Левая панель: Статистика и Склад */
        #stats-panel {
            flex: 1;
            background-color: #161616;
            border-right: 1px solid #2d2d2d;
        }

        .stat-box {
            background: #222;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid #4caf50;
        }

        .stat-box.storage {
            border-left-color: #2196f3;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            margin-top: 5px;
        }

        /* Центральная панель: Печи */
        #action-panel {
            flex: 2;
            background-color: #1f1f1f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-main {
            background: linear-gradient(135deg, #ff5722, #bf360c);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,87,34,0.4);
            transition: transform 0.1s, background 0.2s;
            margin-bottom: 30px;
            width: 80%;
            max-width: 300px;
        }

        .btn-main:active {
            transform: scale(0.97);
        }

        .furnace-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .furnace-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .progress-bar-container {
            background-color: #333;
            border-radius: 4px;
            height: 20px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            background: linear-gradient(90deg, #ff9800, #ff5722);
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .furnace-status {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }

        /* Правая панель: Апгрейды */
        #shop-panel {
            flex: 1;
            background-color: #161616;
            border-left: 1px solid #2d2d2d;
        }

        .shop-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #ff9800;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .upgrade-item {
            background: #222;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .upgrade-item.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .btn-buy {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-buy:hover {
            background-color: #45a049;
        }

        /* Адаптивность для мобилок */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                overflow-y: auto;
            }
            body { overflow-y: auto; height: auto; }
            .panel { overflow-y: visible; flex: none !important; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Пепельный Бизнес Tycoon</h1>
    </header>

    <div class="main-container">
        <div class="panel" id="stats-panel">
            <div class="stat-box">
                <div>Баланс:</div>
                <div class="stat-value" id="money-display">$0</div>
            </div>
            <div class="stat-box storage">
                <div>Очередь заказов:</div>
                <div class="stat-value" id="orders-display">0</div>
            </div>
        </div>

        <div class="panel" id="action-panel">
            <button class="btn-main" id="btn-order">Принять заказ (+1)</button>

            <div class="furnace-card">
                <div class="furnace-header">
                    <span>Печь №1 (Базовая)</span>
                    <span id="furnace-timer">Готова</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="furnace-progress"></div>
                </div>
                <div class="furnace-status" id="furnace-status-text">Ожидание сырья...</div>
            </div>
        </div>

        <div class="panel" id="shop-panel">
            <div class="shop-title">Модернизация</div>
            
            <div class="upgrade-item" id="upg-speed">
                <div>
                    <strong>Быстрый нагрев</strong><br>
                    <small>Ускоряет работу на 20%</small><br>
                    <span style="color:#4caf50;" id="upg-speed-cost">Цена: $100</span>
                </div>
                <button class="btn-buy" onclick="buySpeed()">Купить</button>
            </div>

            <div class="upgrade-item" id="upg-price">
                <div>
                    <strong>Элитные урны</strong><br>
                    <small>+25% к доходу с заказа</small><br>
                    <span style="color:#4caf50;" id="upg-price-cost">Цена: $150</span>
                </div>
                <button class="btn-buy" onclick="buyPrice()">Купить</button>
            </div>
        </div>
    </div>

    <script>
        // ИГРОВЫЕ ПЕРЕМЕННЫЕ
        let state = {
            money: 0,
            orders: 0,
            burnTime: 5000, // Время сжигания в мс (5 секунд)
            income: 50,     // Базовый доход за 1 заказ
            isBurning: false,
            upgrades: {
                speedLevel: 0,
                priceLevel: 0
            }
        };

        // Загрузка сохранения
        if(localStorage.getItem('crematory_save')) {
            state = JSON.parse(localStorage.getItem('crematory_save'));
        }

        // ЭЛЕМЕНТЫ DOM
        const moneyDisplay = document.getElementById('money-display');
        const ordersDisplay = document.getElementById('orders-display');
        const btnOrder = document.getElementById('btn-order');
        const fProgress = document.getElementById('furnace-progress');
        const fTimer = document.getElementById('furnace-timer');
        const fStatus = document.getElementById('furnace-status-text');

        // ОБНОВЛЕНИЕ ИНТЕРФЕЙСА
        function updateUI() {
            moneyDisplay.innerText = `$${state.money}`;
            ordersDisplay.innerText = state.orders;
            
            // Обновление цен в магазине
            document.getElementById('upg-speed-cost').innerText = `Цена: $${Math.floor(100 * Math.pow(1.5, state.upgrades.speedLevel))}`;
            document.getElementById('upg-price-cost').innerText = `Цена: $${Math.floor(150 * Math.pow(1.6, state.upgrades.priceLevel))}`;
            
            saveGame();
        }

        // СОХРАНЕНИЕ В LOCALSTORAGE
        function saveGame() {
            localStorage.setItem('crematory_save', JSON.stringify(state));
        }

        // КЛИК: ПРИНЯТЬ ЗАКАЗ
        btnOrder.addEventListener('click', () => {
            state.orders++;
            updateUI();
            checkFurnace();
        });

        // ЛОГИКА РАБОТЫ ПЕЧИ
        function checkFurnace() {
            if (state.orders > 0 && !state.isBurning) {
                state.isBurning = true;
                state.orders--;
                updateUI();
                
                fStatus.innerText = "Процесс кремации...";
                let start = Date.now();
                let duration = state.burnTime / (1 + state.upgrades.speedLevel * 0.2); // Ускорение от апгрейдов

                let interval = setInterval(() => {
                    let elapsed = Date.now() - start;
                    let progress = (elapsed / duration) * 100;
                    
                    if (progress >= 100) {
                        clearInterval(interval);
                        fProgress.style.width = '0%';
                        fTimer.innerText = 'Готова';
                        fStatus.innerText = 'Ожидание сырья...';
                        
                        // Завершение процесса
                        let currentIncome = Math.floor(state.income * (1 + state.upgrades.priceLevel * 0.25));
                        state.money += currentIncome;
                        state.isBurning = false;
                        
                        updateUI();
                        checkFurnace(); // Проверяем, есть ли еще заказы в очереди
                    } else {
                        fProgress.style.width = progress + '%';
                        fTimer.innerText = ((duration - elapsed) / 1000).toFixed(1) + 'с';
                    }
                }, 50);
            }
        }

        // ПОКУПКА АПГРЕЙДОВ
        function buySpeed() {
            let cost = Math.floor(100 * Math.pow(1.5, state.upgrades.speedLevel));
            if (state.money >= cost) {
                state.money -= cost;
                state.upgrades.speedLevel++;
                updateUI();
            }
        }

        function buyPrice() {
            let cost = Math.floor(150 * Math.pow(1.6, state.upgrades.priceLevel));
            if (state.money >= cost) {
                state.money -= cost;
                state.upgrades.priceLevel++;
                updateUI();
            }
        }

        // Инициализация при старте
        updateUI();
        checkFurnace();
    </script>
</body>
</html>
