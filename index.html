<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Clash JS</title>
    <style>
        :root { --gold: #ffd700; --elixir: #ff00ff; --p-color: #3498db; --e-color: #e74c3c; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial Rounded MT Bold', sans-serif; }
        
        /* ЛОББИ */
        #lobby { position: absolute; inset: 0; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .lobby-content { transform: scale(1.2); }
        .play-btn { background: #4cd137; color: white; border: none; padding: 20px 60px; font-size: 30px; border-radius: 20px; box-shadow: 0 8px 0 #3b9e2a; cursor: pointer; transition: 0.1s; }
        .play-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #3b9e2a; }

        /* ИНТЕРФЕЙС ИГРЫ */
        #game-ui { position: absolute; inset: 0; pointer-events: none; display: none; flex-direction: column; justify-content: flex-end; }
        
        #elixir-bar { width: 80%; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; margin: 10px auto; overflow: hidden; pointer-events: auto; }
        #elixir-fill { height: 100%; background: var(--elixir); width: 0%; transition: width 0.3s; }

        .cards-deck { width: 100%; display: flex; justify-content: center; gap: 8px; padding-bottom: 20px; pointer-events: auto; }
        .card { width: 75px; height: 100px; background: #fff; border-radius: 12px; border: 3px solid #444; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; font-size: 12px; font-weight: bold; color: #333; }
        .card.active { border-color: var(--gold); transform: translateY(-10px); background: #eee; }
        .card .cost { position: absolute; top: -8px; left: -8px; background: var(--elixir); color: white; width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2px solid #fff; }

        /* HP BARS (для юнитов и башен) */
        .hp-bar { position: absolute; width: 40px; height: 6px; background: #000; border: 1px solid #fff; pointer-events: none; z-index: 100; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; }
        .hp-tower { width: 80px; height: 10px; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="lobby-content">
        <h1 style="text-shadow: 2px 4px #000;">CLASH JS</h1>
        <button class="play-btn" onclick="startGame()">В БОЙ!</button>
    </div>
</div>

<div id="game-ui">
    <div id="elixir-bar"><div id="elixir-fill"></div></div>
    <div class="cards-deck">
        <div class="card active" onclick="pick('knight', this)" id="c-knight"><div class="cost">3</div>🛡️<br>РЫЦАРЬ</div>
        <div class="card" onclick="pick('archer', this)" id="c-archer"><div class="cost">2</div>🏹<br>ЛУЧНИК</div>
        <div class="card" onclick="pick('giant', this)" id="c-giant"><div class="cost">5</div>👹<br>ГИГАНТ</div>
    </div>
</div>

<div id="hp-elements"></div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

<script type="module">
    import * as THREE from 'three';

    const CONFIG = {
        knight: { hp: 600, dmg: 40, range: 1.2, speed: 0.05, rate: 1000, cost: 3, color: 0x3498db, size: 0.6 },
        archer: { hp: 250, dmg: 30, range: 5.0, speed: 0.07, rate: 800, cost: 2, color: 0xe67e22, size: 0.4 },
        giant:  { hp: 2000, dmg: 100, range: 1.5, speed: 0.03, rate: 1500, cost: 5, color: 0x27ae60, size: 0.9, towerOnly: true }
    };

    let scene, camera, renderer, clock;
    let units = [], towers = [], elixir = 5, botElixir = 5, selectedCard = 'knight', isRunning = false;

    window.startGame = () => {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
        init();
        isRunning = true;
    };

    window.pick = (type, el) => {
        selectedCard = type;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x27ae60);
        scene.fog = new THREE.Fog(0x27ae60, 15, 45);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 16);
        camera.lookAt(0, -2, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 15, 10);
        scene.add(sun);

        // Арена
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(12, 24), new THREE.MeshStandardMaterial({ color: 0x2ecc71 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Река
        const river = new THREE.Mesh(new THREE.PlaneGeometry(12, 2.5), new THREE.MeshStandardMaterial({ color: 0x2980b9 }));
        river.rotation.x = -Math.PI / 2;
        river.position.y = 0.05;
        scene.add(river);

        // Башни
        towers.push(spawnTower(0, 9, 'player'));
        towers.push(spawnTower(0, -9, 'bot'));

        clock = new THREE.Clock();
        animate();
    }

    function spawnTower(x, z, team) {
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.4, 3, 8), new THREE.MeshStandardMaterial({ color: 0x95a5a6 }));
        const top = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 2), new THREE.MeshStandardMaterial({ color: team === 'player' ? 0x3498db : 0xe74c3c }));
        top.position.y = 1.8;
        group.add(body, top);
        group.position.set(x, 1.5, z);
        scene.add(group);

        const hpEl = document.createElement('div');
        hpEl.className = 'hp-bar hp-tower';
        hpEl.innerHTML = '<div class="hp-fill"></div>';
        document.getElementById('hp-elements').appendChild(hpEl);

        return { mesh: group, team, hp: 3000, maxHp: 3000, hpEl };
    }

    function createUnit(type, x, z, team) {
        const c = CONFIG[type];
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(c.size, c.size, c.size), new THREE.MeshStandardMaterial({ color: team === 'player' ? 0x3498db : 0xe74c3c }));
        mesh.position.set(x, c.size/2, z);
        scene.add(mesh);

        const hpEl = document.createElement('div');
        hpEl.className = 'hp-bar';
        hpEl.innerHTML = '<div class="hp-fill"></div>';
        document.getElementById('hp-elements').appendChild(hpEl);

        units.push({ ...c, mesh, team, curHp: c.hp, hpEl, lastAtk: 0 });
    }

    window.addEventListener('touchstart', (e) => {
        if(!isRunning || elixir < CONFIG[selectedCard].cost) return;
        const touch = e.touches[0];
        const mouse = new THREE.Vector2((touch.clientX/window.innerWidth)*2-1, -(touch.clientY/window.innerHeight)*2+1);
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, camera);
        const hits = ray.intersectObjects(scene.children);
        if(hits.length > 0 && hits[0].point.z > 0.5) {
            createUnit(selectedCard, hits[0].point.x, hits[0].point.z, 'player');
            elixir -= CONFIG[selectedCard].cost;
        }
    });

    function updateUI(obj, offset) {
        const vector = obj.mesh.position.clone();
        vector.y += offset;
        vector.project(camera);
        const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
        const y = -(vector.y * 0.5 - 0.5) * window.innerHeight;
        obj.hpEl.style.left = (x - (obj.maxHp ? 40 : 20)) + 'px';
        obj.hpEl.style.top = y + 'px';
        const pct = (obj.hp || obj.curHp) / (obj.maxHp || obj.hp) * 100;
        obj.hpEl.children[0].style.width = Math.max(0, pct) + '%';
    }

    function animate() {
        if(!isRunning) return;
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime() * 1000;

        elixir = Math.min(10, elixir + 0.008);
        botElixir = Math.min(10, botElixir + 0.006);
        document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';

        // ИИ Бота
        if(botElixir >= 4) {
            const types = ['knight', 'archer', 'giant'];
            const t = types[Math.floor(Math.random()*3)];
            createUnit(t, (Math.random()-0.5)*8, -9, 'bot');
            botElixir -= CONFIG[t].cost;
        }

        units.forEach((u, i) => {
            let enemies = [...units.filter(en => en.team !== u.team), ...towers.filter(t => t.team !== u.team)];
            if(u.towerOnly) enemies = towers.filter(t => t.team !== u.team);
            
            let closest = null, minDist = Infinity;
            enemies.forEach(en => {
                const d = u.mesh.position.distanceTo(en.mesh.position);
                if(d < minDist) { minDist = d; closest = en; }
            });

            if(closest) {
                if(minDist > u.range) {
                    const dir = new THREE.Vector3().subVectors(closest.mesh.position, u.mesh.position).normalize();
                    u.mesh.position.add(dir.multiplyScalar(u.speed));
                    u.mesh.lookAt(closest.mesh.position);
                } else {
                    if(time - u.lastAtk > u.rate) {
                        closest.hp !== undefined ? closest.hp -= u.dmg : closest.curHp -= u.dmg;
                        u.lastAtk = time;
                    }
                }
            }
            updateUI(u, 1.2);
            if(u.curHp <= 0) {
                u.hpEl.remove();
                scene.remove(u.mesh);
                units.splice(i, 1);
            }
        });

        towers.forEach(t => updateUI(t, 3.5));

        towers.forEach(t => {
            if(t.hp <= 0) {
                alert(t.team === 'player' ? "ПОРАЖЕНИЕ" : "ПОБЕДА");
                location.reload();
            }
        });

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
