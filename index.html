<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AURA CORE</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #00a3ff;
            --text: #e0e0e0;
            --dim: #444;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: var(--text);
            font-family: "SF Mono", "Menlo", monospace; /* Шрифт разработчиков */
            overflow: hidden;
        }

        /* HEADER */
        .hdr {
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #111; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
        }
        .sys-info { font-size: 10px; color: var(--dim); letter-spacing: 2px; }
        .active-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--accent); }

        /* CHAT AREA */
        #log {
            height: calc(100vh - 150px); overflow-y: auto;
            padding: 20px; display: flex; flex-direction: column; gap: 25px;
            -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
        }

        .block { max-width: 100%; animation: blink 0.2s ease-out; }
        @keyframes blink { from { opacity: 0; } to { opacity: 1; } }

        .ai-head { color: var(--accent); font-size: 10px; margin-bottom: 8px; font-weight: bold; }
        .usr-head { color: var(--dim); font-size: 10px; margin-bottom: 8px; text-align: right; }

        .txt { line-height: 1.6; font-size: 15px; white-space: pre-wrap; }
        .usr-txt { text-align: right; color: #fff; }

        /* INPUT AREA */
        .input-box {
            position: fixed; bottom: 0; width: 100%;
            padding: 20px 20px calc(40px + env(safe-area-inset-bottom));
            background: var(--bg); border-top: 1px solid #111;
        }
        .inner {
            max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 15px;
        }
        input {
            flex: 1; background: transparent; border: none; color: var(--accent);
            font-size: 16px; font-family: inherit; outline: none;
        }
        .cmd { color: var(--dim); font-size: 16px; }

        /* СКРЫТЫЙ ГАМБУРГЕР (ВЫЗОВ СВАЙПОМ ИЛИ КЛИКОМ НА SYS-INFO) */
        .menu {
            position: fixed; top: 0; left: -100%; width: 250px; height: 100%;
            background: #050505; border-right: 1px solid #111; z-index: 100;
            transition: 0.3s; padding: 30px 20px;
        }
        .menu.open { left: 0; }
        .m-item { padding: 15px 0; color: var(--dim); font-size: 12px; cursor: pointer; border-bottom: 1px solid #111; }
        .m-item:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div class="menu" id="menu">
        <div style="color:var(--accent); font-size:14px; margin-bottom:30px;">[ ARCHIVE ]</div>
        <div id="hist"></div>
        <div class="m-item" onclick="location.reload()" style="color:red; margin-top:50px;">RESET_CORE</div>
    </div>

    <div class="hdr" onclick="toggleMenu()">
        <div class="sys-info"><span class="active-dot"></span> AURA_v6.0_STABLE</div>
        <div class="sys-info">2026_CORE</div>
    </div>

    <div id="log"></div>

    <div class="input-box">
        <div class="inner">
            <span class="cmd">></span>
            <input type="text" id="cmd-in" placeholder="Введите запрос..." autocomplete="off" autofocus>
        </div>
    </div>

    <script>
        const log = document.getElementById('log'), input = document.getElementById('cmd-in'), 
              menu = document.getElementById('menu'), hist = document.getElementById('hist');

        let memory = JSON.parse(localStorage.getItem('aura_core')) || [];

        function toggleMenu() { menu.classList.toggle('open'); }

        window.onload = () => {
            print("CORE_INITIALIZED: Система работает на 200%. Связь с базой установлена. Жду задачу.", "ai");
            renderHist();
        };

        async function exec() {
            const val = input.value.trim(); if(!val) return;
            print(val, "usr");
            input.value = '';

            // Эмуляция глубокого мышления ИИ
            setTimeout(() => {
                let res = analyze(val);
                print(res, "ai");
                memory.unshift({q: val, a: res});
                if(memory.length > 20) memory.pop();
                localStorage.setItem('aura_core', JSON.stringify(memory));
                renderHist();
            }, 300);
        }

        function analyze(t) {
            const q = t.toLowerCase();
            // Прямая, жесткая логика без "воды"
            if(q.includes('бравл') || q.includes('baza')) return "[STATUS: БИЗНЕС]\nДля BAZA SHOP нужно обновить визуальный ряд. Мета изменилась. Предлагаю сделать упор на эксклюзивные паки. Написать текст рассылки?";
            if(q.includes('школ') || q.includes('биол') || q.includes('8')) return "[STATUS: ОБУЧЕНИЕ]\nТема определена. Анализ 8-го класса (Пасечник) завершен. Суть вопроса в физиологии. Дать краткую выжимку или решение?";
            if(q.includes('невинк') || q.includes('чп')) return "[STATUS: ЛОКАЦИЯ]\nПроект 'ЧП Невинка' требует оперативного контента. Рекомендую автоматизировать сбор сводок через ботов. Помочь с алгоритмом?";
            if(q.includes('кто') || q.includes('что')) return "[STATUS: ИНФО]\nЗапрос обработан. Речь о ключевом объекте/личности. Влияние на сферу: 85%. Хочешь получить детальный разбор?";
            return "[STATUS: PROCESSING]\nЗапрос принят. Для iPhone 17 Pro оптимальное решение — алгоритмический подход. Раздели задачу на 3 этапа и начни с первого. Я помогу.";
        }

        function print(t, type) {
            const div = document.createElement('div');
            div.className = 'block';
            div.innerHTML = type === 'ai' 
                ? `<div class="ai-head">AURA_SYSTEM</div><div class="txt">${t}</div>`
                : `<div class="usr-head">USER_COMMAND</div><div class="txt usr-txt">${t}</div>`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function renderHist() {
            hist.innerHTML = memory.map(m => `<div class="m-item">${m.q.substring(0, 20)}...</div>`).join('');
        }

        input.onkeypress = (e) => { if(e.key === 'Enter') exec(); };
        // Закрытие меню при клике на лог
        log.onclick = () => menu.classList.remove('open');
    </script>
</body>
</html>
