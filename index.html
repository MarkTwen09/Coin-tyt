<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAO EMPIRE OFFICIAL</title>
    <style>
        body {
            background: #050505; color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        .screen { display: none; flex-direction: column; align-items: center; padding: 20px; flex: 1; animation: fadeIn 0.3s; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Дизайн баланса */
        .bal-card { background: linear-gradient(135deg, #111, #000); border: 1px solid #acff01; border-radius: 20px; width: 90%; padding: 20px; text-align: center; margin-top: 20px; box-shadow: 0 0 20px rgba(172, 255, 1, 0.1); }
        .bal-num { font-size: 45px; font-weight: bold; color: #acff01; margin: 10px 0; }

        /* Монета */
        .coin-box {
            width: 150px; height: 150px; border-radius: 50%; border: 4px solid #acff01;
            margin: 40px 0; display: flex; align-items: center; justify-content: center;
            font-size: 70px; background: #000; box-shadow: 0 0 30px rgba(172, 255, 1, 0.2);
            transition: 0.2s;
        }
        .rolling { transform: rotateY(720deg) scale(1.1); transition: 1s; opacity: 0.5; }

        /* Кнопки */
        .btn { background: #acff01; color: black; border: none; padding: 15px 40px; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; width: 80%; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .bet-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .bet-btn { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px 20px; border-radius: 10px; cursor: pointer; }
        .bet-btn.active { border-color: #acff01; color: #acff01; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; border-top: 1px solid #222; padding-bottom: 20px; }
        .n-item { flex: 1; padding: 15px; text-align: center; font-size: 11px; color: #555; font-weight: bold; cursor: pointer; }
        .n-item.active { color: #acff01; }

        /* Уведомления */
        #notif { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 30px; border-radius: 10px; font-weight: bold; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="notif"></div>

<div id="scr_game" class="screen active">
    <div class="bal-card">
        <div style="font-size: 12px; color: #555; letter-spacing: 2px;">ВАШ БАЛАНС</div>
        <div class="bal-num" id="b1">500</div>
    </div>
    
    <div id="coin" class="coin-box">🎭</div>

    <div class="bet-row">
        <button class="bet-btn" onclick="setB(10, this)">10</button>
        <button class="bet-btn active" onclick="setB(50, this)">50</button>
        <button class="bet-btn" onclick="setB(100, this)">100</button>
    </div>

    <button class="btn" onclick="play()">БРОСИТЬ МОНЕТУ</button>
</div>

<div id="scr_earn" class="screen">
    <h2 style="color:#acff01">КВЕСТЫ</h2>
    <div class="bal-card" style="text-align: left; width: 85%;">
        <b>Подписка на канал</b><br><small>+1,000 монет</small>
        <button class="btn" style="margin-top:10px; padding:10px;" onclick="claim('t1', 1000)">ПОЛУЧИТЬ</button>
    </div>
</div>

<div id="scr_wall" class="screen">
    <h2 style="color:#acff01">КОШЕЛЕК</h2>
    <div class="bal-card" style="background: linear-gradient(45deg, #0a0a0a, #1a1a1a); height: 160px; display: flex; flex-direction: column; justify-content: center;">
        <div style="color: #444;">ID: KAO_PLAYER_77</div>
        <div class="bal-num" id="b2">500</div>
    </div>
    <button class="btn" style="margin-top: 20px; background: #111; color: white; border: 1px solid #333;" onclick="alert('Вывод от 100,000 монет')">ВЫВЕСТИ</button>
</div><div class="nav">
    <div class="n-item active" id="n0" onclick="show('scr_game', 0)">🏠 ИГРА</div>
    <div class="n-item" id="n1" onclick="show('scr_earn', 1)">💎 КВЕСТЫ</div>
    <div class="n-item" id="n2" onclick="show('scr_wall', 2)">💰 БАЛАНС</div>
</div>

<script>
    let bal = parseInt(localStorage.getItem('kao_bal_fix')) || 500;
    let bet = 50;
    let isRolling = false;

    function sync() {
        document.getElementById('b1').innerText = bal;
        document.getElementById('b2').innerText = bal;
        localStorage.setItem('kao_bal_fix', bal);
    }
    sync();

    function show(id, n) {
        if(isRolling) return;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.n-item').forEach(i => i.classList.remove('active'));
        document.getElementById('n'+n).classList.add('active');
    }

    function toast(m, win) {
        const t = document.getElementById('notif');
        t.innerText = m;
        t.style.background = win ? '#acff01' : '#ff3e3e';
        t.style.color = win ? 'black' : 'white';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 1500);
    }

    function setB(v, el) {
        bet = v;
        document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function play() {
        if(isRolling || bal < bet) {
            if(bal < bet) toast("МАЛО МОНЕТ!", false);
            return;
        }
        isRolling = true;
        bal -= bet;
        sync();

        const c = document.getElementById('coin');
        c.classList.add('rolling');

        setTimeout(() => {
            const win = Math.random() > 0.5;
            c.classList.remove('rolling');
            if(win) {
                bal += bet * 2;
                c.innerText = "🎭";
                toast("ПОБЕДА! +" + bet, true);
            } else {
                c.innerText = "🪙";
                toast("ПРОИГРЫШ", false);
            }
            sync();
            isRolling = false;
        }, 1000);
    }

    function claim(id, amt) {
        if(localStorage.getItem(id)) return toast("УЖЕ ПОЛУЧЕНО", false);
        bal += amt;
        localStorage.setItem(id, "true");
        sync();
        toast("БОНУС: +" + amt, true);
    }
</script>
</body>
</html>
