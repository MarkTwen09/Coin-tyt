<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Order: Cyber Strategy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0f19;
            color: #e2e8f0;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Тактический темный фильтр для придания карте "3D/Sci-Fi" вида */
        .leaflet-layer {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        /* Интерфейс управления */
        .gui-panel {
            position: absolute;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #38bdf8;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #top-bar {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .resource {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            color: #38bdf8;
        }

        #control-panel {
            bottom: 20px;
            left: 20px;
            width: 320px;
            display: none;
        }

        #attack-panel {
            bottom: 20px;
            right: 20px;
            width: 320px;
            display: none;
            border-color: #f43f5e;
        }

        h3 {
            margin-bottom: 10px;
            color: #38bdf8;
            border-bottom: 1px solid #334155;
            padding-bottom: 5px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .btn {
            display: block;
            width: 100%;
            background: #1e293b;
            color: #fff;
            border: 1px solid #475569;
            padding: 8px;
            margin-top: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
        }

        .btn-attack {
            background: #881337;
            border-color: #f43f5e;
        }
        .btn-attack:hover {
            background: #f43f5e;
            color: #fff;
        }

        /* Выбор страны при старте */
        #start-screen {
            position: absolute;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .start-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #38bdf8;
            text-align: center;
            max-width: 400px;
        }

        select {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            background: #0f172a;
            color: #fff;
            border: 1px solid #38bdf8;
            border-radius: 4px;
        }

        .building-list {
            font-size: 13px;
            margin-top: 5px;
            color: #94a3b8;
        }

        /* Кастомные маркеры городов */
        .city-icon {
            background: rgba(56, 189, 248, 0.2);
            border: 2px solid #38bdf8;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            text-align: center;
        }

        .timer-badge {
            font-size: 11px;
            color: #f43f5e;
            font-weight: bold;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="start-box">
            <h2>GLOBAL ORDER</h2>
            <p style="color: #94a3b8; margin-top: 5px;">Выберите вашу державу</p>
            <select id="country-select">
                <option value="player_russia">Россия (Зеленый сектор)</option>
                <option value="player_usa">США (Синий сектор)</option>
                <option value="player_china">Китай (Красный сектор)</option>
                <option value="player_germany">Германия (Желтый сектор)</option>
            </select>
            <button class="btn" onclick="startGame()">Начать экспансию</button>
        </div>
    </div>

    <div id="top-bar" class="gui-panel">
        <div class="resource">💰 Бюджет: <span id="res-money">1000</span>$</div>
        <div class="resource">📦 Сталь: <span id="res-steel">500</span>т</div>
        <div class="resource">🎖️ Армия: <span id="res-troops">10</span> див.</div>
    </div>

    <div id="control-panel" class="gui-panel">
        <h3 id="selected-city-name">Город</h3>
        <p style="font-size: 12px; color: #a1a1aa;">Статус: Ваш регион</p>
        <div class="building-list" id="city-buildings">Постройки: Нет</div>
        
        <button class="btn" onclick="buildStructure('bank')">Построить Банк (+50$/мин) <br><small>Цена: 300$</small></button>
        <button class="btn" onclick="buildStructure('factory')">Построить Завод (+30 стали/мин) <br><small>Цена: 200$, 100 сталь</small></button>
        <button class="btn" onclick="buildStructure('military')">Военная база (+1 войск/мин) <br><small>Цена: 400$, 200 сталь</small></button>
    </div>

    <div id="attack-panel" class="gui-panel">
        <h3 id="enemy-city-name" style="color:#f43f5e;">Вражеский Город</h3>
        <p id="enemy-city-owner" style="font-size: 12px; color: #e11d48; margin-bottom: 8px;">Владелец: ИИ</p>
        
        <button class="btn btn-attack" onclick="startAssault('infantry')">Штурм Пехотой (5 мин)</button>
        <button class="btn btn-attack" onclick="startAssault('tanks')">Танковый прорыв (2 мин)</button>
        <button class="btn btn-attack" onclick="startAssault('planes')">Авиаудар (2 мин)</button>
        <div id="assault-timer" class="timer-badge"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Игровые ресурсы
        let resources = { money: 1000, steel: 500, troops: 15 };
        let playerCountry = '';
        let selectedCity = null;

        // Настройки цветов для фракций
        const factionColors = {
            'Игрок': '#22c55e',       // Зеленый для игрока
            'США (ИИ)': '#3b82f6',    // Синий
            'Китай (ИИ)': '#ef4444',  // Красный
            'Германия (ИИ)': '#eab308',// Желтый
            'Россия (ИИ)': '#a855f7'   // Фиолетовый
        };

        // База данных городов (баз)
        let cities = [
            { id: 1, name: "Москва", lat: 55.7558, lng: 37.6173, owner: "Россия (ИИ)", color: factionColors["Россия (ИИ)"], buildings: [], radius: 150000 },
            { id: 2, name: "Берлин", lat: 52.5200, lng: 13.4050, owner: "Германия (ИИ)", color: factionColors["Германия (ИИ)"], buildings: [], radius: 120000 },
            { id: 3, name: "Вашингтон", lat: 38.9072, lng: -77.0369, owner: "США (ИИ)", color: factionColors["США (ИИ)"], buildings: [], radius: 160000 },
            { id: 4, name: "Пекин", lat: 39.9042, lng: 116.4074, owner: "Китай (ИИ)", color: factionColors["Китай (ИИ)"], buildings: [], radius: 170000 },
            { id: 5, name: "Париж", lat: 48.8566, lng: 2.3522, owner: "Германия (ИИ)", color: factionColors["Германия (ИИ)"], buildings: [], radius: 100000 },
            { id: 6, name: "Нью-Йорк", lat: 40.7128, lng: -74.0060, owner: "США (ИИ)", color: factionColors["США (ИИ)"], buildings: [], radius: 110000 },
            { id: 7, name: "Владивосток", lat: 43.1198, lng: 131.8869, owner: "Россия (ИИ)", color: factionColors["Россия (ИИ)"], buildings: [], radius: 130000 }
        ];

        // Инициализация карты
        const map = L.map('map', {
            center: [45, 10],
            zoom: 3,
            minZoom: 2,
            maxZoom: 10
        });

        // Загрузка стильных темных тайлов OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Запуск игры
        function startGame() {
            const select = document.getElementById('country-select');
            const chosen = select.options[select.selectedIndex].text;
            
            // Определяем, какую фракцию взял игрок
            if(chosen.includes("Россия")) playerCountry = "Россия (ИИ)";
            if(chosen.includes("США")) playerCountry = "США (ИИ)";
            if(chosen.includes("Китай")) playerCountry = "Китай (ИИ)";
            if(chosen.includes("Германия")) playerCountry = "Германия (ИИ)";

            // Переназначаем выбранную страну Игроку
            cities.forEach(city => {
                if(city.owner === playerCountry) {
                    city.owner = "Игрок";
                    city.color = factionColors["Игрок"];
                }
            });

            document.getElementById('start-screen').style.display = 'none';
            renderWorld();
            startGameloop();
        }

        // Отрисовка зон влияния стран и маркеров городов
        let layersGroup = L.layerGroup().addTo(map);

        function renderWorld() {
            layersGroup.clearLayers();

            cities.forEach(city => {
                // Подсвечиваемая зона вокруг города (территория страны)
                let zone = L.circle([city.lat, city.lng], {
                    radius: city.radius,
                    color: city.color,
                    fillColor: city.color,
                    fillOpacity: 0.25,
                    weight: 2
                }).addTo(layersGroup);

                // Клик на зону или город открывает меню управления/атаки
                zone.on('click', () => selectCityProps(city));

                // Кастомная точка-маркер центра управления
                let marker = L.circleMarker([city.lat, city.lng], {
                    radius: 8,
                    color: '#ffffff',
                    fillColor: city.color,
                    fillOpacity: 1,
                    weight: 2
                }).addTo(layersGroup);
                
                marker.bindTooltip(`<b>${city.name}</b><br>Владелец: ${city.owner}`, {permanent: false, direction: 'top'});
                marker.on('click', () => selectCityProps(city));
            });
        }

        // Логика выбора города кликом
        function selectCityProps(city) {
            selectedCity = city;
            if (city.owner === "Игрок") {
                document.getElementById('attack-panel').style.display = 'none';
                document.getElementById('control-panel').style.display = 'block';
                document.getElementById('selected-city-name').innerText = city.name;
                document.getElementById('city-buildings').innerText = "Постройки: " + (city.buildings.length > 0 ? city.buildings.join(', ') : "Нет");
            } else {
                document.getElementById('control-panel').style.display = 'none';
                document.getElementById('attack-panel').style.display = 'block';
                document.getElementById('enemy-city-name').innerText = city.name;
                document.getElementById('enemy-city-owner').innerText = `Владелец: ${city.owner}`;
            }
        }

        // Постройка инфраструктуры
        function buildStructure(type) {
            if (!selectedCity) return;

            if (type === 'bank' && resources.money >= 300) {
                resources.money -= 300;
                selectedCity.buildings.push("Банк");
            } else if (type === 'factory' && resources.money >= 200 && resources.steel >= 100) {
                resources.money -= 200;
                resources.steel -= 100;
                selectedCity.buildings.push("Завод");
            } else if (type === 'military' && resources.money >= 400 && resources.steel >= 200) {
                resources.money -= 400;
                resources.steel -= 200;
                selectedCity.buildings.push("Военная База");
            } else {
                alert("Недостаточно ресурсов для строительства!");
                return;
            }

            updateUI();
            selectCityProps(selectedCity);
        }

        // Облегченная механика штурма из Iron Order (реальные таймеры)
        function startAssault(unitType) {
            if (!selectedCity || resources.troops < 1) {
                alert("Нет доступных дивизий для отправки в атаку!");
                return;
            }

            // Списываем 1 дивизию на операцию штурма
            resources.troops -= 1;
            updateUI();

            let duration = 120; // 2 минуты по умолчанию (самолеты/танки)
            if (unitType === 'infantry') {
                duration = 300; // 5 минут для пехоты
            }

            let targetCity = selectedCity;
            let timerElement = document.getElementById('assault-timer');
            
            let countdown = setInterval(() => {
                duration--;
                let mins = Math.floor(duration / 60);
                let secs = duration % 60;
                timerElement.innerText = `Штурм ${targetCity.name}: ${mins}:${secs < 10 ? '0' : ''}${secs}`;

                if (duration <= 0) {
                    clearInterval(countdown);
                    timerElement.innerText = "";
                    
                    // Упрощенный расчет боя: 70% шанс успеха игрока
                    if (Math.random() < 0.7) {
                        alert(`Победа! ${targetCity.name} переходит под ваш контроль!`);
                        targetCity.owner = "Игрок";
                        targetCity.color = factionColors["Игрок"];
                        renderWorld();
                    } else {
                        alert(`Штурм ${targetCity.name} провалился. Войска разбиты.`);
                    }
                    document.getElementById('attack-panel').style.display = 'none';
                }
            }, 1000);
        }

        // Экономический игровой цикл (каждые 5 секунд начисляются ресурсы)
        function startGameloop() {
            setInterval(() => {
                // Базовый прирост
                resources.money += 20;
                resources.steel += 10;

                // Бонусы от построек во всех городах игрока
                cities.forEach(city => {
                    if (city.owner === "Игрок") {
                        city.buildings.forEach(b => {
                            if (b === "Банк") resources.money += 15;
                            if (b === "Завод") resources.steel += 10;
                            if (b === "Военная База") resources.troops += 1;
                        });
                    } else {
                        // Облегченный ИИ: с шансом 5% строит что-то у себя
                        if (Math.random() < 0.05) {
                            city.buildings.push("Завод ИИ");
                        }
                    }
                });

                updateUI();
            }, 5000);
        }

        // Обновление интерфейса
        function updateUI() {
            document.getElementById('res-money').innerText = resources.money;
            document.getElementById('res-steel').innerText = resources.steel;
            document.getElementById('res-troops').innerText = resources.troops;
        }
    </script>
</body>
</html>
