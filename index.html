<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NEON CLICKER PRO</title>
    <style>
        :root {
            --neon: #00f2ff;
            --pink: #ff00c8;
            --bg: #0d0221;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* ЛЕВАЯ ПАНЕЛЬ - ИГРА */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 2px solid rgba(255, 255, 255, 0.1);
        }

        .stats {
            margin-bottom: 30px;
            padding: 15px 40px;
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--neon);
            border-radius: 50px;
            box-shadow: 0 0 20px var(--neon);
            font-size: 28px;
            font-weight: bold;
        }

        #coin {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: gold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            cursor: pointer;
            user-select: none;
            transition: 0.1s;
            border: 6px solid #fff;
            box-shadow: 0 0 40px gold;
        }

        #coin:active { transform: scale(0.93); }

        /* ПРАВАЯ ПАНЕЛЬ - МАГАЗИН */
        .side-menu {
            width: 380px;
            background: #000;
            padding: 20px;
            overflow-y: auto;
        }

        .case-box {
            background: #1a1a1a;
            border: 1px solid var(--pink);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .btn {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            margin-top: 10px;
        }

        .btn:hover { box-shadow: 0 0 15px var(--neon); }

        /* ИНВЕНТАРЬ */
        .inventory {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .slot {
            height: 70px;
            background: #222;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            cursor: pointer;
            border-radius: 8px;
        }

        .slot.active {
            border-color: var(--neon);
            box-shadow: 0 0 10px var(--neon);
        }

        /* МОДАЛКА */
        #popup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 4px solid var(--pink);
            padding: 40px;
            display: none;
            z-index: 999;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 0 50px var(--pink);
        }
    </style>
</head>
<body>

    <div class="game-area">
        <div class="stats">Баланс: <span id="balance">0</span> 🪙</div>
        <div id="coin" onclick="doClick()">💰</div>
    </div>

    <div class="side-menu">
        <h2 style="color:var(--pink)">КЕЙСЫ</h2>
        <div class="case-box">
            <p>Стандартный (150 🪙)</p>
            <button class="btn" onclick="openCase('std')">Открыть</button>
        </div>
        <div class="case-box">
            <p>Премиум (1000 🪙)</p>
            <button class="btn" onclick="openCase('pre')">Открыть</button>
        </div><h2 style="color:var(--neon)">МОИ СКИНЫ</h2>
        <div class="inventory" id="inv"></div>
    </div>

    <div id="popup">
        <h2 id="win-title">ДРОП!</h2>
        <div id="win-item" style="font-size: 80px; margin: 20px;"></div>
        <button class="btn" onclick="hidePopup()" style="background:var(--pink)">ЗАБРАТЬ</button>
    </div>

    <script>
        // База данных
        const SKINS = {
            's1': { icon: '💰', bg: 'gold' },
            's2': { icon: '💎', bg: '#00f2ff' },
            's3': { icon: '🔥', bg: '#ff4d00' },
            's4': { icon: '🍀', bg: '#00ff40' },
            's5': { icon: '👑', bg: '#ffcc00' },
            's6': { icon: '👾', bg: '#9d00ff' }
        };

        // Состояние
        let game = JSON.parse(localStorage.getItem('neon_save')) || {
            coins: 0,
            owned: ['s1'],
            active: 's1'
        };

        // Обновление всего интерфейса
        function updateAll() {
            // Баланс
            document.getElementById('balance').innerText = Math.floor(game.coins);
            
            // Монета
            const c = document.getElementById('coin');
            const activeSkin = SKINS[game.active];
            c.innerText = activeSkin.icon;
            c.style.background = activeSkin.bg;
            c.style.boxShadow = 0 0 40px ${activeSkin.bg};

            // Инвентарь
            const inv = document.getElementById('inv');
            inv.innerHTML = '';
            game.owned.forEach(id => {
                const s = document.createElement('div');
                s.className = 'slot' + (id === game.active ? ' active' : '');
                s.innerText = SKINS[id].icon;
                s.onclick = () => { game.active = id; save(); updateAll(); };
                inv.appendChild(s);
            });
        }

        function save() {
            localStorage.setItem('neon_save', JSON.stringify(game));
        }

        // Клик
        function doClick() {
            game.coins += 1;
            updateAll();
            save();
        }

        // Логика кейсов
        function openCase(type) {
            const price = (type === 'std') ? 150 : 1000;
            if (game.coins < price) {
                alert("Не хватает монет!");
                return;
            }

            game.coins -= price;

            // Рандом монет (от 0.5 до 2.5 цены)
            let winCoins = Math.floor(Math.random() * (price * 2));
            game.coins += winCoins;

            // Рандом скина (шанс 25%)
            let winSkin = null;
            if (Math.random() < 0.25) {
                const keys = Object.keys(SKINS);
                winSkin = keys[Math.floor(Math.random() * keys.length)];
                if (!game.owned.includes(winSkin)) {
                    game.owned.push(winSkin);
                }
            }

            // Показ результата
            const pop = document.getElementById('popup');
            pop.style.display = 'block';
            document.getElementById('win-title').innerText = winSkin ? "ВЫПАЛ СКИН!" : "ВЫИГРЫШ:";
            document.getElementById('win-item').innerText = winSkin ? SKINS[winSkin].icon : +${winCoins} 🪙;

            updateAll();
            save();
        }

        function hidePopup() {
            document.getElementById('popup').style.display = 'none';
        }

        // Первый запуск
        updateAll();
    </script>
</body>
</html>
