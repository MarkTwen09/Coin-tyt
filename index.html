<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA | NEURAL INTERFACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .aura-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% -20%, #2e1065 0%, #000 85%); }
        .aura-bg::after { content: ''; position: absolute; inset: 0; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; pointer-events: none; }

        .msg-ai { background: rgba(255,255,255,0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; border-left: 3px solid #a855f7; }
        .msg-user { background: linear-gradient(135deg, #8b5cf6, #6366f1); border-radius: 24px 24px 4px 24px; align-self: flex-end; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3); }

        #chat-flow { height: calc(100vh - 180px); scroll-behavior: smooth; mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent); }
        #chat-flow::-webkit-scrollbar { width: 0; }

        .input-gadget { background: rgba(15,15,15,0.85); backdrop-filter: blur(50px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; }
        .input-gadget:focus-within { border-color: #a855f7; box-shadow: 0 0 30px rgba(168, 85, 247, 0.2); }
        
        .shimmer { background: linear-gradient(90deg, #fff, #a855f7, #fff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shim 5s linear infinite; font-weight: 900; letter-spacing: -0.05em; }
        @keyframes shim { to { background-position: 200% center; } }
        
        .send-btn { background: #fff; color: #000; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; flex-shrink: 0; }
        .send-btn:active { transform: scale(0.85); }
    </style>
</head>
<body class="flex flex-col">
    <div class="aura-bg"></div>

    <header class="pt-16 pb-5 px-10 flex justify-between items-center border-b border-white/5">
        <h1 class="text-2xl shimmer italic uppercase">Aura</h1>
        <div class="flex items-center gap-2">
            <span class="text-[8px] tracking-[0.4em] opacity-30 uppercase font-mono">Universe 1.0</span>
            <div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-ping"></div>
        </div>
    </header>

    <main id="chat-flow" class="overflow-y-auto p-6 space-y-8 flex flex-col pt-10">
        <div class="msg-ai p-6 text-sm max-w-[90%] leading-relaxed">
            Система инициализирована. Я — **Aura**. <br>Готова к работе в глобальной сети. Чем могу помочь?
        </div>
    </main>

    <div id="status" class="hidden px-10 py-2 text-[9px] text-purple-400 tracking-[0.4em] uppercase animate-pulse">Processing...</div>

    <footer class="p-6 pb-12">
        <div class="max-w-4xl mx-auto input-gadget flex items-center p-2 shadow-2xl">
            <input type="text" id="userInput" class="w-full bg-transparent px-6 py-4 text-sm outline-none text-white placeholder-white/20" placeholder="Напиши сообщение..." autocomplete="off">
            <button onclick="processRequest()" class="send-btn shadow-lg">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
        </div>
    </footer>

    <script>
        // Твой зашифрованный ключ успешно вшит:
        const _0xcr = 'QUl6YVN5QXM0WElDOUl4S2M3dHBNSzdQUlhmZk11RlNVSjZyZVFR';

        async function processRequest() {
            const input = document.getElementById('userInput');
            const flow = document.getElementById('chat-flow');
            const status = document.getElementById('status');
            const val = input.value.trim();
            if (!val) return;

            const AUTH = atob(_0xcr); 
            input.value = '';
            flow.innerHTML += `<div class="msg-user p-6 text-sm max-w-[85%]">${val}</div>`;
            flow.scrollTo(0, flow.scrollHeight);
            status.classList.remove('hidden');

            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AUTH}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await r.json();
                status.classList.add('hidden');

                if (data.error) {
                    flow.innerHTML += `<div class="p-5 bg-red-900/20 text-red-300 rounded-3xl text-[10px] text-center uppercase tracking-widest leading-relaxed">System Alert: ${data.error.message}</div>`;
                } else {
                    const txt = data.candidates[0].content.parts[0].text;
                    flow.innerHTML += `<div class="msg-ai p-7 text-sm max-w-[90%] leading-relaxed">${txt}</div>`;
                }
            } catch (err) {
                status.classList.add('hidden');
                flow.innerHTML += `<div class="text-red-500 text-center text-[10px] uppercase">Link Error: Check VPN</div>`;
            }
            flow.scrollTo({ top: flow.scrollHeight, behavior: 'smooth' });
        }
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') processRequest(); };
    </script>
</body>
</html>
