<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Military Theatre</title>
    
    <!-- Подключаем стили Leaflet для корректного отображения карты -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --panel-bg: rgba(20, 25, 31, 0.95);
            --border-color: #2f363d;
            --gold: #dfa837;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e11;
            color: #cbd5e1;
        }

        /* Контейнер для карты во весь экран */
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background-color: #1a202c; /* Цвет океана по умолчанию до загрузки тайлов */
        }

        /* Кастомный стиль для скрытия дефолтных кнопок Leaflet, чтобы не портили интерфейс игры */
        .leaflet-control-zoom {
            display: none !important;
        }
        .leaflet-control-attribution {
            background: rgba(0,0,0,0.5) !important;
            color: #555 !important;
            font-size: 9px !important;
        }

        /* Верхний HUD (Ресурсы из Iron Order) */
        .game-hud {
            position: absolute;
            top: 0; left: 0; width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, rgba(16,21,27,1) 0%, rgba(16,21,27,0.85) 100%);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        .hud-profile { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; }
        .hud-level { background: #238636; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        
        .resource-group { display: flex; gap: 16px; max-width: 65%; overflow-x: auto; }
        .res-cell { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 600; }
        .res-cell span { color: #fff; }

        /* Нижняя выдвижная панель управления регионом */
        .action-dock {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: var(--panel-bg);
            border-top: 2px solid var(--border-color);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            padding: 20px 16px;
            z-index: 100;
            display: none; /* Показывается только при клике на страну */
            box-shadow: 0 -8px 32px rgba(0,0,0,0.7);
            transform: translateY(0);
            animation: slideUp 0.25s cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .dock-title { font-size: 20px; font-weight: 800; color: #ffffff; margin-bottom: 4px; letter-spacing: 0.5px; }
        .dock-subtitle { font-size: 12px; color: #8b949e; text-transform: uppercase; margin-bottom: 16px; }
        
        .dock-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .game-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .game-btn:active { background: #30363d; transform: scale(0.98); }
        .btn-attack { background: #852222; border-color: #b53333; color: #fff; grid-column: span 2; }
        .btn-attack:active { background: #a52a2a; }
    </style>
</head>
<body>

    <!-- ВЕРХНИЙ ИНТЕРФЕЙС ИГРЫ -->
    <div class="game-hud">
        <div class="hud-profile">
            <div class="hud-level">78-Й</div>
            <span style="color: var(--gold);">⚡ 1,466</span>
        </div>
        <div class="resource-group">
            <div class="res-cell">🪵 <span>12.4K</span></div>
            <div class="res-cell">🪙 <span>9.2K</span></div>
            <div class="res-cell">📦 <span>5.9K</span></div>
            <div class="res-cell">💵 <span>7.6K</span></div>
        </div>
    </div>

    <!-- КАРТА, КОТОРАЯ БУДЕТ ЗАГРУЖАТЬСЯ ИЗ СЕТИ -->
    <div id="map"></div>

    <!-- НИЖНЯЯ ПАНЕЛЬ ДЛЯ ВЗАИМОДЕЙСТВИЯ -->
    <div class="action-dock" id="control-dock">
        <div class="dock-title" id="country-name">Название Государства</div>
        <div class="dock-subtitle" id="country-status">Статус региона</div>
        <div class="dock-buttons" id="action-buttons-container">
            <!-- Сюда скрипт подкинет нужные кнопки -->
        </div>
    </div>

    <!-- Подключаем сам скрипт движка Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. ИНИЦИАЛИЗАЦИЯ КАРТЫ
        // Устанавливаем стартовый вид на Восточную Европу и задаем лимиты зума
        const map = L.map('map', {
            center: [53.9, 27.5], // Центрируем в районе Беларуси
            zoom: 5,
            minZoom: 4,
            maxZoom: 7,
            zoomSnap: 0.5,
            bounceAtZoomLimits: true
        });

        // 2. ПОДКЛЮЧЕНИЕ ТЕМНЫХ СТИЛЬНЫХ ТАЙЛОВ (CartoDB Dark Matter)
        // Они дают идеальный монохромный тёмно-серый цвет суши и глубокий цвет воды
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB'
        }).addTo(map);

        // 3. ДАННЫЕ ГРАНИЦ СТРАН (GeoJSON полигоны)
        // Настоящие координаты сглаженных контуров государств
        const worldGeometries = {
            "type": "FeatureCollection",
            "features": [
                {
                    "type": "Feature",
                    "properties": { "name": "Белорусская ССР", "type": "player" },
                    "geometry": {
                        "type": "Polygon",
                        "coordinates": [[
                            [23.5, 52.0], [23.9, 53.9], [25.6, 54.3], [26.6, 55.7], [28.2, 55.9],
                            [30.1, 56.1], [31.2, 55.0], [32.8, 53.5], [31.6, 52.1], [30.5, 51.3],
                            [27.5, 52.1], [24.0, 51.5], [23.5, 52.0]
                        ]]
                    }
                },
                {
                    "type": "Feature",
                    "properties": { "name": "Украинская ССР", "type": "ai" },
                    "geometry": {
                        "type": "Polygon",
                        "coordinates": [[
                            [24.0, 51.5], [27.5, 52.1], [30.5, 51.3], [31.6, 52.1], [33.0, 52.4],
                            [34.3, 50.8], [36.7, 50.2], [39.5, 49.3], [40.1, 47.8], [37.7, 47.1],
                            [34.5, 46.1], [32.5, 46.4], [30.2, 46.3], [28.7, 45.3], [28.2, 46.3],
                            [26.2, 48.3], [22.2, 48.2], [22.5, 49.5], [24.0, 51.5]
                        ]]
                    }
                },
                {
                    "type": "Feature",
                    "properties": { "name": "Российская Империя (Запад)", "type": "ai" },
                    "geometry": {
                        "type": "Polygon",
                        "coordinates": [[
                            [31.2, 55.0], [30.1, 56.1], [28.2, 55.9], [28.0, 57.5], [30.0, 60.0],
                            [35.0, 60.0], [40.0, 55.0], [39.5, 49.3], [36.7, 50.2], [34.3, 50.8],
                            [33.0, 52.4], [31.6, 52.1], [32.8, 53.5], [31.2, 55.0]
                        ]]
                    }
                },
                {
                    "type": "Feature",
                    "properties": { "name": "Польская Республика", "type": "ai" },
                    "geometry": {
                        "type": "Polygon",
                        "coordinates": [[
                            [23.5, 52.0], [24.0, 51.5], [22.5, 49.5], [19.0, 49.4], [16.2, 50.7],
                            [15.0, 52.3], [14.2, 53.9], [17.0, 54.5], [19.5, 54.4], [22.8, 54.2],
                            [23.5, 52.0]
                        ]]
                    }
                }
            ]
        };

        // 4. НАСТРОЙКА СТИЛЕЙ (Мягкая заливка хаки как в Iron Order)
        // Твоя страна красится в полупрозрачный зелёный с сочным контуром, чужие — в строгий стальной
        function styleFeature(feature) {
            if (feature.properties.type === 'player') {
                return {
                    fillColor: '#2e7559',      // Тот самый благородный хаки/зеленый
                    fillOpacity: 0.45,         // Мягкая прозрачность, видно подложку
                    color: '#3b9c75',          // Плотная линия границы страны
                    weight: 2.5,
                    opacity: 1
                };
            } else {
                return {
                    fillColor: '#3d4852',      // Стальной цвет для ИИ-держав
                    fillOpacity: 0.2,          // Почти прозрачные, чтобы не отвлекать
                    color: '#4a5763',          // Неброская серая граница
                    weight: 1.5,
                    opacity: 0.7
                };
            }
        }

        // Переменная для хранения текущей выбранной на карте страны
        let geojsonLayer;

        // 5. ИНТЕРАКТИВНОСТЬ И КЛИКИ
        function onEachFeature(feature, layer) {
            // Подсветка при наведении или таче пальцем
            layer.on('mouseover', function () {
                layer.setStyle({
                    fillOpacity: feature.properties.type === 'player' ? 0.6 : 0.4
                });
            });
            
            layer.on('mouseout', function () {
                geojsonLayer.resetStyle(layer); // Возвращаем исходный стиль
            });

            // Клик по стране открывает нижний док (как на видео)
            layer.on('click', function (e) {
                const props = feature.properties;
                
                document.getElementById('control-dock').style.display = 'block';
                document.getElementById('country-name').innerText = props.name;
                
                const buttonsContainer = document.getElementById('action-buttons-container');
                
                if (props.type === 'player') {
                    document.getElementById('country-status').innerText = 'Ваша суверенная территория';
                    buttonsContainer.innerHTML = `
                        <button class="game-btn" onclick="triggerAction('Построена крепость')">🔨 Построить ДОТ</button>
                        <button class="game-btn" onclick="triggerAction('Производство запущено')">🏭 На завод</button>
                    `;
                } else {
                    document.getElementById('country-status').innerText = 'Вражеская фракция (ИИ)';
                    buttonsContainer.innerHTML = `
                        <button class="game-btn btn-attack" onclick="startWar('${props.name}', layer)">⚔️ ОБЪЯВИТЬ ВОЙНУ И НАЧАТЬ ШТУРМ</button>
                    `;
                }
                
                // Останавливаем всплытие события, чтобы клик не засчитался по воде
                L.DomEvent.stopPropagation(e);
            });
        }

        // Отрисовываем полигоны на нашей Leaflet карте
        geojsonLayer = L.geoJSON(worldGeometries, {
            style: styleFeature,
            onEachFeature: onEachFeature
        }).addTo(map);

        // Закрытие дока при клике на свободную область (воду)
        map.on('click', function() {
            document.getElementById('control-dock').style.display = 'none';
        });

        // 6. ИГРОВАЯ ЛОГИКА (Перекрашивание на лету при захвате)
        function triggerAction(text) {
            alert(`[ШТАБ]: ${text}`);
        }

        function startWar(name, layer) {
            alert(`[ОПЕРАЦИЯ]: Дивизии пересекли границу государства: ${name}!`);
            
            setTimeout(() => {
                // Меняем внутренние свойства захваченного объекта
                layer.feature.properties.type = 'player';
                // Перерисовываем страну в наш зелёный цвет хаки
                layer.setStyle(styleFeature(layer.feature));
                
                alert(`[ПОБЕДА]: ${name} капитулирует! Земли присоединены, карта обновлена.`);
                document.getElementById('control-dock').style.display = 'none';
            }, 1500);
        }
    </script>
</body>
</html>
