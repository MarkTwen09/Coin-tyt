<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EUROPE CONQUEST: REAL MAP</title>
    <style>
        body { margin: 0; background: #0a0c10; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #ui { width: 300px; background: #161b22; border-right: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; }
        #map-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: #0d1117; }
        
        /* Стили для реальных стран */
        path { fill: #21262d; stroke: #30363d; stroke-width: 0.5; transition: 0.2s; cursor: pointer; }
        path:hover { fill: #30363d; stroke: #58a6ff; }
        .owned { fill: #238636 !important; stroke: #79c0ff !important; }

        .stat { background: #0d1117; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #30363d; }
        .gold { font-size: 28px; color: #f1e05a; font-weight: bold; }
        #loading { position: absolute; font-size: 20px; color: #58a6ff; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>EUROPE STRATEGY</h2>
        <div class="stat">
            <div>БЮДЖЕТ:</div>
            <div class="gold"><span id="gold">500</span> 🪙</div>
            <div style="font-size: 12px; color: #238636;">Доход: +<span id="income">5</span>/сек</div>
        </div>
        <button onclick="upgrade()" style="padding:10px; cursor:pointer; background:#238636; color:white; border:none; border-radius:5px;">УЛУЧШИТЬ ЭКОНОМИКУ (300)</button>
        <div id="log" style="margin-top:20px; font-size: 12px; color: #8b949e; height: 200px; overflow-y: auto;">
            Кликните на страну Европы для захвата (Цена: 200)
        </div>
    </div>

    <div id="map-container">
        <div id="loading">ЗАГРУЗКА КАРТЫ...</div>
        <svg id="europe-map" viewBox="0 0 1000 1000" style="width: 90%; height: 90%; display: none;"></svg>
    </div>

    <script>
        let gold = 500;
        let income = 5;

        // 1. ЗАГРУЗКА НАСТОЯЩЕЙ SVG КАРТЫ
        fetch('https://raw.githubusercontent.com/leakyMirror/map-of-europe/master/Europe_map.svg')
            .then(res => res.text())
            .then(data => {
                const container = document.getElementById('map-container');
                const loading = document.getElementById('loading');
                
                // Вставляем SVG
                container.innerHTML = data;
                loading.style.display = 'none';
                
                const svg = container.querySelector('svg');
                svg.style.width = "90%";
                svg.style.height = "90%";

                // Настраиваем клики на все страны
                const countries = svg.querySelectorAll('path');
                countries.forEach(c => {
                    c.onclick = () => claim(c);
                });
            })
            .catch(err => {
                document.getElementById('loading').innerText = "ОШИБКА ЗАГРУЗКИ. Гитхаб блокирует файл.";
                console.error(err);
            });

        // 2. ЛОГИКА ИГРЫ
        setInterval(() => {
            gold += income;
            document.getElementById('gold').innerText = Math.floor(gold);
        }, 1000);

        function upgrade() {
            if (gold >= 300) {
                gold -= 300;
                income += 10;
                document.getElementById('income').innerText = income;
                addLog("Экономика улучшена!");
            }
        }

        function claim(el) {
            if (el.classList.contains('owned')) return;
            if (gold >= 200) {
                gold -= 200;
                income += 5;
                el.classList.add('owned');
                document.getElementById('income').innerText = income;
                addLog("Территория захвачена!");
            } else {
                addLog("Мало золота!");
            }
        }function addLog(txt) {
            const log = document.getElementById('log');
            log.innerHTML = <div>[${new Date().toLocaleTimeString()}] ${txt}</div> + log.innerHTML;
        }
    </script>
</body>
</html>
