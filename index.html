<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHETTO BANK | Private Banking</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --black: #0a0a0a;
            --card: #151515;
            --gray: #222;
            --text-dim: #666;
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo span { color: var(--gold); }

        .user-tag {
            background: var(--card);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid #333;
            color: var(--gold);
        }

        /* Main Card */
        .main-card {
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border-radius: 28px;
            padding: 30px;
            position: relative;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        .main-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.05;
            pointer-events: none;
        }

        .balance-label { color: var(--text-dim); font-size: 14px; margin-bottom: 8px; }
        .balance-val { font-size: 42px; font-weight: 700; letter-spacing: -1px; }

        /* Inputs & Buttons */
        .section-title { font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; margin-left: 5px; }

        .input-group {
            background: var(--card);
            border-radius: 20px;
            padding: 5px;
            margin-bottom: 15px;
            border: 1px solid #222;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 15px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .btn-send {
            background: white;
            color: black;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            transition: 0.3s;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-send:active { transform: scale(0.97); background: #eee; }

        /* History */
        .history-list { margin-top: 20px; }
        .history-item {
            background: var(--card);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1a1a1a;
        }

        .h-info div { font-size: 14px; font-weight: 600; }
        .h-info span { font-size: 11px; color: var(--text-dim); }
        .h-amount { font-weight: 700; color: #ff453a; }
        .h-amount.plus { color: #32d74b; }

        #status {
            text-align: center;
            font-size: 11px;
            margin-top: 10px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">Ghetto<span>Bank</span></div>
        <div class="user-tag" id="myId">ID: ...</div>
    </header>

    <div class="main-card">
        <div class="balance-label">Сумма активов</div>
        <div class="balance-val" id="balanceDisplay">0.00 ₽</div>
        <div style="margin-top: 25px; display: flex; gap: 10px;">
            <div style="width: 40px; height: 25px; background: #333; border-radius: 4px;"></div>
            <div style="color: var(--text-dim); font-size: 12px; line-height: 25px;">•••• 7789</div>
        </div>
    </div>

    <div class="section-title">Мгновенный перевод</div>
    <div class="input-group">
        <input type="text" id="targetId" placeholder="ID получателя">
    </div>
    <div class="input-group">
        <input type="number" id="amount" placeholder="Сумма ₽">
    </div>
    <button class="btn-send" onclick="sendMoney()">Отправить средства</button>
    <div id="status">Система активна</div>

    <div class="section-title" style="margin-top: 30px;">Последние транзакции</div>
    <div id="history" class="history-list">
        </div>
</div>

<script>
    // Инициализируем Gun.js (используем публичные узлы для синхронизации)
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    
    // Создаем или загружаем личный ID
    let myId = localStorage.getItem('gb_user_id') || 'ID' + Math.floor(Math.random() * 89999 + 10000);
    localStorage.setItem('gb_user_id', myId);
    document.getElementById('myId').innerText = myId;

    const userNode = gun.get('ghetto_bank_v2').get(myId);

    // Начальный баланс для новых (только если в базе пусто)
    userNode.get('balance').once((data) => {
        if (data === undefined) userNode.put({balance: 50000});
    });

    // Постоянное слушание изменений баланса в реальном времени
    userNode.get('balance').on((val) => {
        document.getElementById('balanceDisplay').innerText = parseFloat(val).toLocaleString() + ' ₽';
    });

    async function sendMoney() {
        const to = document.getElementById('targetId').value.trim();
        const sum = parseFloat(document.getElementById('amount').value);
        const status = document.getElementById('status');

        if (!to || !sum || sum <= 0) return;

        status.innerText = "Авторизация транзакции...";
        
        // Берем текущий баланс
        userNode.get('balance').once(async (myBalance) => {
            if (myBalance < sum) {
                alert("Недостаточно средств на балансе");
                status.innerText = "Отказ в операции";
                return;
            }

            // Находим получателя и меняем балансы
            const recipient = gun.get('ghetto_bank_v2').get(to);
            
            recipient.get('balance').once((targetBal) => {
                const newTargetBal = (parseFloat(targetBal) || 0) + sum;
                const newMyBal = myBalance - sum;

                recipient.put({balance: newTargetBal});
                userNode.put({balance: newMyBal});

                // Добавляем в историю
                addHistoryItem(to, sum);
                
                status.innerText = "Транзакция завершена";
                document.getElementById('amount').value = '';
                alert("Успешно отправлено!");
            });
        });
    }

    function addHistoryItem(to, sum) {
        const h = document.getElementById('history');
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
            <div class="h-info">
                <div>Перевод: ${to}</div>
                <span>Сегодня, ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
            </div>
            <div class="h-amount">-${sum} ₽</div>
        `;
        h.prepend(item);
    }
</script>

</body>
</html>
