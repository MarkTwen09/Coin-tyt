<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Clash Royale JS Pro</title>
    <style>
        :root { --gold: #f1c40f; --elixir: #9b59b6; --blue: #3498db; --red: #e74c3c; }
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; background: #1a1a1a; color: white; }
        
        /* ЛОББИ */
        #lobby { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #2c3e50, #000); display: flex; flex-direction: column; z-index: 100; }
        .top-bar { display: flex; justify-content: space-between; padding: 20px; background: rgba(0,0,0,0.4); border-bottom: 3px solid #444; }
        .currency { font-size: 20px; display: flex; gap: 20px; }
        .gold { color: var(--gold); } .gems { color: #2ecc71; }
        
        .main-menu { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .arena-preview { width: 200px; height: 250px; background: #27ae60; border: 5px solid #fff; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 0 20px var(--blue); }
        
        .deck { display: flex; gap: 10px; margin-bottom: 40px; }
        .deck-card { width: 70px; height: 90px; background: #ddd; border-radius: 5px; border: 2px solid #555; }

        /* ИГРА */
        #game-ui { position: absolute; bottom: 0; width: 100%; height: 150px; display: none; flex-direction: column; align-items: center; z-index: 50; pointer-events: none; }
        .hand { display: flex; gap: 15px; pointer-events: auto; padding: 10px; background: rgba(0,0,0,0.5); border-radius: 15px 15px 0 0; }
        .card { width: 90px; height: 120px; background: #fff; color: #333; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; border: 4px solid #7f8c8d; transition: 0.2s; position: relative; }
        .card.selected { border-color: var(--blue); transform: translateY(-20px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card .cost { position: absolute; top: -10px; left: -10px; background: var(--elixir); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; }
        
        #elixir-container { width: 300px; height: 25px; background: #333; border: 3px solid #fff; border-radius: 12px; margin-bottom: 5px; position: relative; }
        #elixir-fill { height: 100%; background: var(--elixir); width: 50%; transition: width 0.3s; border-radius: 8px; }

        .btn-battle { padding: 20px 60px; font-size: 30px; background: #e67e22; border: none; border-radius: 15px; color: white; cursor: pointer; box-shadow: 0 8px 0 #d35400; text-shadow: 2px 2px #000; }
        .btn-battle:hover { background: #f39c12; }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="top-bar">
            <div class="currency">
                <span class="gold">💰 1,250</span>
                <span class="gems">💎 50</span>
            </div>
            <div>LVL 5</div>
        </div>
        <div class="main-menu">
            <div class="arena-preview"></div>
            <div class="deck">
                <div class="deck-card" style="background: #3498db"></div>
                <div class="deck-card" style="background: #e67e22"></div>
                <div class="deck-card" style="background: #27ae60"></div>
                <div class="deck-card" style="background: #9b59b6"></div>
            </div>
            <button class="btn-battle" onclick="startBattle()">В БОЙ!</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="elixir-container"><div id="elixir-fill"></div></div>
        <div class="hand">
            <div class="card selected" onclick="pick('knight', this)"><div class="cost">3</div><br>🛡️<br>РЫЦАРЬ</div>
            <div class="card" onclick="pick('archer', this)"><div class="cost">2</div><br>🏹<br>ЛУЧНИК</div>
            <div class="card" onclick="pick('giant', this)"><div class="cost">5</div><br>👹<br>ГИГАНТ</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const CONFIG = {
            knight: { hp: 600, dmg: 50, range: 1.2, speed: 0.05, rate: 800, cost: 3, color: 0x3498db, size: 0.5 },
            archer: { hp: 250, dmg: 40, range: 5.0, speed: 0.07, rate: 600, cost: 2, color: 0xe67e22, size: 0.4 },
            giant:  { hp: 2000, dmg: 100, range: 1.5, speed: 0.02, rate: 1500, cost: 5, color: 0x27ae60, size: 0.9, towerOnly: true }
        };

        let scene, camera, renderer, clock;
        let units = [], towers = [], elixir = 5, selectedCard = 'knight', isBattle = false;

        window.startBattle = () => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            initGame();
        };

        window.pick = (type, el) => {
            selectedCard = type;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        };

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x2ecc71);
            clock = new THREE.Clock();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 18, 15);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // Поле
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(14, 26), new THREE.MeshStandardMaterial({color: 0x27ae60}));
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // Башни
            towers.push(spawnTower(0, 8, 'player'));
            towers.push(spawnTower(0, -8, 'bot'));
            
            isBattle = true;
            animate();
        }

        function spawnTower(x, z, team) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4, 2.5), new THREE.MeshStandardMaterial({color: team === 'player' ? 0x2980b9 : 0xc0392b}));
            mesh.position.set(x, 2, z);
            scene.add(mesh);
            return { mesh, team, hp: 3000, type: 'tower' };
        }

        function createUnit(type, x, z, team) {
            const c = CONFIG[type];
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(c.size, c.size*1.2, c.size), new THREE.MeshStandardMaterial({color: team === 'player' ? 0x3498db : 0xe74c3c}));
            group.add(body);
            group.position.set(x, c.size/2, z);
            scene.add(group);

            units.push({
                mesh: group, team, ...c, 
                currentHp: c.hp, 
                lastAttack: 0,
                target: null
            });
        }

        window.addEventListener('mousedown', (e) => {
            if(!isBattle || elixir < CONFIG[selectedCard].cost) return;
            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            const ray = new THREE.Raycaster();
            ray.setFromCamera(mouse, camera);
            const hit = ray.intersectObjects(scene.children);
            if(hit.length > 0 && hit[0].point.z > 0) {
                createUnit(selectedCard, hit[0].point.x, hit[0].point.z, 'player');
                elixir -= CONFIG[selectedCard].cost;
            }
        });

        function animate() {
            if(!isBattle) return;
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime() * 1000;

            // Логика эликсира
            elixir = Math.min(10, elixir + 0.005);
            document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';

            // ИИ Бота
            if(Math.random() < 0.01) createUnit('knight', (Math.random()-0.5)*10, -8, 'bot');

            units.forEach((u, i) => {
                // Поиск цели (вражеский юнит или башня)
                let enemies = [...units.filter(en => en.team !== u.team), ...towers.filter(t => t.team !== u.team)];
                if(u.towerOnly) enemies = towers.filter(t => t.team !== u.team);

                let closest = null, minDist = Infinity;
                enemies.forEach(en => {
                    let d = u.mesh.position.distanceTo(en.mesh.position);
                    if(d < minDist) { minDist = d; closest = en; }
                });

                u.target = closest;

                if(u.target) {
                    if(minDist > u.range) {
                        // Идем к цели
                        const dir = new THREE.Vector3().subVectors(u.target.mesh.position, u.mesh.position).normalize();
                        u.mesh.position.add(dir.multiplyScalar(u.speed));
                        u.mesh.lookAt(u.target.mesh.position);
                    } else {
                        // Атакуем
                        if(delta - u.lastAttack > u.rate) {
                            u.target.hp ? u.target.hp -= u.dmg : u.target.currentHp -= u.dmg;
                            u.lastAttack = delta;
                            u.mesh.position.y += 0.3; // Прыжок при атаке
                            setTimeout(() => u.mesh.position.y = u.size/2, 100);
                        }
                    }
                }

                // Смерть
                if(u.currentHp <= 0) {
                    scene.remove(u.mesh);
                    units.splice(i, 1);
                }
            });

            // Проверка башен
            towers.forEach((t, i) => {
                if(t.hp <= 0) {
                    alert(t.team === 'player' ? "ПОРАЖЕНИЕ" : "ПОБЕДА");
                    location.reload();
                }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
