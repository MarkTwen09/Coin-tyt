<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Гетто Банк</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --accent-yellow: #ffdd2d;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --success-green: #30d158;
            --error-red: #ff453a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 100px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            background: #2c2c2e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            border: 1px solid #3a3a3c;
        }

        /* Card Block */
        .main-card {
            background: linear-gradient(135deg, #3a3a3c 0%, #1c1c1e 100%);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .balance-label { color: var(--text-secondary); font-size: 14px; margin-bottom: 8px; }
        .balance-val { font-size: 32px; font-weight: 700; letter-spacing: -1px; }

        /* Action Buttons */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }

        .icon-circle {
            width: 56px;
            height: 56px;
            background: #1c1c1e;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: transform 0.1s;
        }

        .action-btn:active .icon-circle { transform: scale(0.9); background: #2c2c2e; }

        /* Transactions */
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
        .trans-list { display: flex; flex-direction: column; gap: 20px; }
        .trans-item { display: flex; justify-content: space-between; align-items: center; }
        .trans-icon { width: 44px; height: 44px; background: #1c1c1e; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .trans-details { flex: 1; margin-left: 14px; }
        .trans-name { font-weight: 500; font-size: 16px; }
        .trans-cat { color: var(--text-secondary); font-size: 13px; }
        .trans-sum { font-weight: 600; text-align: right; }

        /* Modal Area */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: flex-end;
            z-index: 100;
        }

        .modal-content {
            background: #1c1c1e;
            width: 100%;
            padding: 32px 24px;
            border-radius: 24px 24px 0 0;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            margin: 16px 0;
            outline: none;
        }

        .confirm-btn {
            width: 100%;
            background: var(--accent-yellow);
            color: black;
            font-weight: 700;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
        }

        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            max-width: 430px;
            width: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 30px;
            border-top: 0.5px solid #2c2c2e;
        }

        .tab { color: var(--text-secondary); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tab.active { color: var(--accent-yellow); }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="avatar">A</div>
        <div style="font-weight: 700; font-size: 17px;">ГЕТТО БАНК</div>
        <div style="font-size: 20px;">🔔</div>
    </div>

    <div class="main-card">
        <div class="balance-label">Гетто Black • •• 7789</div>
        <div class="balance-val" id="display-balance">0 ₽</div>
    </div>

    <div class="actions-grid">
        <button class="action-btn" onclick="openModal('add')">
            <div class="icon-circle" style="background: var(--accent-yellow); color: black;">+</div>
            <span class="tab">Пополнить</span>
        </button>
        <button class="action-btn" onclick="openModal('pay')">
            <div class="icon-circle">⇄</div>
            <span class="tab">Перевести</span>
        </button>
        <button class="action-btn">
            <div class="icon-circle">🧾</div>
            <span class="tab">Платежи</span>
        </button>
        <button class="action-btn">
            <div class="icon-circle">•••</div>
            <span class="tab">Еще</span>
        </button>
    </div>

    <div class="section-title">История</div>
    <div class="trans-list" id="history-list">
        </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div id="modal-title" style="font-size: 20px; font-weight: 700;"></div>
        <input type="number" id="amount-input" placeholder="Введите сумму">
        <button class="confirm-btn" onclick="processTransaction()">Подтвердить</button>
        <button onclick="closeModal()" style="background: none; border: none; color: var(--text-secondary); width: 100%; margin-top: 15px;">Отмена</button>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active"><span>🏠</span><span>Главная</span></div>
    <div class="tab"><span>💎</span><span>Кэшбэк</span></div>
    <div class="tab"><span>💬</span><span>Чат</span></div>
    <div class="tab"><span>⚙️</span><span>Настройки</span></div>
</div>

<script>
    let balance = parseFloat(localStorage.getItem('ghetto_balance')) || 150000;
    let mode = '';

    function updateUI() {
        document.getElementById('display-balance').innerText = balance.toLocaleString('ru-RU') + ' ₽';
        localStorage.setItem('ghetto_balance', balance);
    }

    function openModal(type) {
        mode = type;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modal-title').innerText = type === 'add' ? 'Пополнение баланса' : 'Перевод средств';
        document.getElementById('amount-input').focus();
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('amount-input').value = '';
    }

    function processTransaction() {
        const val = parseFloat(document.getElementById('amount-input').value);
        if (isNaN(val) || val <= 0) return alert('Введи нормальную сумму!');

        if (mode === 'add') {
            balance += val;
            addHistory('Пополнение', val, true);
        } else {
            if (val > balance) return alert('Недостаточно средств на районе!');
            balance -= val;
            addHistory('Перевод', val, false);
        }

        updateUI();
        closeModal();
    }

    function addHistory(name, sum, isPlus) {
        const list = document.getElementById('history-list');
        const item = document.createElement('div');
        item.className = 'trans-item';
        item.innerHTML = `
            <div class="trans-icon">${isPlus ? '💰' : '💸'}</div>
            <div class="trans-details">
                <div class="trans-name">${name}</div>
                <div class="trans-cat">${new Date().toLocaleTimeString()}</div>
            </div>
            <div class="trans-sum" style="color: ${isPlus ? 'var(--success-green)' : 'white'}">
                ${isPlus ? '+' : '-'} ${sum.toLocaleString()} ₽
            </div>
        `;
        list.prepend(item);
    }

    // Старт
    updateUI();
</script>

</body>
</html>
