<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA — нейросеть</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --glow: 0 0 70px -20px rgb(234 179 8);
        }
        
        body {
            margin: 0;
            font-family: 'Inter', system_ui, sans-serif;
            background: #0b0b12;
            color: #f1f5f9;
            overflow: hidden;
        }
        
        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .blob {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(160px);
            opacity: 0.25;
            animation: float 30s infinite alternate ease-in-out;
        }
        
        .blob:nth-child(1) { background: #8a5cff; top: -250px; left: -250px; }
        .blob:nth-child(2) { background: #00ffd0; bottom: -300px; right: -250px; animation-delay: 10s; }
        
        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(80px, 120px); }
        }
        
        .header {
            padding: 20px 24px;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 3px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(40px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        
        .chat {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .message {
            padding: 16px 22px;
            border-radius: 24px;
            max-width: 88%;
            background: rgba(255,255,255,0.09);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(25px);
            animation: messageIn 0.45s ease forwards;
        }
        
        .user {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(138,92,255,0.4), rgba(0,255,208,0.25));
        }
        
        .ai { align-self: flex-start; }
        
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-area {
            padding: 18px 24px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        
        input {
            flex: 1;
            padding: 18px 24px;
            border: none;
            border-radius: 9999px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16.5px;
            outline: none;
        }
        
        button.send {
            padding: 18px 26px;
            border: none;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #8a5cff, #00ffd0);
            color: white;
            transition: all 0.25s ease;
        }
        
        button.send:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="bg">
    <div class="blob"></div>
    <div class="blob"></div>
</div>

<div class="container flex flex-col h-screen">
    <div class="header">AURA</div>
    
    <div class="chat flex-1" id="chat">
        <div class="message ai">
            Привет! Я <strong>AURA v2.3</strong> — теперь значительно умнее.<br>
            Я отлично понимаю естественные фразы, решаю примеры с процентами и могу просто поговорить.
        </div>
    </div>

    <div class="input-area">
        <div class="flex gap-3">
            <input type="text" id="input" placeholder="Например: сколько будет 100-5 или реши 75*9">
            <button class="send" onclick="sendMessage()">→</button>
        </div>
    </div>
</div>

<script>
// ==================== УЛУЧШЕННЫЙ МАТЕМАТИЧЕСКИЙ ДВИЖОК ====================
function calculateMath(text) {
    const lower = text.toLowerCase().trim();

    // Естественные фразы
    if (lower.includes("сколько будет") || lower.includes("реши сколько") || lower.includes("помоги решить")) {
        let expr = lower.replace(/сколько будет|реши сколько|помоги решить|сколько будет|реши/g, "").trim();
        
        // Простые выражения
        try {
            let clean = expr
                .replace(/÷/g, '/')
                .replace(/×/g, '*')
                .replace(/\^/g, '**')
                .replace(/π/gi, 'Math.PI');
            
            const result = Function('"use strict";return (' + clean + ')')();
            if (!isNaN(result)) return `**Ответ: ${result}**`;
        } catch(e) {}
    }

    // Проценты
    if (lower.includes('%')) {
        let m = lower.match(/(\d+(?:\.\d+)?)\s*%\s*от\s*(\d+(?:\.\d+)?)/);
        if (m) {
            const p = parseFloat(m[1]);
            const n = parseFloat(m[2]);
            const res = (p / 100) * n;
            return `**${p}% от ${n} = ${res}**\n\nШаги:\n1. ${p} ÷ 100 = ${p/100}\n2. ${p/100} × ${n} = ${res}`;
        }
    }

    // Квадратные уравнения
    if (lower.includes('x^2') || lower.includes('x²')) {
        // ... (можно добавить позже)
    }

    return null;
}

// ==================== РАЗГОВОРНЫЕ ОТВЕТЫ ====================
function getConversationResponse(text) {
    const lower = text.toLowerCase();
    
    if (lower.includes("привет") || lower.includes("здравствуй")) 
        return "Привет! Рад тебя видеть 👋 Чем могу помочь?";
    
    if (lower.includes("как дела") || lower.includes("как ты")) 
        return "У меня всё отлично! А у тебя как настроение?";
    
    if (lower.includes("кто ты") || lower.includes("представься")) 
        return "Я AURA v2.3 — умная нейросеть, которая хорошо считает и может просто поболтать.";
    
    if (lower.includes("спасибо")) return "Пожалуйста! Всегда рад помочь ❤️";
    
    return null;
}

// ==================== ОСНОВНАЯ ЛОГИКА ====================
function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    // Добавляем сообщение пользователя
    addMessage(text, "user");
    input.value = "";

    setTimeout(() => {
        // Сначала пытаемся решить математику
        const mathResult = calculateMath(text);
        if (mathResult) {
            addMessage(mathResult, "ai");
            return;
        }

        // Потом обычный разговор
        const conv = getConversationResponse(text);
        if (conv) {
            addMessage(conv, "ai");
            return;
        }

        // Если ничего не подошло
        addMessage("Я понял запрос. Напиши пример или задачу — я решу с объяснением.", "ai");
    }, 700);
}

function addMessage(text, type) {
    const chat = document.getElementById("chat");
    const msg = document.createElement("div");
    msg.className = `message ${type}`;
    msg.innerHTML = text.replace(/\n/g, '<br>');
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

// Enter
document.getElementById("input").addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
