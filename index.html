<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI — Next Gen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d11;
            --card-bg: #161a22;
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --text-color: #eef2f6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Шапка */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #2d333b;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        /* Зона чата */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--accent-gradient);
            color: #fff;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--card-bg);
            border: 1px solid #2d333b;
        }

        /* Поле ввода */
        .input-area {
            padding: 20px;
            background: #11141a;
            display: flex;
            gap: 10px;
            border-top: 1px solid #2d333b;
        }

        input {
            flex: 1;
            background: #1c2128;
            border: 1px solid #2d333b;
            border-radius: 10px;
            padding: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
        }

        button {
            background: var(--accent-gradient);
            border: none;
            border-radius: 10px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }

        /* Индикатор загрузки */
        .typing {
            font-style: italic;
            font-size: 12px;
            color: #8b949e;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <h1>AURA</h1>
</header>

<div id="chat-container">
    <div class="message ai-message">Привет! Я Aura. Твой личный ИИ с характером Grok и мощью Gemini. Чем займемся? ✨</div>
</div>

<div id="typing-indicator" class="typing" style="padding-left: 20px; margin-bottom: 5px;">Aura думает...</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Напиши что-нибудь..." autocomplete="off">
    <button onclick="sendMessage()">Отправить</button>
</div>

<script>
    const API_KEY = 'ВАШ_КЛЮЧ'; // AIzaSyDOqqL5RGsnseRbEnfn64YZdpZ7-2YIzOY
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const typingIndicator = document.getElementById('typing-indicator');

    // Промт для настройки личности
    const SYSTEM_PROMPT = "Ты — Aura, умная, стильная и современная нейросеть. Твой стиль: смесь Grok (остроумие), Алисы (полезность) и Gemini (интеллект). Отвечай четко, используй эмодзи и будь классным собеседником.";

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Добавляем сообщение пользователя на экран
        appendMessage(text, 'user-message');
        userInput.value = '';
        typingIndicator.style.display = 'block';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `${SYSTEM_PROMPT}\n\nПользователь: ${text}` }]
                    }]
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            appendMessage(aiText, 'ai-message');
        } catch (error) {
            appendMessage('Ошибка! Проверь API ключ в коде или интернет.', 'ai-message');
            console.error(error);
        } finally {
            typingIndicator.style.display = 'none';
        }
    }

    function appendMessage(text, className) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Отправка по Enter
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
