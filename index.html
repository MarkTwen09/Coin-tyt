<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLIXY MUSIC</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #ffcc00;
            --bg: #000000;
            --card: #121212;
            --gray: #282828;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Main Screen --- */
        .main-content {
            height: 100vh;
            overflow-y: auto;
            padding: 60px 20px 180px;
            background: linear-gradient(to bottom, #1a1a1a 0%, #000 30%);
        }

        .section-header { font-size: 24px; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.5px; }

        /* --- Track UI --- */
        .track-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            gap: 16px;
        }
        .track-item img { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; }
        .track-info { flex: 1; }
        .track-info h4 { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
        .track-info p { font-size: 13px; color: var(--text-dim); }

        /* --- Секция публикации --- */
        .upload-zone {
            background: var(--card);
            padding: 24px;
            border-radius: 28px;
            margin-bottom: 40px;
            border: 1px solid #222;
        }
        .u-input {
            width: 100%; background: #1f1f1f; border: none; padding: 16px;
            border-radius: 16px; color: white; margin-bottom: 12px; font-size: 16px;
        }
        .u-btn {
            width: 100%; background: var(--accent); color: #000; border: none;
            padding: 18px; border-radius: 18px; font-weight: 700; font-size: 16px;
        }

        /* --- FULL PLAYER --- */
        .player-overlay {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
            transition: transform 0.4s cubic-bezier(0.32, 1, 0.23, 1);
            display: flex; flex-direction: column;
            padding: 20px 28px 60px;
        }
        .player-overlay.active { transform: translateY(-100%); }

        .player-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0 40px; color: var(--text-dim);
        }

        .cover-art {
            width: 100%; aspect-ratio: 1; border-radius: 24px;
            object-fit: cover; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            margin-bottom: 40px;
        }

        /* --- Настоящий Слайдер --- */
        .seek-bar-container { width: 100%; margin-top: 30px; }
        .seek-bar {
            width: 100%; height: 6px; -webkit-appearance: none;
            background: #333; border-radius: 10px; outline: none;
        }
        .seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: #fff; border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .time-labels {
            display: flex; justify-content: space-between;
            font-size: 12px; color: var(--text-dim); margin-top: 12px;
        }

        /* --- Контролы --- */
        .controls-row {
            display: flex; justify-content: space-around; align-items: center;
            margin-top: 40px;
        }
        .main-play-btn {
            width: 76px; height: 76px; background: #fff; color: #000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }

        /* --- Mini Player --- */
        .mini-p {
            position: fixed; bottom: 84px; left: 10px; right: 10px;
            background: rgba(25, 25, 25, 0.95); backdrop-filter: blur(20px);
            height: 64px; border-radius: 16px; display: flex; align-items: center;
            padding: 0 12px; z-index: 1000; border: 1px solid #333;
        }
        .mini-p img { width: 44px; height: 44px; border-radius: 8px; margin-right: 12px; }

        /* --- Nav --- */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 74px;
            background: #000; display: flex; justify-content: space-around;
            padding-top: 12px; border-top: 1px solid #1a1a1a;
        }
        .tab-item { color: var(--text-dim); font-size: 10px; text-align: center; }
        .tab-item.active { color: #fff; }
        .tab-item i { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="main-content">
    <h1 class="section-header">FLIXY MUSIC</h1>

    <div class="upload-zone">
        <h3 style="margin-bottom: 16px;">Опубликовать</h3>
        <input type="text" id="name" class="u-input" placeholder="Название трека">
        <input type="text" id="artist" class="u-input" placeholder="Артист">
        <label style="display:block; margin-bottom:12px; color:#888; font-size:14px;">Обложка и Аудио:</label>
        <input type="file" id="img-f" accept="image/*" class="u-input" style="padding:10px;">
        <input type="file" id="snd-f" accept="audio/*" class="u-input" style="padding:10px;">
        <button class="u-btn" onclick="save()">Загрузить на устройство</button>
    </div>

    <h2 class="section-header">Моя медиатека</h2>
    <div id="lib"></div>
</div>

<div class="mini-p" id="mini" style="display: none;" onclick="openPlayer()">
    <img id="m-img" src="">
    <div class="track-info">
        <h4 id="m-title">Title</h4>
        <p id="m-artist">Artist</p>
    </div>
    <i class="fas fa-play" id="m-play" onclick="event.stopPropagation(); togglePlay();" style="font-size: 20px; margin: 0 15px;"></i>
</div>

<div class="player-overlay" id="full">
    <div class="player-header">
        <i class="fas fa-chevron-down" onclick="closePlayer()" style="font-size: 20px;"></i>
        <span style="font-weight: 600; font-size: 13px; letter-spacing: 1px;">СЕЙЧАС ИГРАЕТ</span>
        <i class="fas fa-ellipsis-h" style="font-size: 20px;"></i>
    </div>

    <img id="f-img" class="cover-art" src="">

    <div style="text-align: left; width: 100%;">
        <h1 id="f-title" style="font-size: 26px; margin-bottom: 4px;">Track Title</h1>
        <p id="f-artist" style="font-size: 18px; color: var(--text-dim);">Artist Name</p>
    </div>

    <div class="seek-bar-container">
        <input type="range" class="seek-bar" id="seek" value="0" step="0.1">
        <div class="time-labels">
            <span id="cur">0:00</span>
            <span id="dur">0:00</span>
        </div>
    </div>

    <div class="controls-row">
        <i class="fas fa-random" style="color: #444; font-size: 20px;"></i>
        <i class="fas fa-step-backward" style="font-size: 28px;"></i>
        <div class="main-play-btn" onclick="togglePlay()">
            <i class="fas fa-play" id="f-play"></i>
        </div>
        <i class="fas fa-step-forward" style="font-size: 28px;"></i>
        <i class="fas fa-redo" style="color: #444; font-size: 20px;"></i>
    </div>
</div>

<div class="tab-bar">
    <div class="tab-item active"><i class="fas fa-home"></i>Главная</div>
    <div class="tab-item"><i class="fas fa-compass"></i>Обзор</div>
    <div class="tab-item"><i class="fas fa-bookmark"></i>Коллекция</div>
</div>

<script>
    const audio = new Audio();
    let db;

    // База данных IndexedDB
    const req = indexedDB.open("FlixyDB", 1);
    req.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
    };
    req.onsuccess = e => { db = e.target.result; render(); };

    async function save() {
        const n = document.getElementById('name').value, a = document.getElementById('artist').value;
        const img = document.getElementById('img-f').files[0], snd = document.getElementById('snd-f').files[0];
        if(!n || !a || !img || !snd) return alert("Выбери все файлы!");

        const song = { name: n, artist: a, img: await toB64(img), snd: await toB64(snd) };
        const tx = db.transaction("songs", "readwrite");
        tx.objectStore("songs").add(song);
        tx.oncomplete = () => { render(); alert("Готово!"); };
    }

    const toB64 = f => new Promise(r => { const reader = new FileReader(); reader.onload = e => r(e.target.result); reader.readAsDataURL(f); });

    function render() {
        const list = document.getElementById('lib'); list.innerHTML = '';
        const tx = db.transaction("songs", "readonly");
        tx.objectStore("songs").openCursor().onsuccess = e => {
            const c = e.target.result;
            if(c) {
                const s = c.value;
                const div = document.createElement('div');
                div.className = 'track-item';
                div.onclick = () => play(s);
                div.innerHTML = `<img src="${s.img}"><div class="track-info"><h4>${s.name}</h4><p>${s.artist}</p></div>`;
                list.prepend(div);
                c.continue();
            }
        };
    }

    function play(s) {
        audio.src = s.snd; audio.play();
        document.getElementById('mini').style.display = 'flex';
        document.getElementById('m-title').innerText = s.name;
        document.getElementById('m-artist').innerText = s.artist;
        document.getElementById('m-img').src = s.img;
        document.getElementById('f-title').innerText = s.name;
        document.getElementById('f-artist').innerText = s.artist;
        document.getElementById('f-img').src = s.img;
        updateIcons(true);
    }

    function togglePlay() {
        if(audio.paused) { audio.play(); updateIcons(true); }
        else { audio.pause(); updateIcons(false); }
    }

    function updateIcons(s) {
        const i = s ? 'fa-pause' : 'fa-play';
        document.getElementById('m-play').className = 'fas ' + i;
        document.getElementById('f-play').className = 'fas ' + i;
    }

    function openPlayer() { document.getElementById('full').classList.add('active'); }
    function closePlayer() { document.getElementById('full').classList.remove('active'); }

    // Логика слайдера перемотки
    const slider = document.getElementById('seek');
    audio.ontimeupdate = () => {
        if(!audio.duration) return;
        const val = (audio.currentTime / audio.duration) * 100;
        slider.value = val;
        document.getElementById('cur').innerText = formatTime(audio.currentTime);
        document.getElementById('dur').innerText = formatTime(audio.duration);
    };

    slider.oninput = function() {
        const time = (this.value / 100) * audio.duration;
        audio.currentTime = time;
    };

    function formatTime(s) {
        let m = Math.floor(s / 60), sec = Math.floor(s % 60);
        return m + ":" + (sec < 10 ? '0' : '') + sec;
    }
</script>

</body>
</html>
