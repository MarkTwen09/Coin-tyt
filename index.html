<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLIXY MUSIC</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #2e67f8; /* Синий как ты просил */
            --bg: #000000;
            --surface: #121212;
            --text: #ffffff;
            --text-dim: #929292;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- ГЛАВНЫЙ ЭКРАН --- */
        .app-container { height: 100vh; overflow-y: auto; padding: 60px 16px 160px; scrollbar-width: none; }
        .app-container::-webkit-scrollbar { display: none; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: -1px; }

        h2 { font-size: 22px; font-weight: 700; margin: 20px 0; }

        /* --- ТРЕКИ --- */
        .track-list { display: flex; flex-direction: column; gap: 4px; }
        .track-item {
            display: flex; align-items: center; padding: 10px;
            background: rgba(255,255,255,0.03); border-radius: 12px; transition: 0.2s;
        }
        .track-item:active { background: rgba(255,255,255,0.1); }
        .track-item img { width: 48px; height: 48px; border-radius: 6px; margin-right: 14px; object-fit: cover; }
        .track-meta { flex: 1; }
        .track-meta h4 { font-size: 16px; font-weight: 500; }
        .track-meta p { font-size: 13px; color: var(--text-dim); }

        /* --- СИНЯЯ КНОПКА ЗАГРУЗКИ (Floating Action Button) --- */
        .fab {
            position: fixed; right: 20px; bottom: 160px;
            width: 56px; height: 56px; background: var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px rgba(46, 103, 248, 0.4); z-index: 1500;
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fab:active { transform: scale(0.9); }

        /* --- ОКНО ЗАГРУЗКИ (Modal) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); display: none; z-index: 3000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-card {
            background: #1c1c1e; width: 100%; max-width: 350px;
            padding: 24px; border-radius: 24px; border: 1px solid #333;
        }
        .modal-card input {
            width: 100%; background: #2c2c2e; border: none; padding: 14px;
            border-radius: 12px; color: #fff; margin-bottom: 12px; font-size: 15px;
        }
        .file-box {
            background: #2c2c2e; padding: 12px; border-radius: 12px;
            text-align: center; font-size: 13px; color: var(--text-dim); margin-bottom: 12px;
        }
        .btn-upload {
            width: 100%; background: var(--accent); color: #fff; border: none;
            padding: 15px; border-radius: 14px; font-weight: 700;
        }

        /* --- ПОЛНЫЙ ПЛЕЕР --- */
        .full-player {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2500; transition: transform 0.4s cubic-bezier(0.32, 1, 0.23, 1);
            padding: 30px 24px; display: flex; flex-direction: column;
        }
        .full-player.active { transform: translateY(-100%); }

        .p-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .big-cover { width: 100%; aspect-ratio: 1; border-radius: 20px; object-fit: cover; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin-bottom: 30px; }

        /* --- СЛАЙДЕР (Seek Bar) --- */
        .seek-container { margin: 30px 0 10px; }
        .seek-bar {
            width: 100%; height: 4px; -webkit-appearance: none;
            background: #333; border-radius: 2px; outline: none;
        }
        .seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            background: #fff; border-radius: 50%;
        }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .play-main { width: 72px; height: 72px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; }

        /* --- МИНИ-ПЛЕЕР --- */
        .mini-player {
            position: fixed; bottom: 85px; left: 10px; right: 10px;
            background: rgba(28,28,30,0.95); backdrop-filter: blur(20px);
            height: 60px; border-radius: 12px; display: flex; align-items: center;
            padding: 0 10px; z-index: 1000; border: 1px solid rgba(255,255,255,0.05);
        }
        .mini-player img { width: 42px; height: 42px; border-radius: 6px; margin-right: 12px; }

        .tabs {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: #000; display: flex; justify-content: space-around;
            padding-top: 10px; border-top: 1px solid #1a1a1a;
        }
        .tab-item { color: var(--text-dim); font-size: 10px; text-align: center; }
        .tab-item.active { color: #fff; }
        .tab-item i { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">FLIXY</div>
        <i class="fas fa-search" style="font-size: 20px;"></i>
    </div>
    
    <h2>Мои треки</h2>
    <div id="lib" class="track-list"></div>
</div>

<div class="fab" onclick="toggleModal(true)">
    <i class="fas fa-plus" style="color: white; font-size: 22px;"></i>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target == this) toggleModal(false)">
    <div class="modal-card">
        <h3 style="margin-bottom: 16px;">Новый трек</h3>
        <input type="text" id="n" placeholder="Название">
        <input type="text" id="a" placeholder="Исполнитель">
        <div class="file-box">Обложка: <input type="file" id="fi" accept="image/*"></div>
        <div class="file-box">Аудио (MP3): <input type="file" id="fa" accept="audio/*"></div>
        <button class="btn-upload" onclick="upload()">Добавить в библиотеку</button>
    </div>
</div>

<div class="mini-player" id="mini" style="display: none;" onclick="openP()">
    <img id="m-i" src="">
    <div class="track-meta">
        <h4 id="m-t">Title</h4>
        <p id="m-a">Artist</p>
    </div>
    <i class="fas fa-play" id="m-p" onclick="event.stopPropagation(); toggle();" style="font-size: 20px; margin: 0 10px;"></i>
</div>

<div class="full-player" id="full">
    <div class="p-header">
        <i class="fas fa-chevron-down" onclick="closeP()" style="font-size: 22px;"></i>
        <span style="font-weight: 600; font-size: 12px; color: #666;">FLIXY MUSIC</span>
        <i class="fas fa-ellipsis-h" style="font-size: 20px;"></i>
    </div>
    <img id="f-i" class="big-cover">
    <div style="width: 100%;">
        <h1 id="f-t" style="font-size: 24px; margin-bottom: 4px;">Title</h1>
        <p id="f-a" style="font-size: 16px; color: var(--text-dim);">Artist</p>
    </div>
    <div class="seek-container">
        <input type="range" class="seek-bar" id="seek" value="0" step="0.1">
        <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 11px; color: #555;">
            <span id="cur">0:00</span>
            <span id="dur">0:00</span>
        </div>
    </div>
    <div class="controls">
        <i class="fas fa-random" style="color: #333;"></i>
        <i class="fas fa-step-backward" style="font-size: 24px;"></i>
        <div class="play-main" onclick="toggle()"><i class="fas fa-play" id="f-p"></i></div>
        <i class="fas fa-step-forward" style="font-size: 24px;"></i>
        <i class="fas fa-redo" style="color: #333;"></i>
    </div>
</div>

<nav class="tabs">
    <div class="tab-item active"><i class="fas fa-home"></i>Главная</div>
    <div class="tab-item"><i class="fas fa-compass"></i>Обзор</div>
    <div class="tab-item"><i class="fas fa-heart"></i>Коллекция</div>
</nav>

<script>
    const audio = new Audio();
    let db;

    const req = indexedDB.open("FlixyDB", 1);
    req.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
    };
    req.onsuccess = e => { db = e.target.result; render(); };

    function toggleModal(s) { document.getElementById('modal').style.display = s ? 'flex' : 'none'; }

    async function upload() {
        const n = document.getElementById('n').value, a = document.getElementById('a').value;
        const fi = document.getElementById('fi').files[0], fa = document.getElementById('fa').files[0];
        if(!n || !a || !fi || !fa) return alert("Заполни всё!");

        const song = { name: n, artist: a, img: await toB64(fi), snd: await toB64(fa) };
        const tx = db.transaction("songs", "readwrite");
        tx.objectStore("songs").add(song);
        tx.oncomplete = () => { render(); toggleModal(false); };
    }

    const toB64 = f => new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); });

    function render() {
        const l = document.getElementById('lib'); l.innerHTML = '';
        const tx = db.transaction("songs", "readonly");
        tx.objectStore("songs").openCursor().onsuccess = e => {
            const c = e.target.result;
            if(c) {
                const s = c.value;
                const d = document.createElement('div');
                d.className = 'track-item'; d.onclick = () => play(s);
                d.innerHTML = `<img src="${s.img}"><div class="track-meta"><h4>${s.name}</h4><p>${s.artist}</p></div>`;
                l.prepend(d); c.continue();
            }
        };
    }

    function play(s) {
        audio.src = s.snd; audio.play();
        document.getElementById('mini').style.display = 'flex';
        ['m-t','f-t'].forEach(id => document.getElementById(id).innerText = s.name);
        ['m-a','f-a'].forEach(id => document.getElementById(id).innerText = s.artist);
        ['m-i','f-i'].forEach(id => document.getElementById(id).src = s.img);
        updateIcons(true);
    }

    function toggle() { audio.paused ? audio.play() : audio.pause(); updateIcons(!audio.paused); }
    function updateIcons(s) { 
        const i = s ? 'fa-pause' : 'fa-play';
        document.getElementById('m-p').className = 'fas ' + i;
        document.getElementById('f-p').className = 'fas ' + i;
    }

    function openP() { document.getElementById('full').classList.add('active'); }
    function closeP() { document.getElementById('full').classList.remove('active'); }

    const s = document.getElementById('seek');
    audio.ontimeupdate = () => {
        if(!audio.duration) return;
        s.value = (audio.currentTime / audio.duration) * 100;
        document.getElementById('cur').innerText = fmt(audio.currentTime);
        document.getElementById('dur').innerText = fmt(audio.duration);
    };
    s.oninput = function() { audio.currentTime = (this.value / 100) * audio.duration; };
    const fmt = t => { const m = Math.floor(t/60), s = Math.floor(t%60); return m + ":" + (s<10?'0':'')+s; };
</script>

</body>
</html>
