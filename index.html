<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Stars — Premium Digital Assets</title>
    <style>
        :root {
            --bg-dark: #0a0c10;
            --card-bg: rgba(20, 24, 33, 0.9);
            --accent-gold: #c5a059;
            --accent-blue: #0088cc;
            --accent-sber: #21a038;
            --accent-sale: #ff4757; /* Цвет для скидок */
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(197, 160, 89, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 100% 100%, rgba(0, 136, 204, 0.05) 0%, transparent 30%);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-main); padding: 20px 0; overflow-x: hidden;
        }

        .header-logo { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }
        .logo span { color: var(--accent-gold); }

        .slider-wrapper { width: 100%; overflow: hidden; margin-bottom: 25px; position: relative; }
        .services-slider { display: flex; gap: 15px; padding: 0 20px; scroll-behavior: smooth; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .services-slider::-webkit-scrollbar { display: none; }
        .service-card { min-width: 85%; height: 150px; border-radius: 28px; padding: 24px; position: relative; display: flex; flex-direction: column; justify-content: flex-end; text-decoration: none; color: white; flex-shrink: 0; }
        .vpn-card { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .shop-card { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .card-tag { position: absolute; top: 24px; left: 24px; font-size: 10px; font-weight: 800; text-transform: uppercase; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 10px; }
        .card-title { font-size: 20px; font-weight: 800; }
        .card-desc { font-size: 12px; opacity: 0.9; margin-top: 4px; }
        .card-arrow { position: absolute; top: 24px; right: 24px; font-size: 20px; opacity: 0.7; }

        .main-container { width: 90%; max-width: 380px; background: var(--card-bg); backdrop-filter: blur(25px); border-radius: 32px; padding: 28px; border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(0,0,0,0.8); text-align: center; margin-bottom: 24px; }
        .tabs-container { position: relative; display: flex; background: rgba(0, 0, 0, 0.4); padding: 4px; border-radius: 16px; margin-bottom: 28px; }
        .tab-slider { position: absolute; top: 4px; left: 4px; height: calc(100% - 8px); width: calc(50% - 4px); background: rgba(255, 255, 255, 0.05); border-radius: 12px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--text-dim); font-weight: 700; font-size: 11px; text-transform: uppercase; cursor: pointer; position: relative; z-index: 2; }
        .tab-btn.active { color: var(--text-main); }

        #profile-box { display: none; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); padding: 12px 16px; border-radius: 18px; margin-top: 10px; }
        .profile-avatar { width: 36px; height: 36px; background: var(--accent-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #000; }
        .tg-input { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 16px; padding: 16px 16px 16px 44px; color: white; outline: none; }
        .at-sign { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--accent-gold); }

        .price-display { padding: 24px; background: rgba(255,255,255,0.02); border-radius: 24px; border: 1px solid var(--border); margin: 24px 0; position: relative; overflow: hidden; }
        .sale-badge { position: absolute; top: 10px; right: -25px; background: var(--accent-sale); color: white; font-size: 9px; font-weight: 900; padding: 4px 30px; transform: rotate(45deg); text-transform: uppercase; }
        .val-main { font-size: 28px; font-weight: 800; }
        .val-sub { font-size: 16px; color: var(--accent-sale); font-weight: 800; text-shadow: 0 0 10px rgba(255, 71, 87, 0.3); }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 32px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #fff; border-radius: 50%; border: 5px solid var(--bg-dark); }

        .buy-btn { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 18px; font-size: 13px; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(20px); }
        .payment-card { width: 92%; max-width: 350px; background: #12141a; border-radius: 35px; padding: 30px 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .sber-btn { display: block; width: 100%; padding: 18px; background: #21a038; color: #fff; border: none; border-radius: 20px; font-size: 14px; font-weight: 800; text-decoration: none; text-transform: uppercase; margin-bottom: 10px; }
        .done-btn { width: 100%; padding: 18px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); border-radius: 20px; font-size: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-logo">
    <div class="logo">MOON<span>STARS</span></div>
</div>

<div class="slider-wrapper">
    <!-- Слайдер сервисов (без изменений) -->
    <div class="services-slider" id="serv-slider">
        <a href="https://t.me/Tgeshka_vpn" class="service-card vpn-card" target="_blank">
            <span class="card-arrow">↗</span>
            <div class="card-tag">Безопасность</div>
            <div>
                <div class="card-title">Tgeshka VPN</div>
                <div class="card-desc">Безлимитный доступ</div>
            </div>
        </a>
    </div>
</div>

<div class="main-container">
    <div class="tabs-container">
        <div class="tab-slider" id="slider-bg"></div>
        <button class="tab-btn active" onclick="setMode('stars', 0)">Stars</button>
        <button class="tab-btn" onclick="setMode('premium', 100)">Premium</button>
    </div>

    <div class="input-group" style="position: relative; text-align: left;">
        <label style="font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block;">Telegram Username</label>
        <div id="input-box" style="position: relative;">
            <span class="at-sign">@</span>
            <input type="text" id="username" class="tg-input" placeholder="Введите ник" oninput="handleInput(this)">
        </div>
        <div id="profile-box">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="profile-avatar" id="p-avatar">?</div>
                <div id="p-name" style="font-weight: 600;">Username</div>
            </div>
            <button onclick="resetUser()" style="background:none; border:none; color:var(--text-dim); font-size:20px;">×</button>
        </div>
    </div>

    <div class="price-display">
        <div class="sale-badge">SALE</div>
        <div class="val-main" id="display-val">100 STARS</div>
        <div class="val-sub" id="display-price">155 ₽</div>
    </div>

    <!-- Слайдер выбора (max изменен под 11 позиций звезд) -->
    <input type="range" id="slider" min="0" max="10" step="1" value="0" oninput="update()">
    <button class="buy-btn" onclick="checkout()">Оформить со скидкой</button>
</div>

<!-- Модалка (без изменений ссылок) -->
<div class="modal-overlay" id="modal">
    <div class="payment-card">
        <div class="pay-title">Оплата заказа</div>
        <a href="https://www.sberbank.com/sms/pbpn?requisiteNumber=79888486675" class="sber-btn">Оплатить в Сбере</a>
        <button class="done-btn" onclick="done()">Я оплатил</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="background:none; border:none; color:var(--text-dim); margin-top:20px; cursor:pointer;">Отмена</button>
    </div>
</div>

<script>
    let mode = 'stars';
    let confirmedUser = "";
    
    // ТВОИ НОВЫЕ ЦЕНЫ И ВАРИАНТЫ
    const data = {
        stars: [
            {t:"100 STARS", p:155}, 
            {t:"155 STARS", p:220}, 
            {t:"250 STARS", p:370}, 
            {t:"500 STARS", p:690}, 
            {t:"1000 STARS", p:1390}, 
            {t:"2500 STARS", p:3380},
            {t:"3000 STARS", p:4025},
            {t:"3500 STARS", p:4700},
            {t:"4000 STARS", p:5350},
            {t:"4500 STARS", p:6030},
            {t:"5000 STARS", p:6695}
        ],
        premium: [
            {t:"3 МЕСЯЦА", p:1200}, 
            {t:"6 МЕСЯЦЕВ", p:1550}, 
            {t:"12 МЕСЯЦЕВ", p:2750}
        ]
    };

    function handleInput(input) {
        let val = input.value.trim().replace('@', '');
        if (val.length > 3) {
            setTimeout(() => { if(input.value.length > 3) showProfile(val); }, 800);
        }
    }

    function showProfile(name) {
        confirmedUser = name;
        document.getElementById('input-box').style.display = 'none';
        document.getElementById('profile-box').style.display = 'flex';
        document.getElementById('p-name').innerText = name;
        document.getElementById('p-avatar').innerText = name.charAt(0).toUpperCase();
    }

    function resetUser() {
        confirmedUser = "";
        document.getElementById('username').value = "";
        document.getElementById('input-box').style.display = 'block';
        document.getElementById('profile-box').style.display = 'none';
    }

    function update() {
        const val = document.getElementById('slider').value;
        document.getElementById('display-val').innerText = data[mode][val].t;
        document.getElementById('display-price').innerText = data[mode][val].p + " ₽";
    }

    function setMode(m, pos) {
        mode = m;
        document.getElementById('slider-bg').style.transform = `translateX(${pos}%)`;
        // Устанавливаем макс. значение слайдера в зависимости от количества товаров
        document.getElementById('slider').max = data[mode].length - 1;
        document.getElementById('slider').value = 0;
        update();
    }

    function checkout() {
        if(!confirmedUser) return alert("Введите свой ник!");
        document.getElementById('modal').style.display = 'flex';
    }

    function done() {
        const item = data[mode][document.getElementById('slider').value];
        const text = `🚀 НОВЫЙ ЗАКАЗ (АКЦИЯ)\n\nТовар: ${item.t}\nСумма: ${item.p}₽\nКлиент: @${confirmedUser}`;
        window.location.href = `https://t.me/kaoface?text=${encodeURIComponent(text)}`;
    }
</script>

</body>
</html>
