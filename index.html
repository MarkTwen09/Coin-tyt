<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Elite Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar: #0a0a0a;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #efefef;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        /* Glassmorphism 2.0 - Тот самый стиль Gemini */
        .glass-premium {
            background: var(--card);
            backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid var(--border);
        }

        .chat-container::-webkit-scrollbar { width: 3px; }
        .chat-container::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        .input-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-box:focus-within {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .msg-enter {
            animation: cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s msgSlide forwards;
        }

        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sidebar-link {
            transition: all 0.2s ease;
            color: rgba(255,255,255,0.4);
        }

        .sidebar-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.03);
        }

        .math-block {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border-radius: 16px;
            padding: 20px;
            border-left: 1px solid rgba(255,255,255,0.1);
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-72 bg-[#080808] border-r border-white/5 flex flex-col hidden md:flex">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-6 h-6 bg-white rounded-sm"></div>
                <span class="text-sm font-semibold tracking-widest uppercase">Aura AI</span>
            </div>
            
            <button onclick="createNewChat()" class="w-full py-3 px-4 glass-premium rounded-xl text-xs font-medium hover:bg-white/5 transition mb-8">
                + Новая сессия
            </button>

            <nav id="chat-list" class="space-y-1">
                </nav>
        </div>

        <div class="mt-auto p-8 border-t border-white/5">
            <div class="flex items-center gap-3 opacity-40 hover:opacity-100 transition cursor-pointer">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-gray-600 to-gray-400"></div>
                <div class="text-[11px]">
                    <p class="font-medium text-white">Mark P.</p>
                    <p class="uppercase tracking-tighter">Premium Access</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-black">
        <header class="h-16 flex items-center justify-between px-10 border-b border-white/5">
            <div class="flex items-center gap-4">
                <span class="text-[10px] text-white/30 uppercase tracking-[0.2em]">Neural Engine v4.2</span>
                <div class="h-1 w-1 bg-white/20 rounded-full"></div>
                <span class="text-[10px] text-white/30 uppercase tracking-[0.2em]">Math-X Stable</span>
            </div>
            <div class="flex gap-6">
                <button class="text-[11px] text-white/40 hover:text-white transition uppercase tracking-widest">Settings</button>
                <button class="text-[11px] text-white/40 hover:text-white transition uppercase tracking-widest">Logs</button>
            </div>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto chat-container py-10">
            <div id="welcome" class="h-full flex flex-col items-center justify-center text-center opacity-20">
                <div class="w-16 h-16 border border-white/20 rounded-2xl mb-6 flex items-center justify-center text-3xl font-light">α</div>
                <h2 class="text-2xl font-light tracking-widest uppercase">Система готова</h2>
                <p class="text-sm mt-2">Введите параметры задачи или запроса</p>
            </div>
        </div>

        <div class="p-10">
            <div class="max-w-4xl mx-auto">
                <div class="input-box rounded-2xl p-2 flex flex-col gap-2 relative">
                    <textarea id="user-input" 
                              rows="1"
                              oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                              onkeydown="if(event.key === 'Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"
                              placeholder="Запросить расчет..."
                              class="bg-transparent outline-none resize-none w-full py-4 px-6 text-[15px] placeholder:text-white/20"></textarea>
                    
                    <div class="flex items-center justify-between px-4 pb-2">
                        <div class="flex gap-4">
                            <button class="text-white/20 hover:text-white transition">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                            </button>
                        </div>
                        <button onclick="sendMessage()" class="w-10 h-10 bg-white text-black rounded-xl flex items-center justify-center hover:bg-gray-200 transition">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let chats = JSON.parse(localStorage.getItem('aura_premium_v1')) || [];
        let currentChatId = null;

        const MathProcessor = {
            process(input) {
                try {
                    const cleanExpr = input.match(/[0-9.+\-*/^()|sqrt|sin|cos|tan|pi|e ]+/g);
                    if (!cleanExpr) return null;
                    
                    const expr = cleanExpr.join('').trim();
                    if (expr.length < 2) return null;

                    const safeEval = expr.toLowerCase()
                        .replace(/sqrt/g, 'Math.sqrt')
                        .replace(/sin/g, 'Math.sin')
                        .replace(/cos/g, 'Math.cos')
                        .replace(/pi/g, 'Math.PI')
                        .replace(/\^/g, '**');

                    const res = Function('"use strict"; return (' + safeEval + ')')();
                    return isNaN(res) ? null : { original: expr, result: res.toLocaleString('ru-RU') };
                } catch (e) { return null; }
            }
        };

        function sendMessage() {
            const el = document.getElementById('user-input');
            const val = el.value.trim();
            if(!val) return;

            if(!currentChatId) createNewChat();

            const chat = chats.find(c => c.id === currentChatId);
            if(chat.messages.length === 0) chat.name = val.substring(0, 30);

            addMessage('user', val);
            el.value = '';
            el.style.height = '';

            setTimeout(() => {
                const math = MathProcessor.process(val);
                const response = math 
                    ? `<div class="math-block"><p class="text-[10px] text-white/30 mb-2 uppercase tracking-widest">Analytical Result</p><p class="text-2xl font-light">Value: ${math.result}</p><p class="text-[10px] text-white/20 mt-4 italic">Expression: ${math.original}</p></div>`
                    : `Запрос обработан. Система классифицировала ввод как текстовую информацию. Требуется ли математический анализ данных?`;
                
                chat.messages.push({ role: 'user', content: val });
                chat.messages.push({ role: 'aura', content: response });
                addMessage('aura', response);
                save();
            }, 600);
        }

        function addMessage(role, content) {
            const box = document.getElementById('messages');
            const welcome = document.getElementById('welcome');
            if(welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = `px-10 py-8 msg-enter ${role === 'aura' ? 'bg-white/[0.02]' : ''}`;
            
            div.innerHTML = `
                <div class="max-w-4xl mx-auto flex gap-10">
                    <div class="w-5 h-5 mt-1 rounded-sm border ${role === 'user' ? 'border-white/20' : 'bg-white border-white'} flex-shrink-0"></div>
                    <div class="text-[15px] leading-[1.6] text-white/80 flex-1">
                        ${content}
                    </div>
                </div>
            `;
            box.appendChild(div);
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        function createNewChat() {
            const id = Date.now();
            chats.unshift({ id, name: 'New Session', messages: [] });
            currentChatId = id;
            document.getElementById('messages').innerHTML = '';
            save();
        }

        function save() {
            localStorage.setItem('aura_premium_v1', JSON.stringify(chats));
            renderList();
        }

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = chats.map(c => `
                <div onclick="switchChat(${c.id})" class="sidebar-link px-4 py-2.5 rounded-lg cursor-pointer text-[12px] flex justify-between items-center ${c.id === currentChatId ? 'bg-white/5 !text-white' : ''}">
                    <span class="truncate">${c.name}</span>
                </div>
            `).join('');
        }

        function switchChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            document.getElementById('messages').innerHTML = '';
            chat.messages.forEach(m => addMessage(m.role, m.content));
            renderList();
        }

        if(chats.length > 0) switchChat(chats[0].id);
    </script>
</body>
</html>
