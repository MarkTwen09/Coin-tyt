<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iron Order: Custom Engine</title>
    <style>
        :root {
            --bg-dark: #07090e;
            --panel-bg: rgba(13, 17, 23, 0.95);
            --border-blue: #1d3557;
            --gold: #ffb703;
            --red-enemy: #ff4d4d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: #cbd5e1;
        }

        /* Игровое поле с сеткой (как у тебя на скрине) */
        #game-field {
            width: 100%;
            height: 100%;
            position: absolute;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* ВЕРХНИЙ HUD (Точь-в-точь как на твоем скриншоте) */
        .top-hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            background: rgba(10, 25, 41, 0.85);
            border: 2px solid #00b4d8;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            box-shadow: 0 0 15px rgba(0, 180, 216, 0.3);
            backdrop-filter: blur(5px);
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .hud-icon { font-size: 20px; }
        .hud-val { font-size: 16px; font-weight: 700; }
        .hud-val.gold { color: var(--gold); }
        .hud-val.divs { color: #ff5252; }

        /* КОНТЕЙНЕР ДЛЯ ТВОИХ КАСТОМНЫХ ПРОВИНЦИЙ */
        .map-container {
            position: relative;
            width: 600px;
            height: 400px;
            transform: scale(0.9);
        }

        /* Твои нарисованные провинции в виде SVG */
        .region-path {
            cursor: pointer;
            stroke-width: 2;
            transition: filter 0.2s, stroke-width 0.2s;
        }

        .region-path:hover {
            filter: brightness(1.3);
        }

        /* Стили владельцев */
        .region-player {
            fill: #1e4636;
            stroke: #3b9c75;
        }
        .region-player.selected {
            stroke: #56ffb7;
            stroke-width: 4;
        }

        .region-blue {
            fill: #1c2d42;
            stroke: #3a5f85;
        }
        .region-blue.selected {
            stroke: #70a1ff;
            stroke-width: 4;
        }

        .region-purple {
            fill: #3b1c42;
            stroke: #783a85;
        }
        .region-purple.selected {
            stroke: #da70ff;
            stroke-width: 4;
        }

        /* ИКОНКИ И ВОЕННЫЕ ПРЯМО НА КАРТЕ */
        .map-badge {
            position: absolute;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid #fff;
            border-radius: 6px;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        .badge-player { border-color: #3b9c75; color: #56ffb7; }
        .badge-enemy { border-color: #ff4d4d; color: #ff7675; }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .bottom-panel {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: var(--panel-bg);
            border-top: 2px solid #21262d;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            padding: 16px;
            z-index: 100;
            display: none;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.6);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .panel-title { font-size: 18px; font-weight: 800; color: #fff; }
        .panel-info { font-size: 12px; color: #8b949e; text-transform: uppercase; }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-attack {
            grid-column: span 2;
            background: #852222;
            border-color: #b53333;
            color: #fff;
            font-size: 14px;
        }
        .btn-attack:disabled {
            background: #3a2222;
            border-color: #552222;
            color: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="top-hud">
        <div class="hud-item">
            <span class="hud-icon">💰</span>
            <span class="hud-val gold" id="global-cash">1305</span>
        </div>
        <div class="hud-item">
            <span class="hud-icon">📦</span>
            <span class="hud-val" id="global-supply">645</span>
        </div>
        <div class="hud-item">
            <span class="hud-icon">🎖️</span>
            <span class="hud-val divs" id="global-divs">15 ДИВ.</span>
        </div>
    </div>

    <div id="game-field">
        <div class="map-container">
            
            <svg viewBox="0 0 600 400" width="100%" height="100%">
                <path id="reg_blue_1" class="region-path region-blue" d="M 50,200 Q 80,150 120,160 Q 150,200 130,240 Q 80,260 50,200 Z" />
                <path id="reg_blue_2" class="region-path region-blue" d="M 120,160 Q 170,140 190,180 Q 160,220 130,240 Z" />
                <path id="reg_blue_3" class="region-path region-blue" d="M 130,240 Q 160,220 190,180 Q 210,230 170,260 Q 120,280 130,240 Z" />

                <path id="reg_player_1" class="region-path region-player" d="M 250,150 Q 290,140 310,180 Q 280,220 250,210 Q 220,180 250,150 Z" />
                <path id="reg_player_2" class="region-path region-player" d="M 250,210 Q 280,220 310,180 Q 330,220 300,260 Q 260,270 250,210 Z" />
                <path id="reg_player_3" class="region-path region-player" d="M 250,210 Q 260,270 300,260 Q 280,310 250,290 Q 220,260 250,210 Z" />

                <path id="reg_purple_1" class="region-path region-purple" d="M 370,180 Q 420,160 450,200 Q 420,250 370,230 Q 350,200 370,180 Z" />
                <path id="reg_purple_2" class="region-path region-purple" d="M 450,200 Q 520,180 550,220 Q 500,260 420,250 Z" />
            </svg>

            <div id="badges-layer"></div>

        </div>
    </div>

    <div class="bottom-panel" id="sector-panel">
        <div class="panel-header">
            <div class="panel-title" id="sector-title">Сектор Альфа</div>
            <div class="panel-info" id="sector-owner">Владелец</div>
        </div>
        <div class="action-grid">
            <button class="btn" id="btn-build-factory" onclick="buildFactory()">🏭 Построить завод</button>
            <button class="btn" id="btn-recruit" onclick="recruitDivision()">🎖️ Нанять дивизию</button>
            <button class="btn btn-attack" id="btn-attack-action" onclick="startBattle()">⚔️ ШТУРМОВАТЬ СЕКТОР</button>
        </div>
    </div>

    <script>
        // База данных секторов (Твоя карта)
        const sectors = {
            // Синяя фракция
            "reg_blue_1": { name: "Познань", owner: "blue", divs: 4, factory: false, cx: 90, cy: 200 },
            "reg_blue_2": { name: "Варшава", owner: "blue", divs: 3, factory: true, cx: 155, cy: 180 },
            "reg_blue_3": { name: "Краков", owner: "blue", divs: 5, factory: false, cx: 165, cy: 240 },
            // Твоя зеленая фракция
            "reg_player_1": { name: "Минск Центр", owner: "player", divs: 6, factory: true, cx: 270, cy: 175 },
            "reg_player_2": { name: "Полесье", owner: "player", divs: 4, factory: false, cx: 285, cy: 220 },
            "reg_player_3": { name: "Гомельский Рубеж", owner: "player", divs: 5, factory: false, cx: 265, cy: 270 },
            // Фиолетовая фракция
            "reg_purple_1": { name: "Смоленск", owner: "purple", divs: 4, factory: false, cx: 395, cy: 205 },
            "reg_purple_2": { name: "Москва Запад", owner: "purple", divs: 6, factory: true, cx: 480, cy: 225 }
        };

        // Игровой баланс кошелька
        let globalCash = 1305;
        let globalSupply = 645;
        let selectedSectorId = null;

        // Обновление цифр в HUD
        function updateHUD() {
            document.getElementById('global-cash').innerText = globalCash;
            document.getElementById('global-supply').innerText = globalSupply;
            
            // Считаем сумму всех твоих дивизий на карте
            let totalPlayerDivs = 0;
            for (let id in sectors) {
                if (sectors[id].owner === 'player') totalPlayerDivs += sectors[id].divs;
            }
            document.getElementById('global-divs').innerText = totalPlayerDivs + " ДИВ.";
        }

        // Рендеринг иконок заводов и дивизий прямо поверх твоих нарисованных стран
        function renderBadges() {
            const container = document.getElementById('badges-layer');
            container.innerHTML = "";

            for (let id in sectors) {
                const sec = sectors[id];
                const badge = document.createElement('div');
                badge.className = `map-badge ${sec.owner === 'player' ? 'badge-player' : 'badge-enemy'}`;
                badge.style.left = `${sec.cx}px`;
                badge.style.top = `${sec.cy}px`;

                let content = `🎖️ ${sec.divs}`;
                if (sec.factory) content += " | 🏭";
                badge.innerHTML = content;

                container.appendChild(badge);
            }
        }

        // Клик по сектору
        document.querySelectorAll('.region-path').forEach(path => {
            path.addEventListener('click', (e) => {
                // Снимаем выделение со всех
                document.querySelectorAll('.region-path').forEach(p => p.classList.remove('selected'));
                
                selectedSectorId = path.id;
                path.classList.add('selected');

                const sector = sectors[selectedSectorId];
                const panel = document.getElementById('sector-panel');
                
                panel.style.display = 'block';
                document.getElementById('sector-title').innerText = sector.name;

                const bFactory = document.getElementById('btn-build-factory');
                const bRecruit = document.getElementById('btn-recruit');
                const bAttack = document.getElementById('btn-attack-action');

                if (sector.owner === 'player') {
                    document.getElementById('sector-owner').innerText = "Ваша суверенная провинция";
                    document.getElementById('sector-owner').style.color = "#56ffb7";
                    
                    bFactory.style.display = "block";
                    bRecruit.style.display = "block";
                    bAttack.style.display = "none";

                    bFactory.innerText = sector.factory ? "🏭 Снести завод" : "🔨 Построить завод";
                } else {
                    document.getElementById('sector-owner').innerText = `Вражеская территория (${sector.owner === 'blue' ? 'Запад' : 'Восток'})`;
                    document.getElementById('sector-owner').style.color = "#ff4d4d";
                    
                    bFactory.style.display = "none";
                    bRecruit.style.display = "none";
                    bAttack.style.display = "block";
                    
                    // Проверяем, есть ли у игрока дивизии в соседних регионах для атаки
                    bAttack.removeAttribute('disabled');
                }
                e.stopPropagation();
            });
        });

        // Скрыть панель при клике по фону
        document.getElementById('game-field').addEventListener('click', () => {
            document.getElementById('sector-panel').style.display = 'none';
            document.querySelectorAll('.region-path').forEach(p => p.classList.remove('selected'));
        });

        // Механика: Построить / Убрать завод
        function buildFactory() {
            const sec = sectors[selectedSectorId];
            if (!sec.factory) {
                if (globalCash >= 300) {
                    globalCash -= 300;
                    sec.factory = true;
                } else { alert("Недостаточно денег для постройки завода (Нужно 300)!"); }
            } else {
                sec.factory = false;
                globalCash += 150; // Возврат половины стоимости
            }
            updateHUD();
            renderBadges();
            document.getElementById('btn-build-factory').innerText = sec.factory ? "🏭 Снести завод" : "🔨 Построить завод";
        }

        // Механика: Нанять дивизию в сектор
        function recruitDivision() {
            if (globalCash >= 150 && globalSupply >= 50) {
                globalCash -= 150;
                globalSupply -= 50;
                sectors[selectedSectorId].divs += 1;
                updateHUD();
                renderBadges();
            } else {
                alert("Недостаточно ресурсов для мобилизации дивизии (Нужно 150 💰 и 50 📦)!");
            }
        }

        // МЕХАНИКА ЧЕСТНОГО БОЯ И ДВИЖЕНИЯ ВОЙСК
        function startBattle() {
            const targetSec = sectors[selectedSectorId];
            
            // Ищем сильный атакующий сектор игрока (у которого больше 1 дивизии)
            let attackingSector = null;
            for (let id in sectors) {
                if (sectors[id].owner === 'player' && sectors[id].divs > 1) {
                    attackingSector = sectors[id];
                    break;
                }
            }

            if (!attackingSector) {
                alert("У вас нет свободных штурмовых дивизий в смежных секторах! Оставьте хотя бы 1 дивизию для охраны тыла.");
                return;
            }

            // Рассчитываем силу атаки (игрок отправляет все войска кроме одного)
            let playerAttackPower = attackingSector.divs - 1;
            alert(`[БОЙ]: Дивизии из сектора "${attackingSector.name}" пошли в наступление на "${targetSec.name}"!`);

            // Симуляция сражения кубиками (как в Iron Order)
            setTimeout(() => {
                let enemyDefensePower = targetSec.divs;

                while (playerAttackPower > 0 && enemyDefensePower > 0) {
                    if (Math.random() > 0.4) {
                        enemyDefensePower--; // Игрок нанес урон
                    } else {
                        playerAttackPower--; // ИИ отбил атаку
                    }
                }

                // Результаты сражения
                if (enemyDefensePower <= 0) {
                    // ИГРОК ПОБЕДИЛ И ЗАХВАТИЛ ЗЕМЛЮ!
                    alert(`[ПОБЕДА]: Вражеский гарнизон уничтожен! Сектор "${targetSec.name}" переходит под ваш контроль. Оставшиеся дивизии (${playerAttackPower}) закрепились на рубеже.`);
                    
                    targetSec.owner = 'player';
                    targetSec.divs = playerAttackPower;
                    attackingSector.divs = 1; // В тылу остался один гарнизон

                    // Перекрашиваем SVG-элемент на лету в зеленый цвет!
                    const element = document.getElementById(selectedSectorId);
                    element.className = "region-path region-player";
                } else {
                    // АТАКА ОТБИТА
                    alert(`[ПОРАЖЕНИЕ]: Наступление захлебнулось! Враг отстоял свои рубежи. У ИИ в секторе "${targetSec.name}" осталось ${enemyDefensePower} див.`);
                    targetSec.divs = enemyDefensePower;
                    attackingSector.divs = 1;
                }

                updateHUD();
                renderBadges();
                document.getElementById('sector-panel').style.display = 'none';
            }, 1000);
        }

        // Старт движка
        updateHUD();
        renderBadges();
    </script>
</body>
</html>
