<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines Game | Cyber Edition</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(31, 40, 51, 0.6);
            --cyan-neon: #66fcf1;
            --dark-cyan: #45a29e;
            --text-color: #c5a6ff;
            --mine-color: #ff4d4d;
            --gem-color: #00ffcc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at 50% 50%, #1f2833 0%, #0b0c10 80%);
            padding: 20px;
        }

        .game-container {
            display: flex;
            flex-direction: row;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 252, 241, 0.2);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7), 0 0 15px rgba(102, 252, 241, 0.1);
            max-width: 850px;
            width: 100%;
            gap: 24px;
        }

        /* Боковая панель управления */
        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 220px;
        }

        .brand-title {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--cyan-neon);
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #85929E;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .input-style {
            width: 100%;
            background: rgba(11, 12, 16, 0.8);
            border: 1px solid var(--dark-cyan);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-style:focus {
            border-color: var(--cyan-neon);
            box-shadow: 0 0 8px rgba(102, 252, 241, 0.4);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
        }

        .btn-primary {
            background: var(--cyan-neon);
            color: #0b0c10;
            box-shadow: 0 4px 15px rgba(102, 252, 241, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            background: #fff;
            box-shadow: 0 4px 20px rgba(102, 252, 241, 0.6);
            transform: translateY(-2px);
        }

        .btn-cashout {
            background: #ffb703;
            color: #0b0c10;
            box-shadow: 0 4px 15px rgba(255, 183, 3, 0.3);
            display: none;
        }

        .btn-cashout:hover:not(:disabled) {
            background: #ffdd67;
            box-shadow: 0 4px 20px rgba(255, 183, 3, 0.6);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .stats-box {
            background: rgba(11, 12, 16, 0.5);
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            border-left: 3px solid var(--cyan-neon);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-value {
            font-weight: bold;
            color: var(--cyan-neon);
        }

        /* Игровое поле */
        .grid-panel {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
            aspect-ratio: 1 / 1;
            max-width: 500px;
            width: 100%;
        }

        .cell {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            transition: all 0.2s ease;
            position: relative;
            user-select: none;
        }

        .cell:hover:not(.revealed):not(.disabled) {
            background: rgba(102, 252, 241, 0.1);
            border-color: var(--cyan-neon);
            transform: scale(1.03);
        }

        .cell.revealed {
            cursor: default;
            background: rgba(11, 12, 16, 0.9);
        }

        .cell.gem {
            color: var(--gem-color);
            border-color: var(--gem-color);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.6);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cell.mine {
            color: var(--mine-color);
            border-color: var(--mine-color);
            background: rgba(255, 77, 77, 0.15);
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.6);
            animation: shake 0.3s linear;
        }

        /* Анимации */
        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }

        /* Адаптив под мобилки */
        @mixin phone {
            @media (max-width: 680px) { @content; }
        }

        @media (max-width: 680px) {
            .game-container {
                flex-direction: column;
                padding: 16px;
            }
            .grid-panel {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="control-panel">
            <div>
                <div class="brand-title">MINES WEB3</div>
                
                <div class="input-group">
                    <label for="mines-count">Количество мин (1 - 24)</label>
                    <input type="number" id="mines-count" class="input-style" value="3" min="1" max="24">
                </div>

                <div class="stats-box">
                    <div class="stat-row">
                        <span>Множитель:</span>
                        <span id="multiplier-val" class="stat-value">x1.00</span>
                    </div>
                    <div class="stat-row">
                        <span>Алмазы:</span>
                        <span id="gems-found" class="stat-value">0 / 0</span>
                    </div>
                </div>
            </div>

            <div>
                <button id="start-btn" class="btn btn-primary">Начать игру</button>
                <button id="cashout-btn" class="btn btn-cashout">Забрать куш</button>
            </div>
        </div>

        <div class="grid-panel" id="grid"></div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const startBtn = document.getElementById('start-btn');
        const cashoutBtn = document.getElementById('cashout-btn');
        const minesInput = document.getElementById('mines-count');
        const multiplierVal = document.getElementById('multiplier-val');
        const gemsFoundTxt = document.getElementById('gems-found');

        const GRID_SIZE = 25;
        let board = []; 
        let isGameActive = false;
        let minesCount = 3;
        let revealedGems = 0;
        let totalGems = 22;

        // Генерация сетки при запуске страницы
        function createVisualGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell', 'disabled');
                cell.dataset.index = i;
                grid.appendChild(cell);
            }
        }

        // Формула расчета множителя (как в реальных играх)
        function getMultiplier(mines, gems) {
            if (gems === 0) return 1.00;
            let p = 1;
            for (let i = 0; i < gems; i++) {
                p *= (GRID_SIZE - mines - i) / (GRID_SIZE - i);
            }
            return (0.95 / p).toFixed(2); // 0.95 — это RTP (возврат игроку 95%)
        }

        function startGame() {
            minesCount = parseInt(minesInput.value);
            if (isNaN(minesCount) || minesCount < 1 || minesCount > 24) {
                alert('Введите корректное число мин от 1 до 24!');
                return;
            }

            // Настройки состояния
            isGameActive = true;
            revealedGems = 0;
            totalGems = GRID_SIZE - minesCount;
            
            // Интерфейс
            startBtn.style.display = 'none';
            cashoutBtn.style.display = 'block';
            cashoutBtn.disabled = true;
            minesInput.disabled = true;
            updateStats();

            // Генерация мин на поле
            board = Array(GRID_SIZE).fill('gem');
            let placedMines = 0;
            while (placedMines < minesCount) {
                let randIndex = Math.floor(Math.random() * GRID_SIZE);
                if (board[randIndex] !== 'mine') {
                    board[randIndex] = 'mine';
                    placedMines++;
                }
            }

            // Активация ячеек для клика
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.className = 'cell'; 
                cell.innerHTML = '';
                cell.addEventListener('click', handleCellClick);
            });
        }

        function handleCellClick(e) {
            if (!isGameActive) return;
            const cell = e.currentTarget;
            const idx = parseInt(cell.dataset.index);

            if (cell.classList.contains('revealed')) return;

            if (board[idx] === 'mine') {
                // Взрыв!
                cell.classList.add('revealed', 'mine');
                cell.innerHTML = '💣';
                gameOver(false);
            } else {
                // Алмаз
                cell.classList.add('revealed', 'gem');
                cell.innerHTML = '💎';
                revealedGems++;
                cashoutBtn.disabled = false;
                updateStats();

                if (revealedGems === totalGems) {
                    gameOver(true); // Забрали все гемы
                }
            }
        }

        function updateStats() {
            const currentMult = getMultiplier(minesCount, revealedGems);
            multiplierVal.innerText = `x${currentMult}`;
            gemsFoundTxt.innerText = `${revealedGems} / ${totalGems}`;
        }

        function gameOver(isWin) {
            isGameActive = false;
            startBtn.style.display = 'block';
            cashoutBtn.style.display = 'none';
            minesInput.disabled = false;

            // Показываем где что было
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, idx) => {
                cell.removeEventListener('click', handleCellClick);
                if (!cell.classList.contains('revealed')) {
                    cell.classList.add('revealed');
                    if (board[idx] === 'mine') {
                        cell.innerHTML = '💣';
                        cell.style.opacity = '0.5';
                    } else {
                        cell.innerHTML = '💎';
                        cell.style.opacity = '0.3';
                    }
                }
            });

            setTimeout(() => {
                if (isWin) {
                    alert(`Отлично! Вы забрали куш с множителем ${getMultiplier(minesCount, revealedGems)}x!`);
                } else {
                    alert('Бум! Вы подорвались на мине. Попробуйте еще раз!');
                }
            }, 200);
        }

        // Кнопка забрать деньги
        cashoutBtn.addEventListener('click', () => {
            if (revealedGems > 0 && isGameActive) {
                gameOver(true);
            }
        });

        startBtn.addEventListener('click', startGame);

        // Первая инициализация пустого поля
        createVisualGrid();
    </script>
</body>
</html>
