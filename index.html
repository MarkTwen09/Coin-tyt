<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europe Tactical Map</title>
    
    <!-- Подключаем Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1b1e; font-family: sans-serif; user-select: none; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }

        /* Матовый военный фильтр для карты */
        .leaflet-tile-container {
            filter: sepia(20%) hue-rotate(-10deg) saturate(70%) contrast(102%) brightness(95%);
        }

        /* Стартовый экран выбора фракции */
        #start-screen {
            position: fixed; inset: 0; background: rgba(15, 17, 20, 0.95); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff;
        }
        .start-box { background: #22252a; border: 1px solid #2b66d2; padding: 25px; border-radius: 8px; text-align: center; width: 85%; max-width: 350px; }
        .start-box h2 { color: #00ffaa; margin-top: 0; text-transform: uppercase; font-size: 18px; }
        .faction-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .f-btn { background: #2d3139; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .f-btn:hover { border-color: #00ffaa; background: #343942; }

        /* Минималистичная инфо-панель сверху */
        .info-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(25, 27, 31, 0.9); border: 1px solid #3e4149;
            padding: 8px 16px; border-radius: 20px; color: #fff; font-size: 13px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; pointer-events: none;
        }
        .info-bar span { color: #00ffaa; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Выбор фракции -->
    <div id="start-screen">
        <div class="start-box">
            <h2>ВЫБЕРИТЕ СВОЮ ФРАКЦИЮ</h2>
            <div class="faction-list">
                <button class="f-btn" onclick="startConquest('Империя (Вы)', '#8c4343')">Красный Альянс</button>
                <button class="f-btn" onclick="startConquest('Империя (Вы)', '#3366cc')">Синий Союз</button>
                <button class="f-btn" onclick="startConquest('Империя (Вы)', '#5c6f52')">Зеленый Блок</button>
            </div>
        </div>
    </div>

    <!-- Инфо-панель -->
    <div class="info-bar">
        Ваша фракция: <span id="faction-name">—</span> | Тапни по региону для захвата
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Центрируем карту строго на Европе
        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false 
        }).setView([52.0, 20.0], 4);

        // Ставим качественную топографическую подложку рельефа земли
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', { 
            maxZoom: 7,
            minZoom: 3
        }).addTo(map);

        let playerFaction = "";
        let playerColor = "";
        let regionsData = {}; 

        // Дефолтный стиль для карты Европы (нейтральные регионы)
        const neutralStyle = {
            color: "#2b261f", // Темные тонкие границы провинций
            weight: 1.2,
            fillColor: "#6b7280", // Базовый матовый цвет
            fillOpacity: 0.2
        };

        function startConquest(name, color) {
            playerFaction = name;
            playerColor = color;
            document.getElementById('faction-name').innerText = "АКТИВНА";
            document.getElementById('faction-name').style.color = color;
            document.getElementById('start-screen').style.display = 'none';
            
            loadEuropeanProvinces();
        }

        function loadEuropeanProvinces() {
            // Подгружаем карту с детальным разделением регионов Европы
            fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
                .then(res => res.json())
                .then(geoData => {
                    // Фильтруем координаты, оставляя в основном европейский регион для легкости работы
                    L.geoJSON(geoData, {
                        style: neutralStyle,
                        onEachFeature: function (feature, layer) {
                            let rName = feature.properties.ADMIN;
                            
                            // Сохраняем базовые данные региона
                            regionsData[rName] = {
                                owner: "Нейтралы",
                                color: "#6b7280"
                            };

                            // Главная механика: Тап — и регион физически переходит под твой контроль
                            layer.on('click', function (e) {
                                // Меняем данные региона на данные игрока
                                regionsData[rName].owner = playerFaction;
                                regionsData[rName].color = playerColor;

                                // Мгновенно перекрашиваем границы и внутреннюю часть региона в цвет игрока
                                layer.setStyle({
                                    fillColor: playerColor,
                                    fillOpacity: 0.4,
                                    color: "#111", // Граница становится контрастной военной линией
                                    weight: 1.5
                                });
                            });
                        }
                    }).addTo(map);
                });
        }
    </script>
</body>
</html>
