<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack Daniel's: Глобальная Экспансия</title>
    <style>
        :root {
            --bg-color: #080808;
            --panel-color: #121212;
            --accent-gold: #ffb300;
            --accent-gold-glow: rgba(255, 179, 0, 0.3);
            --accent-green: #4caf50;
            --accent-red: #f44336;
            --accent-blue: #2196f3;
            --text-color: #e0e0e0;
            --border-color: #222;
        }

        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            width: 100%;
            max-width: 700px;
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-gold-glow);
        }

        .sub-header {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: var(--accent-gold);
            text-transform: uppercase;
        }

        .container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .panel {
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            position: relative;
        }

        .panel-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        /* --- Дашборд ресурсов --- */
        .resources-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .res-box {
            background: #181818;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            border-left: 3px solid var(--accent-gold);
        }

        .res-box.money { border-left-color: var(--accent-green); }

        .res-label {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
        }

        .res-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
            margin-top: 2px;
        }

        /* --- Склад Бочек (Визуальный Цех) --- */
        .warehouse-floor {
            background: radial-gradient(circle, #1c1c1c 0%, #0c0c0c 100%);
            height: 140px;
            border: 2px inset #1f1f1f;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            flex-wrap: wrap-reverse;
            gap: 6px;
            padding: 10px;
        }

        .warehouse-floor::before {
            content: "ЦЕХ ВЫДЕРЖКИ БОЧЕК";
            position: absolute;
            top: 5px;
            left: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: #444;
        }

        /* 3D Стилизованная бочка через CSS */
        .barrel {
            width: 24px;
            height: 34px;
            background: #795548;
            border-radius: 5px / 9px;
            border: 2px solid #3e2723;
            position: relative;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.6), 0 4px 6px rgba(0,0,0,0.5);
            animation: dropIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .barrel::before, .barrel::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 3px;
            background: #333;
            left: 0;
        }
        .barrel::before { top: 6px; }
        .barrel::after { bottom: 6px; }

        @keyframes dropIn {
            0% { transform: translateY(-80px) scale(0.5); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* --- Кнопки управления --- */
        .btn {
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            padding: 12px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-gold {
            background: linear-gradient(180deg, #ffca28 0%, #ffb300 100%);
            color: #000;
        }
        .btn-gold:hover:not(:disabled) {
            box-shadow: 0 0 15px var(--accent-gold);
            transform: translateY(-1px);
        }
        .btn-gold:active:not(:disabled) { transform: translateY(1px); }

        .btn:disabled {
            background: #2a2a2a !important;
            color: #555 !important;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Прогресс бар */
        .progress-box {
            width: 100%;
            background: #000;
            height: 8px;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
            border: 1px solid #222;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold), #fff);
        }

        /* --- Сетка стран / Заводов --- */
        .countries-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .country-card {
            background: #161616;
            border: 1px solid #252525;
            border-radius: 6px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .country-info {
            flex: 1;
        }

        .country-name {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .country-meta {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: #888;
            margin-top: 3px;
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-open { background: rgba(76,175,80,0.2); color: var(--accent-green); }
        .badge-boom { background: rgba(33,150,243,0.2); color: var(--accent-blue); animation: pulse 1s infinite alternate; }
        .badge-sanctions { background: rgba(244,67,54,0.2); color: var(--accent-red); }

        .btn-sm {
            width: auto;
            padding: 8px 14px;
            font-size: 0.85rem;
        }

        /* --- Лента Новостей --- */
        .news-box {
            background: #000;
            height: 60px;
            overflow-y: auto;
            border-radius: 4px;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            border: 1px solid #1f1f1f;
        }
        .news-line {
            border-left: 2px solid var(--accent-blue);
            padding-left: 6px;
            margin-bottom: 4px;
        }

        /* --- Анимация Всплывающего Дохода --- */
        .floating-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-green);
            text-shadow: 0 0 8px rgba(0,0,0,1);
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0px) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.2); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; } 100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>JACK DANIEL'S</h1>
        <div class="sub-header">GLOBAL EXPANSION SIMULATOR</div>
    </header>

    <div class="container" id="game-container">
        
        <!-- РЕСУРСЫ -->
        <div class="panel resources-bar">
            <div class="res-box money">
                <div class="res-label">Капитал</div>
                <div class="res-value" id="lbl-money">$500</div>
            </div>
            <div class="res-box">
                <div class="res-label">Общий Склад</div>
                <div class="res-value" id="lbl-barrels">0 б.</div>
            </div>
        </div>

        <!--ПРОИЗВОДСТВО И ВИЗУАЛ БОЧЕК -->
        <div class="panel">
            <div class="panel-title">🏭 Главная Винокурня (Теннесси)</div>
            <div class="warehouse-floor" id="warehouse">
                <!-- Сюда динамически валятся бочки -->
            </div>
            <div style="margin-top: 12px;">
                <button class="btn btn-gold" id="btn-craft">Запустить варку партии (+5 бочек)</button>
                <div class="progress-box"><div class="progress-fill" id="craft-progress"></div></div>
            </div>
        </div>

        <!-- ГЛОБАЛЬНЫЕ РЫНКИ И СТРОИТЕЛЬСТВО ЗАВОДОВ -->
        <div class="panel">
            <div class="panel-title">🌐 Международная Сеть Дистрибуции</div>
            <div class="countries-grid" id="countries-list">
                <!-- Генерируется из JS -->
            </div>
        </div>

        <!-- ЛЕНТА НОВОСТЕЙ -->
        <div class="panel">
            <div class="panel-title">📰 Геополитические Сводки</div>
            <div class="news-box" id="news-container">
                <div class="news-line" style="border-color: var(--accent-gold)">Совет директоров одобрил план глобального доминирования бренда. Начните развитие.</div>
            </div>
        </div>

    </div>

    <script>
        // Игровой движок
        let game = {
            money: 500,
            barrels: 0,
            craftCost: 100,
            craftDuration: 3000, // 3 сек
            isCrafting: false,

            // Базы по странам
            countries: {
                usa: { name: "США", built: true, cost: 0, basePrice: 25, status: "OPEN", mod: 1, autoBps: 0 },
                europe: { name: "Евросоюз", built: false, cost: 400, basePrice: 45, status: "OPEN", mod: 1, autoBps: 0.3 },
                asia: { name: "Азия", built: false, cost: 1000, basePrice: 65, status: "OPEN", mod: 1, autoBps: 1.0 },
                latam: { name: "Латинская Америка", built: false, cost: 2500, basePrice: 35, status: "OPEN", mod: 1, autoBps: 2.5 }
            }
        };

        const evPool = [
            { text: "⚡ В Азии бум американской культуры! Спрос взлетел х2!", target: "asia", status: "BOOM", mod: 2.0 },
            { text: "⚠️ Евросоюз вводит жесткие пошлины и эко-санкции на алкоголь из США!", target: "europe", status: "SANCTIONS", mod: 0.4 },
            { text: "📈 Рынок Латинской Америки стабилизировался, пошлины отменены.", target: "latam", status: "OPEN", mod: 1.0 },
            { text: "✅ Новый президент США снизил налоги на экспорт крепкого алкоголя!", target: "usa", status: "BOOM", mod: 1.4 },
            { text: "🔄 Ситуация в Европе нормализовалась, заводы работают в штатном режиме.", target: "europe", status: "OPEN", mod: 1.0 }
        ];

        // Кэш элементов
        const elMoney = document.getElementById('lbl-money');
        const elBarrels = document.getElementById('lbl-barrels');
        const elWarehouse = document.getElementById('warehouse');
        const elBtnCraft = document.getElementById('btn-craft');
        const elProgress = document.getElementById('craft-progress');
        const elCountries = document.getElementById('countries-list');
        const elNews = document.getElementById('news-container');
        const elContainer = document.getElementById('game-container');

        function updateUI() {
            elMoney.innerText = `$${Math.floor(game.money)}`;
            elBarrels.innerText = `${Math.floor(game.barrels)} шт`;
            elBtnCraft.disabled = game.money < game.craftCost || game.isCrafting;

            // Рендер стран
            elCountries.innerHTML = '';
            for (let id in game.countries) {
                let c = game.countries[id];
                let card = document.createElement('div');
                card.className = 'country-card';

                let price = Math.floor(c.basePrice * c.mod);
                
                if (c.built) {
                    // Если завод построен — показываем кнопку продажи виски
                    let badgeClass = c.status === 'OPEN' ? 'badge-open' : (c.status === 'BOOM' ? 'badge-boom' : 'badge-sanctions');
                    let statusText = c.status === 'OPEN' ? 'Стабилен' : (c.status === 'BOOM' ? 'БУМ!' : 'САНКЦИИ');

                    card.innerHTML = `
                        <div class="country-info">
                            <div class="country-name">🇺🇸 ${c.name} <span class="badge ${badgeClass}">${statusText}</span></div>
                            <div class="country-meta">Цена продажи: <b style="color:#fff">$${price}</b>/б | Авто: +${c.autoBps} б/с</div>
                        </div>
                        <button class="btn btn-gold btn-sm" onclick="sellTo('${id}', event)" ${game.barrels < 1 ? 'disabled' : ''}>Экспорт 1б.</button>
                    `;
                } else {
                    // Если не построен — кнопка постройки завода
                    card.innerHTML = `
                        <div class="country-info">
                            <div class="country-name" style="color: #666;">🏢 Завод в ${c.name}</div>
                            <div class="country-meta">Откроет рынок и автоматическое производство виски.</div>
                        </div>
                        <button class="btn btn-sm" style="background:#333; color:#ffb300;" onclick="buildFactory('${id}')" ${game.money < c.cost ? 'disabled' : ''}>Строить ($${c.cost})</button>
                    `;
                }
                elCountries.appendChild(card);
            }
            syncVisualBarrels();
        }

        // Логика ручной варки (анимация бара)
        elBtnCraft.addEventListener('click', () => {
            if (game.isCrafting || game.money < game.craftCost) return;
            game.isCrafting = true;
            game.money -= game.craftCost;
            updateUI();

            let start = Date.now();
            let timer = setInterval(() => {
                let diff = Date.now() - start;
                let pct = (diff / game.craftDuration) * 100;
                
                if (pct >= 100) {
                    clearInterval(timer);
                    elProgress.style.width = '0%';
                    game.barrels += 5;
                    game.isCrafting = false;
                    updateUI();
                } else {
                    elProgress.style.width = `${pct}%`;
                }
            }, 40);
        });

        // Синхронизация визуальных бочек
        let renderedCount = 0;
        function syncVisualBarrels() {
            let floorCount = Math.floor(game.barrels);
            let displayMax = 35; // защита от лагов
            let targetCount = Math.min(floorCount, displayMax);

            if (targetCount > renderedCount) {
                for (let i = renderedCount; i < targetCount; i++) {
                    let b = document.createElement('div');
                    b.className = 'barrel';
                    b.style.transform = `rotate(${(Math.random() - 0.5) * 15}deg)`;
                    elWarehouse.appendChild(b);
                }
            } else if (targetCount < renderedCount) {
                elWarehouse.innerHTML = '';
                renderedCount = 0;
                for (let i = 0; i < targetCount; i++) {
                    let b = document.createElement('div');
                    b.className = 'barrel';
                    b.style.transform = `rotate(${(Math.random() - 0.5) * 15}deg)`;
                    elWarehouse.appendChild(b);
                }
            }
            renderedCount = targetCount;
        }

        // Продажа в страну с эффектом вылетающих цифр денег
        window.sellTo = function(id, event) {
            if (game.barrels < 1) return;
            let c = game.countries[id];
            let profit = Math.floor(c.basePrice * c.mod);

            game.barrels--;
            game.money += profit;

            // Эффект вылетающих цифр денег
            createFloatingText(`+$${profit}`, event.clientX, event.clientY);
            updateUI();
        };

        function createFloatingText(text, x, y) {
            let ft = document.createElement('div');
            ft.className = 'floating-text';
            ft.innerText = text;
            ft.style.left = `${x || 150}px`;
            ft.style.top = `${y || 200}px`;
            document.body.appendChild(ft);
            setTimeout(() => ft.remove(), 800);
        }

        // Постройка завода в новой стране
        window.buildFactory = function(id) {
            let c = game.countries[id];
            if (game.money >= c.cost && !c.built) {
                game.money -= c.cost;
                c.built = true;
                logNews(`🚀 Построен новый перегонный завод в регионе: ${c.name}! Запущено автопроизводство.`, 'var(--accent-green)');
                updateUI();
            }
        };

        function logNews(text, color = 'var(--accent-blue)') {
            let entry = document.createElement('div');
            entry.className = 'news-line';
            entry.style.borderColor = color;
            entry.innerText = `[${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}] ${text}`;
            elNews.insertBefore(entry, elNews.firstChild);
        }

        // Случайные мировые ивенты (каждые 15 сек)
        setInterval(() => {
            let ev = evPool[Math.floor(Math.random() * evPool.length)];
            let c = game.countries[ev.target];
            
            c.status = ev.status;
            c.mod = ev.mod;

            let col = ev.status === 'BOOM' ? 'var(--accent-blue)' : (ev.status === 'SANCTIONS' ? 'var(--accent-red)' : '#888');
            logNews(ev.text, col);
            updateUI();
        }, 15000);

        // Автогенерация бочек построенными заводами (раз в секунду)
        setInterval(() => {
            let passiveInflow = 0;
            for (let id in game.countries) {
                let c = game.countries[id];
                if (c.built) passiveInflow += c.autoBps;
            }
            if (passiveInflow > 0) {
                game.barrels += passiveInflow;
                elBarrels.innerText = `${Math.floor(game.barrels)} шт`;
                syncVisualBarrels();
            }
        }, 1000);

        updateUI();
    </script>
</body>
</html>
