<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLIXY PREMUM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #ffcc00;
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --text-dim: #8e8e93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Контентная часть --- */
        .scroll-area {
            height: 100vh;
            overflow-y: auto;
            padding: 60px 16px 180px;
            scroll-behavior: smooth;
        }

        .header-top {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 15px 16px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: -1px; }

        h2 { font-size: 22px; font-weight: 700; margin: 25px 0 15px; }

        /* --- Секция Загрузки --- */
        .upload-section {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .form-input {
            width: 100%;
            background: #2c2c2e;
            border: none;
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .file-btn {
            display: block;
            background: #3a3a3c;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            color: var(--text-dim);
        }

        .btn-main {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
        }

        /* --- Список треков (как на видео) --- */
        .track-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid #2c2c2e;
        }

        .track-row img {
            width: 48px; height: 48px;
            border-radius: 8px;
            margin-right: 15px;
            object-fit: cover;
        }

        .track-meta { flex: 1; min-width: 0; }
        .track-meta h4 { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-meta p { font-size: 13px; color: var(--text-dim); }

        /* --- Мини плеер --- */
        .mini-player {
            position: fixed;
            bottom: 85px;
            left: 8px;
            right: 8px;
            height: 64px;
            background: #2c2c2e;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            z-index: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .mini-player img { width: 44px; height: 44px; border-radius: 8px; margin-right: 12px; }

        /* --- Full Screen Player --- */
        .full-screen-player {
            position: fixed;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.17, 0.67, 0.12, 1);
            padding: 60px 30px;
            display: flex;
            flex-direction: column;
        }

        .full-screen-player.active { transform: translateY(-100%); }

        .player-header { display: flex; justify-content: space-between; font-size: 24px; margin-bottom: 40px; }

        .player-cover {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 24px;
            object-fit: cover;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            margin-bottom: 40px;
        }

        .progress-area { margin: 40px 0 20px; }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }
        .progress-fill { height: 100%; background: #fff; width: 0%; border-radius: 2px; }

        .player-controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 20px;
        }
        .play-trigger {
            width: 80px; height: 80px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        /* --- Таб бар --- */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            border-top: 0.5px solid #2c2c2e;
            z-index: 600;
        }
        .nav-item { color: var(--text-dim); text-align: center; font-size: 10px; }
        .nav-item.active { color: #fff; }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="header-top">
    <div class="logo">FLIXY</div>
    <i class="fas fa-search"></i>
</div>

<div class="scroll-area">
    <h2>Для тебя</h2>
    <div style="display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px;">
        <div style="min-width: 140px;"><img src="https://picsum.photos/200?1" style="width:140px; border-radius:20px;"></div>
        <div style="min-width: 140px;"><img src="https://picsum.photos/200?2" style="width:140px; border-radius:20px;"></div>
        <div style="min-width: 140px;"><img src="https://picsum.photos/200?3" style="width:140px; border-radius:20px;"></div>
    </div>

    <div class="upload-section">
        <h3 style="margin-bottom: 15px;">Опубликовать трек</h3>
        <input type="text" id="t-name" class="form-input" placeholder="Название">
        <input type="text" id="t-artist" class="form-input" placeholder="Исполнитель">
        
        <label class="file-btn">Обложка (JPG) <input type="file" id="t-img" hidden accept="image/*"></label>
        <label class="file-btn">Музыка (MP3) <input type="file" id="t-snd" hidden accept="audio/*"></label>
        
        <button class="btn-main" onclick="publish()">Опубликовать</button>
    </div>

    <h2>Моя музыка</h2>
    <div id="library">
        <p id="empty-msg" style="color: #444; text-align: center; margin-top: 20px;">У вас пока нет треков</p>
    </div>
</div>

<div class="mini-player" id="m-player" style="display: none;" onclick="showPlayer()">
    <img id="m-img" src="">
    <div class="track-meta">
        <h4 id="m-title">Название</h4>
        <p id="m-artist">Исполнитель</p>
    </div>
    <i class="fas fa-play" id="m-play-btn" onclick="event.stopPropagation(); togglePlay();" style="font-size: 22px; margin: 0 10px;"></i>
</div>

<div class="full-screen-player" id="f-player">
    <div class="player-header">
        <i class="fas fa-chevron-down" onclick="hidePlayer()"></i>
        <span style="font-size: 14px; font-weight: 600;">СЕЙЧАС ИГРАЕТ</span>
        <i class="fas fa-ellipsis-h"></i>
    </div>
    
    <img id="f-img" class="player-cover" src="">

    <div class="track-info-big">
        <h1 id="f-title" style="font-size: 26px;">Title</h1>
        <p id="f-artist" style="color: var(--text-dim); font-size: 18px;">Artist</p>
    </div>

    <div class="progress-area">
        <div class="progress-bar">
            <div class="progress-fill" id="f-progress"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 8px;">
            <span id="time-cur">0:00</span>
            <span id="time-dur">0:00</span>
        </div>
    </div>

    <div class="player-controls">
        <i class="fas fa-random" style="color: #444"></i>
        <i class="fas fa-step-backward" style="font-size: 24px;"></i>
        <div class="play-trigger" onclick="togglePlay()">
            <i class="fas fa-play" id="f-play-icon"></i>
        </div>
        <i class="fas fa-step-forward" style="font-size: 24px;"></i>
        <i class="fas fa-redo" style="color: #444"></i>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active"><i class="fas fa-home"></i>Главная</div>
    <div class="nav-item"><i class="fas fa-compass"></i>Обзор</div>
    <div class="nav-item"><i class="fas fa-bookmark"></i>Коллекция</div>
    <div class="nav-item"><i class="fas fa-user"></i>Профиль</div>
</nav>

<script>
    const audio = new Audio();
    let library = JSON.parse(localStorage.getItem('flixy_lib') || '[]');

    function publish() {
        const name = document.getElementById('t-name').value;
        const artist = document.getElementById('t-artist').value;
        const imgFile = document.getElementById('t-img').files[0];
        const sndFile = document.getElementById('t-snd').files[0];

        if(!name || !artist || !imgFile || !sndFile) return alert("Заполни все поля!");

        const readerImg = new FileReader();
        readerImg.onload = function(e) {
            const imgData = e.target.result;
            const readerSnd = new FileReader();
            readerSnd.onload = function(ev) {
                const track = { id: Date.now(), name, artist, img: imgData, snd: ev.target.result };
                library.push(track);
                localStorage.setItem('flixy_lib', JSON.stringify(library));
                render();
                alert("Готово!");
            };
            readerSnd.readAsDataURL(sndFile);
        };
        readerImg.readAsDataURL(imgFile);
    }

    function render() {
        const libDiv = document.getElementById('library');
        libDiv.innerHTML = '';
        if(library.length > 0) document.getElementById('empty-msg').style.display = 'none';
        
        library.forEach(t => {
            const row = document.createElement('div');
            row.className = 'track-row';
            row.onclick = () => play(t);
            row.innerHTML = `<img src="${t.img}"><div class="track-meta"><h4>${t.name}</h4><p>${t.artist}</p></div><i class="far fa-heart"></i>`;
            libDiv.prepend(row);
        });
    }

    function play(t) {
        audio.src = t.snd;
        audio.play();
        document.getElementById('m-player').style.display = 'flex';
        document.getElementById('m-title').innerText = t.name;
        document.getElementById('m-artist').innerText = t.artist;
        document.getElementById('m-img').src = t.img;
        
        document.getElementById('f-title').innerText = t.name;
        document.getElementById('f-artist').innerText = t.artist;
        document.getElementById('f-img').src = t.img;
        
        updateIcons(true);
    }

    function togglePlay() {
        if(audio.paused) { audio.play(); updateIcons(true); }
        else { audio.pause(); updateIcons(false); }
    }

    function updateIcons(is) {
        document.getElementById('m-play-btn').className = is ? 'fas fa-pause' : 'fas fa-play';
        document.getElementById('f-play-icon').className = is ? 'fas fa-pause' : 'fas fa-play';
    }

    function showPlayer() { document.getElementById('f-player').classList.add('active'); }
    function hidePlayer() { document.getElementById('f-player').classList.remove('active'); }

    audio.ontimeupdate = () => {
        const p = (audio.currentTime / audio.duration) * 100;
        document.getElementById('f-progress').style.width = p + '%';
        document.getElementById('time-cur').innerText = formatTime(audio.currentTime);
        document.getElementById('time-dur').innerText = formatTime(audio.duration);
    };

    function formatTime(s) {
        if(!s) return "0:00";
        let m = Math.floor(s / 60);
        let sec = Math.floor(s % 60);
        return m + ":" + (sec < 10 ? '0' : '') + sec;
    }

    render();
</script>
</body>
</html>
