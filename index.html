<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dota 2 HTML Mobile</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background: #000; overflow: hidden; width: 100vw; height: 100vh; font-family: sans-serif; }
        
        /* Игровой экран */
        #gameCanvas { display: block; background: #111; }

        /* Интерфейс мобильного управления */
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 20px;
        }
        .touch-zone { pointer-events: auto; }
        
        /* Виртуальный джойстик (левая рука) */
        #joystick-container {
            width: 120px; height: 120px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        #joystick-stick {
            width: 50px; height: 50px; background: #e54e4e;
            border-radius: 50%; box-shadow: 0 0 10px #e54e4e;
            transform: translate(0px, 0px);
        }

        /* Кнопки способностей (правая рука) */
        #actions-container { display: flex; gap: 15px; }
        .action-btn {
            width: 65px; height: 65px; background: rgba(20, 25, 30, 0.8);
            border: 2px solid #3c4856; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .action-btn:active { transform: scale(0.9); border-color: #e54e4e; }
        #btn-ult { border-color: #ffd700; }

        /* Верхняя панель состояния */
        #top-hud {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 15, 20, 0.85); border: 1px solid #333;
            padding: 5px 20px; border-radius: 20px; display: flex; gap: 20px;
            font-weight: bold; font-size: 14px; color: #fff; pointer-events: none;
        }
        .gold { color: #ffd700; } .kills { color: #ff4d4d; }
    </style>
</head>
<body>

    <div id="top-hud">
        <span class="kills">Kills: <span id="k-count">0</span></span>
        <span class="gold">Gold: <span id="g-count">0</span></span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <!-- Джойстик передвижения -->
        <div id="joystick-container" class="touch-zone">
            <div id="joystick-stick"></div>
        </div>

        <!-- Кнопки атаки и ульты -->
        <div id="actions-container" class="touch-zone">
            <div class="action-btn" id="btn-attack">⚔️</div>
            <div class="action-btn" id="btn-ult">🔥</div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Адаптация размеров под экран телефона
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- ПАРАМЕТРЫ КАРТЫ (Мир игры намного больше экрана) ---
const MapWidth = 2000;
const MapHeight = 2000;

// Камера (следует за игроком)
const camera = { x: 0, y: 0 };

// --- ИГРОК (Shadow Fiend) ---
const player = {
    x: 200, y: 1800, // Спавн в левом нижнем углу (База Сил Света)
    radius: 25, speed: 4,
    hp: 550, maxHp: 550,
    gold: 0, kills: 0,
    color: '#7f1d1d', text: '😈'
};

// --- ИГРОВЫЕ ОБЪЕКТЫ ---
const towers = [
    // Вражеские башни на миду (Т1, Т2) и Трон в верхнем правом углу
    { x: 900, y: 1100, radius: 40, hp: 1000, maxHp: 1000, team: 'dire', type: 'tower', range: 250 },
    { x: 1400, y: 600, radius: 40, hp: 1200, maxHp: 1200, team: 'dire', type: 'tower', range: 250 },
    { x: 1800, y: 200, radius: 60, hp: 2500, maxHp: 2500, team: 'dire', type: 'throne', range: 300 }
];

const creeps = [];
const projectiles = [];

// Спавн вражеских крипов из Трона
function spawnCreepWave() {
    if (creeps.filter(c => c.team === 'dire').length < 4) {
        creeps.push({
            x: 1700, y: 300, radius: 18, speed: 1.5,
            hp: 200, maxHp: 200, team: 'dire', text: '👹',
            targetX: 200, targetY: 1800
        });
    }
}
setInterval(spawnCreepWave, 8000);
spawnCreepWave(); // Первый спавн сразу

// --- СИСТЕМА УПРАВЛЕНИЯ (МОБИЛЬНЫЙ ДЖОЙСТИК) ---
const joystick = { active: false, startX: 0, startY: 0, moveX: 0, moveY: 0, vx: 0, vy: 0 };
const joyContainer = document.getElementById('joystick-container');
const joyStick = document.getElementById('joystick-stick');

joyContainer.addEventListener('touchstart', (e) => {
    joystick.active = true;
    const t = e.touches[0];
    const rect = joyContainer.getBoundingClientRect();
    joystick.startX = rect.left + rect.width / 2;
    joystick.startY = rect.top + rect.height / 2;
});

window.addEventListener('touchmove', (e) => {
    if (!joystick.active) return;
    const t = e.touches[0];
    let dx = t.clientX - joystick.startX;
    let dy = t.clientY - joystick.startY;
    const dist = Math.hypot(dx, dy);
    const maxDist = 40;

    if (dist > maxDist) {
        dx = (dx / dist) * maxDist;
        dy = (dy / dist) * maxDist;
    }

    joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
    joystick.vx = dx / maxDist;
    joystick.vy = dy / maxDist;
});

window.addEventListener('touchend', () => {
    joystick.active = false;
    joyStick.style.transform = 'translate(0px, 0px)';
    joystick.vx = 0;
    joystick.vy = 0;
});

// Кнопки атаки
document.getElementById('btn-attack').addEventListener('touchstart', () => playerAttack(false));
document.getElementById('btn-ult').addEventListener('touchstart', () => playerAttack(true));

function playerAttack(isUlt) {
    // Ищем ближайшего врага (крипа или башню)
    let targets = [...creeps, ...towers].filter(e => e.hp > 0);
    let closest = null;
    let minDist = isUlt ? 400 : 200;

    targets.forEach(t => {
        let d = Math.hypot(t.x - player.x, t.y - player.y);
        if (d < minDist) { minDist = d; closest = t; }
    });

    if (closest) {
        projectiles.push({
            x: player.x, y: player.y,
            target: closest, speed: 8,
            damage: isUlt ? 150 : 45, color: isUlt ? '#ff5500' : '#da2222',
            radius: isUlt ? 12 : 6
        });
    }
}

// --- ИГРОВОЙ ЦИКЛ И ЛОГИКА ---
function update() {
    // Движение игрока
    player.x += joystick.vx * player.speed;
    player.y += joystick.vy * player.speed;

    // Ограничение границами карты
    player.x = Math.max(player.radius, Math.min(MapWidth - player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(MapHeight - player.radius, player.y));

    // Центрирование камеры на игроке
    camera.x = player.x - canvas.width / 2;
    camera.y = player.y - canvas.height / 2;
    camera.x = Math.max(0, Math.min(MapWidth - canvas.width, camera.x));
    camera.y = Math.max(0, Math.min(MapHeight - canvas.height, camera.y));

    // Логика крипов
    creeps.forEach((creep, index) => {
        if (creep.hp <= 0) {
            creeps.splice(index, 1);
            player.gold += 40;
            player.kills++;
            document.getElementById('g-count').innerText = player.gold;
            document.getElementById('k-count').innerText = player.kills;
            return;
        }
        // Идут в сторону базы игрока
        let dx = player.x - creep.x;
        let dy = player.y - creep.y;
        let dist = Math.hypot(dx, dy);

        if (dist < 150) { // Если игрок близко — агрятся на него
            creep.x += (dx / dist) * creep.speed;
            creep.y += (dy / dist) * creep.speed;
            
            if (dist < 40 && Math.random() < 0.02) {
                player.hp -= 10; // Наносят урон в ближнем бою
            }
        } else {
            // Идут по миду к цели
            let tDx = creep.targetX - creep.x;
            let tDy = creep.targetY - creep.y;
            let tDist = Math.hypot(tDx, tDy);
            creep.x += (tDx / tDist) * creep.speed;
            creep.y += (tDy / tDist) * creep.speed;
        }
    });

    // Логика башен (Атакуют игрока, если он в радиусе)
    towers.forEach(tower => {
        if (tower.hp <= 0) return;
        let dist = Math.hypot(player.x - tower.x, player.y - tower.y);
        if (dist < tower.range && Math.random() < 0.015) {
            projectiles.push({
                x: tower.x, y: tower.y,
                target: player, speed: 5,
                damage: 35, color: '#ff3333', radius: 8
            });
        }
    });

    // Полет снарядов
    projectiles.forEach((p, index) => {
        let dx = p.target.x - p.x;
        let dy = p.target.y - p.y;
        let dist = Math.hypot(dx, dy);

        if (dist < 10) {
            p.target.hp -= p.damage;
            projectiles.splice(index, 1);
        } else {
            p.x += (dx / dist) * p.speed;
            p.y += (dy / dist) * p.speed;
        }
    });

    if (player.hp <= 0) {
        alert("Вы погибли! Респавн на фонтане.");
        player.hp = player.maxHp;
        player.x = 200; player.y = 1800;
    }
}

// --- ОТРИСОВКА ГРАФИКИ (Изометрия/Псевдо-3D) ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // Сдвиг сцены под камеру
    ctx.translate(-camera.x, -camera.y);

    // Рисуем карту (Трава/Текстура земли)
    ctx.fillStyle = '#1b2616';
    ctx.fillRect(0, 0, MapWidth, MapHeight);
    
    // Линия реки (Мидлейн диагональ)
    ctx.strokeStyle = '#1d3557';
    ctx.lineWidth = 120;
    ctx.beginPath();
    ctx.moveTo(0, MapHeight);
    ctx.lineTo(MapWidth, 0);
    ctx.stroke();

    // Сетка для создания 3D перспективы земли
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = 0; i < MapWidth; i += 100) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MapHeight); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MapWidth, i); ctx.stroke();
    }

    // Отрисовка Башен / Трона
    towers.forEach(t => {
        if (t.hp <= 0) {
            ctx.fillStyle = '#333';
            ctx.beginPath(); ctx.arc(t.x, t.y, t.radius, 0, Math.PI*2); ctx.fill();
            return;
        }
        // Тень здания
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(t.x - t.radius, t.y, t.radius * 2, t.radius * 1.5);

        // Само здание (с градиентом под 3D колонну)
        let grad = ctx.createLinearGradient(t.x - t.radius, t.y, t.x + t.radius, t.y);
        grad.addColorStop(0, '#451a03'); grad.addColorStop(1, '#9a3412');
        ctx.fillStyle = t.type === 'throne' ? '#701a75' : grad;
        
        ctx.fillRect(t.x - t.radius, t.y - t.radius * 2, t.radius * 2, t.radius * 2);

        // ХП Бар над башней
        drawHpBar(t.x - t.radius, t.y - t.radius * 2.5, t.radius * 2, t.hp, t.maxHp);
    });

    // Отрисовка крипов
    creeps.forEach(c => {
        ctx.font = '30px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(c.text, c.x, c.y + 10);
        drawHpBar(c.x - 20, c.y - 30, 40, c.hp, c.maxHp);
    });

    // Отрисовка снарядов (Атак)
    projectiles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
    });

    // Отрисовка Игрока (Shadow Fiend)
    ctx.font = '45px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(player.text, player.x, player.y + 15);
    drawHpBar(player.x - 30, player.y - 45, 60, player.hp, player.maxHp, '#2ecc71');

    ctx.restore();

    // ОТИСОВКА МИНИ-КАРТЫ (В левом верхнем углу экрана)
    drawMinimap();
}

// Вспомогательная функция хп-баров
function drawHpBar(x, y, w, hp, maxHp, color = '#e74c3c') {
    ctx.fillStyle = '#222';
    ctx.fillRect(x, y, w, 6);
    let pct = (hp / maxHp) * w;
    ctx.fillStyle = color;
    ctx.fillRect(x, y, Math.max(0, pct), 6);
}

// Отрисовка мини-карты
function drawMinimap() {
    const size = 100;
    const mx = 15; const my = 50;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(mx, my, size, size);
    ctx.strokeStyle = '#444';
    ctx.strokeRect(mx, my, size, size);

    // Точка игрока на мини-карте
    let px = mx + (player.x / MapWidth) * size;
    let py = my + (player.y / MapHeight) * size;
    ctx.fillStyle = '#00ff00';
    ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI*2); ctx.fill();

    // Точки башен врага
    towers.forEach(t => {
        if (t.hp <= 0) return;
        let tx = mx + (t.x / MapWidth) * size;
        let ty = my + (t.y / MapHeight) * size;
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(tx - 2, ty - 2, 4, 4);
    });
}

// Главный цикл
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
