<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLIXY MUSIC</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --surface: #121212;
            --accent: #ffcc00; /* Желтый акцент как в Яндекс/Кинопоиск */
            --text-main: #ffffff;
            --text-secondary: #8e8e8e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Скролл-зона --- */
        .app-view {
            height: 100vh;
            overflow-y: auto;
            padding: 20px 16px 160px 16px;
            scrollbar-width: none;
        }
        .app-view::-webkit-scrollbar { display: none; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; color: var(--accent); }

        h2 { font-size: 22px; margin: 24px 0 16px; font-weight: 700; }

        /* --- Секция публикации --- */
        .upload-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #222;
        }

        .input-field {
            width: 100%;
            background: #222;
            border: none;
            padding: 14px;
            border-radius: 12px;
            color: white;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .file-label {
            display: block;
            background: #333;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 12px;
            font-size: 14px;
            cursor: pointer;
        }

        .publish-btn {
            width: 100%;
            background: var(--accent);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
        }

        /* --- Горизонтальные миксы --- */
        .horizontal-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            margin: 0 -16px;
            padding: 0 16px;
            scrollbar-width: none;
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .mix-card {
            min-width: 160px;
            width: 160px;
        }
        .mix-card img {
            width: 160px;
            height: 160px;
            border-radius: 24px;
            object-fit: cover;
            margin-bottom: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }

        /* --- Список треков (как на видео) --- */
        .track-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        .track-item img {
            width: 50px; height: 50px;
            border-radius: 8px;
            margin-right: 15px;
        }
        .track-info { flex: 1; }
        .track-info h4 { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
        .track-info p { font-size: 13px; color: var(--text-secondary); }

        /* --- Мини-плеер --- */
        .mini-player {
            position: fixed;
            bottom: 75px;
            left: 10px;
            right: 10px;
            background: #1e1e1e;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .mini-player img { width: 40px; height: 40px; border-radius: 6px; margin-right: 12px; }
        
        /* --- Полноэкранный плеер (Player View) --- */
        .full-player {
            position: fixed;
            top: 100%; /* Скрыт внизу */
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #2c3e50, #000000);
            z-index: 2000;
            transition: top 0.4s cubic-bezier(0.32, 1, 0.23, 1);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .full-player.active { top: 0; }
        .close-player { align-self: flex-start; font-size: 24px; margin-bottom: 40px; }
        .big-cover { width: 100%; aspect-ratio: 1; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 40px; }
        
        .progress-container { width: 100%; margin: 30px 0; }
        .slider { width: 100%; accent-color: var(--accent); }

        .player-controls { display: flex; align-items: center; gap: 40px; font-size: 30px; }
        .play-main { width: 70px; height: 70px; background: white; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; }

        /* --- Таб-бар --- */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 12px 0 25px;
            border-top: 1px solid #1a1a1a;
        }
        .tab { color: var(--text-secondary); text-align: center; font-size: 11px; }
        .tab.active { color: var(--text-main); }
        .tab i { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-view">
    <header>
        <div class="logo">FLIXY</div>
        <i class="far fa-bell" style="font-size: 20px;"></i>
    </header>

    <h2>Начни с этого</h2>
    <div class="horizontal-scroll">
        <div class="mix-card">
            <img src="https://m.media-amazon.com/images/I/41K-m8iZ8LL._UX250_FMjpg_QL85_.jpg">
            <h4>Моя волна</h4>
            <p style="color: grey; font-size: 12px;">Бесконечный поток</p>
        </div>
        <div class="mix-card">
            <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=400&q=80">
            <h4>Новинки</h4>
            <p style="color: grey; font-size: 12px;">Для тебя</p>
        </div>
    </div>

    <h2>Опубликовать свою музыку</h2>
    <div class="upload-card">
        <input type="text" id="up-title" class="input-field" placeholder="Название трека">
        <input type="text" id="up-artist" class="input-field" placeholder="Имя артиста">
        
        <label class="file-label">Выберите обложку
            <input type="file" id="up-cover" accept="image/*" hidden>
        </label>
        
        <label class="file-label">Выберите MP3 файл
            <input type="file" id="up-audio" accept="audio/*" hidden>
        </label>
        
        <button class="publish-btn" onclick="handleUpload()">Опубликовать на FLIXY</button>
    </div>

    <h2>Твои треки</h2>
    <div id="track-container">
        </div>
</div>

<div class="mini-player" id="mini-player" style="display: none;" onclick="openFullPlayer()">
    <img src="" id="mini-img">
    <div class="track-info">
        <h4 id="mini-title">...</h4>
        <p id="mini-artist">...</p>
    </div>
    <i class="fas fa-play" id="mini-play-icon" style="font-size: 20px; padding: 10px;"></i>
</div>

<div class="full-player" id="full-player">
    <div class="close-player" onclick="closeFullPlayer()"><i class="fas fa-chevron-down"></i></div>
    <img src="" class="big-cover" id="full-img">
    
    <div style="width: 100%; text-align: left;">
        <h1 id="full-title" style="font-size: 28px;">Song Title</h1>
        <p id="full-artist" style="color: var(--text-secondary); font-size: 18px;">Artist Name</p>
    </div>

    <div class="progress-container">
        <input type="range" class="slider" id="prog-slider" value="0" step="0.1">
    </div>

    <div class="player-controls">
        <i class="fas fa-step-backward"></i>
        <div class="play-main" onclick="event.stopPropagation(); togglePlayback();">
            <i class="fas fa-play" id="full-play-icon"></i>
        </div>
        <i class="fas fa-step-forward"></i>
    </div>
</div>

<nav class="tab-bar">
    <div class="tab active"><i class="fas fa-home"></i>Главная</div>
    <div class="tab"><i class="fas fa-compass"></i>Обзор</div>
    <div class="tab"><i class="fas fa-heart"></i>Коллекция</div>
</nav>

<script>
    // Инициализация базы данных в браузере (IndexedDB)
    let db;
    const request = indexedDB.open("FlixyDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => {
        db = e.target.result;
        loadSongs();
    };

    const audio = new Audio();
    let currentTrack = null;

    function handleUpload() {
        const title = document.getElementById('up-title').value;
        const artist = document.getElementById('up-artist').value;
        const coverFile = document.getElementById('up-cover').files[0];
        const audioFile = document.getElementById('up-audio').files[0];

        if(!title || !artist || !coverFile || !audioFile) return alert("Заполни всё!");

        const reader = new FileReader();
        reader.onload = function(e) {
            const coverData = e.target.result;
            const readerAudio = new FileReader();
            readerAudio.onload = function(e) {
                const audioData = e.target.result;
                const song = { title, artist, cover: coverData, audio: audioData };
                
                const tx = db.transaction("songs", "readwrite");
                tx.objectStore("songs").add(song);
                tx.oncomplete = () => {
                    loadSongs();
                    alert("Трек опубликован!");
                };
            };
            readerAudio.readAsDataURL(audioFile);
        };
        reader.readAsDataURL(coverFile);
    }

    function loadSongs() {
        const container = document.getElementById('track-container');
        container.innerHTML = '';
        const tx = db.transaction("songs", "readonly");
        tx.objectStore("songs").openCursor().onsuccess = e => {
            const cursor = e.target.result;
            if(cursor) {
                const track = cursor.value;
                const el = document.createElement('div');
                el.className = 'track-item';
                el.onclick = () => playTrack(track);
                el.innerHTML = `
                    <img src="${track.cover}">
                    <div class="track-info">
                        <h4>${track.title}</h4>
                        <p>${track.artist}</p>
                    </div>
                    <i class="fas fa-ellipsis-v" style="color: #333"></i>
                `;
                container.prepend(el);
                cursor.continue();
            }
        };
    }

    function playTrack(track) {
        currentTrack = track;
        audio.src = track.audio;
        audio.play();
        
        document.getElementById('mini-player').style.display = 'flex';
        document.getElementById('mini-title').innerText = track.title;
        document.getElementById('mini-artist').innerText = track.artist;
        document.getElementById('mini-img').src = track.cover;
        
        document.getElementById('full-title').innerText = track.title;
        document.getElementById('full-artist').innerText = track.artist;
        document.getElementById('full-img').src = track.cover;
        
        updateIcons(true);
    }

    function togglePlayback() {
        if(audio.paused) { audio.play(); updateIcons(true); }
        else { audio.pause(); updateIcons(false); }
    }

    function updateIcons(playing) {
        const iconClass = playing ? 'fas fa-pause' : 'fas fa-play';
        document.getElementById('mini-play-icon').className = iconClass;
        document.getElementById('full-play-icon').className = iconClass;
    }

    function openFullPlayer() { document.getElementById('full-player').classList.add('active'); }
    function closeFullPlayer() { document.getElementById('full-player').classList.remove('active'); }

    // Прогресс бар
    audio.ontimeupdate = () => {
        const slider = document.getElementById('prog-slider');
        if(!audio.duration) return;
        slider.value = (audio.currentTime / audio.duration) * 100;
    };

    document.getElementById('prog-slider').oninput = function() {
        audio.currentTime = (this.value / 100) * audio.duration;
    };
</script>

</body>
</html>
