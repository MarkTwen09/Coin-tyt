<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kao Project v1.2 FIX</title>
    <style>
        :root { --green: #acff01; --purple: #9d00ff; --glass: rgba(255, 255, 255, 0.05); }
        body { background: radial-gradient(circle at top, #111f33 0%, #050a12 100%); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .screen { flex-grow: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .screen.active { display: flex; }
        .header { display: flex; justify-content: space-between; padding: 15px 25px; border-bottom: 1px solid rgba(172,255,1,0.1); }
        .tag { color: var(--green); border: 1px solid rgba(172,255,1,0.2); padding: 5px 15px; border-radius: 15px; font-size: 14px; }
        #bal { font-size: 60px; color: var(--green); text-shadow: 0 0 20px rgba(172,255,1,0.4); font-weight: bold; margin: 10px 0; }
        .coin-area { height: 200px; display: flex; align-items: center; justify-content: center; }
        .coin { width: 150px; height: 150px; border: 6px solid var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 70px; transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 40px rgba(172,255,1,0.2); }
        .btn { background: var(--purple); border: none; color: white; padding: 20px 60px; border-radius: 20px; font-size: 18px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn:active { transform: scale(0.95); }
        .bet-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .b-btn { background: var(--glass); border: 1px solid rgba(172,255,1,0.1); color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; }
        .b-btn.active { background: var(--green); color: black; font-weight: bold; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0 30px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-top: 1px solid rgba(172,255,1,0.1); }
        .nav div { color: #555; font-size: 12px; text-align: center; }
        .nav .active { color: var(--green); }
        /* HL Game */
        .hl-card { background: var(--glass); padding: 30px; border-radius: 25px; border: 1px solid rgba(172,255,1,0.1); text-align: center; width: 80%; }
    </style>
</head>
<body>

    <div class="header">
        <div class="tag">@kao_project</div>
        <div style="color: #444;">v1.2.1</div>
    </div>

    <div id="home" class="screen active">
        <div style="color: #666; font-size: 14px; letter-spacing: 1px;">БАЛАНС</div>
        <div id="bal_display">500</div>
        
        <div class="coin-area">
            <div id="coin_obj" class="coin">🎭</div>
        </div>

        <div class="bet-btns">
            <div class="b-btn" onclick="chBet(10, this)">10</div>
            <div class="b-btn active" onclick="chBet(50, this)">50</div>
            <div class="b-btn" onclick="chBet(100, this)">100</div>
        </div>

        <button id="main_btn" class="btn" onclick="startFlip()">ИГРАТЬ</button>
    </div>

    <div id="list" class="screen">
        <h2 style="color:var(--green)">ВЫБЕРИ ИГРУ</h2>
        <button class="btn" style="width:80%; margin-bottom:15px;" onclick="toScr('home',0)">🎭 ОРЕЛ / РЕШКА</button>
        <button class="btn" style="width:80%; background:#333;" onclick="initHL()">📈 БОЛЬШЕ / МЕНЬШЕ</button>
    </div>

    <div id="hl_game" class="screen">
        <div class="hl-card">
            <div style="color:#666; margin-bottom:10px;">ЧИСЛО (1-100)</div><div id="hl_num" style="font-size:80px; font-weight:bold; margin-bottom:20px;">?</div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="flex:1; background:#acff01; color:black;" onclick="doHL('h')">БОЛЬШЕ</button>
                <button class="btn" style="flex:1; background:#ff4d4d;" onclick="doHL('l')">МЕНЬШЕ</button>
            </div>
        </div>
        <button class="b-btn" style="margin-top:30px;" onclick="toScr('list',1)">← НАЗАД</button>
    </div>

    <div class="nav">
        <div class="active" id="n0" onclick="toScr('home',0)">🏠<br>Главная</div>
        <div id="n1" onclick="toScr('list',1)">🎮<br>Игры</div>
        <div onclick="alert('Скоро!')">👥<br>Друзья</div>
    </div>

    <script>
        let balance = localStorage.getItem('kao_bal') ? parseInt(localStorage.getItem('kao_bal')) : 500;
        let bet = 50;
        let hlNum = 0;
        let isRolling = false;

        function refresh() {
            document.getElementById('bal_display').innerText = balance;
            localStorage.setItem('kao_bal', balance);
        }
        refresh();

        function chBet(v, el) {
            bet = v;
            document.querySelectorAll('.b-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function toScr(id, n) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(n !== undefined) {
                document.querySelectorAll('.nav div').forEach(d => d.classList.remove('active'));
                document.getElementById('n'+n).classList.add('active');
            }
        }

        function startFlip() {
            if(isRolling) return;
            if(balance < bet) return alert('Недостаточно монет!');

            isRolling = true;
            balance -= bet;
            refresh();

            const c = document.getElementById('coin_obj');
            const btn = document.getElementById('main_btn');
            
            btn.innerText = "ЖДЕМ...";
            btn.style.opacity = "0.5";
            
            // Анимация вращения
            c.style.transform = "rotateY(1440deg)";

            setTimeout(() => {
                const win = Math.random() > 0.5;
                c.style.transform = "rotateY(0deg)";
                
                if(win) {
                    balance += bet * 2;
                    alert("ПОБЕДА! + " + bet);
                } else {
                    alert("ПРОИГРЫШ!");
                }
                
                refresh();
                isRolling = false;
                btn.innerText = "ИГРАТЬ";
                btn.style.opacity = "1";
            }, 1600);
        }

        function initHL() {
            hlNum = Math.floor(Math.random() * 99) + 1;
            document.getElementById('hl_num').innerText = hlNum;
            toScr('hl_game');
        }

        function doHL(choice) {
            if(balance < 50) return alert('Нужно минимум 50 монет!');
            balance -= 50;
            const next = Math.floor(Math.random() * 99) + 1;
            const old = hlNum;
            hlNum = next;
            document.getElementById('hl_num').innerText = hlNum;

            let win = false;
            if(choice === 'h' && next > old) win = true;
            if(choice === 'l' && next < old) win = true;

            if(win) {
                balance += 100;
                alert("УГАДАЛ! +50");
            } else {
                alert("НЕ УГАДАЛ! Было: " + next);
            }
            refresh();
        }
    </script>
</body>
</html>
