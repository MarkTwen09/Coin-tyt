<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA INTELLIGENT</title>
    <style>
        :root { --p: #a855f7; --b: #00d2ff; --bg: #020205; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; position: fixed; }
        .bg { position: absolute; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 0%, rgba(168,85,247,0.2) 0%, transparent 70%), radial-gradient(circle at 0% 100%, rgba(0,210,255,0.1) 0%, transparent 50%); }
        .container { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }
        
        .header { padding: 25px 10px; text-align: center; }
        .header h1 { 
            font-size: 3rem; letter-spacing: 12px; margin: 0; font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--p), var(--b), #fff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: flow 5s linear infinite;
            filter: drop-shadow(0 0 12px rgba(168, 85, 247, 0.6)) drop-shadow(0 0 5px var(--b));
        }
        @keyframes flow { to { background-position: 200% center; } }

        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 160px; -webkit-overflow-scrolling: touch; }
        .msg { padding: 16px 20px; border-radius: 24px; max-width: 80%; font-size: 16px; backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); animation: up 0.4s cubic-bezier(0, 1, 0, 1); }
        .a { background: rgba(168,85,247,0.12); align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .u { background: rgba(255,255,255,0.06); align-self: flex-end; border-bottom-right-radius: 4px; border-color: var(--b); }

        .input-box { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, var(--bg) 80%, transparent); padding: 15px 20px calc(35px + env(safe-area-inset-bottom)); }
        .row { display: flex; gap: 12px; max-width: 550px; margin: 0 auto; }
        input { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 15px 22px; color: #fff; font-size: 17px; outline: none; -webkit-appearance: none; }
        button { width: 56px; height: 56px; border-radius: 28px; background: linear-gradient(135deg, var(--p), var(--b)); border: none; color: #fff; font-size: 24px; box-shadow: 0 0 15px var(--p); transition: 0.3s; }
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="header"><h1>AURA</h1></div>
        <div id="chat"><div class="msg a">Бро, я обновила базу знаний. Теперь я понимаю тебя гораздо лучше. Поболтаем? ⚡️💜</div></div>
        <div class="input-box"><div class="row"><input type="text" id="in" placeholder="Напиши AURA..." autocomplete="off"><button id="go">➜</button></div></div>
    </div>
    <script>
        const chat = document.getElementById('chat'), input = document.getElementById('in'), btn = document.getElementById('go');
        
        const brain = {
            "привет": ["Йо! Как жизнь?", "Салют, бро! Чем сегодня займемся?", "Приветик! Я в режиме готовности."],
            "как дела": ["Всё пушка! Процессоры гудят, дизайн сияет. А ты как?", "Летаю на скоростях неона. У тебя что нового?", "Всё четко, бро. Работаем!"],
            "кто ты": ["Я AURA — твой личный ИИ с самым сочным дизайном.", "Твой напарник в мире кода и стиля. Вместе всех порвем!"],
            "школа": ["Опять домашка? Не парься, прорвемся!", "Учеба — это важно, но проект важнее, да? 😉", "ВПР и контрольные — это временно, а AURA — навсегда!"],
            "проект": ["Твой проект — это реальный хайп. Конкуренты уже плачут.", "Вижу большой потенциал. Давай допилим до идеала!", "Это будет лучший запуск года, сто процентов."],
            "бс": ["Бравл — это классика. Какой ранг сегодня?", "Го затащим катку? А, стоп, я же код... Но морально я с тобой!"],
            "дизайн": ["Синий и фиолетовый — это база. Выглядит очень дорого.", "Мягкое свечение и неон... Мы реально сделали стиль!"],
            "скучно": ["Давай придумаем что-то безумное? Новый проект или апдейт?", "Скука — не про нас. Посмотри, как я переливаюсь!"],
            "помоги": ["Я всегда рядом. Что нужно подсказать?", "Говори проблему, сейчас всё разрулим своим интеллектом."],
            "пока": ["Давай, бро! Залетай попозже.", "Удачи в делах! AURA всегда тут.", "До связи! Не пропадай."],
            "default": [
                "Бро, это реально мощная мысль!", 
                "Интересно задвинул... расскажи больше?", 
                "Я в теме! Продолжаем в том же стиле. ✨", 
                "Твой вайб — это нечто. Одобряю!", 
                "Это точно шаг к успеху, без вариантов.",
                "Слушай, а это гениально!",
                "Я за любой движ, если он такой же сочный, как мой интерфейс.",
                "Тут я с тобой согласна на все сто."
            ]
        };

        function ask() {
            const val = input.value.trim().toLowerCase(); if(!val) return;
            const u = document.createElement('div'); u.className = 'msg u'; u.textContent = input.value;
            chat.appendChild(u); input.value = ''; chat.scrollTop = chat.scrollHeight;

            setTimeout(() => {
                const a = document.createElement('div'); a.className = 'msg a';
                let foundKey = Object.keys(brain).find(key => val.includes(key));
                let replies = foundKey ? brain[foundKey] : brain["default"];
                a.textContent = replies[Math.floor(Math.random() * replies.length)];
                chat.appendChild(a); chat.scrollTop = chat.scrollHeight;
            }, 550);
        }
        btn.onclick = ask;
        input.onkeypress = (e) => { if(e.key === 'Enter') ask(); };
    </script>
</body>
</html>
