<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLIXY PREMIUM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #2e67f8;
            --bg: #000000;
            --surface: #121212;
            --text-dim: #717171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; height: 100vh; }

        .app { height: 100vh; overflow-y: auto; padding: 60px 20px 160px; scrollbar-width: none; }
        .app::-webkit-scrollbar { display: none; }

        .logo { font-size: 28px; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 30px; }

        /* Треки */
        .track-card {
            display: flex; align-items: center; padding: 12px;
            background: rgba(255,255,255,0.05); border-radius: 20px; margin-bottom: 10px;
            backdrop-filter: blur(10px);
        }
        .track-card img { width: 52px; height: 52px; border-radius: 12px; margin-right: 15px; }
        .track-meta { flex: 1; }
        .track-meta h4 { font-size: 16px; font-weight: 600; }
        .track-meta p { font-size: 13px; color: var(--text-dim); }
        .del { color: #333; padding: 10px; font-size: 14px; }

        /* FAB */
        .fab {
            position: fixed; right: 25px; bottom: 100px;
            width: 60px; height: 60px; background: var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(46, 103, 248, 0.4); z-index: 1000;
        }

        /* FULL PLAYER */
        .player {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #121212 0%, #000 100%);
            z-index: 2000; transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 30px; display: flex; flex-direction: column; align-items: center;
        }
        .player.active { transform: translateY(-100%); }

        .handle { width: 40px; height: 4px; background: #333; border-radius: 10px; margin-bottom: 50px; }

        /* ОБЛОЖКА СО СВЕЧЕНИЕМ */
        .cover-wrap {
            position: relative; width: 85%; aspect-ratio: 1; margin-bottom: 50px;
        }
        .cover-glow {
            position: absolute; inset: 10px;
            background-size: cover; filter: blur(40px); opacity: 0.6;
            z-index: -1; transition: 0.5s;
        }
        .big-img { width: 100%; height: 100%; border-radius: 24px; object-fit: cover; z-index: 1; }

        .playing .cover-glow { opacity: 0.9; transform: scale(1.1); }
        .playing .big-img { transform: scale(1.02); animation: pulse 4s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1.02); } 50% { transform: scale(0.98); } }

        /* КРУТОЙ ПОЛЗУНОК */
        .seek-wrap { width: 100%; margin: 40px 0 10px; position: relative; }
        .range {
            width: 100%; -webkit-appearance: none; background: transparent; cursor: pointer;
        }
        .range::-webkit-slider-runnable-track {
            height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px;
        }
        .range::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px;
            background: #fff; border-radius: 50%; margin-top: -5px;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        .controls { display: flex; justify-content: space-around; align-items: center; width: 100%; margin-top: 30px; }
        .p-btn { width: 75px; height: 75px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }

        /* Мини-плеер */
        .mini {
            position: fixed; bottom: 25px; left: 15px; right: 15px;
            background: rgba(20,20,20,0.85); backdrop-filter: blur(25px);
            height: 64px; border-radius: 20px; display: flex; align-items: center;
            padding: 0 15px; z-index: 500; border: 1px solid rgba(255,255,255,0.08);
        }
        .mini img { width: 44px; height: 44px; border-radius: 10px; margin-right: 15px; }

        /* Модалка */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px); display: none; z-index: 3000;
            align-items: center; justify-content: center; padding: 30px;
        }
        .modal-body { background: #1c1c1e; width: 100%; border-radius: 30px; padding: 30px; border: 1px solid #333; }
        input[type="text"] { width: 100%; background: #2c2c2e; border: none; padding: 18px; border-radius: 15px; color: #fff; margin-bottom: 15px; }
        .up-btn { width: 100%; background: var(--accent); color: #fff; padding: 18px; border-radius: 18px; border: none; font-weight: 700; font-size: 16px; }
    </style>
</head>
<body>

<div class="app">
    <div class="logo">FLIXY</div>
    <div id="list"></div>
</div>

<div class="fab" onclick="modal(true)"><i class="fas fa-plus" style="color:#fff; font-size:24px;"></i></div>

<div class="modal" id="modal" onclick="if(event.target==this) modal(false)">
    <div class="modal-body">
        <h2 style="margin-bottom:25px">Новый трек</h2>
        <input type="text" id="n" placeholder="Название">
        <input type="text" id="a" placeholder="Исполнитель">
        <div style="font-size:13px; color:#666; margin-bottom:15px">
            Обложка: <input type="file" id="fi" accept="image/*" style="margin-bottom:10px"><br>
            Музыка: <input type="file" id="fa" accept="audio/*">
        </div>
        <button class="up-btn" onclick="add()">Добавить</button>
    </div>
</div>

<div class="mini" id="mini" style="display:none" onclick="openP()">
    <img id="m-i" src="">
    <div class="track-meta"><h4 id="m-t"></h4><p id="m-a"></p></div>
    <i class="fas fa-play" id="m-p" onclick="event.stopPropagation(); toggle();" style="font-size:22px; margin:0 10px"></i>
</div>

<div class="player" id="full">
    <div class="handle" onclick="closeP()"></div>
    <div class="cover-wrap">
        <div id="glow" class="cover-glow"></div>
        <img id="f-i" class="big-img">
    </div>
    <div style="width:100%; text-align:left">
        <h1 id="f-t" style="font-size:28px; font-weight:800"></h1>
        <p id="f-a" style="font-size:18px; color:var(--text-dim)"></p>
    </div>
    <div class="seek-wrap">
        <input type="range" class="range" id="seek" value="0">
        <div style="display:flex; justify-content:space-between; margin-top:12px; font-size:12px; color:#444">
            <span id="cur">0:00</span><span id="dur">0:00</span>
        </div>
    </div>
    <div class="controls">
        <i class="fas fa-random" style="color:#222; font-size:20px"></i>
        <i class="fas fa-step-backward" style="font-size:26px"></i>
        <div class="p-btn" onclick="toggle()"><i class="fas fa-play" id="f-p"></i></div>
        <i class="fas fa-step-forward" style="font-size:26px"></i>
        <i class="fas fa-redo" style="color:#222; font-size:20px"></i>
    </div>
</div>

<script>
    const audio = new Audio();
    let db;

    const req = indexedDB.open("FlixyDB", 1);
    req.onupgradeneeded = e => { e.target.result.createObjectStore("songs", {keyPath:"id", autoIncrement:true}); };
    req.onsuccess = e => { db = e.target.result; render(); };

    function modal(s) { document.getElementById('modal').style.display = s?'flex':'none'; }

    async function add() {
        const n=document.getElementById('n').value, a=document.getElementById('a').value;
        const fi=document.getElementById('fi').files[0], fa=document.getElementById('fa').files[0];
        if(!n||!a||!fi||!fa) return alert("Файлы!");
        const song = {n, a, i:await toB(fi), s:await toB(fa)};
        const tx = db.transaction("songs","readwrite");
        tx.objectStore("songs").add(song);
        tx.oncomplete = () => { render(); modal(false); };
    }

    const toB = f => new Promise(res => { const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(f); });

    function render() {
        const l = document.getElementById('list'); l.innerHTML = '';
        db.transaction("songs").objectStore("songs").openCursor().onsuccess = e => {
            const c = e.target.result;
            if(c) {
                const s = c.value;
                const d = document.createElement('div');
                d.className = 'track-card'; d.onclick = () => play(s);
                d.innerHTML = `<img src="${s.i}"><div class="track-meta"><h4>${s.n}</h4><p>${s.a}</p></div>
                               <div class="del" onclick="event.stopPropagation(); del(${s.id})"><i class="fas fa-trash"></i></div>`;
                l.prepend(d); c.continue();
            }
        };
    }

    function del(id) {
        if(confirm("Удалить?")) {
            const tx = db.transaction("songs","readwrite");
            tx.objectStore("songs").delete(id);
            tx.oncomplete = () => render();
        }
    }

    function play(s) {
        audio.src = s.s; audio.play();
        document.getElementById('mini').style.display = 'flex';
        document.getElementById('m-t').innerText = document.getElementById('f-t').innerText = s.n;
        document.getElementById('m-a').innerText = document.getElementById('f-a').innerText = s.a;
        document.getElementById('m-i').src = document.getElementById('f-i').src = s.i;
        document.getElementById('glow').style.backgroundImage = `url(${s.i})`;
        update(true);
    }

    function toggle() { audio.paused?audio.play():audio.pause(); update(!audio.paused); }
    
    function update(p) {
        const i = p?'fa-pause':'fa-play';
        document.getElementById('m-p').className = document.getElementById('f-p').className = 'fas '+i;
        p ? document.getElementById('full').classList.add('playing') : document.getElementById('full').classList.remove('playing');
    }

    function openP() { document.getElementById('full').classList.add('active'); }
    function closeP() { document.getElementById('full').classList.remove('active'); }

    const sk = document.getElementById('seek');
    audio.ontimeupdate = () => {
        if(!audio.duration) return;
        sk.value = (audio.currentTime/audio.duration)*100;
        document.getElementById('cur').innerText = fmt(audio.currentTime);
        document.getElementById('dur').innerText = fmt(audio.duration);
    };
    sk.oninput = function() { audio.currentTime = (this.value/100)*audio.duration; };
    const fmt = t => { const m=Math.floor(t/60), s=Math.floor(t%60); return m+":"+(s<10?'0':'')+s; };
</script>
</body>
</html>
