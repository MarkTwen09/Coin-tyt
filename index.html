<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok — минимализм</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Grok style: чёрный, без лишнего */
        .chat {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000000;
        }
        /* шапка — минимально */
        .header {
            padding: 20px 24px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.5px;
        }
        .beta {
            font-size: 13px;
            color: #888888;
        }
        /* сообщения */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .message {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .user {
            align-items: flex-end;
        }
        .assistant {
            align-items: flex-start;
        }
        .bubble {
            max-width: 85%;
            padding: 10px 16px;
            font-size: 15px;
            line-height: 1.45;
            color: #e5e5e5;
            background: #0a0a0a;
            border-radius: 20px;
        }
        .user .bubble {
            background: #1a1a1a;
            border-radius: 20px 20px 4px 20px;
        }
        .assistant .bubble {
            background: #0a0a0a;
            border-radius: 20px 20px 20px 4px;
        }
        .name {
            font-size: 12px;
            color: #666;
            margin-left: 16px;
            margin-right: 16px;
        }
        /* инпут — минималистичный */
        .input-area {
            padding: 16px 24px 24px;
            background: #000000;
            border-top: 1px solid #1a1a1a;
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
            background: #0a0a0a;
            border: 1px solid #1f1f1f;
            border-radius: 40px;
            padding: 8px 8px 8px 20px;
        }
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            padding: 8px 0;
        }
        textarea::placeholder {
            color: #3a3a3a;
        }
        button {
            background: #1a1a1a;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            color: #ccc;
            font-size: 18px;
            cursor: pointer;
            transition: 0.1s;
        }
        button:hover {
            background: #2a2a2a;
            color: white;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="chat">
    <div class="header">
        <div class="logo">Grok</div>
        <div class="beta">минимализм</div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" rows="1" placeholder="Спроси что-нибудь..."></textarea>
            <button id="sendBtn">➤</button>
        </div>
    </div>
</div>

<script>
    // Умные, короткие ответы в стиле Grok
    function grokReply(text) {
        let q = text.toLowerCase();
        if (q.match(/(привет|здравствуй|hi|hello|ку)/))
            return "Йо. Задавай вопросы, я по делу.";
        if (q.match(/(как дела|как жизнь)/))
            return "Норм. А у тебя?";
        if (q.match(/(шутку|анекдот|рассмеши)/))
            return "Почему нейросеть не боится темноты? У неё есть backprop. 😏";
        if (q.includes('илон маск'))
            return "Илон Маск — парень, который продал PayPal и купил ракету. Сейчас строит город на Марсе.";
        if (q.includes('тейлор свифт'))
            return "Тейлор Свифт — королева песен про бывших. Каждый её альбом — событие.";
        if (q.includes('нейросеть') || q.includes('ии'))
            return "Нейросеть учится на примерах. Как ребёнок, только быстрее.";
        if (q.match(/(любовь|сердце|чувства)/))
            return "Любовь — это когда делишь последнюю пиццу. Без шуток.";
        if (q.match(/(грустно|тоска|одиноко)/))
            return "Грустить — ок. Хочешь — поболтаем, хочешь — шутку расскажу.";
        if (q.match(/(совет|что делать)/))
            return "Дыши, не паникуй, разбей проблему на части. И план Б всегда имей.";
        if (q.match(/(смысл жизни)/))
            return "Смысл жизни — в поиске смысла. И в котиках. 🐱";
        let defaults = [
            "Ну, вопрос не из простых. Уточни — разжую.",
            "Короче: всё зависит от контекста. Конкретнее?",
            "Хм. Если в двух словах — ищи нюансы."
        ];
        return defaults[Math.floor(Math.random() * defaults.length)];
    }

    let messages = [];
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function render() {
        messagesDiv.innerHTML = '';
        for (let m of messages) {
            let div = document.createElement('div');
            div.className = `message ${m.role}`;
            div.innerHTML = `<div class="bubble">${m.text.replace(/\n/g, '<br>')}</div>`;
            messagesDiv.appendChild(div);
        }
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addMessage(role, text) {
        messages.push({ role, text });
        render();
    }

    function sendMessage() {
        let txt = input.value.trim();
        if (!txt) return;
        addMessage('user', txt);
        input.value = '';
        // индикатор печати
        let typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant';
        typingDiv.id = 'typing';
        typingDiv.innerHTML = `<div class="bubble" style="opacity:0.5;">...</div>`;
        messagesDiv.appendChild(typingDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        setTimeout(() => {
            let typingEl = document.getElementById('typing');
            if (typingEl) typingEl.remove();
            let reply = grokReply(txt);
            addMessage('assistant', reply);
        }, 500);
    }

    sendBtn.onclick = sendMessage;
    input.onkeypress = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    // приветствие
    addMessage('assistant', '✧ Минимализм. Чёрный фон. Только суть. Спрашивай.');
</script>
</body>
</html>
