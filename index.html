<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA INFINITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .bg-animate { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #000 70%); }
        .bg-animate::after { content: ''; position: absolute; inset: 0; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; pointer-events: none; }
        
        .aura-glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .msg-user { background: linear-gradient(135deg, #8b5cf6, #d946ef); border-radius: 20px 20px 4px 20px; box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3); align-self: flex-end; }
        .msg-ai { background: rgba(15, 15, 15, 0.8); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 20px 20px 20px 4px; align-self: flex-start; border-left: 3px solid #8b5cf6; }
        
        #chat-flow { height: calc(100vh - 180px); scroll-behavior: smooth; mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent); }
        #chat-flow::-webkit-scrollbar { width: 0; }

        .input-bar { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 100px; padding: 6px 6px 6px 24px; }
        .input-bar:focus-within { border-color: #8b5cf6; box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }
        
        .aura-shimmer { background: linear-gradient(90deg, #fff, #8b5cf6, #fff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shim 3s linear infinite; font-weight: 900; letter-spacing: 0.1em; }
        @keyframes shim { to { background-position: 200% center; } }
        .send-btn { background: #fff; color: #000; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
        .send-btn:active { transform: scale(0.8); }
    </style>
</head>
<body class="flex flex-col">
    <div class="bg-animate"></div>

    <header class="pt-14 pb-5 px-10 flex justify-between items-center">
        <h1 class="text-2xl aura-shimmer italic">AURA</h1>
        <div class="text-[8px] tracking-[0.4em] opacity-40 uppercase">Infinity System</div>
    </header>

    <main id="chat-flow" class="overflow-y-auto p-6 space-y-8 flex flex-col pt-10"></main>

    <div id="status" class="hidden px-10 py-2 text-[9px] text-purple-400 tracking-[0.4em] uppercase animate-pulse">Neural processing...</div>

    <footer class="p-8 pb-12">
        <div class="max-w-4xl mx-auto input-bar flex items-center">
            <input type="text" id="userInput" class="w-full bg-transparent py-4 text-sm outline-none text-white placeholder-white/20" placeholder="Message Infinity Aura..." autocomplete="off">
            <button onclick="send()" class="send-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
        </div>
    </footer>

    <script>
        
        const KEY = 'AIzaSyBMMIx_XEYfWryfXw6BxfQYzWJ4EtVlMkM';

        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat-flow');
            const status = document.getElementById('status');
            const val = input.value.trim();
            if (!val) return;

            input.value = '';
            chat.innerHTML += `<div class="msg-user p-5 text-sm max-w-[80%]">${val}</div>`;
            chat.scrollTo(0, chat.scrollHeight);
            status.classList.remove('hidden');

            try {
                // Используем v1beta для максимальной совместимости
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await r.json();
                status.classList.add('hidden');

                if (data.error) {
                    chat.innerHTML += `<div class="p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-[10px] text-red-300 text-center uppercase tracking-widest">Protocol Alert: ${data.error.message}</div>`;
                } else {
                    const txt = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="msg-ai p-6 text-sm max-w-[85%] leading-relaxed">${txt}</div>`;
                }
            } catch (err) {
                status.classList.add('hidden');
                chat.innerHTML += `<div class="text-red-500 text-center text-[10px] uppercase">Link Error: Check VPN</div>`;
            }
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
        }
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
