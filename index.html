<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SHADOW BANKING BLACK</title>
    <style>
        :root {
            --bg: #000;
            --card: #111112;
            --accent: #ffde00;
            --glass: rgba(255, 255, 255, 0.05);
            --red: #ff3b30;
        }
        body {
            background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: env(safe-area-inset-top) 16px 100px 16px; overflow-x: hidden;
        }

        /* Анимированный фон для стиля */
        body::before {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 70%); z-index: -1;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -1px; margin: 0; }
        
        .main-card {
            background: linear-gradient(145deg, #1c1c1e, #0a0a0a);
            border-radius: 30px; padding: 25px; margin-bottom: 20px;
            border: 1px solid #2c2c2e; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .balance-label { color: #8e8e93; font-size: 13px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .balance-val { font-size: 42px; font-weight: 800; letter-spacing: -1px; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 16px; border-radius: 20px; border: 1px solid #222; }
        .stat-n { font-size: 10px; color: #666; font-weight: 700; margin-bottom: 4px; }
        .stat-v { font-size: 18px; font-weight: 700; }

        /* Уведомления как в iOS */
        #event-toast {
            position: fixed; top: -100px; left: 16px; right: 16px;
            background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 15px; border: 1px solid #333;
            transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 1000;
        }
        #event-toast.show { top: env(safe-area-inset-top); }

        .actions { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .btn {
            background: var(--card); color: #fff; border: 1px solid #333;
            padding: 18px; border-radius: 20px; font-weight: 700; font-size: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn:active { background: #222; transform: scale(0.98); }
        .btn-main { background: var(--accent); color: #000; border: none; }
        .btn small { font-weight: 400; opacity: 0.6; }

        .progress-bar { width: 100%; height: 4px; background: #222; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
        .danger-fill { background: var(--red); }
    </style>
</head>
<body>

    <div id="event-toast">
        <div style="font-size: 12px; color: var(--accent); margin-bottom: 5px;" id="toast-title">УВЕДОМЛЕНИЕ</div>
        <div style="font-size: 14px;" id="toast-msg">Текст события...</div>
        <div id="toast-btns" style="display: flex; gap: 10px; margin-top: 10px;"></div>
    </div>

    <div class="header">
        <h1>SHADOW<span style="color:var(--accent)">BANK</span></h1>
        <div style="color: #34c759; font-size: 12px; font-weight: 700;">SECURE CONNECTION</div>
    </div>

    <div class="main-card">
        <div class="balance-label">Активы в сети</div>
        <div class="balance-val" id="money">1,000 ₽</div>
        <div class="progress-bar"><div id="risk-bar" class="progress-fill danger-fill"></div></div>
        <div style="font-size: 10px; color: #666; margin-top: 5px;">ВНИМАНИЕ СПЕЦСЛУЖБ</div>
    </div>

    <div class="stats-row">
        <div class="stat-box">
            <div class="stat-n">РЕПУТАЦИЯ</div>
            <div class="stat-v" id="rep">10</div>
        </div>
        <div class="stat-box">
            <div class="stat-n">ПАССИВНЫЙ ДОХОД</div>
            <div class="stat-v" id="income">0 ₽/с</div>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-main" onclick="launder()">
            Отмыть транзакцию <small>+150 ₽</small>
        </button>
        <button class="btn" onclick="buyAsset('crypto')">
            Крипто-обменник <small>Цена: 2,500 ₽</small>
        </button>
        <button class="btn" onclick="buyAsset('cleaner')">
            Нанять юристов <small>Сброс риска: 5,000 ₽</small>
        </button>
    </div>

    <script>
        let money = 1000;
        let risk = 0;
        let rep = 10;
        let income = 0;
        let assets = { crypto: 0 };

        function update() {
            document.getElementById('money').innerText = Math.floor(money).toLocaleString() + ' ₽';
            document.getElementById('rep').innerText = rep;
            document.getElementById('income').innerText = income + ' ₽/с';
            document.getElementById('risk-bar').style.width = risk + '%';
            
            if (risk >= 100) {
                alert("ВАС НАКРЫЛИ. Счета заморожены.");
                location.reload();
            }
        }

        function launder() {
            money += 150;
            risk += 2 + (rep * 0.05);
            update();
            checkEvent();
        }

        function buyAsset(type) {
            if (type === 'crypto' && money >= 2500) {
                money -= 2500;
                income += 50;
                assets.crypto++;
                showToast("БИЗНЕС", "Обменник запущен. Доход вырос.");
            } else if (type === 'cleaner' && money >= 5000) {
                money -= 5000;
                risk = Math.max(0, risk - 30);
                showToast("ЮРИСТЫ", "Следы в реестрах подтерты.");
            }
            update();
        }

        function showToast(title, msg, choices = null) {
            const toast = document.getElementById('event-toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            
            const btnContainer = document.getElementById('toast-btns');
            btnContainer.innerHTML = '';
            
            if (!choices) {
                setTimeout(() => toast.classList.remove('show'), 3000);
            } else {
                choices.forEach(c => {
                    let b = document.createElement('button');
                    b.className = 'btn';
                    b.style.padding = '8px 15px';
                    b.innerText = c.text;
                    b.onclick = () => { c.action(); toast.classList.remove('show'); update(); };
                    btnContainer.appendChild(b);
                });
            }
        }

        function checkEvent() {
            let r = Math.random();
            if (r > 0.9) {
                showToast("ПРОВЕРКА", "Налоговая заблокировала счет. Откупиться за 1,000₽?", [
                    { text: "Платить", action: () => { money -= 1000; risk -= 5; } },
                    { text: "Игнорить", action: () => { risk += 20; rep -= 5; } }
                ]);
            }
        }

        // Пассивный доход
        setInterval(() => {
            money += income;
            if (income > 0) risk += 0.5; // Чем больше бизнеса, тем быстрее растет интерес копов
            update();
        }, 1000);

    </script>
</body>
</html>
