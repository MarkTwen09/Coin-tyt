<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Clicker: Cases Edition</title>
    <style>
        :root {
            --primary-neon: #00f2ff;
            --secondary-neon: #7000ff;
            --accent-neon: #ff00c8;
            --bg-color: #0d0221;
            --panel-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Заголовок и баланс */
        .header {
            text-align: center;
            margin-top: 20px;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--primary-neon);
            text-shadow: 0 0 10px var(--primary-neon), 0 0 20px var(--primary-neon);
            margin-bottom: 10px;
        }

        .balance-container {
            font-size: 1.5rem;
            background: var(--panel-bg);
            padding: 10px 30px;
            border-radius: 50px;
            border: 2px solid var(--secondary-neon);
            box-shadow: 0 0 15px var(--secondary-neon);
        }

        #balance {
            font-weight: bold;
            color: #fff;
        }

        /* Главная зона клика */
        .click-area {
            margin: 40px 0;
            position: relative;
        }

        .main-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--secondary-neon), var(--bg-color));
            border: 4px solid var(--primary-neon);
            cursor: pointer;
            outline: none;
            transition: transform 0.1s, box-shadow 0.3s;
            box-shadow: 0 0 30px var(--primary-neon);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            user-select: none;
        }

        .main-button:active {
            transform: scale(0.95);
            box-shadow: 0 0 50px var(--accent-neon);
        }

        /* Секция Кейсов */
        .cases-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
            margin-bottom: 50px;
        }

        .case-card {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 180px;
            transition: 0.3s;
        }

        .case-card:hover {
            border-color: var(--accent-neon);
            transform: translateY(-5px);
        }

        .case-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
        }

        .case-name {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .case-price {
            color: var(--primary-neon);
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: block;
        }

        .buy-btn {
            background: transparent;
            color: white;
            border: 1px solid var(--primary-neon);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .buy-btn:hover {
            background: var(--primary-neon);
            color: black;
            box-shadow: 0 0 15px var(--primary-neon);
        }

        /* Уведомления о выигрыше */
        .log {
            position: fixed;
            bottom: 20px;
            right: 20px;
            max-width: 250px;
            font-size: 0.9rem;
        }.log-item {
            background: rgba(0,0,0,0.8);
            margin-top: 5px;
            padding: 10px;
            border-left: 4px solid var(--accent-neon);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>NEON CLICKER</h1>
        <div class="balance-container">
            Баланс: <span id="balance">0</span> 🪙
        </div>
    </div>

    <div class="click-area">
        <button class="main-button" id="clickBtn">💎</button>
    </div>

    <div class="cases-container">
        <div class="case-card">
            <span class="case-icon">📦</span>
            <span class="case-name">Обычный кейс</span>
            <span class="case-price">Цена: 100</span>
            <button class="buy-btn" onclick="openCase('common')">Открыть</button>
        </div>

        <div class="case-card">
            <span class="case-icon">🎁</span>
            <span class="case-name">Редкий кейс</span>
            <span class="case-price">Цена: 500</span>
            <button class="buy-btn" onclick="openCase('rare')">Открыть</button>
        </div>

        <div class="case-card" style="border-color: var(--accent-neon);">
            <span class="case-icon">💎</span>
            <span class="case-name">Эпик кейс</span>
            <span class="case-price">Цена: 2500</span>
            <button class="buy-btn" onclick="openCase('epic')" style="border-color: var(--accent-neon);">Открыть</button>
        </div>
    </div>

    <div class="log" id="log"></div>

    <script>
        // Инициализация данных
        let coins = parseInt(localStorage.getItem('neonCoins')) || 0;
        const balanceDisplay = document.getElementById('balance');
        const clickBtn = document.getElementById('clickBtn');
        const logContainer = document.getElementById('log');

        // Настройки кейсов (мин выигрыш, макс выигрыш, цена)
        const cases = {
            common: { min: 10, max: 250, price: 100, name: "Обычный" },
            rare: { min: 100, max: 1500, price: 500, name: "Редкий" },
            epic: { min: 1000, max: 10000, price: 2500, name: "Эпический" }
        };

        // Обновление интерфейса
        function updateUI() {
            balanceDisplay.innerText = coins.toLocaleString();
            localStorage.setItem('neonCoins', coins);
        }

        // Клик
        clickBtn.addEventListener('click', (e) => {
            coins += 1;
            updateUI();
            createClickParticle(e);
        });

        // Открытие кейса
        function openCase(type) {
            const selectedCase = cases[type];

            if (coins >= selectedCase.price) {
                coins -= selectedCase.price;
                
                // Рандомный выигрыш
                const win = Math.floor(Math.random() * (selectedCase.max - selectedCase.min + 1)) + selectedCase.min;
                coins += win;
                
                addLog(Кейс ${selectedCase.name}: +${win} 🪙);
                updateUI();
            } else {
                addLog("Недостаточно монет!", "#ff4d4d");
            }
        }

        // Логи уведомлений
        function addLog(text, color = "#00f2ff") {
            const item = document.createElement('div');
            item.className = 'log-item';
            item.style.borderLeftColor = color;
            item.innerText = text;
            logContainer.prepend(item);

            setTimeout(() => {
                item.style.opacity = '0';
                setTimeout(() => item.remove(), 500);
            }, 3000);
        }

        // Визуальный эффект при клике (циферка +1)function createClickParticle(e) {
            const particle = document.createElement('span');
            particle.innerText = '+1';
            particle.style.position = 'absolute';
            particle.style.left = ${e.clientX - 10}px;
            particle.style.top = ${e.clientY - 20}px;
            particle.style.color = 'var(--primary-neon)';
            particle.style.fontWeight = 'bold';
            particle.style.pointerEvents = 'none';
            particle.style.transition = 'all 0.5s ease-out';
            
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.style.transform = 'translateY(-50px)';
                particle.style.opacity = '0';
            }, 10);

            setTimeout(() => particle.remove(), 600);
        }

        // Запуск UI
        updateUI();
    </script>
</body>
</html>
