<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europe Conflict: Iron Order Light</title>
    <!-- Подключаем Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #090d16;
            color: #f8fafc;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: #0f172a;
        }

        /* Стильный темный военный радар */
        .leaflet-layer {
            filter: brightness(0.4) contrast(1.2) sepia(0.1) hue-rotate(190deg);
        }

        /* Интерфейс управления */
        .gui-panel {
            position: absolute;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #0284c7;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        #top-bar {
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
            align-items: center;
            border-color: #38bdf8;
        }

        .resource {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 16px;
        }
        #res-money { color: #eab308; }
        #res-steel { color: #94a3b8; }
        #res-troops { color: #ef4444; }

        #control-panel, #attack-panel {
            bottom: 25px;
            left: 25px;
            width: 350px;
            display: none;
        }

        #attack-panel {
            border-color: #ef4444;
        }

        h3 {
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 18px;
            letter-spacing: 1px;
        }
        
        .owner-badge {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .building-slots {
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .building-grid {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        .build-tag {
            background: #334155;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #475569;
        }

        .btn {
            display: block;
            width: 100%;
            background: #1e293b;
            color: #fff;
            border: 1px solid #38bdf8;
            padding: 10px;
            margin-top: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            text-align: left;
        }

        .btn:hover {
            background: #38bdf8;
            color: #0f172a;
        }

        .btn small {
            display: block;
            color: #94a3b8;
            font-weight: normal;
        }
        .btn:hover small { color: #1e293b; }

        .btn-attack {
            border-color: #ef4444;
            background: #451a03;
        }
        .btn-attack:hover {
            background: #ef4444;
            color: #fff;
        }

        /* Выбор фракции */
        #start-screen {
            position: absolute;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .start-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            border: 3px solid #38bdf8;
            text-align: center;
            width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        select {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: #0f172a;
            color: #fff;
            border: 2px solid #38bdf8;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
        }

        .active-timers {
            position: absolute;
            top: 90px;
            right: 25px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .timer-card {
            background: rgba(239, 68, 68, 0.9);
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-left: 5px solid #fff;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>

    <!-- Экран выбора -->
    <div id="start-screen">
        <div class="start-box">
            <h1 style="color: #38bdf8; letter-spacing: 2px; margin-bottom: 10px;">EUROPE: IRON ORDER</h1>
            <p style="color: #94a3b8;">Выберите страну для тотального доминирования:</p>
            <select id="country-select">
                <option value="Германия">Германия (Центральный Сектор)</option>
                <option value="Франция">Франция (Западный Сектор)</option>
                <option value="Польша">Польша (Восточный Сектор)</option>
                <option value="Великобритания">Великобритания (Островной Сектор)</option>
                <option value="Италия">Италия (Южный Сектор)</option>
            </select>
            <button class="btn" style="text-align:center; background:#38bdf8; color:#0f172a;" onclick="startGame()">НАЧАТЬ ВОЙНУ</button>
        </div>
    </div>

    <!-- Ресурсы -->
    <div id="top-bar" class="gui-panel">
        <div class="resource">💰 <span id="res-money">1000</span></div>
        <div class="resource">📦 <span id="res-steel">500</span></div>
        <div class="resource">🎖️ <span id="res-troops">12</span> див.</div>
    </div>

    <!-- Окна штурмов в углу экрана -->
    <div class="active-timers" id="timers-container"></div>

    <!-- Панель СВОЕГО государства -->
    <div id="control-panel" class="gui-panel">
        <h3 id="selected-city-name">Регион</h3>
        <span class="owner-badge" style="background: #22c55e; color: #0f172a;">ВАШ СЕКТОР</span>
        
        <div class="building-slots">
            <div style="font-size: 12px; color: #94a3b8;">Построенные объекты:</div>
            <div class="building-grid" id="city-buildings">Нет построек</div>
        </div>
        
        <button class="btn" onclick="buildStructure('bank')">🏦 Построить Банк <small>Цена: 300💰 | Доход: +60💰/цикл</small></button>
        <button class="btn" onclick="buildStructure('factory')">🏭 Построить Завод <small>Цена: 200💰, 100📦 | Доход: +40📦/цикл</small></button>
        <button class="btn" onclick="buildStructure('military')">⚔️ Военная база <small>Цена: 400💰, 200📦 | Доход: +1🎖️/цикл</small></button>
    </div>

    <!-- Панель штурма ВРАГА -->
    <div id="attack-panel" class="gui-panel">
        <h3 id="enemy-city-name">Враг</h3>
        <span id="enemy-city-owner" class="owner-badge" style="background: #ef4444; color: #fff;">ИИ</span>
        
        <div class="building-slots" style="margin-bottom: 10px;">
            <div style="font-size: 12px; color: #94a3b8;">Разведданные инфраструктуры:</div>
            <div class="building-grid" id="enemy-buildings">-</div>
        </div>

        <button class="btn btn-attack" onclick="startAssault('infantry')">🪖 Штурм Пехотой <small>Время: 5 мин | Расход: 1 див.</small></button>
        <button class="btn btn-attack" onclick="startAssault('tanks')">🚜 Танковый прорыв <small>Время: 2 мин | Расход: 2 див.</small></button>
        <button class="btn btn-attack" onclick="startAssault('planes')">✈️ Воздушный удар <small>Время: 2 мин | Расход: 1 див.</small></button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let resources = { money: 1200, steel: 600, troops: 15 };
        let playerCountry = '';
        let selectedState = null;

        // Палитра фракций (Игрок всегда выделяется сочным неоново-зеленым!)
        const factionColors = {
            'Игрок': '#22c55e',          
            'Германия': '#eab308',       
            'Франция': '#3b82f6',        
            'Польша': '#a855f7',         
            'Великобритания': '#06b6d4', 
            'Италия': '#f97316'          
        };

        // База стран Европы с точными координатами границ (полигонами) для удобства клика
        let states = [
            { name: "Германия", owner: "Германия", buildings: [], coords: [[55,6], [55,15], [47,15], [47,6]], center: [51.1657, 10.4515] },
            { name: "Франция", owner: "Франция", buildings: [], coords: [[51,-5], [51,8], [42,8], [42,-5]], center: [46.2276, 2.2137] },
            { name: "Польша", owner: "Польша", buildings: [], coords: [[54,14], [54,24], [49,24], [49,14]], center: [51.9194, 19.1451] },
            { name: "Великобритания", owner: "Великобритания", buildings: [], coords: [[59,-8], [59,2], [50,2], [50,-8]], center: [55.3781, -3.4360] },
            { name: "Италия", owner: "Италия", buildings: [], coords: [[46,6], [46,14], [37,18], [37,12]], center: [41.8719, 12.5674] }
        ];

        // Инициализация карты с фокусом строго на Европу
        const map = L.map('map', {
            center: [50, 10],
            zoom: 4,
            minZoom: 4,
            maxZoom: 6,
            maxBounds: [[30, -15], [65, 35]], // Ограничиваем карту только Европой
            zoomControl: false
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let geoLayers = L.layerGroup().addTo(map);

        function startGame() {
            playerCountry = document.getElementById('country-select').value;

            // Перекрашиваем выбранную игроком страну
            states.forEach(state => {
                if(state.name === playerCountry) {
                    state.owner = "Игрок";
                }
            });

            document.getElementById('start-screen').style.display = 'none';
            drawMap();
            startLoop();
        }

        // Отрисовка карты: Закрашиваем ВСЮ территорию страны ярким цветом владельца
        function drawMap() {
            geoLayers.clearLayers();

            states.forEach(state => {
                let color = factionColors[state.owner] || factionColors['Игрок'];
                
                // Рисуем границы государства
                let polygon = L.polygon(state.coords, {
                    color: color,
                    weight: 3,
                    fillColor: color,
                    fillOpacity: 0.4,
                    className: 'state-poly'
                }).addTo(geoLayers);

                // Клик по любой точке страны открывает её меню
                polygon.on('click', () => openStateMenu(state));

                // Создаем красивый военный маркер столицы
                let marker = L.circleMarker(state.center, {
                    radius: 9,
                    color: '#ffffff',
                    fillColor: color,
                    fillOpacity: 1,
                    weight: 2
                }).addTo(geoLayers);

                marker.bindTooltip(`<b>${state.name}</b><br>Владелец: ${state.owner}`, { permanent: true, direction: 'center', className: 'tactical-label' });
                marker.on('click', () => openStateMenu(state));
            });
        }

        function openStateMenu(state) {
            selectedState = state;
            
            if (state.owner === "Игрок") {
                document.getElementById('attack-panel').style.display = 'none';
                document.getElementById('control-panel').style.display = 'block';
                document.getElementById('selected-city-name').innerText = state.name;
                
                // Рендерим иконки зданий
                let grid = document.getElementById('city-buildings');
                grid.innerHTML = state.buildings.length > 0 ? 
                    state.buildings.map(b => `<span class="build-tag">${b}</span>`).join('') : "Нет построек";
            } else {
                document.getElementById('control-panel').style.display = 'none';
                document.getElementById('attack-panel').style.display = 'block';
                document.getElementById('enemy-city-name').innerText = state.name;
                document.getElementById('enemy-city-owner').innerText = `Владелец: ${state.owner}`;
                
                let grid = document.getElementById('enemy-buildings');
                grid.innerHTML = state.buildings.length > 0 ? 
                    state.buildings.map(b => `<span class="build-tag" style="background:#450a0a;">${b}</span>`).join('') : "Слоты пусты";
            }
        }

        // Строительство
        function buildStructure(type) {
            if (!selectedState) return;

            if (type === 'bank' && resources.money >= 300) {
                resources.money -= 300;
                selectedState.buildings.push("🏦 Банк");
            } else if (type === 'factory' && resources.money >= 200 && resources.steel >= 100) {
                resources.money -= 200;
                resources.steel -= 100;
                selectedState.buildings.push("🏭 Завод");
            } else if (type === 'military' && resources.money >= 400 && resources.steel >= 200) {
                resources.money -= 400;
                resources.steel -= 200;
                selectedState.buildings.push("⚔️ База");
            } else {
                alert("Ошибка: Недостаточно ресурсов для постройки!");
                return;
            }

            updateUI();
            openStateMenu(selectedState);
        }

        // Реальные таймеры штурма (5 минут пехота, 2 минуты техника)
        function startAssault(type) {
            let requiredTroops = type === 'tanks' ? 2 : 1;

            if (resources.troops < requiredTroops) {
                alert("Недостаточно дивизий для проведения операции!");
                return;
            }

            resources.troops -= requiredTroops;
            updateUI();

            // Время в секундах: пехота 300 сек (5 мин), танки/самолеты 120 сек (2 мин)
            let duration = (type === 'infantry') ? 300 : 120; 
            let target = selectedState;

            // Создаем плашку таймера в углу экрана
            let timerId = 'timer_' + Date.now();
            let container = document.getElementById('timers-container');
            let timerCard = document.createElement('div');
            timerCard.className = 'timer-card';
            timerCard.id = timerId;
            container.appendChild(timerCard);

            let countdown = setInterval(() => {
                duration--;
                let mins = Math.floor(duration / 60);
                let secs = duration % 60;
                timerCard.innerText = `⚔️ Битва за ${target.name}: ${mins}:${secs < 10 ? '0' : ''}${secs}`;

                if (duration <= 0) {
                    clearInterval(countdown);
                    timerCard.remove();
                    
                    // Расчет захвата (упрощенный баланс Iron Order)
                    if (Math.random() < 0.75) {
                        alert(`Победа! Прорыв удался, ${target.name} теперь закрашен в ваш цвет!`);
                        target.owner = "Игрок";
                        drawMap(); // Перекрашиваем карту целиком
                    } else {
                        alert(`Ваша армия потерпела поражение в секторе ${target.name}.`);
                    }
                    document.getElementById('attack-panel').style.display = 'none';
                }
            }, 1000);
        }

        // Экономический тик (каждые 4 секунды — начисление)
        function startLoop() {
            setInterval(() => {
                // Базовый доход страны
                resources.money += 30;
                resources.steel += 15;

                // Доходы от заводов и банков
                states.forEach(state => {
                    if (state.owner === "Игрок") {
                        state.buildings.forEach(b => {
                            if (b.includes("Банк")) resources.money += 60;
                            if (b.includes("Завод")) resources.steel += 40;
                            if (b.includes("База")) resources.troops += 1;
                        });
                    } else {
                        // Облегченный ИИ развивается сам
                        if (Math.random() < 0.1) {
                            state.buildings.push("🏭 Завод ИИ");
                        }
                    }
                });

                updateUI();
            }, 4000);
        }

        function updateUI() {
            document.getElementById('res-money').innerText = resources.money;
            document.getElementById('res-steel').innerText = resources.steel;
            document.getElementById('res-troops').innerText = resources.troops;
        }
    </script>
</body>
</html>
